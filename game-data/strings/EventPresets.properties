BATTLE_MODE_BOOSTER.eventCard.BattleModeBooster.summary=Get "Battle Mode Ready" with this incredible limited time offer. Purchasing this deal will boost your account to Team Level <boostTeamLevel>, give you access to nearly every feature in the game, and complete all Normal and Elite Campaign Chapters up to Chapter <boostNormalCampaignChapter>! This deal also unlocks up to a maximum of <heroCount> heroes at <boostStars> Stars and <boostRarity> rank and powered up to Level <boostLevel> so you can jump right into the action! Don't hesitate to collect these awesome Heroes and blast through the virus overtaking the City! Tap the Info icon for more details.
