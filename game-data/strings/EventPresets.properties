TRIAL.howToPlay.LimitedTimeChallenges.title=Limited Time Challenges
TRIAL.howToPlay.LimitedTimeChallenges.bullet1=Trial Events are limited-time events that provide a special challenge and extra rewards
TRIAL.howToPlay.LimitedTimeChallenges.bullet2=While the Trial is running, you will get a number of chances to fight per day, just like Team Trials
TRIAL.howToPlay.LimitedTimeChallenges.bullet3=
TRIAL.howToPlay.UniqueGameplay.title=Unique Gameplay
TRIAL.howToPlay.UniqueGameplay.bullet1=Each Trial Event can be different and offer unique gameplay
TRIAL.howToPlay.UniqueGameplay.bullet2=Some will be similar to the Team Trials while others might even be like a small campaign
TRIAL.howToPlay.UniqueGameplay.bullet3=This means that rewards can be awarded differently depending on the Trial Type
TRIAL.howToPlay.SpecialRules.title=Special Rules
TRIAL.howToPlay.SpecialRules.bullet1=Trials can also have special rules that modify the gameplay
TRIAL.howToPlay.SpecialRules.bullet2=These rules can adjust how combat works or even what Heroes can be used
TRIAL.howToPlay.SpecialRules.bullet3=
TRIAL.howToPlay.DifferentDifficulties.title=Different Difficulties and Stages
TRIAL.howToPlay.DifferentDifficulties.bullet1=Some Trial Events might have multiple difficulties or stages, so make sure to select the difficulty that is right for you
TRIAL.howToPlay.DifferentDifficulties.bullet2=Beating a stage at one difficulty will NOT automatically beat the same stage at a lower difficulty
TRIAL.howToPlay.DifferentDifficulties.bullet3=
TRIAL.howToPlay.3StarCampaign.title=Campaign Trial
TRIAL.howToPlay.3StarCampaign.bullet1=Players do not use any daily chances in a Campaign Trial. Instead, players will be able to fight through a linear set of battles.
TRIAL.howToPlay.3StarCampaign.bullet2=Players will be able to attempt to complete the trial until the end of the event or until they have completed all of the stages of the trial.
TRIAL.howToPlay.3StarCampaign.bullet3=Once a stage has been defeated and a player has achieved a 3 star victory, that stage cannot be completed again. Once all stages have been beaten at 3 stars, the Trial has been defeated!
TRIAL.howToPlay.Campaign.title=Campaign Trial
TRIAL.howToPlay.Campaign.bullet1=Players do not use any daily chances in a Campaign Trial. Instead, players will be able to fight through a linear set of battles.
TRIAL.howToPlay.Campaign.bullet2=Players will be able to attempt to complete the trial until the end of the event or until they have completed all of the stages of the trial
TRIAL.howToPlay.Campaign.bullet3=Once a stage has been defeated that stage cannot be completed again. Once all stages have been beaten, the Trial has been defeated!
TRIAL.howToPlay.WaveTrial.title=Wave Trials
TRIAL.howToPlay.WaveTrial.bullet1=All players will get a fixed set of daily chances every day at their own daily reset time. Each player will have the same number of resets regardless of when their reset time occurs.
TRIAL.howToPlay.WaveTrial.bullet2=Any stage can be attempted while the player has any daily chances remaining. Losing or retreating does not use a daily chance.
TRIAL.howToPlay.WaveTrial.bullet3=The enemies will change with every daily reset unless specifically stated otherwise. The enemies will be the same for all players.
TRIAL.eventCard.OlafTrial.title=Olaf's Winter Adventure
TRIAL.eventCard.OlafTrial.summary=Winter has come to the City!
TRIAL.eventCard.OlafTrial.details=
TRIAL.eventCard.OlafTrial.button=Trials
TRIAL.stage.OlafTrialStage1.title=Stay Frosty
TRIAL.stage.OlafTrialStage1.info=A winter storm has hit the City, covering everything in snow and ice! Olaf and his friends need to save the other heroes from winter's icy grip before it's too late!
TRIAL.stage.OlafTrialStage1.button=Story
TRIAL.stage.OlafTrialStage2.title=Exact Opposites
TRIAL.stage.OlafTrialStage2.info=As the team begins their search, Olaf starts to mope. After all, winter isn't nearly as fun as summer. Anna and Elsa assure him that there are plenty of fun things to do in winter, but Olaf remains skeptical.
TRIAL.stage.OlafTrialStage2.button=Story
TRIAL.stage.OlafTrialStage3.title=Super Cold
TRIAL.stage.OlafTrialStage3.info=The team finds Dash with his feet frozen to the ground. The young super was trying to outrun a polar wind, but it was too swift even for him.
TRIAL.stage.OlafTrialStage3.button=Story
TRIAL.stage.OlafTrialStage4.title=Sled Race
TRIAL.stage.OlafTrialStage4.info=With his feet freed, Dash invites the team to go sledding. It's his very favorite thing to do in winter. Anna and Elsa think it's a wonderful idea and drag Olaf along for the ride.
TRIAL.stage.OlafTrialStage4.button=Story
TRIAL.stage.OlafTrialStage5.title=Snow Drifted
TRIAL.stage.OlafTrialStage5.info=The next heroes in trouble are Sully and Boo. It seems they got caught in the storm while trying to have a snowball fight.
TRIAL.stage.OlafTrialStage5.button=Story
TRIAL.stage.OlafTrialStage6.title=Fight To The Finish
TRIAL.stage.OlafTrialStage6.info=After the heroes dig out Sully and Boo, the snowball fight resumes! Olaf had forgotten how much fun they were and giggles merrily as he lobs snowballs at the heroes.
TRIAL.stage.OlafTrialStage6.button=Story
TRIAL.stage.OlafTrialStage7.title=Tongue Tied
TRIAL.stage.OlafTrialStage7.info=With the snowball fight over, the team presses on. It isn't long before they find Gonzo with his tongue stuck to a lamppost. It turns out he was doing his favorite winter activity, licking things!
TRIAL.stage.OlafTrialStage7.button=Story
TRIAL.stage.OlafTrialStage8.title=Yank!
TRIAL.stage.OlafTrialStage8.info=It takes some tugging, but the team gets Gonzo separated from the lamppost. Gonzo thanks everyone and heads on his way to go find something else to lick. Olaf suddenly wishes he had a tongue.
TRIAL.stage.OlafTrialStage8.button=Story
TRIAL.stage.OlafTrialStage9.title=Stuck
TRIAL.stage.OlafTrialStage9.info=The team finds Joy and her hockey buddies out on a frozen pond in the Park, but no one is playing. Joy and the others are stuck to the ice!
TRIAL.stage.OlafTrialStage9.button=Story
TRIAL.stage.OlafTrialStage10.title=Unbuttoned
TRIAL.stage.OlafTrialStage10.info=Once Joy and the others are freed from the ice, they invite the team to play. Olaf claims the title of team mascot, and even offers up one of his coal buttons as a puck!
TRIAL.stage.OlafTrialStage10.button=Story
TRIAL.stage.OlafTrialStage11.title=Soda Soaked
TRIAL.stage.OlafTrialStage11.info=Olaf and the team venture farther into the Park. It isn't long before they find Vanellope covered in soda and shivering. The extreme cold caused her soda soaker to burst a gasket.
TRIAL.stage.OlafTrialStage11.button=Story
TRIAL.stage.OlafTrialStage12.title=Hot Stuff
TRIAL.stage.OlafTrialStage12.info=The heroes get Vanellope dried off and into warmer attire. She offers them hot cocoa as thanks, which Olaf thinks is a splendid idea, despite not having a stomach or any other internal organs.
TRIAL.stage.OlafTrialStage12.button=Story
TRIAL.stage.OlafTrialStage13.title=Caved In
TRIAL.stage.OlafTrialStage13.info=Suddenly, the team hears a loud *thump* and a voice crying out! They rush to see what's the matter and find Fix-it Felix on the brink of tears. He'd been building a snow fort, only to have it collapse on him.
TRIAL.stage.OlafTrialStage13.button=Story
TRIAL.stage.OlafTrialStage14.title=Shining Castle
TRIAL.stage.OlafTrialStage14.info=Elsa creates a mini ice castle for Felix! It's got everything, a foyer, two sloping stair cases, and even a slide! In all honesty, the slide was Olaf's idea. Felix is delighted!
TRIAL.stage.OlafTrialStage14.button=Story
TRIAL.stage.OlafTrialStage15.title=Shrewd Business
TRIAL.stage.OlafTrialStage15.info=On the way out of the Park, the team runs into Mr. Big and Koslov. Surprisingly, the cold doesn't seem to bother them. Curious, Olaf saunters up and asks Mr. Big what his favorite part about winter is.
TRIAL.stage.OlafTrialStage15.button=Story
TRIAL.stage.OlafTrialStage16.title=In Tense
TRIAL.stage.OlafTrialStage16.info=Mr. Big chuckles and tells Olaf he likes putting folks on ice. Olaf has no idea what that means, but it sounds like fun! The rest of the team, however, seems uneasy about the news.
TRIAL.stage.OlafTrialStage16.button=Story
TRIAL.stage.OlafTrialStage17.title=Snow Day!
TRIAL.stage.OlafTrialStage17.info=By the end of the day the team has saved all the heroes, not to mention they had a great time doing it. Having finally realized how fun winter can be, Olaf can't wait until the next storm hits!
TRIAL.stage.OlafTrialStage17.button=Story
TRIAL.eventCard.NewYearsBugTrial.title=Creepy New Year
TRIAL.eventCard.NewYearsBugTrial.summary=It's New Year's Eve and creeps are ransacking the City!
TRIAL.eventCard.NewYearsBugTrial.details=
TRIAL.eventCard.NewYearsBugTrial.button=Trials
TRIAL.stage.NewYearsBugTrialStage1.title=Creepy Crawlers
TRIAL.stage.NewYearsBugTrialStage1.info=Agitated by all the sounds from the festivities across the City, creeps are on the attack! Bent on ruining everyone's good time, the baddies move from one party to the next.
TRIAL.stage.NewYearsBugTrialStage1.button=Story
TRIAL.stage.NewYearsBugTrialStage2.title=Joyful Noise
TRIAL.stage.NewYearsBugTrialStage2.info=The Electric Mayhem are putting on a concert in the Theater District when creeps crash the final number. People begin to panic as the enemies swarm through the crowd.
TRIAL.stage.NewYearsBugTrialStage2.button=Story
TRIAL.stage.NewYearsBugTrialStage3.title=Surfs Up
TRIAL.stage.NewYearsBugTrialStage3.info=Wasting no time, Animal and the others crush the creeps with their instruments and crowd-surf them out of the venue. Cheers ripple through the audience as the band plays a celebratory encore!
TRIAL.stage.NewYearsBugTrialStage3.button=Story
TRIAL.stage.NewYearsBugTrialStage4.title=Red With Anger
TRIAL.stage.NewYearsBugTrialStage4.info=The Queen of Hearts is hosting a Black and Red Gala when creeps come knocking at her castle door. She watches as they fill the banquet hall, enraged by the sight of it all.
TRIAL.stage.NewYearsBugTrialStage4.button=Story
TRIAL.stage.NewYearsBugTrialStage5.title=Fully Decked
TRIAL.stage.NewYearsBugTrialStage5.info=The Queen commands her card guard to seize the creeps! In the blink of an eye, the baddies are boosted from the banquet hall.
TRIAL.stage.NewYearsBugTrialStage5.button=Story
TRIAL.stage.NewYearsBugTrialStage6.title=No Invite
TRIAL.stage.NewYearsBugTrialStage6.info=The Mad Hatter, March Hare, and Dormouse are having a splendid tea party in the Park when creeps begin to run amok. Needless to say, the three aren't too keen on the uninvited party guests.
TRIAL.stage.NewYearsBugTrialStage6.button=Story
TRIAL.stage.NewYearsBugTrialStage7.title=To The Tea
TRIAL.stage.NewYearsBugTrialStage7.info=Armed with trivets and cutlery, the Mad Hatter leaps into the fray! The March Hare and Dormouse follow closely behind, carrying steaming pots of tea. It isn't long before the creeps scatter out of fear of being scalded.
TRIAL.stage.NewYearsBugTrialStage7.button=Story
TRIAL.stage.NewYearsBugTrialStage8.title=Two To Tango
TRIAL.stage.NewYearsBugTrialStage8.info=Downtown, Goofy is hosting a dance-a-thon. Everyone is getting into the groove when creeps burst into the ballroom!
TRIAL.stage.NewYearsBugTrialStage8.button=Story
TRIAL.stage.NewYearsBugTrialStage9.title=Beat It
TRIAL.stage.NewYearsBugTrialStage9.info=It's a boogie beat-down as the dancers take on the creeps. Thanks to a quick tempo and some fancy footwork, the baddies are backed out of the ballroom and onto the street.
TRIAL.stage.NewYearsBugTrialStage9.button=Story
TRIAL.stage.NewYearsBugTrialStage10.title=Hootenanny
TRIAL.stage.NewYearsBugTrialStage10.info=Back at the Park, Robin Hood and his Merry Men are having a hoedown in the forest. The shindig screeches to a halt when creeps jump out from the underbrush!
TRIAL.stage.NewYearsBugTrialStage10.button=Story
TRIAL.stage.NewYearsBugTrialStage11.title=Arrowed!
TRIAL.stage.NewYearsBugTrialStage11.info=A slew of arrows rain down on the creeps! Robin Hood whoops and hollers as he and his men watch the would-be party crashers flee.
TRIAL.stage.NewYearsBugTrialStage11.button=Story
TRIAL.stage.NewYearsBugTrialStage12.title=Laugh It Up
TRIAL.stage.NewYearsBugTrialStage12.info=The Comedy Club is hosting a laugh-in when creeps swarm the stage! Audience members shriek in fright as the enemies barrel towards them.
TRIAL.stage.NewYearsBugTrialStage12.button=Story
TRIAL.stage.NewYearsBugTrialStage13.title=Fruit Bowled Over
TRIAL.stage.NewYearsBugTrialStage13.info=Thinking fast, Mike and Fozzie throw rotten fruit at the creeps! The audience laughs and cheers as the baddies get pelted with produce.
TRIAL.stage.NewYearsBugTrialStage13.button=Story
TRIAL.stage.NewYearsBugTrialStage14.title=Blast Off
TRIAL.stage.NewYearsBugTrialStage14.info=To top the night off, Merlin and Ian light off fireworks in City Center. But before the big finale, creeps come charging in!
TRIAL.stage.NewYearsBugTrialStage14.button=Story
TRIAL.stage.NewYearsBugTrialStage15.title=Up And Away
TRIAL.stage.NewYearsBugTrialStage15.info=Using their best spells, the wizards blast the bad guys sky high! The creeps travel upward into the atmosphere until they are nothing more than specks among the stars.
TRIAL.stage.NewYearsBugTrialStage15.button=Story
TRIAL.stage.NewYearsBugTrialStage16.title=Happy New Year!
TRIAL.stage.NewYearsBugTrialStage16.info=When the clock strikes midnight, sounds of jubilation can be heard ringing through the streets. It's a new year in the City, and that's always cause for celebration.
TRIAL.stage.NewYearsBugTrialStage16.button=Story
TRIAL.eventCard.BuzzTrial.title=Buzz Refresh Trial
TRIAL.eventCard.BuzzTrial.summary=Toys are in desperate need of assistance across the City! It's up to Buzz to lend a helping hand to his friends.
TRIAL.eventCard.BuzzTrial.details=
TRIAL.eventCard.BuzzTrial.button=Trials
TRIAL.stage.BuzzTrialStage1.title=Woody
TRIAL.stage.BuzzTrialStage1.info=Woody is surrounded by creeps! Buzz shoots his laser beam, but it has no effect. Thinking quickly, Buzz rushes towards the creeps. Grabbing Woody by his pull string, he drags the Sheriff out of harm's way.
TRIAL.stage.BuzzTrialStage1.button=Story
TRIAL.stage.BuzzTrialStage2.title=Rex
TRIAL.stage.BuzzTrialStage2.info=Buzz finds Rex tangled in a yo-yo string. Buzz tries his best to free Rex, but the dinosaur panics, whacking him in the chest with his tail. Unable to evade, Buzz is knocked back, pulling the string with him. Surprisingly, the force untangles Rex.
TRIAL.stage.BuzzTrialStage2.button=Story
TRIAL.stage.BuzzTrialStage3.title=Hamm
TRIAL.stage.BuzzTrialStage3.info=Buzz spots the evil Doctor Pork Chop! But when Buzz tries to disarm him, his suit malfunctions, negating his armor. Seeing Buzz in distress, Doctor Pork Chop takes off his bowler hat, revealing himself to be Hamm all along.
TRIAL.stage.BuzzTrialStage3.button=Story
TRIAL.stage.BuzzTrialStage4.title=Jessie
TRIAL.stage.BuzzTrialStage4.info=Buzz sees Jessie dancing and is momentarily blinded by the dust she kicks up. The ragdoll finishes her jig and the dust settles, snapping Buzz back to reality.
TRIAL.stage.BuzzTrialStage4.button=Story
TRIAL.stage.BuzzTrialStage5.title=Ducky and Bunny
TRIAL.stage.BuzzTrialStage5.info=Ducky and Bunny get into an argument, and start shoving each other. Buzz tries to break it up, but the plush toys rage makes them invincible! After about five seconds, however, the two forget what they were fighting about and make up.
TRIAL.stage.BuzzTrialStage5.button=Story
TRIAL.stage.BuzzTrialStage6.title=Bo Peep
TRIAL.stage.BuzzTrialStage6.info=Bo Peep is overwhelmed by creep Mages! Buzz rushes to her aid, but the enemies are tougher than he anticipated. Working together, he and Bo Peep beat them back and win the battle.
TRIAL.stage.BuzzTrialStage6.button=Story
TRIAL.stage.BuzzTrialStage7.title=Slinky Dog
TRIAL.stage.BuzzTrialStage7.info=Slinky Dog lost a battle with some creeps and has come uncoiled! Though badly damaged, Buzz works quickly to recoil his temporarily hindered friend. In no time at all, Slinky Dog is back to his tail wagging self.
TRIAL.stage.BuzzTrialStage7.button=Story
TRIAL.stage.BuzzTrialStage8.title=Emperor Zurg
TRIAL.stage.BuzzTrialStage8.info=Emperor Zurg comes out from the shadows, cackling wildly! As the menacing villain approaches, Buzz backs off, accidentally stepping in gum! Slowed by the sticky situation, Buzz must brace himself as he's pelted with balls from Zurg's cannon.
TRIAL.stage.BuzzTrialStage8.button=Story
TRIAL.eventCard.TianaTrial.title=Tiana's Party
TRIAL.eventCard.TianaTrial.summary=Tiana's throwing a big party to celebrate the fifth year anniversary of Disney Heroes! The last thing left is put the candles on the enormous cake, and with Creeps attacking, it's up to the other heroes to help her finish!
TRIAL.eventCard.TianaTrial.details=With Tiana in your lineup, complete all Campain Trial stages to unlock a special cosmetic border
TRIAL.eventCard.TianaTrial.button=Trials
TRIAL.stage.TianaTrialStage1.title=Ralph
TRIAL.stage.TianaTrialStage1.info=Ralph is helping Tiana test out flame intensity for the candles when a wave of Creeps crashes in! Distracted, Ralph sets the candles WAY too bright! It'll be hard to see much in this fight!
TRIAL.stage.TianaTrialStage1.button=Story
TRIAL.stage.TianaTrialStage2.title=Vanellope
TRIAL.stage.TianaTrialStage2.info=The Creeps head directly for the cake! Tiana shouts a warning, and Vanellope glitches in, scattering the Creeps. But it startles the other heroes, lowering their defenses!
TRIAL.stage.TianaTrialStage2.button=Story
TRIAL.stage.TianaTrialStage3.title=Elastigirl
TRIAL.stage.TianaTrialStage3.info=As Elastigirl stretches up to put the candles on the cake, more Creeps flood in! Tiana scatters red frosting everywhere, confusing the Creeps trying to attack the red-costumed Elastigirl!
TRIAL.stage.TianaTrialStage3.button=Story
TRIAL.stage.TianaTrialStage4.title=Frozone
TRIAL.stage.TianaTrialStage4.info=One of the lit candles is knocked off the cake by a Creep and tumbles towards a crate of flammable frosting! Tiana shoves it out of the way just as Frozone freezes the candle. Unfortunately, the ice blast goes wild, hitting the heroes!
TRIAL.stage.TianaTrialStage4.button=Story
TRIAL.stage.TianaTrialStage5.title=Goofy
TRIAL.stage.TianaTrialStage5.info=During a brief break in Creep attacks, Tiana thanks everyone for helping her get the big anniversary cake finished in time. Goofy leads a cheer for Tiana, invigorating everyone!
TRIAL.stage.TianaTrialStage5.button=Story
TRIAL.stage.TianaTrialStage6.title=Minnie
TRIAL.stage.TianaTrialStage6.info=The Creeps attack again! Minnie tries to dodge, but she's stuck in place! That loose candle left wax all over the floor! Tiana tries to pull Minnie free as the Creeps swarm.
TRIAL.stage.TianaTrialStage6.button=Story
TRIAL.stage.TianaTrialStage7.title=Fozzie
TRIAL.stage.TianaTrialStage7.info=Tiana rallies the heroes, because the cake is almost ready! Fozzie makes some jokes to get everyone in the spirit, and everyone is so distracted groaning they don't notice some Creeps eating loose frosting!
TRIAL.stage.TianaTrialStage7.button=Story
TRIAL.stage.TianaTrialStage8.title=Daisy
TRIAL.stage.TianaTrialStage8.info=The candles are lit and the cake is ready! Daisy and Tiana lead the charge to clear out the last of the Creeps, but this last batch looks tough! Hang in there and make it a 5th Anniversary to remember!
TRIAL.stage.TianaTrialStage8.button=Story
TRIAL.eventCard.UnityTrial.title=Unity Trial
TRIAL.eventCard.UnityTrial.summary=This is a Unity Trial featuring all available Franchises this month.
TRIAL.eventCard.UnityTrial.button=Start
TRIAL.eventCard.FranchiseTrial.title=Franchise Trial
TRIAL.eventCard.FranchiseTrial.summary=This is a Franchise Trial featuring 1 or more Franchises this month.
TRIAL.eventCard.FranchiseTrial.button=Start
TRIAL.trial.UnityTrial.title=Unity Trial
TRIAL.trial.MajorTrial.title=<franchise> Trial
TRIAL.trial.MergeTrial.title=Merge Trial
TRIAL.eventCard.NBCTrial.title=Nightmare Before Christmas 30th Anniversary Campaign Trial
TRIAL.eventCard.NBCTrial.summary=It's the 30th Anniversary of The Nightmare Before Christmas! Time to gather your trick-or-treat crew and go knocking on the doors of some of the spookiest characters in Disney Heroes: Battle Mode!
TRIAL.eventCard.NBCTrial.details=With various Nightmare Before Christmas and other terrific heroes in your lineup, complete all Campain Trial stages to unlock a special cosmetic border
TRIAL.eventCard.NBCTrial.button=Trials
TRIAL.stage.NBCTrialStage1.title=Dash
TRIAL.stage.NBCTrialStage1.info=The energetic Dash rushes off at super-speed, trying to get first dibs on the best candy! Running to catch up with him leaves the other Heroes tired. Gaining energy is tougher for your Heroes this round!
TRIAL.stage.NBCTrialStage1.button=Story
TRIAL.stage.NBCTrialStage2.title=Lock, Shock, & Barrel
TRIAL.stage.NBCTrialStage2.info=Lock, Shock, & Barrel rush off ahead too, but they're more interested in tricks than treats! Their mischievous pranks get the Creeps riled up. The enemy will gain more energy this round!
TRIAL.stage.NBCTrialStage2.button=Story
TRIAL.stage.NBCTrialStage3.title=Sully & Boo
TRIAL.stage.NBCTrialStage3.info=Boo gets a little spooked by the creepy decorations, not to mention the Creeps! Sully promises her that nothing too scary will happen. To keep his word, your Heroes can't be scary this round!
TRIAL.stage.NBCTrialStage3.button=Story
TRIAL.stage.NBCTrialStage4.title=The Mayor
TRIAL.stage.NBCTrialStage4.info=The trick-or-treating is going great! But the nervous Mayor is worried about public opinion. Is Halloween too scary? Is candy too delicious? Should curse damage be nerfed? Let's see!
TRIAL.stage.NBCTrialStage4.button=Story
TRIAL.stage.NBCTrialStage5.title=Winnie Sanderson
TRIAL.stage.NBCTrialStage5.info=Suddenly, a spooky chant emerges from the sewer as the trick-or-treaters pass: When Winnie's around, you can't make a sound! Your Heroes start this round silenced!
TRIAL.stage.NBCTrialStage5.button=Story
TRIAL.stage.NBCTrialStage6.title=Oogie Boogie
TRIAL.stage.NBCTrialStage6.info=The trick-or-treaters continue bravely into the night. But what's this? A shadow on the moon? Or is it... no, it couldn't be! It's Oogie Boogie! Your Heroes start off scared this round!
TRIAL.stage.NBCTrialStage6.button=Story
TRIAL.stage.NBCTrialStage7.title=Sarah Sanderson
TRIAL.stage.NBCTrialStage7.info=Hey, didn't we already go past the Sanderson house? Then what's Sarah doing here? Oh no! While you were wondering that, she cast a wicked spell on you! Heroes start this round cursed!
TRIAL.stage.NBCTrialStage7.button=Story
TRIAL.stage.NBCTrialStage8.title=Randall Boggs
TRIAL.stage.NBCTrialStage8.info=When the trick-or-treaters go to knock on the next door, their hands collide with something invisible... and cold... and slimy! It's Randall Boggs! Your Heroes will have to deal with the cold this round!
TRIAL.stage.NBCTrialStage8.button=Story
TRIAL.stage.NBCTrialStage9.title=Sally
TRIAL.stage.NBCTrialStage9.info=The next house is unattended, but the owner left a bowl out... and it's totally empty! "I thought people would just take one," explains Sally. The candy-stuffed Creeps have extra health next round!
TRIAL.stage.NBCTrialStage9.button=Story
TRIAL.stage.NBCTrialStage10.title=Mike Wazowski
TRIAL.stage.NBCTrialStage10.info=The trick-or-treaters pass a short, round figure dressed up as... a HAPPY HALLOWEEN sticker? "I figured I should lean into it!" says Mike Wazowski. Enemies have extra stickers–I mean ARMOR–this round!
TRIAL.stage.NBCTrialStage10.button=Story
TRIAL.stage.NBCTrialStage11.title=Kuzco
TRIAL.stage.NBCTrialStage11.info=Suddenly, Kuzco strolls by and grabs a bunch of candy from everyone's bag. "You don't mind, do you?" he asks, already unwrapping and eating it. Stolen treats make it harder to heal next round!
TRIAL.stage.NBCTrialStage11.button=Story
TRIAL.stage.NBCTrialStage12.title=Mary Sanderson
TRIAL.stage.NBCTrialStage12.info=The final Sanderson Sister is hungry for trick-or-treaters! You can't hide from her nose, so your Heroes won't be able to evade this round!
TRIAL.stage.NBCTrialStage12.button=Story
TRIAL.stage.NBCTrialStage13.title=Jack Skellington
TRIAL.stage.NBCTrialStage13.info="Let's have a big finale, everyone!" cries Jack Skellington. The Creeps will be trying extra hard to bring your Heroes down next round. Make it home safe for a Happy Halloween!
TRIAL.stage.NBCTrialStage13.button=Story
TRIAL.eventCard.EarlyAccessTrial.title=Early Access Trial
TRIAL.eventCard.EarlyAccessTrial.summary=This is a Spotlight Trial featuring the latest hero. You will be given a maxed out version of the latest hero to battle it out against increasingly difficult enemies!
TRIAL.eventCard.EarlyAccessTrial.button=Start
TRIAL.trial.EarlyAccessTrial.title=Early Access Trial
TRIAL.howToPlay.EarlyAccessTrial.title=Early Access Trial
TRIAL.howToPlay.EarlyAccessTrial.bullet1=Upon purchasing the Premium Battle Pass, players unlock an exclusive 7-day early access spotlight trial event. This event will only run for 7 days starting the day of purchase, regardless of when the premium track is purchased.
TRIAL.howToPlay.EarlyAccessTrial.bullet2=This event allows players with access to use a maxed out version of the newest hero in their lineup to earn bonus rewards for the duration of the 7 days.
TRIAL.howToPlay.EarlyAccessTrial.bullet3=The event will reset a maximum of 5 times, so make sure to log in every day to maximize the rewards you can earn. This early access event is only available during the first Battle Pass season a new hero is released, and cannot be unlocked anytime after that.
NONSTACKING_IAP_DEAL.eventCard.StaminaSplashBundle.title=Surge of <resource:STAMINA> Deal
NONSTACKING_IAP_DEAL.eventCard.StaminaSplashBundle.summary=Fuel your victory with a surge of energy! Get your team energized with extra stamina items!
NONSTACKING_IAP_DEAL.eventCard.StaminaSplashBundle.details=This package exists as a stand-alone deal and does not stack with other offers or purchases. This deal is limited to select players. Deals may end early.
NONSTACKING_IAP_DEAL.eventCard.StaminaSplashBundle.button=Purchase
NONSTACKING_IAP_DEAL.eventCard.HeroSuppliesBundle.title=<unitType> Chip Supplies Bundle
NONSTACKING_IAP_DEAL.eventCard.HeroSuppliesBundle.summary=Every team needs heroes. Powe up <unitType> with this bundle of heroic supplies!
NONSTACKING_IAP_DEAL.eventCard.HeroSuppliesBundle.details=This package exists as a stand-alone deal and does not stack with other offers or purchases. This deal is limited to select players. Deals may end early.
NONSTACKING_IAP_DEAL.eventCard.HeroSuppliesBundle.button=Purchase
TRIAL.eventCard.7AnniversaryTrial.title=Luau Lockdown Trial
TRIAL.eventCard.7AnniversaryTrial.summary=An important artifact to the city, Mr. Incredible's retro costume has been stolen! Help the Incredibles crew track down the threads and restore this vintage masterpiece!
TRIAL.eventCard.7AnniversaryTrial.details=Using The Incredibles franchise heroes in your lineup, complete all stages to unlock Mr. Incredible's new costume!
TRIAL.eventCard.7AnniversaryTrial.button=Let's Go!
TRIAL.stage.7AnniversaryTrialStage1.title=Part 1
TRIAL.stage.7AnniversaryTrialStage1.info=Late one night, the city's prized artifact—the retro costume of Mr. Incredible—vanishes from the museum. The alarm blares, but when the Incredibles arrive, all they find is a single red thread and a faint whiff of familiar technology. The crew is left wondering: Who would want Mr. Incredible's iconic costume now?
TRIAL.stage.7AnniversaryTrialStage1.button=Story
TRIAL.stage.7AnniversaryTrialStage2.title=Part 2
TRIAL.stage.7AnniversaryTrialStage2.info=Dash speeds around the city, following the trail of fabric left behind by the thief. Soon, they trace the fabric to a hidden underground lair. But as they investigate, they notice something strange—this lair has an eerily familiar signature of advanced technology... Stamped a familiar "S."
TRIAL.stage.7AnniversaryTrialStage2.button=Story
TRIAL.stage.7AnniversaryTrialStage3.title=Part 3
TRIAL.stage.7AnniversaryTrialStage3.info=As they explore deeper into the lair, the Incredibles discover a room full of superhero costumes in various stages of destruction. Just as things start to feel hopeless, a voice cuts through the air: "What are you doing here?" The team turns to find none other than Edna Mode, standing with a high-tech scanner. "You didn't think you could handle this without me, did you, darling?"
TRIAL.stage.7AnniversaryTrialStage3.button=Story
TRIAL.stage.7AnniversaryTrialStage4.title=Part 4
TRIAL.stage.7AnniversaryTrialStage4.info=Edna reveals that the thief isn't some new villain—it's Syndrome, back from the shadows. She explains that he's been hiding for years, secretly collecting and dismantling superhero costumes in a twisted attempt to rebuild his "perfect" tech. The retro costume of Mr. Incredible was his next target, and now, he's planning to use it to fuel his most dangerous creation yet.
TRIAL.stage.7AnniversaryTrialStage4.button=Story
TRIAL.stage.7AnniversaryTrialStage5.title=Part 5
TRIAL.stage.7AnniversaryTrialStage5.info=The Incredibles, with Edna's help, track down Syndrome's secret lair deep beneath the city ferris wheel. Inside, they find Mr. Incredible's costume, now half-assembled into a powerful machine designed to amplify Syndrome's own powers. He's planning to wear it as a new weapon, blending old tech with his own twisted genius.
TRIAL.stage.7AnniversaryTrialStage5.button=Story
TRIAL.stage.7AnniversaryTrialStage6.title=Part 6
TRIAL.stage.7AnniversaryTrialStage6.info=Syndrome, now equipped with his new suit, taunts the Incredibles. "You think you can stop me again? I have the power of your legacy at my fingertips!" The crew readies for battle.
TRIAL.stage.7AnniversaryTrialStage6.button=Story
TRIAL.stage.7AnniversaryTrialStage7.title=Part 7
TRIAL.stage.7AnniversaryTrialStage7.info=With Syndrome defeated and his plans ruined, Mr. Incredible's retro costume is returned to the museum, good as new—thanks to Edna's expert touch. She even creates a new wearable version that Mr. Incredible can don whenever he pleases. The team thanks her for her unexpected intervention, and Edna gives a smug smile. "Darling, I did save your legacy. Don't forget it."
TRIAL.stage.7AnniversaryTrialStage7.button=Story
TRIAL.eventCard.LuauLockdownTrial.summary=The last days of summer call for celebration, and Moana, Maui, Lilo, and Stitch have planned the ultimate luau on the beach. Tiki torches glow, surfboards line the shore, and guests pour in from across the city, but just as the sun begins to set, something stirs beneath the waves...
TRIAL.eventCard.LuauLockdownTrial.details=Using specific heroes in your lineup per stage, battle through this summer finale trial and unlock exciting rewards, including an exclusive cosmetic border!
TRIAL.eventCard.LuauLockdownTrial.button=Let's Go!
TRIAL.stage.LuauLockdownTrialStage1.title=Part 1
TRIAL.stage.LuauLockdownTrialStage1.info=Creeps burst from the water, knocking over tables and scattering guests. Stitch dives straight into the fight, while Jumba scans the beach with his gadgets, tracking where more Creeps are swarming. Candace tries to drag Phineas and Ferb away, convinced they somehow caused the chaos.
TRIAL.stage.LuauLockdownTrialStage1.button=Story
TRIAL.stage.LuauLockdownTrialStage2.title=Part 2
TRIAL.stage.LuauLockdownTrialStage2.info=Moana takes charge, guiding guests to safety while Maui uses his hook to block Creeps rushing the shoreline. Phineas and Ferb scramble to build a contraption to trap the invaders, with Isabella keeping smaller Creeps distracted using nets and quick thinking. The luau grounds quickly turn into a makeshift battlefield.
TRIAL.stage.LuauLockdownTrialStage2.button=Story
TRIAL.stage.LuauLockdownTrialStage3.title=Part 3
TRIAL.stage.LuauLockdownTrialStage3.info=More Creeps pour in from the water, overwhelming the beach. Jack Sparrow tries to rally Barbossa and Elizabeth to fight, but they argue over protecting the luau food instead. Tia Dalma quietly steps in, using her magic to hold back a wave of attackers just long enough for the pirates to join the fray.
TRIAL.stage.LuauLockdownTrialStage3.button=Story
TRIAL.stage.LuauLockdownTrialStage4.title=Part 4
TRIAL.stage.LuauLockdownTrialStage4.info=A massive wave crashes as Davy Jones rises from the deep, furious at the disruption. Tia Dalma convinces him to help, while Dory innocently swims up to "make friends," accidentally distracting him as a group of Creeps attack. Moana uses the moment to push the Creeps toward Jones, who smashes them back into the ocean.
TRIAL.stage.LuauLockdownTrialStage4.button=Story
TRIAL.stage.LuauLockdownTrialStage5.title=Part 5
TRIAL.stage.LuauLockdownTrialStage5.info=Stitch bounces between enemies, launching himself like a cannonball, while Agent P sneaks behind enemy lines to disable Creep tech. Maui wrestles a giant Creep beast in the shallows, buying time as Phineas and Ferb rush to finish their "Creep Catcher 3000." Isabella keeps the area clear, swatting Creeps away from the machine.
TRIAL.stage.LuauLockdownTrialStage5.button=Story
TRIAL.stage.LuauLockdownTrialStage6.title=Part 6
TRIAL.stage.LuauLockdownTrialStage6.info=The Creep Catcher roars to life, vacuuming swarms of enemies across the beach. Stitch gleefully rides the machine like a surfboard, while Maui tosses the Creep beast directly into its pull. With their forces overwhelmed, the Creeps retreat.
TRIAL.stage.LuauLockdownTrialStage6.button=Story
TRIAL.stage.LuauLockdownTrialStage7.title=Part 7
TRIAL.stage.LuauLockdownTrialStage7.info=As the sun sets, the heroes rebuild the luau. Moana and Lilo restart the music, Stitch and Dory attempt a wild hula dance, and Jack Sparrow tries to convince Davy Jones to stay for "just one drink." Guests cheer as the torches are relit, ending summer with one last perfect celebration.
TRIAL.stage.LuauLockdownTrialStage7.button=Story
