MAIL_BODY_NEW_USER_WELCOME_V2=Welcome to the game! Here are a few tips to get you started:\n\n{#ffe00f}Grab Your Daily Rewards!{}
MAIL_BODY_NEW_USER_WELCOME=Welcome to the game! Here are a few tips to get you started:\n\n{#ffe00f}Grab Your Daily Rewards!{}\n{#3ec07b}Sign in{} every day, collect your {#3ec07b}free Gold Crates{} and complete {#3ec07b}Daily Quests{} to earn valuable rewards!\n\n{#ffe00f}Make Your Heroes Stronger!{}\n{#3ec07b}Play Campaign{} to collect badges. Badges are used to promote your heroes and unlock {#3ec07b}new abilities!{}\n\n{#ffe00f}Get More Heroes!{}\nTake advantage of the {#3ec07b}Jumpstart Deal{}, open Diamond Crates or focus on the {#3ec07b}Elite Campaign{} which unlocks when you reach team level 11!\n\n{#ffe00f}Get Free Stuff!{}\nTake advantage of our First Purchase Bonuses to kickstart your progress. Combine multiple bonuses together to earn huge amounts of free diamonds!
MAIL_BODY_NEW_USER_WELCOME_ALT=Welcome to the game! Here are a few tips to get you started:\n\n{#ffe00f}Grab Your Daily Rewards!{}\n{#3ec07b}Sign in{} every day, collect your {#3ec07b}free Gold Crates{} and complete {#3ec07b}Daily Quests{} to earn valuable rewards!\n\n{#ffe00f}Make Your Heroes Stronger!{}\n{#3ec07b}Play Campaign{} to collect badges. Badges are used to promote your heroes and unlock {#3ec07b}new abilities!{}\n\n{#ffe00f}Get More Heroes!{}\nTake advantage of the {#3ec07b}Jumpstart Deal{}, open Diamond Crates or focus on the {#3ec07b}Elite Campaign{} which unlocks when you reach team level 11!\n\n{#ffe00f}Get Free Stuff!{}\nMake ANY purchase in your first 30 days and you'll receive a {#3ec07b}free Daily Diamond Deal{} that awards you 120 Diamonds every day for 30 days, plus {#3ec07b}unlimited raiding!{}
MAIL_BODY_NEW_USER_WELCOME_ALT_2=Welcome to the game! Check out these special, limited-time events: \n\n{#ffe00f}1) First Ever Purchase Bonus:{} Your first ever purchase will give you tons more diamonds than usual... make it count! \n\n{#ffe00f}2) First IAP Pack Bonus:{} The first time you purchase any given package from the store, you'll also receive a big helping of bonus diamonds! \n\n{#ffe00f}3) Dash's Incredible Deal:{} Buy any eligible IAP package during your first week and receive 30 Dash Hero Chips! As a bonus, receive 10 XP Flasks! \n\n{#ffe00f}4) Team Level Challenges:{} If you reach Team Level 10 in your first week, you'll earn %1$s. Reach Team Level 30 by the end of your first week and you'll get an additional %2$s!
