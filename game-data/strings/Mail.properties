MAIL_SUBJECT_NEW_USER_TIPS=Welcome Week Tips!
MAIL_SENDER_NEW_USER_TIPS=The Disney Heroes Team
MAIL_BODY_NEW_USER_TIPS=Missing message
MAIL_SUBJECT_NEW_USER_TIPS_1=Do All Your Quests, Every Day!
MAIL_SUBJECT_NEW_USER_TIPS_2=Take Your Heroes to the Next Level!
MAIL_SUBJECT_NEW_USER_TIPS_3=Badge Hunting 101
MAIL_SUBJECT_NEW_USER_TIPS_4=Build the Perfect Team!
MAIL_SUBJECT_NEW_USER_TIPS_5=Where to Get More Info!
MAIL_BODY_NEW_USER_TIPS_1=Be sure to check your Quests list regularly. Quests earn you Team XP that will help you level up fast. Your Quest list will also remind you of all the things you can do in game. Complete all of your Quests each day and you'll be on your way to becoming a master Disney Heroes player!
MAIL_BODY_NEW_USER_TIPS_2=Remember, there are several ways to upgrade a hero:<br><br>PROMOTION: Collect 6 specific badges to promote a hero to a new rank.<br>EVOLUTION: Collect Hero Chips to evolve a hero, giving it another star and a permanent power boost.<br>LEVELING: USE XP DRINKS to increase a Hero's level, up to your Team Level.<br>SKILL & SKILL LEVELS: Each time you promote a hero to a new color rank, it gains a new skill. Use skill points to level those skills to maximum power!
MAIL_BODY_NEW_USER_TIPS_3=Collecting badges to promote heroes is one of the most important things to focus on as a new player. The best way to find the badges you need is to go to the main Hero Screen, select a hero you're trying to promote, and tap on the badge you want to get next. From there, you can see exactly what goes into crafting that badge as well as where to get it. Just tap one of the levels listed next to the badge to go directly to it in the campaign.<br><br>If you've already 3-starred that level, you can raid it. As long as you have Raid Tickets, you can tap the Raid button to collect a bunch of badges all at once!
MAIL_BODY_NEW_USER_TIPS_4=You may have noticed that some heroes are a better fit for certain battles than others. Here are a few things to look for when picking the "right" Heroes.<br><br>Position<br>Different Heroes prefer to be in different spots in combat. Some like to stand right up front and others like hide out in the back. Choose a mix of positions to get the most from your team.<br><br>Role<br>Each hero also has a role, shown on its detailed stats screen. Tanks are great at taking damage and protecting others. Damage heroes are good at, well, damaging things. Support heroes focus on healing and shielding your team. Control heroes specialize in debilitating the enemy with stuns, charms, freezes, etc. A hero team with a balance of roles usually yields the best results.<br><br>Normal vs. Fantastic Damage<br>All heroes have a basic attack that deals normal damage. But hero skills do either normal or fantastic damage (tap on them to find out which). Some enemies are resistant or even immune to one damage type. Make sure to choose heroes whose skills get past those enemies!
MAIL_BODY_NEW_USER_TIPS_5=Time to venture out on your own! If you're ever confused about anything, there are a few places you can turn. They can all be accessed from the main screen by tapping your profile picture.<br><br>The "Support" button is the place to go to find our game FAQs. If you have a specific issue with your account, you can also contact Customer Support.<br><br>The "Forums" button will take you to the Disney Heroes Forums, which is a great place to ask questions, talk strategy, and chat with other players.
