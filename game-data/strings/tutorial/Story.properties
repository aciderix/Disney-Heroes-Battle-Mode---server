CH_85_LVL_19_POST_5=I think she's just saying it's all feeling a little rough right now.
CH_85_LVL_19_POST_6=Well, perhaps we ought to wait till the waves have calmed a bit.
CH_85_LVL_19_POST_7=No... you're right. We can't let them get away.
CH_85_LVL_19_POST_8=Here we go again!
CH_86_LVL_19_POST_1=Great work, team!
CH_86_LVL_19_POST_2=Yes. We have all done great work.
