CH_27_LVL_2_PRE_5=Lead the way, Carrots.
CH_27_LVL_6_POST_1=Are you sure we're going to find a dev note here? With all this snow, we might as well just save time and give up now.
CH_27_LVL_6_POST_2=Ah, come on. I thought you liked a challenge.
CH_27_LVL_6_POST_3=Usually, yes. But challenges aren't normally this cold.
CH_27_LVL_6_POST_4=I have snow between my toes, I can't feel my tail, and I am not dressed for this weather.
CH_27_LVL_6_POST_5=Well, if this is like the rest of the hidden levels, we won't be able to get out of here until we find the dev note.
CH_27_LVL_6_POST_6=So we might as well start looking.
CH_27_LVL_16_POST_1=Do you want the good news first or the bad news?
CH_27_LVL_16_POST_2=Let's get the bad news out of the way...
CH_27_LVL_16_POST_3=The Inventor's stupid bug program turned into a stink butt virus! We're gonna need all the help we can get or we're sunk!
CH_27_LVL_16_POST_4=Oh man, that's, like, worse than bad.
CH_27_LVL_16_POST_5=Which brings us to the good news...
CH_27_LVL_16_POST_6=The Inventor knew they would need help fighting the virus, so they left a code that would summon heroes outside of the game.
CH_27_LVL_16_POST_7=The game? What does that even mean?
CH_27_LVL_16_POST_8=The note also says that the Inventor was running out of time, so he left more clues in the hidden levels.
CH_27_LVL_16_POST_9=Well, that all sounds ominous.
CH_27_LVL_16_POST_10=Yeah, there's also this bit about "blossoms blooming in adversity," which honestly could mean anything.
CH_28_LVL_2_PRE_1=I'm so glad you're all safe. When that snowstorm happened, I wasn't sure what to think.
CH_28_LVL_2_PRE_2=We got to Arendelle, as advertised. Let me ask you a question though, why would anyone choose to live in a place that cold?
CH_28_LVL_2_PRE_3=Well, it is Norway, so...
CH_28_LVL_2_PRE_4=Yeah, I don't know what that means.
CH_28_LVL_2_PRE_5=Hey, like, guys...
CH_28_LVL_2_PRE_6=It's a country--
CH_28_LVL_2_PRE_7=Uh, like, I just got this weird notification on my device.
CH_28_LVL_2_PRE_8=It says the code the Inventor left was sent already...like before we even found it.
CH_28_LVL_2_PRE_9=Wait, who sent it before?
CH_28_LVL_2_PRE_10=Sweet mother of monkey milk, the INVENTOR sent the code! We're the heroes they were talking about in the dev note!
CH_28_LVL_2_PRE_11=We've been playing the game this whole time!
CH_28_LVL_2_PRE_12=How is that even possible? When we got to the City, things were already crazy.
CH_28_LVL_2_PRE_13=Stinkbrain, the City IS the game! We assumed there would be a start button, but we've been playing since we stepped foot in this place.
CH_28_LVL_2_PRE_14=The Inventor must have been taking us from our own worlds and putting us here in order to save the City from this virus.
CH_28_LVL_2_PRE_15=This is the most epic hustle I've ever seen. Honestly, I'd be furious if I wasn't so impressed.
CH_28_LVL_2_PRE_16=Um, what exactly happened while you were in Arendelle?
CH_28_LVL_16_POST_1=You know, I don't wanna be a bummer, but if the City's infected with this virus thingy then why don't we just go home?
CH_28_LVL_16_POST_2=You mean, back to our own worlds?
CH_28_LVL_16_POST_3=Yeah, like an exit strategy! Why don't we figure that out instead of trying to fight this stupid virus?
CH_28_LVL_16_POST_4=Because that isn't what heroes do.
CH_28_LVL_16_POST_5=I'm with Mrs. Incredible. We need to stand and fight. If not, everyone else in the City, I mean, game, could be in serious danger.
CH_28_LVL_16_POST_6=Carrots is right. We can't give up now.
CH_28_LVL_16_POST_7=Well, I'm in. What do you think, V?
CH_28_LVL_16_POST_8=I don't know...
CH_28_LVL_16_POST_9=Nah, I'm just kidding. Let's be heroes!
CH_28_LVL_19_POST_1=What about this, "blossoms blooming in adversity" bit? That's way too poetic to be the Inventor talking.
CH_28_LVL_19_POST_2=The note also says that the Inventor was running out of time, so they left more clues in the hidden levels.
CH_28_LVL_19_POST_3=Blossoms blooming in adversity...hmm.
CH_28_LVL_19_POST_4=Good hmm, or bad hmm?
CH_28_LVL_19_POST_5=I know I've heard that somewhere...
CH_28_LVL_19_POST_6=That's it! I know who we need to find.
CH_29_LVL_2_PRE_1=Sweet mother of monkey milk! Where did all these creeps come from?
