CH_82_LVL_19_POST_11=Sorry to interrupt, but I got 'em rounded up for you. Well, except her.
CH_82_LVL_19_POST_12=You may have won this time, but my friends will not be defeated!
CH_82_LVL_19_POST_13=Whoa - she just disappeared. Like, in a puff of smoke.
CH_82_LVL_19_POST_14=And I wonder what friends she was talking about??
CH_83_LVL_19_POST_1=Stop right there!
CH_83_LVL_19_POST_2=Hmmm... no, I don't think I will.
CH_83_LVL_19_POST_3=That's right my friend... attack!
CH_83_LVL_19_POST_4=*roars menacingly*
CH_83_LVL_19_POST_5=You will not defeat us.
CH_83_LVL_19_POST_6=Come on! Let's get them out of here!
CH_83_LVL_19_POST_7=Ohh... yeah, for sure, totally.
CH_83_LVL_19_POST_8=Retreat! We'll regroup and try again.
CH_84_LVL_19_POST_1=Thought you could stop me, did you?
