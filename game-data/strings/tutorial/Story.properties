CH_25_LVL_16_POST_4=Well, we sure are glad to see you, Miss Elsa. We've had a dickens of a time trying to track you down.
CH_25_LVL_16_POST_5=Really?
CH_26_LVL_2_PRE_1=Elsa, where are we going?
CH_26_LVL_2_PRE_2=To the Theater District. I think I may know how to get you to Arendelle.
CH_26_LVL_2_PRE_3=The sooner the better. The Inventor has a bunch of stuff about getting rid of bugs in the dev note.
CH_26_LVL_2_PRE_4=But I got a sinking feeling about the whole thing.
CH_26_LVL_2_PRE_5=Well if you're worried, then I'm worried.
