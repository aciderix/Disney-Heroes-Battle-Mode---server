CH_24_LVL_2_PRE_6=Fine, Mom.
CH_24_LVL_6_POST_1=It's too hot. It's too hot, and I didn't find anything. It's just too hot.
CH_24_LVL_6_POST_2=We looked through as many stalls as we could, but we haven't found anything.
