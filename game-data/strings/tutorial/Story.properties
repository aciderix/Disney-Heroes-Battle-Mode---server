CH_30_LVL_6_POST_2=A lot, apparently.
CH_30_LVL_6_POST_3=Yeah, sorry about that everyone. I guess I never really noticed how many there actually were.
CH_30_LVL_6_POST_4=It's okay. We'll keep searching, right team?
