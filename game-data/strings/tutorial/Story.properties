CH_20_LVL_2_PRE_3=It keeps asking for a "secret code."
CH_20_LVL_16_POST_1=What's our next step, Buzz?
CH_20_LVL_16_POST_2=From what Rex said, we need to get to the final battle with Zurg to get the prompt for the secret code.
CH_20_LVL_16_POST_3=You've got to be kidding me. We have to play a video game to find the next clue?
CH_20_LVL_16_POST_4=Don't worry, Mrs. Incredible. This is in my code. Just keep the creeps away and watch a true master at work.
