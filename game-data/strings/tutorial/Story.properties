CH_73_LVL_6_POST_4=Right, sorry! It's almost as big as the swarm that wiped us out at Desert City!
CH_73_LVL_6_POST_5=Sven says it's approaching from the south! We're on our way to intercept!
CH_73_LVL_6_POST_6=Negative, Kristoff. A swarm will destroy you in the open. Get back here and defend the base, now!
CH_73_LVL_13_POST_1=Alright, keep your heads on a swivel, but it's looking like we held them off. Jumba, Maui: radio in!
CH_73_LVL_13_POST_2=I am still doing research near Portal. There are Creeps?
CH_73_LVL_13_POST_3=Rapidly approaching past tense, Jumba. We should be good to...
CH_73_LVL_13_POST_4=Negative! We got a big problem, coming fast! The Creeps were just a feint! From the north! The north!
CH_73_LVL_13_POST_5=Repeat, Maui! What's attacking from the north?
CH_73_LVL_16_POST_1=It's coming! Everyone, back to the base! Now! Now!
CH_73_LVL_16_POST_2=*static* on my way *static* staying ahead of it *static* how it moves so fast when it's that big *static*
CH_73_LVL_16_POST_3=Is Jumba. Am working in lab. What are you seeing, rabbit cop and sometimes-bird?
CH_73_LVL_16_POST_4=Jumba, get out here and pick up a weapon! I think it's...
CH_73_LVL_16_POST_5=IT'S THE MEGA VIRUS!
CH_74_LVL_2_PRE_1=Portal Room breached. Told you it'd be easy. Even Kimmie could have broken in here.
CH_74_LVL_2_PRE_2=Excellent work. Toxic Team, move in. Let's stick together, right between me and any defensive countermeasures.
CH_74_LVL_2_PRE_3=I give the orders, sheep. Remember your place.
CH_74_LVL_2_PRE_4=The flesh may squabble, but I care not. In the end, the Cauldron will swallow you all.
CH_74_LVL_2_PRE_5=If it swallows me, it'll choke. I'm bad to the bill, baby.
CH_74_LVL_6_POST_1=Hiro! You OK over there?
CH_74_LVL_6_POST_2=If I'm being honest, not really! They've got me surrounded! I'm barely staying ahead of them!
CH_74_LVL_6_POST_3=I'm going to help Hiro. Tron, Quorra, defend the Portal. Yax and Gizmoduck, go after these jerks!
CH_74_LVL_6_POST_4=We must defend the User at any costs!
CH_74_LVL_6_POST_5=We've got this, boss. You handle the rescue.
CH_74_LVL_6_POST_6=Please handle it quickly!
CH_74_LVL_13_POST_1=What a stalwart little soldier you are! Shame it'll do you no good.
CH_74_LVL_13_POST_2=Stay back! Don't make me... Don't make me... wait.
CH_74_LVL_13_POST_3=Why can't I raise a hand to stop you?
CH_74_LVL_13_POST_4=I believe you'll find I have what you digital peasants refer to as "Admin Access."
CH_74_LVL_13_POST_5=You can find lots of things in City Hall, if you know where to look... and you're too short for the security cameras.
CH_74_LVL_16_POST_1=This was even easier than I expected. I can't believe you chumps were even weaker than Darkwing Dork. Later!
CH_74_LVL_16_POST_2=Frankly, there's nothing I love more than an unfair fight. Oh wait, seizing power. That's great too. Toodles!
CH_74_LVL_16_POST_3=I won't lower myself to gloat. But I will say that you never had a chance, and were fools not to surrender immediately.
CH_74_LVL_16_POST_4=Cauldron Born! Fight until you crumble. Do as much reckless harm as possible, as is your purpose.
CH_74_LVL_16_POST_5=Wow, every single one of you is intolerably self-serious. Whatever! Occupational hazard of professional villainy.
CH_75_LVL_4_PRE_1=That you, Goliath? You're just in time.
CH_75_LVL_4_PRE_2=Yes. We have perhaps a minute until the Mega Virus collides with the Oasis. Just in time for what, may I ask?
CH_75_LVL_4_PRE_3=To see me beat the Mega Virus by myself. I'd hate for you to miss it.
CH_75_LVL_4_PRE_4=Agreed. I will watch closely, and with your permission, I may join in as well.
CH_75_LVL_16_POST_1=Well, looks like this is it. It was an honor to defend the Oasis with you guys.
CH_75_LVL_16_POST_2=The honor's mine, cottontail. Now get your game face on. Can't face our final foe with a pout.
CH_75_LVL_16_POST_3=While we stand, the Oasis stands. While the Oasis stands, we have not failed in our duty.
CH_75_LVL_16_POST_4=Where's the rag dolls and the scientist? Shouldn't they be here to get run over with us?
CH_75_LVL_16_POST_5=Hey, ignorance is bliss. Let's let them do their thing while we do ours.
CH_75_LVL_16_POST_6=Sorry, is someone saying my name? Walkie reception is getting interference. I have good news for you!
CH_76_LVL_16_POST_1=You have got to be joking. She knocked down the Mega Virus?
CH_76_LVL_16_POST_2=There is no joke. There is only Kim Possible.
CH_76_LVL_16_POST_3=Aye, all charged up with those Platinum Badge shinies we've been findin'. The lass is in a frenzy.
CH_76_LVL_16_POST_4=Nonsense. She's got the situation well in hand.
CH_76_LVL_16_POST_5=Actually, I could still use some help out here, guys!
CH_77_LVL_4_POST_1=Wow, they're really messing that thing up.
CH_77_LVL_4_POST_2=Yeah, they should watch out though. That thing is obviously curse central.
CH_77_LVL_4_POST_3=Baymax. Tell me. Are they dealing significant damage? Could we win this?
CH_77_LVL_4_POST_4=I am unable to offer such an assessment, due to the inherent aberrant nature of the Mega Virus.
CH_77_LVL_4_POST_5=It's not over! Look out!
CH_77_LVL_19_POST_1=I've tracked down more desparate foes in my time.
CH_77_LVL_19_POST_2=I'm sure you wouldn't mind a little bit of help in finding this one.
CH_77_LVL_19_POST_3=Not that I need it, but if you insist, feel free to follow me.
CH_77_LVL_19_POST_4=Captain Hook follows no man!
CH_77_LVL_19_POST_5=But, uh, seeing as you're not exactly a man...
CH_77_LVL_19_POST_6=A king, please.
CH_77_LVL_19_POST_7=Right. Well, king, lead on!
CH_78_LVL_19_POST_1=Nice try! But you won't stop me this time.
CH_78_LVL_19_POST_2=Get away from that badge!
CH_78_LVL_19_POST_3=Whoops. Too late!
CH_79_LVL_7_POST_1=We saw what happened, and we're not happy about it.
CH_79_LVL_7_POST_2=We feel like we let you down...
CH_79_LVL_13_POST_1=I heard you might be in need of some assistance.
CH_79_LVL_13_POST_2=From him? What do you think?
CH_79_LVL_13_POST_3=I think the Tech Team has sent us some help - and we could use it!
CH_79_LVL_16_POST_1=You're right. We could use the help.
CH_79_LVL_16_POST_2=No need to thank me. We're just doing our jobs.
CH_79_LVL_16_POST_3=And there's more help coming your way.
CH_79_LVL_16_POST_4=What... kind of help?
CH_79_LVL_19_POST_1=We'll send you help whenever you need it.
CH_79_LVL_19_POST_2=We appreciate that.
CH_79_LVL_19_POST_3=You didn't tell her everything...
CH_79_LVL_19_POST_4=Well... it seems like we might end up on the front lines ourselves. So - we might call you back here for help, now and then.
CH_79_LVL_19_POST_5=Always happy to help out our friends!
CH_80_LVL_19_POST_1=Almost there...
CH_80_LVL_19_POST_2=Ah-ha! Got it!
CH_80_LVL_19_POST_3=And I've got you!
CH_80_LVL_19_POST_4=Noooo!! How could anyone defeat such a spectacularly intelligent and devious creature as myself?
CH_80_LVL_19_POST_5=Let's retreat while they're nursing their wounds.
CH_81_LVL_19_POST_1=Where is this thing, anyway?
CH_81_LVL_19_POST_2=There's a Powerline Concert around the corner...
CH_81_LVL_19_POST_3=On the way!
CH_81_LVL_19_POST_4=Hey, Bellwether - we could use some help here!
CH_81_LVL_19_POST_5=You will be defeated.
CH_81_LVL_19_POST_6=You know, you could make this all a whole lot easier if you all just stopped running.
CH_82_LVL_19_POST_1=Where is this thing, anyway?
CH_82_LVL_19_POST_2=Try backstage.
CH_82_LVL_19_POST_3=On the way!
CH_82_LVL_19_POST_4=Hey - what are you doing here? I'm getting ready for a show!
