CH_24_LVL_16_POST_6=Give it here, stinkbrain.
CH_24_LVL_16_POST_7=Sweet mother of monkey milk! It's the dev note!
CH_25_LVL_2_PRE_1=Okay everybody, we gotta find Elsa.
