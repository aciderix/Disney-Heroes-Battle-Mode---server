CH_20_LVL_19_POST_5=All right. Vanellope, try typing in "A".
CH_20_LVL_19_POST_6="A"...
CH_20_LVL_19_POST_7="N, D, Y."
CH_20_LVL_19_POST_8=Whoa! A hidden door!
CH_20_LVL_19_POST_9=Just like with the Tron cabinet.
CH_20_LVL_19_POST_10=Yeah, but this door looks all glitchy. Hold on to your lunches everybody, I think we're in for a wild ride!
