CH_11_LVL_19_POST_2=Well, I found some stuff and then some other stuff, and all the stuff is seriously gnarly.
CH_11_LVL_19_POST_3=You can give us the details later. Let's grab this hardware and get it someplace safe.
CH_11_LVL_19_POST_4=That would be right here, dude. There's gotta be a reason this is the only place with computers left.
CH_11_LVL_19_POST_5=Hey, I bet that's why the creeps were trying to smash them! Whoever's in charge can't get to them down here.
CH_11_LVL_19_POST_6=Smart. Let's find a quiet corner. I've got some serious stuff to share with you all.
CH_12_LVL_1_POST_1=Okay, Yax, what's the scoop? The 411? The lowdown?
CH_12_LVL_1_POST_2=Well, I think this place used to be the clubhouse for some kinda underground resistance.
CH_12_LVL_1_POST_3=Resistance? You mean there was another group that was fighting the virus?
CH_12_LVL_1_POST_4=Totally. And those folks were wicked smart, too.
CH_12_LVL_3_POST_1=I don't get it. Why'd we come here, Yax?
CH_12_LVL_3_POST_2=Cause I fixed my device using a patch by this computer guru. Whoever it was is the one who made all these chip things.
CH_12_LVL_3_POST_3=Okay... but what does that have to do with this area?
CH_12_LVL_3_POST_4=Well, I found like this diary blog, and the hacker had a theory... There's one seriously misguided dude causin' all the problems around here.
CH_12_LVL_3_POST_5=Ha! Told ya!
CH_12_LVL_3_POST_6=Yeah, and when the creeps started smashin' their computers, the hacker and his friends created a super secret hideout.
CH_12_LVL_3_POST_7=Ooooo! The plot thickens!
CH_12_LVL_5_POST_1=What else did this resistance do besides making the chips?
CH_12_LVL_5_POST_2=Lots. They saved all the computers they could. And they tried to protect things they called "keystones".
CH_12_LVL_5_POST_3="Keystones?" What in the greater good are those?
CH_12_LVL_7_POST_1=Thank you for *Hee-hee CZZRCK* leading me here, you error-ridden imperfections!
CH_12_LVL_7_POST_2=Who's there?
CH_12_LVL_7_POST_3=I've been *Hee-hee TZZCH* trying to find this place for so very long.
CH_12_LVL_7_POST_4=(Great, another super villain trying to be mysterious.) We don't have time for your mystery-talk. Just show yourself!
CH_12_LVL_7_POST_5=That would ruin all my *HeHee TRZCKK* fun, now wouldn't it? Get them!
CH_12_LVL_7_POST_6=PURGE THE ERRORS!
CH_12_LVL_10_POST_1=I've fought big bad guys, little bad guys, even invisible bad guys, but this guy's a whole new level of freaky.
CH_12_LVL_10_POST_2=I told ya there was a big baddie behind all of this. And now we've lead him straight to the good guys' headquarters.
CH_12_LVL_10_POST_3=Well, then we just have to stop him.
CH_12_LVL_10_POST_4=You're right, honey. Of course he does have an army of creeps guarding him, but we know how to handle those guys.
CH_12_LVL_14_POST_1=Catch me if you can, errors! *Hehee TZZCCHK*
CH_12_LVL_14_POST_2=Don't let him get away!
CH_12_LVL_17_POST_1=*Heehee TZKK* Finally!
CH_12_LVL_17_POST_2=What is he doing?!
CH_12_LVL_17_POST_3=I dunno, but I'm guessin' nothing good! Dude seriously needs to mellow.
CH_12_LVL_17_POST_4=You fools! You've led me straight *HeeHEE CHRZZK* to the one place that was keeping me from taking over the entire City!
CH_12_LVL_17_POST_5=That doesn't sound good.
CH_12_LVL_17_POST_6=Someone stop him before it's too late!
CH_12_LVL_17_POST_7=So long, errors!! Creeps, ATTACK!
CH_13_LVL_3_PRE_1=Have any of you ever been here before?
CH_13_LVL_3_PRE_2=Not me. I didn't even know this part of the City existed.
CH_13_LVL_3_PRE_3=Me neither, and I thought we'd explored every inch of this place.
CH_13_LVL_8_POST_1=We can't find that pixelated punk anywhere!
CH_13_LVL_8_POST_2=It's cool, Vanellope. We'll find him.
CH_13_LVL_8_POST_3=You two should really be more careful. We have no idea what could be lurking up ahead.
CH_13_LVL_8_POST_4=Aww, E-girl, you really do care, don'tcha?
CH_13_LVL_8_POST_5=Of course I do. You're a child and Ralph's... well, he's very strong. But regardless, I want everyone on my team to be safe.
CH_13_LVL_13_PRE_1=Hey ! Lemme go, you pixelated punk!
CH_13_LVL_13_PRE_2=*HeEhE* Why would I ever do that? Especially when I can do this!
CH_13_LVL_13_PRE_3=Wait, what is going ...*CZZK* on?!
CH_13_LVL_13_PRE_4=Vanellope!
CH_13_LVL_13_PRE_5=What are you doin' to me?! Lemme go! *CHOMP*
CH_13_LVL_13_PRE_6=ARGH! You little error-ridden brat! You bit me! After her, my minions!
CH_13_LVL_13_PRE_7=Vanellope, run!
CH_13_LVL_19_POST_1=Are you okay, Vanellope? What happened to you?
CH_13_LVL_19_POST_2=I don't know. That glitchy jerk grabbed me and then I just felt...wrong.
CH_13_LVL_19_POST_3=It looked like he was infecting you with the virus!
CH_13_LVL_19_POST_4=A villain that can infect heroes just by touching them?! That's horrible!
CH_13_LVL_19_POST_5=I bet that pixelated punk is the mastermind behind this mess. We gotta stop him!
CH_13_LVL_19_POST_6=Hold on, Vanellope. He seems pretty dangerous.
CH_13_LVL_19_POST_7=All the more reason to stop him! We've gotta save this place, Ralph.
CH_13_LVL_19_POST_8=Think about what would've happened to Sugar Rush if we'd been too scared to fight back!
CH_13_LVL_19_POST_9=Vanellope's right. I suggest we formulate a plan for taking down this diabolical villain!
CH_13_LVL_19_POST_10=Well, we've never been here before, right? Maybe there's some clues in this district. That bad guy seemed pretty at home here.
CH_14_LVL_2_PRE_1=What's wrong with this place?
CH_14_LVL_2_PRE_2=Yeah, that building's totally got a hole in it.
CH_14_LVL_2_PRE_3=The virus musta really gone for it here.
CH_14_LVL_2_PRE_4=I dunno. This doesn't look like the virus to me.
CH_14_LVL_2_PRE_5=You're right, chumbo! This level must not be finished which means the code's probably pretty unstable. Everybody, watch your step.
CH_14_LVL_2_PRE_6=I'm not certain of some of what you just said, but I agree that we should proceed with caution.
CH_14_LVL_6_POST_1=Did you see that?! That creep just went right through that building!
CH_14_LVL_6_POST_2=Ugh. This code is sloppier than Wreck-It eating an ice cream sundae!
CH_14_LVL_6_POST_3=Hey! I resemble that remark.
CH_14_LVL_6_POST_4=I don't know about you all, but I just want to find some clues and get out. This place is a whole other level of freaky.
CH_14_LVL_16_POST_1=What did ya find, Yax?
CH_14_LVL_16_POST_2=I dunno. Might be nothin'. But there are some notes attached to this building. They all say something about a "workshop".
CH_14_LVL_16_POST_3=It's not much to go on, but it's a start. Let's see what we can dig up.
CH_15_LVL_2_PRE_1=This must be the place.
CH_15_LVL_2_PRE_2=Wow man, this workshop is far out!
CH_15_LVL_2_PRE_3=I can't believe all this great tech! Wasabi would lose his mind here!
CH_15_LVL_2_PRE_4=It looks like that creepy dude left his notebook....
CH_15_LVL_2_PRE_5=A notebook? Hold onto that, it could contain clues!
CH_15_LVL_6_POST_1=Sweet mother of monkey milk! This notebook's nuts! Looks like Captain Creepypants had all kinds of great ideas for this place.
CH_15_LVL_6_POST_2=It seems that he was trying to create a safe and happy space for users...
CH_15_LVL_6_POST_3=So how did it end up going so wrong?
CH_15_LVL_6_POST_4=I dunno. This notebook doesn't seem like something a Bad Guy would write.
CH_15_LVL_6_POST_5=I agree. We need to investigate this more.
CH_15_LVL_6_POST_6=All right then, let's head back to the City and regroup.
CH_15_LVL_16_POST_1=You guys, this is AMAZING! The Inventor created hidden levels!
CH_15_LVL_16_POST_2=The Inventor? Well, that does make for a better super villain name than Captain Creepypants.
CH_15_LVL_16_POST_3=Hidden levels? Are you sure?
CH_15_LVL_16_POST_4=Totally. It's right here!
CH_15_LVL_16_POST_5=My wife might disagree, but I've always considered myself to have hidden levels.
CH_16_LVL_2_PRE_1=So, explain to me exactly how these "Hidden Levels" work.
CH_16_LVL_2_PRE_2=How do I put this? It's like, villains have evil lairs, right?
CH_16_LVL_2_PRE_3=Okay...
CH_16_LVL_2_PRE_4=And those lairs all have secret entrances and mysterious areas...
CH_16_LVL_2_PRE_5=Right... So, Hidden Levels are just parts of the City that we can't easily access?
CH_16_LVL_2_PRE_6=It's a little more complicated than that, but yeah, you're on the right track.
CH_16_LVL_6_POST_1=So, what is the point of even having hidden levels?
CH_16_LVL_6_POST_2=If the Inventor really was just trying to make a safe space for people, wouldn't he want them to be able to access all of it?
CH_16_LVL_6_POST_3=It could be that the hidden levels are like this place. I mean, this area is unfinished and downright dangerous, right?
CH_16_LVL_6_POST_4=It sure doesn't look like that in his notebook.
CH_16_LVL_6_POST_5=Yeah, but a lot musta happened before things got this bad! I don't think the Inventor expected for this to get so...messy.
CH_16_LVL_16_POST_1=So now what? The longer we stay here, the more we endanger ourselves.
CH_16_LVL_16_POST_2=I say we go back to the Hacker Space, regroup, and figure out our next steps from there.
CH_16_LVL_16_POST_3=Fantastic plan! Come on everyone, let's move out.
CH_17_LVL_2_PRE_1=We dodged a bullet back there, but we can't afford to slow down. Yax, is your device still operational?
CH_17_LVL_2_PRE_2=Yeah, it's all good.
CH_17_LVL_2_PRE_3=Do you think you could get it synced with the other computers?
CH_17_LVL_2_PRE_4=Well, I could but only if I knew where they went.
CH_17_LVL_2_PRE_5=Sweet mother of monkey milk! He's right! The computers are gone.
CH_17_LVL_2_PRE_6=The Inventor must have flushed us out so he could double back and remove the computers.
CH_17_LVL_6_POST_1=Good find, Vanellope, but unfortunately, this book is written in gibberish. I can't make heads or tails of it.
CH_17_LVL_6_POST_2=It's not gibberish, it's code! Shank and I can totally figure it out. It just might take a while.
CH_17_LVL_6_POST_3=Are you sure that's time you can spare? It *CHK* looks to me like you're just treading water...until you drown!
CH_17_LVL_6_POST_4=Everyone, get ready to fight! We can't let him get away again.
CH_17_LVL_6_POST_5=Tsk, Tsk, no need for violence. *CZZK* I'm giving you a taste of what's to come, *TCSHHK* for my own amusement.
CH_17_LVL_16_POST_1=Good news everyone, we may have found something.
CH_17_LVL_16_POST_2=Are you kidding? That's not good, that's great!
CH_17_LVL_16_POST_3=Yeah. Enlighten us on your discovery.
CH_17_LVL_16_POST_4=Well, it's more information about the hidden levels. The Inventor kept this codex as he was building them.
CH_17_LVL_16_POST_5=But unfortunately, he left out the locations.
CH_17_LVL_16_POST_6=Okay, then we start brainstorming. We have to figure out our next move.
CH_18_LVL_2_PRE_1=I'm starting to think that one of the hidden levels is underwater.
CH_18_LVL_2_PRE_2=I don't think so. That might've been unexpected a long time ago, but it's pretty predictable now.
CH_18_LVL_2_PRE_3=I agree with Vanellope. Underwater is totally predictable, and the Inventor usually does the unexpected.
CH_18_LVL_2_PRE_4=Okay, but he did make that "treading water until you drown" comment. That has to mean something.
CH_18_LVL_2_PRE_5=True. And it's not like we have anything else to go on.
CH_18_LVL_2_PRE_6=All right. We know where to start our search.
CH_18_LVL_6_POST_1=Mom, look! It's Captain Jack. Maybe we should ask him if he's seen anything strange out on the water.
CH_18_LVL_6_POST_2=I don't know, Dash. I'm not sure his opinion of what is or isn't strange can be trusted.
CH_18_LVL_6_POST_3=Hello, love. Tell me, is this rakish brute bothering you?
CH_18_LVL_6_POST_4=*chuckle* What's rakish?
CH_18_LVL_6_POST_5=This is my son and, no, he's not bothering me. Captain Sparrow, have you seen anything strange out on the water lately?
CH_18_LVL_6_POST_6=I don't know if I'm qualified to answer that, love.
CH_18_LVL_6_POST_7=*sigh*
CH_18_LVL_16_POST_1=We can't go any farther, love. Beyond this, there's nothing.
CH_18_LVL_16_POST_2=Thank you, Captain Sparrow. We appreciate the lift.
CH_18_LVL_16_POST_3=So what do we do now, E-girl?
CH_18_LVL_16_POST_4=I'm not sure. Jump in I guess.
CH_18_LVL_16_POST_5=If it's anything like the other underwater lairs I've dealt with, it shouldn't be too far below the surface.
CH_18_LVL_16_POST_6=And if it isn't?
CH_18_LVL_16_POST_7=Only one way to find out.
CH_19_LVL_2_PRE_1=Wait. This can't be right.
CH_19_LVL_2_PRE_2=I think I remember hearing about this place. Is this...Tortuga?
CH_19_LVL_2_PRE_3=*sniff sniff* Smells like betrayal and lethargy. It's Tortuga all right.
CH_19_LVL_2_PRE_4=Captain Sparrow?! Where did you come from?
CH_19_LVL_2_PRE_5=Jumped in after you, love. Couldn't see myself letting you drown.
CH_19_LVL_2_PRE_6=Guys, we're finally here. It's the hidden level!
CH_19_LVL_6_POST_1=A tavern? We can't take the kids in there.
CH_19_LVL_6_POST_2=Of course we can. If the owner asks, we'll just tell them they're very short...people.
CH_19_LVL_6_POST_3=Come on, Mom. What if there are clues inside?
CH_19_LVL_6_POST_4=Nice try, Dash. You just want to meet more pirates.
CH_19_LVL_6_POST_5=Well, yeah. That too.
CH_19_LVL_6_POST_6=Your son has a point, E-girl.
CH_19_LVL_6_POST_7=*sigh* Okay, but don't touch anything without permission first.
CH_19_LVL_16_POST_1=Were there any clues as to where we should go next?
CH_19_LVL_16_POST_2=Maybe? The end of the notes didn't really make sense. He kept writing over and over "cabinets and curios, toys in the room."
CH_19_LVL_16_POST_3=Aw, sounds like that dude had some issues.
CH_19_LVL_16_POST_4=What do you think Buzz? Got any insight?
CH_19_LVL_16_POST_5=Actually, I think I do.
CH_19_LVL_16_POST_6=We need to get to the Midway.
