CH_86_LVL_19_POST_4=Before what?
CH_86_LVL_19_POST_5=Oh, no. Not you again!
CH_86_LVL_19_POST_6=Surprise.
CH_86_LVL_19_POST_7=Baymax, you get out of here. We'll cover your retreat!
CH_86_LVL_19_POST_8=Stop! No! They've gotten away. Well. I suppose we'll just have to follow them.
CH_87_LVL_19_POST_1=Well done, Jack!
CH_87_LVL_19_POST_2=All in a day's work, m'lady. Now, did we find the treasure?
CH_87_LVL_19_POST_3=Um, well, actually...
CH_87_LVL_19_POST_4=The thing is, Jack, we were really just trying to escape.
CH_87_LVL_19_POST_5=So there's no treasure?
CH_87_LVL_19_POST_6=Sorry to be the one to break it to you.
CH_87_LVL_19_POST_7=Shall we chase them away?
CH_87_LVL_19_POST_8=I suppose we ought to. Everyone - overboard!
CH_88_LVL_19_POST_1=You can't stop us now, Scar!
CH_88_LVL_19_POST_2=I may be alone, but I am not defeated yet.
CH_88_LVL_19_POST_3=Pretty sure "yet" is the most important word in that sentence.
CH_88_LVL_19_POST_4=Hmph. You may defeat me now, but I will rise again and--
CH_88_LVL_19_POST_5=*wham* *whack* *pow*
CH_88_LVL_19_POST_6=You really knocked him out.
CH_88_LVL_19_POST_7=He was talking too much.
CH_88_LVL_19_POST_8=Time to claim the final badge, then, isn't it?
CH_89_LVL_19_POST_1=We'll head to the city.
CH_89_LVL_19_POST_2=Great - I have another team ready to take on the desert.
CH_89_LVL_19_POST_3=I got a call?
CH_89_LVL_19_POST_4=Ready to report for duty.
CH_89_LVL_19_POST_5=I'll be running this outfit.
CH_89_LVL_19_POST_6=I think I'm supposed to be -- somewhere?
CH_89_LVL_19_POST_7=Well... looks like you've got a pretty strong team to take on the terrors in the desert.
CH_89_LVL_19_POST_8=And fight them we shall! None shall stand in our way!
CH_90_LVL_19_POST_1=Any chance you can move?
CH_90_LVL_19_POST_2=Just as frozen as you.
CH_90_LVL_19_POST_3=Me, too. I'm totally frozen. It feels... wrong.
CH_90_LVL_19_POST_4=Any brilliant ideas?
CH_90_LVL_19_POST_5=Perhaps we should unfreeze.
CH_90_LVL_19_POST_6=You know, I never thought of that.
CH_90_LVL_19_POST_7=They're taking the badge! Don't let them get away!
CH_90_LVL_19_POST_8=This isn't over.
CH_90_LVL_19_POST_9=Of course not. I won't stop until I-- I mean, we-- have power over the whole of Agrabah. Or the world. Whichever comes first.
CH_91_LVL_19_POST_1=We can't just stay in here doing nothing!
CH_91_LVL_19_POST_2=Going after revenge now and putting all our platinum energy on the line is just too risky! We need to lie low just a little longer!
CH_91_LVL_19_POST_3=I get that, but we were made fools by Mother Gothel! She can't get away with it that easily!
CH_91_LVL_19_POST_4=They won't, that's why the Tech Team will be hard at work creating the device that will allow us to store the platinum!
CH_91_LVL_19_POST_5=It's going to take too long!
CH_91_LVL_19_POST_6=It might, but it will be worth it in the end. Trust in them!
CH_91_LVL_19_POST_7=*Ralph appears to be calming down*
CH_91_LVL_19_POST_8=Don't worry, they will get what they deserve!
CH_91_LVL_19_POST_9=I'll be the first to remind them of that!
CH_92_LVL_19_POST_1=I still think this plan is risky. Gothel's slippery! She won't fall for just any trap.
CH_92_LVL_19_POST_2=Which is why we make sure she only sees what we want her to. Misdirection is key.
CH_92_LVL_19_POST_3=And if she sees through it?
CH_92_LVL_19_POST_4=Then we adapt. Ice can shift in an instant, and so can we.
CH_92_LVL_19_POST_5=Just don't freeze the whole street. Agrabah's not exactly built for snow.
CH_92_LVL_19_POST_6=I'll keep it subtle. If things go wrong, a little ice might be the least of Gothel's problems.
CH_92_LVL_19_POST_7=Alright, let's do this. Hope she likes surprises.
CH_93_LVL_19_POST_1=Elsa, stay with us! Don't listen to her!
CH_93_LVL_19_POST_2=Oh, but she wants to listen, don't you, dear? I only speak the truth...
CH_93_LVL_19_POST_3=I... I know what you're doing... but... it feels...
CH_93_LVL_19_POST_4=You're stronger than this! Remember who you are!
CH_93_LVL_19_POST_5=Why resist? Just one little slip, and all the problems go away...
CH_93_LVL_19_POST_6=I'd stop talking if I were you, lady.
CH_93_LVL_19_POST_7=No. I won't let you win!
CH_94_LVL_19_POST_1=Whew. That was way too close. You owe me a new staff, by the way!
CH_94_LVL_19_POST_2=We owe you more than that. You saved our skins.
CH_94_LVL_19_POST_3=I almost lost myself... but you didn't give up on me.
CH_94_LVL_19_POST_4=That's what teammates do. Besides, you looked pretty awesome absorbing that platinum stuff.
CH_94_LVL_19_POST_5=Remind me not to get on your frosty side.
CH_94_LVL_19_POST_6=Alright, let's go see what the Tech Team has cooked up while we were gone!
CH_95_LVL_19_POST_1=I don't make miracles. I design them.
CH_95_LVL_19_POST_2=And yet somehow, you always do both.
CH_95_LVL_19_POST_3=Is it weird that I kinda want one as a necklace?
CH_95_LVL_19_POST_4=Not weird. Visionary.
CH_95_LVL_19_POST_5=Can I... maybe reverse-engineer it a little?
CH_95_LVL_19_POST_6=Touch it without permission and I reverse your face.
CH_95_LVL_19_POST_7=Let's stick to using it on the battlefield, huh?
CH_96_LVL_19_POST_1=Okay, I'll admit... this thing is kinda awesome.
CH_96_LVL_19_POST_2=Kinda? Kinda? It's revolutionary, darling!
CH_96_LVL_19_POST_3=The energy density is perfect! This could boost our attack efficiency by at least 42%!
CH_96_LVL_19_POST_4=And it looks cool. I'll take ten.
CH_96_LVL_19_POST_5=Style and substance. A rare combination... like me.
CH_97_LVL_19_POST_1=Alright, team. Someone's gotta hold the line while the rest get the badge. Ideas?
CH_97_LVL_19_POST_2=I think me and you should push forward to reach the badge.
CH_97_LVL_19_POST_3=Baymax should secure the defensive perimeter and assist with shielding.
CH_97_LVL_19_POST_4=Affirmative!
CH_97_LVL_19_POST_5=Ducky, Bunny, keep your defenses up.
CH_97_LVL_19_POST_6=*nervous but brave* They won't get to us.
CH_97_LVL_19_POST_7=*playful yet serious* They won't dare touching us. We are too fluffy.
CH_97_LVL_19_POST_8=Edna, keep yourself safe.
CH_97_LVL_19_POST_9=Holding the line? So last season. Just don't mess up your suits. I stitched them recently.
CH_98_LVL_19_POST_1=*handing the badge and device* Negaduck, this is for you, darling. This way, you will be able to absorve Platinum energy.
CH_98_LVL_19_POST_2=*flabbergasted* Edna... what are you doing? That's the badge!
CH_98_LVL_19_POST_3=He may have helped us, but handing that kind of power to our enemy?
CH_98_LVL_19_POST_4=*concerned* Why are we trusting the guy with the evil laugh?
CH_98_LVL_19_POST_5=*freaking out* Big mistake, big mistake! Huge!
CH_99_LVL_19_POST_1=*outraged* Wait... limits of Platinum energy? That's what this was about?!
CH_99_LVL_19_POST_2=And Negaduck is your "perfect subject"? You cannot be serious.
CH_99_LVL_19_POST_3=Yeah, out of everyone in the world, you picked the cackling maniac with a chainsaw?
CH_99_LVL_19_POST_4=He's gonna fry us all!
CH_99_LVL_19_POST_5=Edna, you can't honestly think we can trust him with that kind of energy.
CH_99_LVL_19_POST_6=He's unstable. Whatever he does with Platinum energy will endanger all of us.
CH_99_LVL_19_POST_7=Yes, he is unstable. That makes him valuable.
CH_99_LVL_19_POST_8=*whispering to Ducky* ... She's lost it.
CH_99_LVL_19_POST_9=*whispering back* We're toast. Platinum-flavored toast.
CH_99_LVL_19_POST_10=Darlings, power requires risks. Negaduck's chaos will push Platinum further than any hero would dare. And I intend to study every part of it.
CH_100_LVL_19_POST_1=*staring at the smoking ruins* What... was that.
CH_100_LVL_19_POST_2=Don't sound so surprised! I, Negaduck, am that powerful!
CH_100_LVL_19_POST_3=You obliterated an entire force with a single strike. That... was the Platinum energy.
CH_100_LVL_19_POST_4=And... the city. Look at it.
CH_100_LVL_19_POST_5=This shouldn't have happened.
CH_100_LVL_19_POST_6=I... hope we get insurance for this.
CH_100_LVL_19_POST_7=Will Negaduck blow us all to pieces next?
CH_100_LVL_19_POST_8=*through comms* Edna, did you know he could do this?
CH_100_LVL_19_POST_9=I suspected. But seeing it in action... oh, it is far more exquisite than I imagined.
CH_100_LVL_19_POST_10=*laughing manically* Get used to it! The Platinum Device and I, we are just getting started!
CH_101_LVL_19_POST_1=*entering the room with Amelia* Woah... the air feels intense here.
CH_101_LVL_19_POST_2=*talking low* Yes my darling, that's why I thought it'd be better to stop.
CH_101_LVL_19_POST_3=*whispering* Good decision. If we kept going, Negaduck could have picked up more clues.
CH_101_LVL_19_POST_4=Indeed. I've got the basis of the study, but I need more time to do proper testing.
CH_101_LVL_19_POST_5=Let's pause here and study it later, better not to draw any suspicion.
CH_101_LVL_19_POST_6=*enters with Ducky and Baymax, stretching* I really needed a break.
CH_101_LVL_19_POST_7=*smirking* I always need one.
CH_101_LVL_19_POST_8=The stress levels in this room are... unusually high.
CH_101_LVL_19_POST_9=Looks like everyone's back... everyone but Negaduck.
CH_101_LVL_19_POST_10=Strange. Where could he have gone?
CH_102_LVL_19_POST_1=Negaduck... where have you been?
CH_102_LVL_19_POST_2=Oh, just taking a little detour.
CH_102_LVL_19_POST_3=*arms crossed* You were supposed to be with your team. Why are you here alone?
CH_102_LVL_19_POST_4=*smirks* I just needed to catch some air after the last battle.
CH_102_LVL_19_POST_5=*thinking to herself* Negaduck... slowing down? Unusual...
CH_102_LVL_19_POST_6=*out loud* Anyway, my tracker is pinging again. You should get ready for the next battle.
CH_102_LVL_19_POST_7=*laughs* Wouldn't miss it for anything!
CH_102_LVL_19_POST_8=*whispers to Baymax* Keep an eye on him, darling.
CH_102_LVL_19_POST_9=Affirmative.
CH_102_LVL_19_POST_10=Are we ready, team?
CH_102_LVL_19_POST_11=*puts her hand up* Wait. Elastigirl is calling.
CH_103_LVL_19_POST_1=What is she possibly trying to do?
CH_103_LVL_19_POST_2=Seems like she's trying to... corrupt the Platinum energy.
CH_103_LVL_19_POST_3=And if she succeeds?
CH_103_LVL_19_POST_4=*firing a laser bolt* The results must be... unpredictable.
CH_103_LVL_19_POST_5=*holding the line against minions* We have to keep pushing!
CH_103_LVL_19_POST_6=Affirmative.
CH_103_LVL_19_POST_7=*laughs wickedly* I can feel it... the corruption is spreading!
CH_103_LVL_19_POST_8=*worried* Can we stop her in time?
CH_104_LVL_19_POST_1=*steadying herself* Everyone alright?
CH_104_LVL_19_POST_2=Alert. Environmental instability detected. Risk level: high
CH_104_LVL_19_POST_3=That wasn't just an attack. This magic is... wicked. It's twisting the Platinum itself.
CH_104_LVL_19_POST_4=We can't just rush forward. Every step is dangerous now.
