CH_29_LVL_16_POST_6=WaaLLLLLeeeee
CH_30_LVL_2_PRE_1=This is kind of how Arendelle felt when we landed there. Sort of like a copy of a copy.
CH_30_LVL_2_PRE_2=It's so strange to think a copy of Arendelle could still make me feel homesick.
CH_30_LVL_2_PRE_3=It's not strange. When Sugar Rush got shut down, I thought I'd never see it again. I was heartbroken.
CH_30_LVL_2_PRE_4=But then I found a new home in Slaughter Race, and then again in the City. I think you'll be able to find something like that too.
