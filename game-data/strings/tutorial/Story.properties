CH_25_LVL_2_PRE_3=The dev note says that the Inventor created a program to eliminate bugs in the game...
CH_25_LVL_2_PRE_4=Getting rid of bugs? Finally, the Inventor does something I can get on board with!
CH_25_LVL_2_PRE_5=It also says the Inventor was really excited about a new project he was doing.
CH_25_LVL_2_PRE_6=Guys, he built Arendelle.
