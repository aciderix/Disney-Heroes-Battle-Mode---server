CH_42_LVL_16_POST_5=You heard, Hiro. Nose to the grindstone, everyone.
CH_43_LVL_2_PRE_1=Can you believe this place!? I say we forget the Mega Virus and soak up some sun.
CH_43_LVL_2_PRE_2=Oh, yeah. I've been meanin' to work on my base tan.
CH_43_LVL_2_PRE_3=That's a negative. We need to keep our eyes on the prize.
CH_43_LVL_2_PRE_4=Now, come on, cupcakes. We're moving out.
CH_43_LVL_6_POST_1=Hey, Kida! I need you to go up in that weird fish-mobile of yours and get a view of this place.
CH_43_LVL_6_POST_2=First, 'that weird fish-mobile,' as you call it, is a Ketak. Second, what shall I be looking for?
CH_43_LVL_6_POST_3=Get the lay of the land. We need to know what we're up against.
CH_43_LVL_6_POST_4=Very well. I shall fulfill your request.
CH_43_LVL_16_POST_1=Is your little pity party over and done with?
CH_43_LVL_16_POST_2=Yeah, yeah. We're cool.
CH_43_LVL_16_POST_3=Good. Let's make one thing clear. We aren't going to panic.
CH_43_LVL_16_POST_4=This new place is big, so what? I say, let's go find ourselves a Mega Virus.
CH_43_LVL_16_POST_5=Now, who's with me?
CH_44_LVL_2_PRE_1=Alright. Let's get dangerous.
CH_44_LVL_2_PRE_2=A brutish statement. But, yes, let's.
CH_44_LVL_2_PRE_3=We can cover more ground if we split up.
CH_44_LVL_2_PRE_4=Is that the best idea, though? We have no idea how big this place actually is.
CH_44_LVL_6_POST_1=Yeesh. Where are all the people? This place is starting to give me the creeps.
CH_44_LVL_6_POST_2=Creeps!
CH_44_LVL_6_POST_3=You feel it too?
CH_44_LVL_6_POST_4=No, Darkwing. CREEPS!
CH_44_LVL_16_POST_1=Is everyone okay?
CH_44_LVL_16_POST_2=What did those creeps eat for breakfast? Other creeps!?
CH_44_LVL_16_POST_3=They did seem auspiciously predatory.
CH_44_LVL_16_POST_4=Almost as if they were being controlled by something of a much more intelligent design.
CH_44_LVL_16_POST_5=Perhaps the Mega Virus's reach extends farther than we realized.
CH_45_LVL_2_PRE_1=Why aren't people freaking out? The whole City is falling apart!
CH_45_LVL_2_PRE_2=Cool it, Pleakley. If we stay calm, hopefully, everyone else will too.
CH_45_LVL_2_PRE_3=Right. Calm. This is me calm...
CH_45_LVL_2_PRE_4=Nope! Not working!
CH_45_LVL_6_POST_1=Alright, everyone. Got any ideas on how to keep folks happy?
CH_45_LVL_6_POST_2=Oh, I know! Stickers!
CH_45_LVL_6_POST_3=Not exactly what I had in mind, but I love the attitude, Joy.
CH_45_LVL_16_POST_1=Now, hear me out. What if, while the do-gooders are distracted, we take over the City?
CH_45_LVL_16_POST_2=And how do you propose we do that, my dear?
CH_45_LVL_16_POST_3=Easy. We take it by force. I mean, think about it. All the other heroes are off doing their own thing. If we team up, we'll be unstoppable.
CH_45_LVL_16_POST_4=Oooh. I like those odds.
CH_46_LVL_2_PRE_1=Goose and ganders! This is pointless.
CH_46_LVL_2_PRE_2=It's okay. We just gotta look at this from a different angle.
CH_46_LVL_2_PRE_3=Meaning?
CH_46_LVL_2_PRE_4=We've hit a dead end. Where else can we go and still help the teams in the Hub?
CH_46_LVL_6_POST_1=Yuck. This place is a pigsty.
CH_46_LVL_6_POST_2=I agree. The condition of the facility is sub-par at best.
CH_46_LVL_6_POST_3=Don't worry, guys, we got this.
CH_46_LVL_6_POST_4=I'm with Hiro. If we just keep at it, we'll find a way to get everything up and running again.
CH_46_LVL_16_POST_1=Gah! Doesn't anything in this place work!?
CH_46_LVL_16_POST_2=What happened to looking at it from a different angle?
CH_46_LVL_16_POST_3=*sigh* Right, right. Different angle...
CH_46_LVL_16_POST_4=I know! If we can get the portals running, we could track the Mega Virus. We don't even need to set foot in the Hub.
CH_46_LVL_16_POST_5=It'll just take some reprogramming and, you know, power.
CH_47_LVL_2_PRE_1=Don't get too comfortable. We move out in ten.
CH_47_LVL_2_PRE_2=You're mad, woman! How are we expected to continue in this heat?
CH_47_LVL_2_PRE_3=The show-boating hunter is right.
CH_47_LVL_2_PRE_4=Yeah! I got sand in places I didn't even know about it.
CH_47_LVL_2_PRE_5=Dude, seriously? That's gross.
CH_47_LVL_6_POST_1=An oasis lies just ahead. If we leave now, we shall arrive by nightfall.
CH_47_LVL_6_POST_2=You think you little canker sores can pull it together long enough to get there?
CH_47_LVL_6_POST_3=*nod*
CH_47_LVL_6_POST_4=Affirmative.
CH_47_LVL_6_POST_5=*sighs* If we must.
CH_47_LVL_16_POST_1=Yo, Ducky. My money is on the Mega Virus.
CH_47_LVL_16_POST_2=Yeah, I'm with you. This is some nightmare fuel sorta stuff.
CH_47_LVL_16_POST_3=What are you two fluff balls talking about?
CH_47_LVL_16_POST_4=Oh, you know, nothing big. Just the Mega Virus! It sent all that sand to throw us off the scent!
CH_47_LVL_16_POST_5=That's impossible.
CH_47_LVL_16_POST_6=No way! MV does what it wants!
CH_47_LVL_16_POST_7=I bet there's somethin' real important at that oasis.
CH_48_LVL_2_PRE_1=Okay, everyone. How do we get a drop on the Mega Virus?
CH_48_LVL_2_PRE_2=Aye, that's a good question, girl.
CH_48_LVL_2_PRE_3=One thing is for certain, we need to be smart about our next move.
CH_48_LVL_2_PRE_4=Yeah, but, smart how?
CH_48_LVL_6_POST_1=What if we track one of the creeps?
CH_48_LVL_6_POST_2=Are you seriously suggesting we follow the things that are currently trying to destroy us?
CH_48_LVL_6_POST_3=How proactive! I second the proposal.
CH_48_LVL_6_POST_4=Perhaps it will lead us to the Mega Virus.
CH_48_LVL_6_POST_5=Or certain doom.
CH_48_LVL_6_POST_6=Oh, pish posh.
CH_48_LVL_16_POST_1=Okay, any questions?
CH_48_LVL_16_POST_2=Sure. What happens if the creep spots us? How long are we planning on tailing it? What'll we do if we find the Mega Virus?
CH_48_LVL_16_POST_3=...
CH_48_LVL_16_POST_4=*shrugs*
CH_48_LVL_16_POST_5=Yeah. We're all gonna die.
CH_49_LVL_2_PRE_1=I say we strike now.
CH_49_LVL_2_PRE_2=Those saps won't know what hit them.
CH_49_LVL_2_PRE_3=I agree. But actions speak louder than words, my dear.
CH_49_LVL_2_PRE_4=Are we simply going to speak of it, or shall we take action?
CH_49_LVL_2_PRE_5=Yeah. Put your money where your mouth is, Hades.
CH_49_LVL_2_PRE_6=Oh, I intend to.
CH_49_LVL_6_POST_1=Guys! Guys! Don't you know we need to work together?
CH_49_LVL_6_POST_2=Yzma, baby, ditch the zeros. If you join us, we'll give you full control of the Fashion District.
CH_49_LVL_6_POST_3=...
CH_49_LVL_6_POST_4=Eh, why not?
CH_49_LVL_6_POST_5=Oh, come on!
CH_49_LVL_16_POST_1=OoOooh! That was fun!
CH_49_LVL_16_POST_2=Indeed. Now, to divide up the City.
CH_49_LVL_16_POST_3=Everyone to their corners, as it were.
CH_49_LVL_16_POST_4=An excellent point, my dear.
CH_49_LVL_16_POST_5=Since this was Hades' plan, I say he goes first. It's only sporting.
CH_49_LVL_16_POST_6=Well, if you insist...
CH_49_LVL_16_POST_7=I claim City Center.
CH_50_LVL_2_PRE_1=Any luck?
CH_50_LVL_2_PRE_2=No. It's like finding a needle in a haystack.
CH_50_LVL_2_PRE_3=With no guarantee that the needle was there to begin with.
CH_50_LVL_2_PRE_4=Don't give up hope. The teams are bound to be somewhere.
CH_50_LVL_6_POST_1=Okay, everyone. Let's take a break.
CH_50_LVL_6_POST_2=Yeah, like, tensions are totally high right now. How about we do a calming exercise?
CH_50_LVL_6_POST_3=This is pointless!
CH_50_LVL_6_POST_4=Our friends could be in serious trouble, and you want to do a calming exercise!?
CH_50_LVL_6_POST_5=*kicks portal*
CH_50_LVL_6_POST_6=Ow!
CH_50_LVL_16_POST_1=Is everyone okay? Hiro, how about you?
CH_50_LVL_16_POST_2=I'm fine, I'm fine.
CH_50_LVL_16_POST_3=If we hurry, we can still recreate the scenario that pulled everything through.
CH_50_LVL_16_POST_4=What? No. We're lucky to be alive.
CH_50_LVL_16_POST_5=You're right. We are. But we have to find out where those creeps came from. The Tactical Teams are counting on us.
CH_51_LVL_2_PRE_1=If the Mega Virus really doesn't want us at the oasis, there must be something of value there.
CH_51_LVL_2_PRE_2=You think?
CH_51_LVL_2_PRE_3=I'd bet my best bearskin rug on it.
CH_51_LVL_2_PRE_4=No, thanks.
CH_51_LVL_2_PRE_5=Perhaps, it is some type of old magic that we can use to defeat the Mega Virus.
CH_51_LVL_2_PRE_6=Oooh, yeah. I bet it's a spell to summon demons that'll fight the MV for us!
CH_51_LVL_6_POST_1=If I hear one more word about demons, you will regret it.
CH_51_LVL_6_POST_2=Do I make myself clear?
CH_51_LVL_6_POST_3=...
CH_51_LVL_6_POST_4=But, you know, the thing about d-
CH_51_LVL_16_POST_1=What do we do now?
CH_51_LVL_16_POST_2=We keep running until we got miles between us and those creeps.
CH_51_LVL_16_POST_3=Yeah...but what about after that?
CH_51_LVL_16_POST_4=You have a plan, right?
CH_51_LVL_16_POST_5=...
CH_51_LVL_16_POST_6=Right!?
CH_52_LVL_2_PRE_1=Okay, everyone. Remember your training. Don't just move through the shadows...
CH_52_LVL_2_PRE_2=Be the shadows.
CH_52_LVL_2_PRE_3=*eye roll* Oh, brother.
CH_52_LVL_2_PRE_4=I was not aware you had a sibling, John Silver.
CH_52_LVL_6_POST_1=*whispers* How much longer are we going to let this creep string us along?
CH_52_LVL_6_POST_2=*whispers* Indeed. I'm afraid this is beginning to look like a fruitless venture.
CH_52_LVL_6_POST_3=*whispers* Come on, guys. We've got to keep quiet.
CH_52_LVL_6_POST_4=*whispers* Yeah, shadows don't talk.
CH_52_LVL_6_POST_5=Darkwing Duck is correct.
CH_52_LVL_6_POST_6=Shadows are an area of darkness created when a source of light is blocked and are therefore incapable of speech.
CH_52_LVL_16_POST_1=What do we do!? What do we do!?
CH_52_LVL_16_POST_2=We stand our ground and fight.
CH_52_LVL_16_POST_3=What are you, crazy!?
CH_52_LVL_16_POST_4=It's not like we have a choice.
CH_52_LVL_16_POST_5=Mulan's right. There's only one way out of here. And it's through that horde.
CH_53_LVL_2_PRE_1=Alright, are we all accounted for?
CH_53_LVL_2_PRE_2=Don't worry, I taught everyone the moving-buddy system.
CH_53_LVL_2_PRE_3=Moving-buddy system?
CH_53_LVL_2_PRE_4=Yeah, it's...nevermind. Just trust the process.
CH_53_LVL_6_POST_1=So, what're we going to do next, guys?
CH_53_LVL_6_POST_2=*blusters* What in heaven's name do you mean?
CH_53_LVL_6_POST_3=I mean, we can't just sit around while the bad guys take over the City.
CH_53_LVL_6_POST_4=But-but...we don't even know where they are right now, much less how to stop them.
CH_53_LVL_6_POST_5=Woody's right. We can't let this stand. In order to keep the City from total collapse, we need to take it back.
CH_53_LVL_6_POST_6=Now, who's with us?
CH_53_LVL_16_POST_1=Where's Yzma?
CH_53_LVL_16_POST_2=It would appear that Hades was true to his word. Yzma is running the Fashion District.
CH_53_LVL_16_POST_3=Then that's our first stop.
CH_53_LVL_16_POST_4=Look, I know you want revenge for her betraying us and all-
CH_53_LVL_16_POST_5=That has nothing to do with it. The Fashion District is isolated, and she's all alone. It poses a strategic advantage.
CH_54_LVL_2_PRE_1=Alright, let's run through the plan.
CH_54_LVL_2_PRE_2=Quorra, Tron. Once the portals are open, we'll hold off the creeps while you communicate with the portals.
CH_54_LVL_2_PRE_3=Try your best to find out where they lead.
CH_54_LVL_2_PRE_4=Here's hoping they're in a chatty mood.
CH_54_LVL_6_POST_1=Tron! Quorra! Are you done yet!?
CH_54_LVL_6_POST_2=Didn't anyone tell you, patience is a virtue?
CH_54_LVL_6_POST_3=Not when you're fighting off a horde of creeps!
CH_54_LVL_6_POST_4=Please, Hiro, just buy us more time!
CH_54_LVL_6_POST_5=That's what we're trying to do!
CH_54_LVL_6_POST_6=And you're doing an excellent job. Now, let us get back to work!
CH_54_LVL_16_POST_1=We have good news.
CH_54_LVL_16_POST_2=Excellent news, in fact. We know where the portals lead.
CH_54_LVL_16_POST_3=Righteous, man. Like, do you know what made them shut down too?
CH_54_LVL_16_POST_4=We asked them to. Our hope was it would give you the advantage you needed to win the battle.
CH_54_LVL_16_POST_5=Well, yeah. It did. But, wait, you just asked the portals to shut down, and...they did?
CH_54_LVL_16_POST_6=We asked very politely.
CH_55_LVL_2_PRE_1=*gapes* Whoa.
CH_55_LVL_2_PRE_2=Shut your mouth. You look like a codfish.
CH_55_LVL_2_PRE_3=But...I'm not wrong, right?
CH_55_LVL_2_PRE_4=No, you're right. There is a definite "whoa" factor about this place.
CH_55_LVL_6_POST_1=Cursed objects?
CH_55_LVL_6_POST_2=*nods* Place like this? It's probably lousy with them.
CH_55_LVL_6_POST_3=Yeah! Maybe there's something out there that'll help us fight the MV!
CH_55_LVL_6_POST_4=...
CH_55_LVL_6_POST_5=Alright. Just keep the junk to a minimum, though. Kapeesh?
CH_55_LVL_6_POST_6=Minimum. Got it.
CH_55_LVL_16_POST_1=*grits teeth* This day just keeps getting better and better.
CH_55_LVL_16_POST_2=What sort of trickery is this?
CH_55_LVL_16_POST_3=I do not know. More important question, what do we do now?
CH_55_LVL_16_POST_4=Well, we can't stand around here getting soaked, that's for sure.
CH_55_LVL_16_POST_5=Oh, man. My fur is gonna smell musty for weeks.
CH_56_LVL_2_PRE_1=This is fun!
CH_56_LVL_2_PRE_2=When this is over, I think we need to re-evaluate your concept of fun, lass.
CH_56_LVL_2_PRE_3=Kim! Lookout!
CH_56_LVL_2_PRE_4=PURGE THE ERRORS!
CH_56_LVL_6_POST_1=PURGE THE ERRORS! PURGE THE ERRORS!
CH_56_LVL_6_POST_2=We need to get to Kim.
CH_56_LVL_6_POST_3=What's the plan, lass?
CH_56_LVL_6_POST_4=How much damage can you do with that hand cannon of yours?
CH_56_LVL_6_POST_5=Aye, she's got settings the likes your eyes have never seen, from culinary to crater.
CH_56_LVL_6_POST_6=I think we're going to need the crater setting.
CH_56_LVL_16_POST_1=We must hurry. The Mega Virus is coming.
CH_56_LVL_16_POST_2=*groans* Wha-what? The Mega Virus?
CH_56_LVL_16_POST_3=It is imperative for everyone's health and safety that we leave immediately.
CH_56_LVL_16_POST_4=Is that your *winces* expert opinion?
CH_56_LVL_16_POST_5=Yes. I would not be an adequate healthcare provider if I let my patients fight a battle they cannot win.
CH_57_LVL_2_PRE_1=Oh, come on! How are we supposed to find Yzma in this mess?
CH_57_LVL_2_PRE_2=She's here somewhere. Everyone spread out.
CH_57_LVL_2_PRE_3=Are we still sure she's one of the bad guys?
CH_57_LVL_2_PRE_4=We're going to treat her as hostile until proven otherwise. It's the only safe way to play this.
CH_57_LVL_6_POST_1=Stop right there, Yzma!
CH_57_LVL_6_POST_2=Ah!
CH_57_LVL_6_POST_3=Close ranks, everyone. Don't let her get away.
CH_57_LVL_6_POST_4=*stammers* Uh, c-can't we work something out?
CH_57_LVL_6_POST_5=I think you've made enough deals.
CH_57_LVL_6_POST_6=Wait! Shouldn't we talk this through first?
CH_57_LVL_16_POST_1=Fine, fine. You caught me. Congratulations.
CH_57_LVL_16_POST_2=Wait, this can't be right. Why did you run, Yzma?
CH_57_LVL_16_POST_3=Because she's guilty, that's why.
CH_57_LVL_16_POST_4=What do you have to say for yourself?
CH_57_LVL_16_POST_5=*shrugs* Hades' deal seemed too good to pass up.
CH_58_LVL_2_PRE_1=Quorra, Tron, you were the ones that communicated with the portals. What's our next move?
CH_58_LVL_2_PRE_2=They don't want creeps coming through them anymore, so we share a common goal.
CH_58_LVL_2_PRE_3=That's all well and good, but how do we get RID of the fiends?
CH_58_LVL_2_PRE_4=That is...an excellent question.
CH_58_LVL_6_POST_1=Guys! I have an idea.
CH_58_LVL_6_POST_2=Please don't say, "look at this from a different angle."
CH_58_LVL_6_POST_3=Yeah, man. It's been done before.
CH_58_LVL_6_POST_4=Har, har.
CH_58_LVL_6_POST_5=No. What if, instead of trying to scrub out the creeps, we just change the code?
CH_58_LVL_6_POST_6=Can we do that?
CH_58_LVL_16_POST_1=I'm the one who should find Tactical Team One.
CH_58_LVL_16_POST_2=I don't think-
CH_58_LVL_16_POST_3=It's my plan.
CH_58_LVL_16_POST_4=I can't have any of you risking yourselves.
CH_58_LVL_16_POST_5=You know, that's, like, a totally righteous sentiment but I really think we should have a vote first...
CH_59_LVL_2_PRE_1=Hey, guys.
CH_59_LVL_2_PRE_2=Hiro? Where in the eight-maids-a-milking did you come from?
CH_59_LVL_2_PRE_3=That's not Hiro, man! It's the MV in disguise!
CH_59_LVL_2_PRE_4=Hit it with sticks!
CH_59_LVL_6_POST_1=Look, guys. I don't know how stable the portal is, so we have to leave. Like, now.
CH_59_LVL_6_POST_2=Alright, you heard the man. Everyone gather your supplies. We're moving out.
CH_59_LVL_6_POST_3=You thinkin' what I'm thinkin', Ducky?
CH_59_LVL_6_POST_4=Yeah! We gotta double down on finding those cursed objects!
CH_59_LVL_6_POST_5=Fine. Just stay within shouting distance.
CH_59_LVL_6_POST_6=*mumbles* Those plush toys will be the death of me.
CH_59_LVL_16_POST_1=We couldn't figure out what stuff was cursed!
CH_59_LVL_16_POST_2=Yeah! So we took it all!
CH_59_LVL_16_POST_3=I thought you two were supposed to stay within shouting distance!
CH_59_LVL_16_POST_4=Well, we're shouting now!
CH_59_LVL_16_POST_5=*grumbles* Just get in the portal.
CH_60_LVL_2_PRE_1=We barely escaped with our lives. Perhaps pursuing the Creeps was a mistake.
CH_60_LVL_2_PRE_2=We gained valuable intelligence on our chief adversary. A tactical retreat is not a failure.
CH_60_LVL_2_PRE_3=If this is what we be calling success, may the winds never lead us to failure. My sea legs are about to give out.
CH_60_LVL_2_PRE_4=The team has sustained numerous minor injuries and several major ones. I will now administer medical treatment.
CH_60_LVL_6_POST_1=All heroes are stable, with the exception of Kim Possible. Outlook uncertain. She needs time to rest.
CH_60_LVL_6_POST_2=She shall have it. The rest of us will take the opportunity to fortify our position here.
CH_60_LVL_6_POST_3=Aye, and what position is that, precisely? Heads in the sand?
CH_60_LVL_6_POST_4=If you have something to say, pirate, now would be the time to say it.
CH_60_LVL_6_POST_5=Oh, I'd hate to spoil the mood, "captain." Besides, I'd only be saying what everyone's thinking.
CH_60_LVL_6_POST_6=That kind of talk does no one any good, Silver. And if you're planning mutiny... I would strongly suggest you reconsider.
CH_60_LVL_13_POST_1=Ugh... what's the sitch? Did we win?
CH_60_LVL_13_POST_2=You were knocked unconscious from behind by a Mage.
CH_60_LVL_13_POST_3=So that's a "no" on the win question.
CH_60_LVL_13_POST_4=Your defeat elevated the stress levels of the group, leading to many additional mistakes and, ultimately, complete failure.
CH_60_LVL_13_POST_5=Hard no. Got it.
CH_60_LVL_16_POST_1=The only difference between us yesterday and us today is us today has better intel. We'll never get surprised like that again.
CH_60_LVL_16_POST_2=Aye, we know more about the unbeatable super-monster we have no hope of stopping. Like knowing the mass of the asteroid about to hit you.
CH_60_LVL_16_POST_3=Since when were we planning to take out the Megavirus by ourselves? This was always a TEAMS effort, plural! We are NOT the only team.
CH_60_LVL_16_POST_4=Miss Possible is correct. Our allies on Tactical Team One, the Tech Team, and the Order Team will all stand with us on the fated day.
CH_60_LVL_16_POST_5=That's right. We just need some way to call them. Or beep them. You know how it goes.
CH_61_LVL_2_PRE_1=Anyone else thinks it looks sort of... strange in there?
CH_61_LVL_2_PRE_2=Can't be any stranger than the fashion district was.
CH_61_LVL_2_PRE_3=The future is always stranger than the past, if only because we haven't met it yet.
CH_61_LVL_2_PRE_4=Thank you for the very helpful wisdom, wizard.
CH_61_LVL_6_POST_1=Strolling into a lion's den uninvited might be called bravery. But barging into the court of a king... that demands reprimand.
CH_61_LVL_6_POST_2=You're no king, Scar. You barely rate as a public menace. I'm tempted to write you up for loitering.
CH_61_LVL_6_POST_3=But your instincts disagree, don't they? Listen to them. They remember who is predator and who is prey, even when you pretend to forget.
CH_61_LVL_6_POST_4=Don't let that varmint get to you, Chief. He's just a stuffed animal that's been out of the toybox too long.
CH_61_LVL_6_POST_5=Maybe he needs a hug?
CH_61_LVL_6_POST_6=Eyes up and cut the chatter. Scar's trying to distract us.
CH_61_LVL_16_POST_1=Nice job playing possum before, Chief.
CH_61_LVL_16_POST_2=Playing, nothing. If it weren't for Pleakley's mosquitoes, my right deltoid would be on permanent desk duty.
CH_61_LVL_16_POST_3=Thank you, Chief. It's nice to be recognized. And thanks to Mrs. Incredible's stretchy punches, I managed to avoid the intestinal tract myself.
CH_61_LVL_16_POST_4=Gross.
CH_61_LVL_16_POST_5=Great teamwork, everyone!
CH_62_LVL_2_PRE_1=These readings are... woah. What were you two doing on the other side of the portal?
CH_62_LVL_2_PRE_2=Gathering objects!
CH_62_LVL_2_PRE_3=Cursed objects!
CH_62_LVL_2_PRE_4=Cursed or not, I'm getting some strange readings from those things. I think I can use them to find the other Team!
CH_62_LVL_6_POST_1=The portal guy! I can't believe it!
CH_62_LVL_6_POST_2=My word. I do believe you are correct in your assessment, Miss Possible.
CH_62_LVL_6_POST_3=Preliminary biometric scan indicates with 99.42% certainty that is Hiro. Scan also indicates a high likelihood that he is agitated.
CH_62_LVL_6_POST_4=Yes, I am!
CH_62_LVL_6_POST_5=You're Hiro? Or you're agitated? The devil's in the details... with the darkness.
CH_62_LVL_6_POST_6=I'm both! Can we PLEASE continue this conversation with everyone on this side of the portal?
CH_62_LVL_13_POST_1=This trusty, time-tested walkie-talkie will keep us in touch no matter what, no matter where you are!
CH_62_LVL_13_POST_2=Thanks!
CH_62_LVL_13_POST_3=Wow, it's so old!
CH_62_LVL_13_POST_4=Is it cursed? It looks kind of cursed.
CH_62_LVL_13_POST_5=Please be careful with it. It's time-tested, but it's a little fragile from age...
CH_62_LVL_16_POST_1=Hey Crop-top, is that a beeper?
CH_62_LVL_16_POST_2=I assume you're talking to me and you're talking about my Kimmunicator. Correct me if I'm wrong on either point.
CH_62_LVL_16_POST_3=Got it in one. I'm thinking if old comms tech would work across the portals, maybe we can use that?
CH_62_LVL_16_POST_4=You're right! With a little tweaking, I bet we can use the Kimmunicator to stay in contact!
CH_62_LVL_16_POST_5=It sounds like a plan, except, wait... OLD comms tech? Wade just updated this!
CH_63_LVL_2_PRE_1=So, we were headed to the desert, and we're obviously not there. First off, any theories on where we are?
CH_63_LVL_2_PRE_2=It's not Arendelle. Too warm. No mountains. And no snow. And it's a giant kid's bedroom.
CH_63_LVL_2_PRE_3=Lilo room? Too big. Big Lilo?
CH_63_LVL_2_PRE_4=626 has right concept, wrong little girl. I am hearing of this place from others. Is room of human child, Bonnie. Size is tricky concept here.
CH_63_LVL_6_POST_1=Strength and discipline... I knew all that climbing would come in handy. See you at the top!
CH_63_LVL_6_POST_2=Can't climb faster than a grappling hook, Mulan! I'll see you there first!
CH_63_LVL_6_POST_3=Just going to play through if you don't mind, ladies.
CH_63_LVL_6_POST_4=Miss Elsa! Riding a giant pillar of ice is hardly sporting!
CH_63_LVL_6_POST_5=Shoulda caught a ride on the Ketak, cap'n.
CH_63_LVL_6_POST_6=If your claws scratch the paint, I will buff it out with your furry hide!
CH_63_LVL_13_POST_1=That's no water, lass. It's our undoing.
CH_63_LVL_13_POST_2=Warning: scanners overloaded. Number of Creeps exceeds survivability.
CH_63_LVL_13_POST_3=The Portal... this was a trap! It must have been the Megavirus!
CH_63_LVL_13_POST_4=On your guard. If we are to perish, let it be as comrades-in-arms.
CH_63_LVL_13_POST_5=Nobody's perishing on my watch.
CH_63_LVL_16_POST_1=MY EYES!!
CH_63_LVL_16_POST_2=Kim! Are you hurt?
CH_63_LVL_16_POST_3=I'm fine... in fact, I feel.... Great? But what happened to the Creeps?
CH_63_LVL_16_POST_4=Gone in a flash, as soon as you touched the Badge. As quickly as they appeared, and as mysteriously.
CH_63_LVL_16_POST_5=Well, that's probably fine, then. I'm sure that dark and portentous description spells good news for everybody.
CH_64_LVL_2_PRE_1=I just keep picturing the street opening up like a huge mouth and swallowing me whole. Is anyone else picturing that?
CH_64_LVL_2_PRE_2=Well, now I am. Thanks for that, partner. Nothing like imagining a slow suffocation by concrete to put the spark in your spurs.
CH_64_LVL_2_PRE_3=Positive thinking, everyone!
CH_64_LVL_2_PRE_4=Right! Maybe we'll just be crushed instantaneously!
CH_64_LVL_2_PRE_5=That's enough. Stay focused.
CH_64_LVL_2_PRE_6=And when the street starts to open up?
CH_64_LVL_2_PRE_7=Be somewhere else.
CH_64_LVL_6_POST_1=The street! The street's a mouth! I knew it would end this way!
CH_64_LVL_6_POST_2=You knew that a death god would use his command over entropy to tame decaying code to his will?  I must say, I am impressed!
CH_64_LVL_6_POST_3=Woah, points for the wizard. I was expecting a little more shock and awe, but hey, what can you do.
CH_64_LVL_6_POST_4=It was no great trial, King of Death. I already lived through Hiro explaining this all later over a cup of tea.
CH_64_LVL_6_POST_5=Don't worry, everyone! As long as we keep our cool, I just know we can win!
CH_64_LVL_6_POST_6=Hey, love the enthusiasm. Very cool. Positivity. The kids today just eat that up.  Which reminds me, I'm STARVING!
CH_64_LVL_13_POST_1=HEY, HEY, LOOKING GOOD, LOVE THE HAIR. YOUR SKIN'S LOOKING TIGHT. YOU MOISTURIZING? LOVE THAT.
CH_64_LVL_13_POST_2=Ugh, that voice. I feel like I'm taking a bath in sewage.
CH_64_LVL_13_POST_3=There's no way out! It's all just fire, and creepy mouths, and glitched architecture! I should have stayed in space!
CH_64_LVL_13_POST_4=THERE IS A WAY OUT, EYEBALL. THE ONLY WAY. A ONE-WAY TRIP TO THE UNDERWORLD. ALL-INCLUSIVE.
CH_64_LVL_13_POST_5=If anyone has any ideas, there's no time like the present.
CH_64_LVL_13_POST_6=All times are like the present, Chief Bogo. Allow me to demonstrate.
CH_64_LVL_16_POST_1=That was some pretty fancy spell-slinging, Merlin.
CH_64_LVL_16_POST_2=I knew you could do it!
CH_64_LVL_16_POST_3=*cough* *sputter* got... lucky...
CH_64_LVL_16_POST_4=You're the lucky one, Hades. If any of my team had gotten hurt, you might not be getting off so easy.
CH_64_LVL_16_POST_5=Excuse me, I cannot sanction prohibit punitive violence against prisoners no matter the circumstances.
CH_64_LVL_16_POST_6=That's right. Let's not start acting like Creeps. Villains are villains. It's up to us to be the Heroes.
CH_65_LVL_2_PRE_1=Get them back on track, bot-boy. Eyes on the prize.
CH_65_LVL_2_PRE_2=I'm trying. Kim? Are you there? You say you're in Bonnie's Room? Are there any locals there, any indication of what happened?
CH_65_LVL_2_PRE_3=I smell treasure.
CH_65_LVL_2_PRE_4=Be careful! We have no idea why you ended up there! Hello? Hello! Kim!
CH_65_LVL_6_POST_1=I'll run a set of simulations to try to figure out how a Portal's output destination could get shifted remotely.
CH_65_LVL_6_POST_2=Good. We learn it, maybe we can use it. And overclock the sims. We've got bandwidth to spare.
CH_65_LVL_6_POST_3=I don't like how fast Bonnie's Room was completely full of Creeps. It was a more coordinated effort than we've ever seen.
CH_65_LVL_6_POST_4=No arguments here. Figure out how it happened. Don't dismiss the impossible.
CH_65_LVL_6_POST_5=Something funky was going on with that Platinum Badge, man. Real mystical. Needs some dedicated analysis.
CH_65_LVL_6_POST_6=Stay focused, keep your head out of the clouds, and bring me a report before Tactical Team reaches the return Portal.
CH_65_LVL_13_POST_1=So it wasn't the Mega Virus that redirected the Portal destination. It was the Platinum Badge!
CH_65_LVL_13_POST_2=Platinum Badge energy pulls everything toward it. So when the team entered the Portal...
CH_65_LVL_13_POST_3=They got pulled into the gravity well of its power, and popped out in Bonnie's Room.
CH_65_LVL_13_POST_4=The same thing must have been happening to the Creeps. Any time they tried to slip through to somewhere else...
CH_65_LVL_13_POST_5=They got pulled to the same destination as the Tactical Team. Looks like we can expect a welcoming party for the next Platinum Badge.
CH_65_LVL_16_POST_1=It's clear we can't let the Creeps or the Mega Virus get their greasy hands on a Platinum Badge.
CH_65_LVL_16_POST_2=And based on the energy I analyzed, it looks like another one began forming as soon as Kim Possible grabbed the first.
CH_65_LVL_16_POST_3=So when our team reaches the return portal in Bonnie's Room, won't they just get pulled to the next Platinum Badge?
CH_65_LVL_16_POST_4=That could be to our advantage. The Creeps took a while to gather at the last one. This time, we can get there first.
CH_65_LVL_16_POST_5=That's my Tech Team. Good work.
CH_66_LVL_2_PRE_1=I was here before, when we were working the dev notes lead on the Inventor case. Peter Pan brought us... I think it's called... Neverland?
CH_66_LVL_2_PRE_2=Charming, in an eerie kinda way. Is it always this deserted? I thought I heard about some kids who needed directions.
CH_66_LVL_2_PRE_3=Yes! The Lost Boys, some pirates, even some mermaids. They weren't a lot of help, but they were nice. Maybe we can track them down again.
CH_66_LVL_2_PRE_4=If we are to interview mermaids again, I call "dibs" on that task. I don't invoke my aquatic birthright very often, but I do so now.
CH_66_LVL_2_PRE_5=Noted.
CH_66_LVL_6_POST_1=You can tell the direction of the magic badge that makes everyone crazy?
CH_66_LVL_6_POST_2=Yeah. Not sure how I feel about that, honestly.
CH_66_LVL_6_POST_3=I like it! It's ominous! Maybe you're cursed!
CH_66_LVL_6_POST_4=Sounds like a tactical advantage to me. Never look one of those in the mouth. Lots of teeth.
CH_66_LVL_6_POST_5=Shouldn't we go after them?
CH_66_LVL_6_POST_6=Affirmative. Alright grunts, we've got three AWOL comrades moving towards a mind-altering object of incredible power. After them! Go go go!
CH_66_LVL_13_POST_1=Our foes surround us. I will stay behind to distract them. If this is my final stand, you were honorable comrades.
CH_66_LVL_13_POST_2=If you fall, it won't be alone. My fellow winged soldier of the night. So long as you stand, I will stand with you.
CH_66_LVL_13_POST_3=Kristoff, take Sven and back them up. No heroic sacrifices today, got it?
CH_66_LVL_13_POST_4=On it, your highness.
CH_66_LVL_13_POST_5=See if you can get them to lighten up a little while you're at it!
CH_66_LVL_16_POST_1=I'll hold them off for as long as it takes. Get to the Platinum Badge.
CH_66_LVL_16_POST_2=I'll help. Ice support incoming.
CH_66_LVL_16_POST_3=Be careful, both of you! Please!
CH_66_LVL_16_POST_4=Express your concern by moving quickly. I spy a silver-white glow above.
CH_66_LVL_16_POST_5=Aye aye, Captain.
CH_66_LVL_16_POST_6=Indeed.
CH_67_LVL_2_PRE_1=Looks like the bug man's making himself at home.
CH_67_LVL_2_PRE_2=Ooh, the Midway! It's always great! All those games, and treats, and everyone having fun!
CH_67_LVL_2_PRE_3=Careful, kiddo. We don't know what kind of weird stink Oogie Boogie's put on it.
CH_67_LVL_2_PRE_4=Eyes up, we're entering the Midway now. Be on your guard for anything.
CH_67_LVL_6_POST_1=Careful with those dice, Magic Man! You might get lost in thought, ha ha!
CH_67_LVL_6_POST_2=There are... so many dice. How many dice? One, two, three... So many... thirty-five, thirty-six... I can't seem to stop... one-hundred and one...
CH_67_LVL_6_POST_3=Merlin! Are you ok?
CH_67_LVL_6_POST_4=Seven hundred and twelve... one thousand, six hundred and fifty... the numbers... keep changing...
CH_67_LVL_6_POST_5=Look out! Oogie Boogie's rolling the die again!
CH_67_LVL_6_POST_6=This is a crooked game, bug man. I don't allow crooked games in my town.
CH_67_LVL_13_POST_1=This... this doesn't make any sense. You were never this strong.
CH_67_LVL_13_POST_2=That was before the code got curdled, stretch. And you know what they call problems in the code, right?
CH_67_LVL_13_POST_3=Oh, let me recall my Earth vernacular. I think they call them hugs? No wait, bugs!
CH_67_LVL_13_POST_4=Prize for the poindexter! And there's nothing I love more than BUGS! They make me stronger!
CH_67_LVL_13_POST_5=Well, it's nice to have hobbies, but wouldn't you be happier if we all got along together?
CH_67_LVL_13_POST_6=No!
CH_67_LVL_16_POST_1=Here he comes, oh no, oh no! We've gotta get out of here! No, we've gotta help our friends! I can't decide! I'm too scared!
CH_67_LVL_16_POST_2=That's right, little man! Fear me! Fear the king of the bugs! It makes me even stronger!
CH_67_LVL_16_POST_3=Hi! That's interesting! I don't agree with you, but I'm glad you've found a way to make yourself happy!
CH_67_LVL_16_POST_4=That's right, little lady, I'm–wait, why aren't you afraid of me?
CH_67_LVL_16_POST_5=Oh, I don't feel fear. That's my friend's department. I'm Joy! Nice to meet you!
CH_67_LVL_16_POST_6=You don't... feel any fear at all?
CH_67_LVL_16_POST_7=Not one bit, oh great king of the creepy crawlies. Isn't that just... delightful?
CH_68_LVL_2_PRE_1=Information is great, but it's useless if we don't find a way to implement it.
CH_68_LVL_2_PRE_2=Indeed! Information is our greatest asset, but we must find a way to use it.
CH_68_LVL_2_PRE_3=Quorra, Tron, Yax, I want you to draw up proposals for how we can use what we've learned to help the Tactical Team.
CH_68_LVL_2_PRE_4=Hiro, you focus on staying in contact with Kim Possible. Gizmoduck, repeat what I say in different words again and I'll feed you your visor.
CH_68_LVL_6_POST_1=I want to try to develop a Creep early-warning system. It could keep the Tactical Team from getting ambushed so often.
CH_68_LVL_6_POST_2=That does seem to happen a lot, doesn't it? Go for it.
CH_68_LVL_6_POST_3=Since we recoded the portals, we've only been able to open one at any given time. We should know why that is.
CH_68_LVL_6_POST_4=Mobility is everything in a battle, just like in a street race. Figure it out, but don't let all the Creeps in again.
CH_68_LVL_6_POST_5=Like, now that we know the Platinum badges aren't unique, maybe we can make some of our own?
CH_68_LVL_6_POST_6=If you're right, that'd be a huge advantage. Get on it, but be careful. That's a lot of power to play with.
CH_68_LVL_13_POST_1=Alright crew, hit me. What were your results? Any luck?
CH_68_LVL_13_POST_2=I was able to tap into the network to determine if there is any Creep activity near a Portal's exit, but nothing about their future activity.
CH_68_LVL_13_POST_3=As for me, I found more problems than I solved. We can open many Portals at once, but that shrinks every opening to a pinhole.
CH_68_LVL_13_POST_4=Yeah man, I don't know what to tell you. I can make fake Platinum badges all day, but their power output is a fraction of the real thing.
CH_68_LVL_13_POST_5=Hmmm... I think I know how we can turn these three bad laps into a new track record.
CH_68_LVL_16_POST_1=And we'll use Tron's new monitoring system to see if it worked. Sound good?
CH_68_LVL_16_POST_2=These are devious tactics, but against such an enemy, we have no choice. The City must be defended.
CH_68_LVL_16_POST_3=I like this plan better than trying to make actual Platinum badges. Something about that just seems wrong.
CH_68_LVL_16_POST_4=You remind me of a friend of mine, Yax. I think he'd like this plan too. It's a Kevin Flynn kind of trick.
CH_68_LVL_16_POST_5=I'll take that as unanimous approval. Nice work, team.
CH_69_LVL_2_PRE_1=So, there was Platinum Badge in Oasis all along? We are beginning the hunt now, yes?
CH_69_LVL_2_PRE_2=I don't think so. I'm not feeling anything like the pull I felt in Neverland or the giant playroom.
CH_69_LVL_2_PRE_3=I am thinking this is perhaps a waystation. In-between place. Is perhaps why it returns when, if memory serves, we all saw it disappear?
CH_69_LVL_2_PRE_4=Stitch forgot about that.
CH_69_LVL_6_POST_1=So, the idea is, instead of all of us bouncing around from world to world, we establish a permanent base here, in the Oasis.
CH_69_LVL_6_POST_2=It'll give us a tactical advantage over the enemy to be striking out from a position of strength.
CH_69_LVL_6_POST_3=Hey, I'm a voyager at heart. You can't chain down this demigod.
CH_69_LVL_6_POST_4=Don't worry, Captain Conditioner. We'll keep you moving.
CH_69_LVL_6_POST_5=See, comments like that? That's the kind of thing that makes a guy glad he can turn into a bird and fly away.
CH_69_LVL_13_POST_1=So, where does that leave the rest of us?
CH_69_LVL_13_POST_2=The rest of us will stand ready.
CH_69_LVL_13_POST_3=Ready for what?
CH_69_LVL_13_POST_4=Ready to drop everything at a moment's notice and follow Kim through a new Portal when it appears.
CH_69_LVL_13_POST_5=Vigilance... the mindset demanded by the crime fighting lifestyle. The shadows will follow you, Kim.
CH_69_LVL_13_POST_6=Yeah, Darkwing, that's usually how shadows work. But I know what you mean, and I appreciate it.
CH_69_LVL_16_POST_1=But can we really trust this pirate not to try to steal the Platinum Badge again?
CH_69_LVL_16_POST_2=Aye, twice bitten, thrice shy, lass. I've seen the error of me ways, and all that.
CH_69_LVL_16_POST_3=If you have not, I'll make sure that you soon do. Or you'll need a new robotic... everything.
CH_69_LVL_16_POST_4=Understood. My bionic eye can detect almost anything, and I'll keep it peeled for Platinum. But for the lady Possible, not for meself.
CH_69_LVL_16_POST_5=Just so we're clear, I'm saying if you try to steal the Platinum Badge again, I will hit you with my sword. A lot.
CH_69_LVL_16_POST_6=The clarity is understood and very much appreciated, thank you.
CH_70_LVL_2_PRE_1=Can we really handle two queens of evil at once? I mean, Ursula AND Maleficent?
CH_70_LVL_2_PRE_2=The better question is, can THEY handle it? I don't really see those two playing nice together.
CH_70_LVL_2_PRE_3=Maybe you're right, and it's a weakness we can exploit. Maybe you're not, and they'll come at us in perfect unison.
CH_70_LVL_2_PRE_4=Either way, the plan's the same. Be on your guard and be ready for anything.
CH_70_LVL_6_POST_1=Welcome to the Black Market, dearies! And today, it's YOU that's for sale!
CH_70_LVL_6_POST_2=Enough, Ursula! Call off your tentacles and come quietly. Yzma, Scar, Hades and Oogie-Boogie have already been handled.
CH_70_LVL_6_POST_3=Oh, what a lovely invitation to languish in a prison cell. I think I'll pass. Don't lump me in with those incompetent fools.
CH_70_LVL_6_POST_4=Which incompetent fools would you rather be lumped in with?
CH_70_LVL_6_POST_5=I notice Maleficent isn't around...
CH_70_LVL_6_POST_6=Enough! I'll have you all broken down and sold for parts!
CH_70_LVL_13_POST_1=These glitches... the power! I can be everywhere at once!
CH_70_LVL_13_POST_2=Keep fighting! Just keep wearing her down! The tentacles aren't that strong!
CH_70_LVL_13_POST_3=I know we can do it!
CH_70_LVL_13_POST_4=Yeah! Definitely! Although... it seems unlikely, if I'm being honest!
CH_70_LVL_13_POST_5=Try being quiet instead!
CH_70_LVL_16_POST_1=Alright, Maleficent. I leave the rest to you.
CH_70_LVL_16_POST_2=Nice bluff, Ursula. But if Maleficent were really here, she'd have helped you by now.
CH_70_LVL_16_POST_3=You dare presume to know the mind of the Mistress of All Evil? Our plans run deeper than you can comprehend.
CH_70_LVL_16_POST_4=Where's the voice coming from? Anyone have eyes on the target?
CH_70_LVL_16_POST_5=Pathetic earthbound mortals! They never look to the skies!
CH_71_LVL_2_PRE_1=Stitch bored. Stitch no want wait.
CH_71_LVL_2_PRE_2=Easy there, my chew-happy chum. Boredom is the enemy of vigilance. We must maintain maximum readiness at every moment.
CH_71_LVL_2_PRE_3=Darkwing Duck take nap earlier. Stitch saw.
CH_71_LVL_2_PRE_4=I was meditating! Meditating on JUSTICE.
CH_71_LVL_6_POST_1=Kida, kindly take to the skies on your Ketak and give me a report on local creep activity. Elsa, build us some icy defenses, then join Kim.
CH_71_LVL_6_POST_2=It shall be done.
CH_71_LVL_6_POST_3=Aye-aye, Captain.
CH_71_LVL_6_POST_4=Miss Possible, Mister Silver, what can you tell me about the badge's location?
CH_71_LVL_6_POST_5=My clever eye's picking up nothing platinum in the immediate vicinity, but I've got nothing on Miss Possible.
CH_71_LVL_6_POST_6=I can feel it. It's uphill... I think it might be in that little building in the distance?
CH_71_LVL_13_POST_1=But... why would there be a Platinum Badge in my village? Why at my family's shrine? What's special about me, or this place?
CH_71_LVL_13_POST_2=Best leave those worries for the philosophers, lass.
CH_71_LVL_13_POST_3=A large school of Creeps incoming!
CH_71_LVL_13_POST_4=My scanners confirm an increase in Creep activity in the immediately surrounding area.
CH_71_LVL_13_POST_5=Nothing gets past you, mate.
CH_71_LVL_16_POST_1=Got the badge, Captain. We're on our way back to the Portal.
CH_71_LVL_16_POST_2=It would seem we were able to secure the badge with minimal Creep interference. The Platinum Retrieval Team strategy worked quite well.
CH_71_LVL_16_POST_3=Mulan, are you sure you're OK?
CH_71_LVL_16_POST_4=Yes! At first, being here was strange. It made me wonder what this place actually was, and by extension, who I am. But defeating the Creeps in combat reminded me.
CH_71_LVL_16_POST_5=Well... who are you? What is this place?
CH_71_LVL_16_POST_6=This place, like every other place we've journeyed to... is a battlefield. And I, by extension, am a warrior.
CH_72_LVL_2_PRE_1=It never ends with these villains! I've met mosquitoes that were less persistent!
CH_72_LVL_2_PRE_2=Mosquitoes can be ignored. Villains can't. Keep it moving!
CH_72_LVL_2_PRE_3=Ah yes, I remember this. This was right before that troublesome pack of villains took over the city.
CH_72_LVL_2_PRE_4=You're mixed up, Merlin! That part already happened!
CH_72_LVL_6_POST_1=Everybody hold on tight!
CH_72_LVL_6_POST_2=What? Why? Aren't you holding us? Are you going to drop us?
CH_72_LVL_6_POST_3=It's an expression, Pleakley.
CH_72_LVL_6_POST_4=No, I mean it! Here we go!
CH_72_LVL_6_POST_5=Wait! I can just use my striiiiiiiiing!
CH_72_LVL_6_POST_6=Yay! I love when we all have fun together!
CH_72_LVL_13_POST_1=Why *huff* did I think *puff* the last Villain *huff* would be easier? *puff*
CH_72_LVL_13_POST_2=I'm not sure! It seems out of character for you, honestly!
CH_72_LVL_13_POST_3=Hey! I'm capable of growth! Remember when I got Scar with all those mosquitoes?
CH_72_LVL_13_POST_4=Yeah, I do! I just wasn't sure YOU remembered it! Where's THAT Pleakley been lately?
CH_72_LVL_13_POST_5=You're right! I've fallen back to my old cowardly ways! Well, no longer. From now on... I JUST REALIZED THE TUNNEL IS COLLAPSING! RUN! RUN!
CH_72_LVL_16_POST_1=What's your game, Maleficent? Why sacrifice yourself trying to bring down the tunnel on us?
CH_72_LVL_16_POST_2=Oh... it will take more than... running into a few walls at top speed... to stop me for good, Chief Bogo.
CH_72_LVL_16_POST_3=The only walls you'll be seeing for a while will be the inside of a jail cell, Maleficent. Your time is up.
CH_72_LVL_16_POST_4=Oh, is that so? I believe... you will find... time was on my side, after all.
CH_72_LVL_16_POST_5=For you see... you're too late. By now... they're already... at the Portal Room. We've won... I leave the rest... to you, my Toxic Squad! Ahahahaha!
CH_73_LVL_2_PRE_1=How's it looking out there, Kristoff? Anything to report from the scout trio?
CH_73_LVL_2_PRE_2=Negative, team leader. Gaston says he saw an elk, but he's definitely lying. Sven says he didn't see anything either.
CH_73_LVL_2_PRE_3=How about you, Maui? Skies still friendly?
CH_73_LVL_2_PRE_4=Man, flying in the desert is EASY! All this hot air, and my wings never get wet! But no Creeps, Captain.
CH_73_LVL_6_POST_1=Red alert! Red alert! Creep swarm! Creep swarm incoming!
CH_73_LVL_6_POST_2=Ready the guns! Ready the torches! Ready the guns with torches attached to them!
