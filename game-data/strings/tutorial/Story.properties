CH_21_LVL_16_POST_3=Does this mean we don't get to jump on the bed anymore?
CH_22_LVL_2_PRE_1=So, you're saying there are objects in the City that magically transported you to important places from your homes?
CH_22_LVL_2_PRE_2=Yeah, that's basically the gist of it.
CH_22_LVL_2_PRE_3=Let's see... important places in Agrabah... the palace, the marketplace... No! I've got it! The Cave of Wonders!
