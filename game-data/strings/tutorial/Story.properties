CH_24_LVL_6_POST_5=Yeah, there's that.
CH_24_LVL_16_POST_1=Okay, which one of you pussy willows sent those creeps up here?
CH_24_LVL_16_POST_2=Sorry, Calhoun.
CH_24_LVL_16_POST_3=Did anyone see any clues? You know, before the creeps showed up?
