CH_23_LVL_2_PRE_2=That's okay, Genie. I think we've all reached our limit from being toy-sized.
CH_23_LVL_2_PRE_3=Unless there's a really big bed to jump on in there, right stinkbrain?
CH_23_LVL_2_PRE_4=Yeah!
