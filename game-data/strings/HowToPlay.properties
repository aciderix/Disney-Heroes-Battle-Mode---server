
HERO_FILTERS_CARD_1_TITLE=Hero Filters
HERO_FILTERS_CARD_1_BULLET_A_TITLE=Overview
HERO_FILTERS_CARD_1_BULLET_A_TEXT=Hero Filters allow you to easily filter your Hero collection to find the right Heroes for the job!
HERO_FILTERS_CARD_1_BULLET_A1_TEXT=You can filter which Heroes you see on the "Heroes" and "Choose Your Heroes!" screens.
HERO_FILTERS_CARD_1_BULLET_B_TITLE=Creating a Hero Filter
HERO_FILTERS_CARD_1_BULLET_B_TEXT=There are several Filter Types, each with their own Individual Filters that can be toggled ON or OFF.
HERO_FILTERS_CARD_1_BULLET_B1_TEXT=You may toggle up to <hero_tag_filter_limit> Individual Filters ON at once.
HERO_FILTERS_CARD_1_BULLET_B2_TEXT=The "Heroes in Filter" section shows you how many Unlocked and Locked Heroes match your current Hero Filter.
HERO_FILTERS_CARD_1_BULLET_B3_TEXT=For each Filter Type except "General", Heroes must match every Individual Filter to be shown.
HERO_FILTERS_CARD_1_BULLET_B4_TEXT=You can remove a Hero Filter at any time by tapping the "Clear All" button.
HERO_FILTERS_CARD_1_BULLET_C_TITLE=Applying a Hero Filter
HERO_FILTERS_CARD_1_BULLET_C_TEXT=Apply your Hero Filter by closing the "Hero Filters" window.
HERO_FILTERS_CARD_1_BULLET_C1_TEXT=Once a Hero Filter is applied, you'll only see Heroes that match the filter's requirements.
HERO_FILTERS_CARD_1_BULLET_D_TITLE=General Filters
HERO_FILTERS_CARD_1_BULLET_D_TEXT=Individual Filters in the "General" section are broken up into separate categories.
HERO_FILTERS_CARD_1_BULLET_D1_TEXT=Multiple Individual Filters may be toggled ON within and across these categories.
HERO_FILTERS_CARD_1_BULLET_D2_TEXT=To be eligible for the Hero Filter, Heroes only need to match one Individual Filter within each category that has at least one filter toggled ON.
HERO_FILTERS_CARD_1_BULLET_E_TITLE=A Hero's Full Potential
HERO_FILTERS_CARD_1_BULLET_E_TEXT=All currently available Skills are taken into account when deciding if a Hero matches a Hero Filter or not. This includes any Locked Skills your Hero may have.
HERO_FILTERS_CARD_1_BULLET_E1_TEXT=Your Heroes will be added to more Individual Filters as you progress and unlock new Skills for them.
HERO_FILTERS_CARD_1_BULLET_E2_TEXT=Make sure to take this into consideration when using a Hero Filter to choose your Heroes.
HERO_FILTERS_CARD_1_BULLET_F_TITLE=Mercenaries and Saving Hero Filters
HERO_FILTERS_CARD_1_BULLET_F_TEXT=Hired mercenaries will always be visible, regardless of which Individual Filters are toggled ON.
HERO_FILTERS_CARD_1_BULLET_F1_TEXT=Hero Filters are only saved while active within a mode. Leaving that mode will clear the Hero Filter, toggling each Individual Filter OFF.
WAR_CARD_1_TITLE=Summary
WAR_CARD_1_BULLET_A_TITLE=Head-to-Head Wars
WAR_CARD_1_BULLET_A_TEXT=Compete in two-day long Wars against other Guilds to climb the rankings and earn War Box Rewards.
WAR_CARD_1_BULLET_B_TITLE=Strategy & Tactics
WAR_CARD_1_BULLET_B_TEXT=During the Queue Phase, Protect your Heroes to prevent them from being Banned by the enemy guild. Once the Queue Phase ends, the first 12 hours of Day One begin, where you can set your Bans and Sabotage enemy Heroes for a Day Two advantage. During the next 12 hours, you can continue sabotaging, but you can no longer ban. Take advantage of Day One to coordinate with your Guild and plan your attacks.
WAR_CARD_1_BULLET_B1_TEXT=Day Two is all about clearing rooms! Attack to clear as many as you can!
WAR_CARD_1_BULLET_C_TITLE=Legendary Ranking
WAR_CARD_1_BULLET_C_TEXT=Win as many battles as you can to increase your MMR and get better rewards, including End-of-Season Rewards that depend on the top League you can reach.
WAR_CARD_2_TITLE=The Cars
WAR_CARD_2_BULLET_A_TITLE=Car Bonuses
WAR_CARD_2_BULLET_A_TEXT=Your Guild has nine cars to either protect you from attacks or give you bonus points during the War. Use them well!
WAR_CARD_2_BULLET_B_TITLE=Car Defense
WAR_CARD_2_BULLET_B_TEXT=Set your Heroes to defend your cars from attackers. You have nine cars, so be vigilant!
WAR_CARD_2_BULLET_C_TITLE=Clear Rooms!
WAR_CARD_2_BULLET_C_TEXT=Go on the attack, defeat all defenders in a room to disable its car. Cars are disabled for the rest of the War!
WAR_CARD_2_BULLET_D_TITLE=Climb Floors!
WAR_CARD_2_BULLET_D_TEXT=You begin at the ground floor, so attack to advance! You must steal a car to open the next floor.
WAR_CARD_3_TITLE=Attacks
WAR_CARD_3_BULLET_A_TITLE=One-to-Two Attacks per War
WAR_CARD_3_BULLET_A_TEXT=Every player gets one free attack per War, so make them count!
WAR_CARD_3_BULLET_A1_TEXT=Each Guild has a limited number of extra attacks that officers and higher Guild members can use to make a second attack in a War. The Guild Leader may change the settings to allow any Guild members to use Extra Attacks.
WAR_CARD_3_BULLET_B_TITLE=15-Hero Fights
WAR_CARD_3_BULLET_B_TEXT=Each fight in a War requires you to fight three 5-Hero defending teams with three different 5-Hero attacking teams.
WAR_CARD_3_BULLET_B1_TEXT=Defeat defending Heroes to knock them out for the rest of the War!
WAR_CARD_3_BULLET_C_TITLE=Auto Optional
WAR_CARD_3_BULLET_C_TEXT=Remember, you can turn off auto to take full control of your skills. Use them well to gain the advantage!
WAR_CARD_3_BULLET_D_TITLE=Test Your Lineups with Spars
WAR_CARD_3_BULLET_D_TEXT=Use Spars to practice your attacks before the real battle. You can Spar during both Day One (Sabotage Phase) and Day Two (Battle Phase) to test strategies and improve your lineup. Spars do not consume your War attack, and each member has a limited number of Spars.
WAR_CARD_4_TITLE=Sabotages
WAR_CARD_4_BULLET_A_TITLE=Day One
WAR_CARD_4_BULLET_A_TEXT=Day one is all about preparation. Sabotage enemy Heroes throughout the full 24 hours. During the first 12 hours of the Sabotage Phase, Champions and Leader can also set the Guild's Bans. Use the full 24 hours to plan your Guild's attacks.
WAR_CARD_4_BULLET_B_TITLE=Pick Your Sabotage
WAR_CARD_4_BULLET_B_TEXT=Which defending Hero to sabotage? That's up to you! Think tactically to put the enemy in a bind.
WAR_CARD_4_BULLET_B1_TEXT=Strategy is everything. Choose the best type of sabotage from the available list.
WAR_CARD_4_BULLET_C_TITLE=Sabotage Costs
WAR_CARD_4_BULLET_C_TEXT=Your planning pays off! Sabotage uses Guild Tokens.
WAR_CARD_4_BULLET_C1_TEXT=As your Guild ranks up, more sabotages will be available.
WAR_CARD_4_BULLET_C2_TEXT=The more your Guild sabotages a single player, the more the price goes up. Spread it around, or focus on a weak link?
WAR_CARD_4_BULLET_C3_TEXT=Tokens spent are refunded if you lose the War.
WAR_CARD_5_TITLE=Scoring
WAR_CARD_5_BULLET_A_TITLE=Lineups Defeated
WAR_CARD_5_BULLET_A_TEXT=Defeating an enemy Hero team earns your Guild one point. Each player has three teams, so that's three points possible from each enemy player!
WAR_CARD_5_BULLET_B_TITLE=Rooms Defeated
WAR_CARD_5_BULLET_B_TEXT=Every enemy room your Guild clears of defenders is worth 100 points.
WAR_CARD_5_BULLET_B1_TEXT=Rooms that have no defenders are automatically defeated and worth 100 points to the other side.
WAR_CARD_5_BULLET_C_TITLE=Clean Sweeps
WAR_CARD_5_BULLET_C_TEXT=If your guild's Sharky car survives the War, your Guild will get points for each clean sweep attack your Guild made durring the War.
WAR_CARD_5_BULLET_C1_TEXT=A clean sweep is when you win all 3 rounds of a War attack.
WAR_CARD_5_BULLET_D_TITLE=Defensive Wins
WAR_CARD_5_BULLET_D_TEXT=If your Guild's Off Roader car survives the War, your Guild will get points for each time an enemy failed to defeat a lineup.
WAR_CARD_5_BULLET_E_TITLE=Clean Defenses
WAR_CARD_5_BULLET_E_TEXT=If your Guild's Roller Diva car survives the War, your Guild will get points for each full defense.
WAR_CARD_5_BULLET_E1_TEXT=A clean defense is when a player's 3 lineups each have 1 or more heroes left standing.
WAR_CARD_6_TITLE=Seasons & Rewards
WAR_CARD_6_BULLET_A_TITLE=New Season Each Month
WAR_CARD_6_BULLET_A_TEXT=Every month a new season of War starts and all Guilds' have their MMR reset.
WAR_CARD_6_BULLET_A1_TEXT=A Guild's starting MMR depends on their final MMR from the previous season.
WAR_CARD_6_BULLET_A2_TEXT=The top ten Guilds (based on MMR) from the previous season will have their MMR reset to start the new season in the Gold league.
WAR_CARD_6_BULLET_A3_TEXT=All other Guilds will be seeded from Copper to Silver in accordance with their MMR.
WAR_CARD_6_BULLET_B_TITLE=Rank Up & Earn Rewards
WAR_CARD_6_BULLET_B_TEXT=Win Wars to increase your Guild's MMR and earn War Box Rewards.
WAR_CARD_6_BULLET_B1_TEXT=There are seven Leagues, each with their own MMR requirements. The highest Leagues offer the best rewards!
WAR_CARD_6_BULLET_B2_TEXT=All participating Guilds will receive End-of-Season Rewards based on their League, with the top 5 Guilds in Legendary receiving exclusive rewards in temporary Avatar Borders and Drop Boosters!
WAR_CARD_6_BULLET_B3_TEXT=The temporary Avatar Borders can be used by Players and Guilds for the entirety of the next War Season.
WAR_CARD_6_BULLET_B4_TEXT=The Drop Boosters will increase Hero XP, Gold, and Skill Chips by a % in Normal and Elite Campaigns respectively for the entirety of the next War Season.
WAR_CARD_6_BULLET_B5_TEXT=Upon Season end, all End-of-Season Rewards will be delivered directly to your in-game Mailbox and any exclusive rewards will automatically be activated on your account.
WAR_CARD_6_BULLET_C_TITLE=Participation Matters!
WAR_CARD_6_BULLET_C_TEXT=End-of-Season Rewards are obtainable only by participating in a Guild's War and being in that Guild at season end.
WAR_CARD_6_BULLET_D_TITLE=Matchmaking Rating (MMR)
WAR_CARD_6_BULLET_D_TEXT=When you queue for War, the game matches your Guild against other Guilds with a similar MMR.
WAR_CARD_6_BULLET_D1_TEXT=Your Guild's MMR goes up or down depending on if your Guild wins or loses a War.
WAR_CARD_6_BULLET_D2_TEXT=To reach the next League, a Guild needs to meet its MMR requirements.
WAR_CARD_6_BULLET_D3_TEXT=Once a Guild reaches a League within a season, it cannot be demoted from that League during that season.
WAR_CARD_7_TITLE=Guild Perks
WAR_CARD_7_BULLET_A_TITLE=Car Size
WAR_CARD_7_BULLET_A_TEXT=Your Guild can upgrade the number of defenders per room.
WAR_CARD_7_BULLET_B_TITLE=Car Bonuses
WAR_CARD_7_BULLET_B_TEXT=Your Guild can upgrade the strength of its car bonuses.
WAR_CARD_7_BULLET_C_TITLE=Bonus Attacks
WAR_CARD_7_BULLET_C_TEXT=Your Guild can get extra attacks for officers and higher Guild members to use as second attacks.
WAR_CARD_7_BULLET_D_TITLE=Bonus Rewards
WAR_CARD_7_BULLET_D_TEXT=Your Guild can increase the amount of rewards it gets through guild perks.
WAR_CARD_7_BULLET_E_TITLE=War Spars
WAR_CARD_7_BULLET_E_TEXT=Your Guild can increase the war spar tries available per member.
WAR_CARD_8_TITLE=Sabotage Types
WAR_CARD_9_TITLE=Car Bonuses
WAR_BP_CARD_1_TITLE=Ban & Protect Overview
WAR_BP_CARD_1_BULLET_A_TITLE=How Does it Work
WAR_BP_CARD_1_BULLET_A_TEXT=Each guild has the ability to select Heroes they want to Ban or Protect. Banned Heroes cannot be used in enemy attack lineups during the current War, while Protected Heroes cannot be chosen by the enemy for banning.
WAR_BP_CARD_1_BULLET_B_TITLE=Timings and Permissions
WAR_BP_CARD_1_BULLET_B1_TEXT=Protects are set only during the Queue Phase. Once the Queue ends, Protects are locked in and will last through that War. They cannot be updated during the Sabotage or Battle phases.
WAR_BP_CARD_1_BULLET_B2_TEXT=Bans are set during the first 12 hours of the Sabotage Phase. Once this 12-hour window closes, Bans are locked in and will last through that War.
WAR_BP_CARD_1_BULLET_B3_TEXT=After Bans are locked in, the second half of the Sabotage Phase provides 12 full hours of preparation time before Battle Day begins.
WAR_BP_CARD_1_BULLET_B4_TEXT=Only guild members ranked Champion or higher can set or update Bans and Protects.
WAR_BP_CARD_1_BULLET_C_TITLE=Cooldowns
WAR_BP_CARD_1_BULLET_C_TEXT=If the same Hero is Banned or Protected in two consecutive Wars, that Hero goes on cooldown and becomes ineligible to be Banned or Protected for the following two Wars. After the cooldown period ends, the Hero becomes eligible again.
WAR_BP_CARD_1_BULLET_C1_TEXT=Example: If a Hero is Protected in Wars 1 and 2, they cannot be Protected in Wars 3 and 4 but will be available again in War 5. The same rule applies to Heroes that are Banned in consecutive Wars.
WAR_BP_CARD_2_TITLE=Bans & Protects by Rank
WAR_BP_CARD_2_BULLET_A_TITLE=Base Amounts
WAR_BP_CARD_2_BULLET_A1_TEXT=Copper: 1 Ban, 1 Protect
WAR_BP_CARD_2_BULLET_A2_TEXT=Bronze: 1 Ban, 1 Protect
WAR_BP_CARD_2_BULLET_A3_TEXT=Silver: 2 Bans, 2 Protects
WAR_BP_CARD_2_BULLET_A4_TEXT=Gold: 2 Bans, 2 Protects
WAR_BP_CARD_2_BULLET_A5_TEXT=Platinum: 3 Bans, 3 Protects
WAR_BP_CARD_2_BULLET_A6_TEXT=Challenger: 4 Bans, 4 Protects
WAR_BP_CARD_2_BULLET_A7_TEXT=Legendary: 5 Bans, 5 Protects
WAR_BP_CARD_2_BULLET_B_TITLE=Example:
WAR_BP_CARD_2_BULLET_B_TEXT=Gold vs Gold: Each guild receives 2 Protects and 2 Bans.
WAR_BP_CARD_3_TITLE=Rank Mismatch Adjustments
WAR_BP_CARD_3_BULLET_A_TITLE=Fairness rule
WAR_BP_CARD_3_BULLET_A_TEXT=When guilds of different ranks face each other, a fairness rule is applied. The lower-ranked guild gains +1 Ban for every rank difference, up to a maximum of 5 Bans. The higher-ranked guild loses -1 Ban for every rank difference, down to a minimum of 1 Ban. Protects are not adjusted and always follow the base amounts by rank.
WAR_BP_CARD_3_BULLET_B_TITLE=Example: Gold vs Challenger
WAR_BP_CARD_3_BULLET_B1_TEXT=Gold vs Challenger: Gold receives 2 Protects and 4 Bans (base 2 Bans +2 for the rank difference), while Challenger receives 4 Protects and 2 Bans (base 4 Bans -2 for being higher rank).
SILVER_CHEST_CARD_1_TITLE=Gold Crate
SILVER_CHEST_CARD_1_BULLET_1_TITLE="Buy 1" Drop Rates
SILVER_CHEST_CARD_1_BULLET_1_TEXT={#ffe00f}Badges:{} 87.5% (Full white, green, blue badges and purple, or orange and red bits)
SILVER_CHEST_CARD_1_BULLET_1A_TEXT={#ffe00f}Hero Chips:{} 9% (For any *one-star* hero except those found in the Sign-In monthly, Guild Crate feature or VIP Crate feature)
SILVER_CHEST_CARD_1_BULLET_1B_TEXT={#ffe00f}Credits:{} 2% (Silver, gold or platinum)
SILVER_CHEST_CARD_1_BULLET_1C_TEXT={#ffe00f}XP Drinks:{} 1.5% (Mini or grande)
SILVER_CHEST_CARD_1_BULLET_2_TITLE="Buy 10" Special Rules
SILVER_CHEST_CARD_1_BULLET_2_TEXT="Buy 10" guarantees 1 of the 10 drops is a badge (full white, green and blue badges, or purple bits).
SILVER_CHEST_CARD_1_BULLET_2A_TEXT=The other 9 drops have the same odds as listed above.
GOLD_CHEST_CARD_1_TITLE=Diamond Crate
GOLD_CHEST_CARD_1_BULLET_1_TITLE="Buy 1" Drop Rates
GOLD_CHEST_CARD_1_BULLET_1_TEXT={#ffe00f}Badges:{} 28.8% (Full blue or purple)
GOLD_CHEST_CARD_1_BULLET_1A_TEXT={#ffe00f}Hero Chips:{} 32% (For any hero except Event Exclusive Heroes, Sign-In monthly, Guild Crate feature or VIP Crate feature)
GOLD_CHEST_CARD_1_BULLET_1B_TEXT={#ffe00f}Full Hero:{} 20% (For any hero except Event Exclusive Heroes, Sign-In monthly, Guild Crate feature or VIP Crate feature)
GOLD_CHEST_CARD_1_BULLET_1C_TEXT={#ffe00f}Credits:{} 12.8% (Sapphire)
GOLD_CHEST_CARD_1_BULLET_1D_TEXT={#ffe00f}XP Drinks:{} 6.4% (Mega or turbo)
GOLD_CHEST_CARD_1_BULLET_2_TITLE="Buy 10" Special Rules
GOLD_CHEST_CARD_1_BULLET_2_TEXT="Buy 10" guarantees 1 of the 10 drops is a full hero. If the hero is one you already own, you will receive that hero's chips instead: 7 for 1-star hero, 18 for 2-star or 30 for a 3-star.
GOLD_CHEST_CARD_1_BULLET_2A_TEXT=Other than this, drops have the same odds as listed above for the "Buy 1".
GOLD_CHEST_CARD_1_BULLET_2B_TEXT="Buy 10" also guarantees that you will recieve *at least* 30 total hero chips from all 10 drops. Full hero drops are counted in this guarantee using a conversion to chips.
SOCIAL_CHEST_CARD_1_TITLE=Guild Crate
SOCIAL_CHEST_CARD_1_BULLET_3_TITLE=Earning Guild Coins
SOCIAL_CHEST_CARD_1_BULLET_3_TEXT={#ffe00f}Mercenaries:{} Earn 100 Guild Coins when one of your mercenaries is hired; earn 30 Coins if not.
SOCIAL_CHEST_CARD_1_BULLET_3A_TEXT={#ffe00f}Purchases:{} Every time a member makes an IAP purchase, everyone in the guild receives Guild Coins. Bigger purchases award more Coins.
SOCIAL_CHEST_CARD_1_BULLET_1_TITLE="Buy 1" Drop Rates
SOCIAL_CHEST_CARD_1_BULLET_1_TEXT={#ffe00f}Badges:{} 76.5% (Full white, green and blue badges, or purple bits)
SOCIAL_CHEST_CARD_1_BULLET_1A_TEXT={#ffe00f}Hero Chips:{} 20% (For the featured hero shown on Guild Crate screen. This hero is not in any other crates, but may be available elsewhere in game.)
SOCIAL_CHEST_CARD_1_BULLET_1B_TEXT={#ffe00f}Credits:{} 2% (Silver, gold or platinum)
SOCIAL_CHEST_CARD_1_BULLET_1C_TEXT={#ffe00f}XP Drinks:{} 1.5% (Mini or grande)
SOCIAL_CHEST_CARD_1_BULLET_2_TITLE="Buy 5" Drop Rates
SOCIAL_CHEST_CARD_1_BULLET_2_TEXT={#ffe00f}Badges:{} 73.2% (Full white, green and blue badges, or purple bits)
SOCIAL_CHEST_CARD_1_BULLET_2A_TEXT={#ffe00f}Hero Chips:{} 24% (For the featured hero; "Buy 5" also guarantees 1 of the 5 drops will be hero chips)
SOCIAL_CHEST_CARD_1_BULLET_2B_TEXT={#ffe00f}Credits:{} 1.6% (Silver, gold or platinum)
SOCIAL_CHEST_CARD_1_BULLET_2C_TEXT={#ffe00f}XP Drinks:{} 1.2% (Mini or grande)
SOUL_CHEST_CARD_1_TITLE=VIP Crate
SOUL_CHEST_CARD_1_BULLET_1_TITLE=Guaranteed Hero Chip Drops
SOUL_CHEST_CARD_1_BULLET_1_TEXT=2 of the 6 drops are guaranteed to be hero chips.
SOUL_CHEST_CARD_1_BULLET_1A_TEXT=1 of the 2 chip drops is guaranteed to be for the featured hero shown on the VIP Crate screen.
SOUL_CHEST_CARD_1_BULLET_1B_TEXT=The other chip drop will be for the daily heroes shown on the VIP Crate screen.
SOUL_CHEST_CARD_1_BULLET_2_TITLE=Rates for the Other 4 Drops
SOUL_CHEST_CARD_1_BULLET_2_TEXT={#ffe00f}Hero Chips:{} 15% (For the daily or featured heroes shown on the VIP Crate screen.)
SOUL_CHEST_CARD_1_BULLET_2A_TEXT={#ffe00f}Credits:{} 55% (Platinum or sapphire)
SOUL_CHEST_CARD_1_BULLET_2B_TEXT={#ffe00f}XP Drinks:{} 30% (Mega or turbo)
HEIST_CARD_1_TITLE=Heist Overview
HEIST_CARD_1_BULLET_1_TITLE=Real-Time Cooperative Play
HEIST_CARD_1_BULLET_1_TEXT=The Heist is a real-time cooperative game mode that you can play with up to four other players.
HEIST_CARD_1_BULLET_1B_TEXT=Each player controls five heroes on the city map, who move, investigate, stand guard and battle.
HEIST_CARD_1_BULLET_2_TITLE=Goals & Rewards
HEIST_CARD_1_BULLET_2_TEXT=Your goal is to find the Thief's hideout before she steals all of the Valuables.
HEIST_CARD_1_BULLET_2B_TEXT=Winning the Heist rewards Heist Tokens and Guild Influence.
HEIST_CARD_1_BULLET_2C_TEXT=You can also earn Disk Power at higher difficulties.
HEIST_CARD_2_TITLE=Creating a Heist
HEIST_CARD_2_BULLET_1_TITLE=Heist Tickets
HEIST_CARD_2_BULLET_1_TEXT=Each player can start or join 1 heist a day for free.
HEIST_CARD_2_BULLET_1B_TEXT=You can create or join additional heists each day using tickets.
HEIST_CARD_2_BULLET_1C_TEXT=You can get additional heist tickets from the City Watch shop.
HEIST_CARD_2_BULLET_2_TITLE=Public or Private?
HEIST_CARD_2_BULLET_2_TEXT=Heists can be public or private. Anyone can join public Heists.
HEIST_CARD_2_BULLET_2B_TEXT=For private heists, the creator can invite friends or guild members to participate.
HEIST_CARD_2_BULLET_2C_TEXT=Invites are sent via private chat, from the Heist creator to the invitee.
HEIST_CARD_2_BULLET_3_TITLE=Heist Difficulty
HEIST_CARD_2_BULLET_3_TEXT=The Heist creator can set the difficulty: Easy, Medium, Hard, Very Hard.
HEIST_CARD_2_BULLET_3B_TEXT=This determines the level of enemies you will face in Heist and the amount of Disk Power reward you can win.
HEIST_CARD_2_BULLET_4_TITLE=Plan in the Lobby
HEIST_CARD_2_BULLET_4_TEXT=After a heist is created, but before it starts, players can gather in the lobby.
HEIST_CARD_2_BULLET_4B_TEXT=The lobby is a great place to chat about strategy before the creator starts the heist.
HEIST_CARD_2_BULLET_4C_TEXT=If the creator disbands the heist, everyone is kicked out and their tickets are refunded.
HEIST_CARD_2_BULLET_5_TITLE=Time Is of the Essence
HEIST_CARD_2_BULLET_5_TEXT=Once a Heist is started, the Thief is off and running!
HEIST_CARD_2_BULLET_5B_TEXT=Make sure you invite other players who will join soon after starting.
HEIST_CARD_3_TITLE=Joining a Heist
HEIST_CARD_3_BULLET_1_TITLE=Heist Tickets
HEIST_CARD_3_BULLET_1_TEXT=Each player receives 1 Heist Ticket per day.
HEIST_CARD_3_BULLET_1B_TEXT=Your ticket can be used to create a new heist or join an existing one.
HEIST_CARD_3_BULLET_2_TITLE="Join a Heist" Screen
HEIST_CARD_3_BULLET_2_TEXT=Shows a list of Heists, both ones you're invited to and ones anyone can join.
HEIST_CARD_3_BULLET_2B_TEXT=Also shows: number of players in Heist so far, remaining valuables (the fewer left, the further along the Heist), whether you have 5 heroes who can join the Heist.
HEIST_CARD_3_BULLET_3_TITLE=Viewing a Heist
HEIST_CARD_3_BULLET_3_TEXT=You can view any Heist on your list.
HEIST_CARD_3_BULLET_3B_TEXT=If there is a spot for another player, you can also join.
HEIST_CARD_3_BULLET_4_TITLE=Choosing Heroes
HEIST_CARD_3_BULLET_4_TEXT=Once you join a Heist, you must choose 5 heroes to use.
HEIST_CARD_3_BULLET_4B_TEXT=Only one of each hero is allowed in each Heist. So if other players have already joined, some heroes won't be usable.
HEIST_CARD_3_BULLET_4C_TEXT=In addition, a few randomly selected heroes will be "off duty" each day. No one can use these heroes in any Heist that day.
HEIST_CARD_4_TITLE=The Heist Map
HEIST_CARD_4_BULLET_1_TITLE=Map Views
HEIST_CARD_4_BULLET_1_TEXT=The map has two views: zoomed out and in.
HEIST_CARD_4_BULLET_1B_TEXT=In zoomed out mode, you get a sense of how the whole Heist is going: valuables left, where the thief is and where the heroes are.
HEIST_CARD_4_BULLET_1C_TEXT=In zoomed in mode, you can see more details and interact with elements on the map.
HEIST_CARD_4_BULLET_2_TITLE=Player List
HEIST_CARD_4_BULLET_2_TEXT=Each player in the Heist is assigned a color.
HEIST_CARD_4_BULLET_2B_TEXT=Your heroes will always be white.
HEIST_CARD_4_BULLET_3_TITLE=Valuables
HEIST_CARD_4_BULLET_3_TEXT=The pink Valuable meter shows how many Valuables are left on the map.
HEIST_CARD_4_BULLET_3B_TEXT=When the Thief steals all the Valuables, you lose!
HEIST_CARD_4_BULLET_3C_TEXT=Remaining Valuables are pink; stolen ones are black.
HEIST_CARD_4_BULLET_4_TITLE=Black Circle / Thief
HEIST_CARD_4_BULLET_4_TEXT=The black circle shows where the Thief was last seen.
HEIST_CARD_4_BULLET_4B_TEXT=The size of the circle shows how precisely you know the Thief's location.
HEIST_CARD_4_BULLET_4C_TEXT=The darkness of the circle shows how recently you saw the Thief.
HEIST_CARD_4_BULLET_4D_TEXT=Over time, the circle fades and even disappears. This is because the Thief is always moving around!
HEIST_CARD_4_BULLET_4E_TEXT=Spot the Thief again to restore the black circle.
HEIST_CARD_4_BULLET_5_TITLE=White Circle / Hideout
HEIST_CARD_4_BULLET_5_TEXT=The Thief has a Hideout hidden in one of the white "?" pins on the map.
HEIST_CARD_4_BULLET_5B_TEXT=When you start the Heist, you have no idea where the Hideout is.
HEIST_CARD_4_BULLET_5C_TEXT=As you collect clues, you will fill the green clue meter. Each time you do, you crack a case and the white circle gets smaller.
HEIST_CARD_4_BULLET_5D_TEXT=The Hideout is always somewhere inside the white circle.
HEIST_CARD_5_TITLE=Interacting with the Map
HEIST_CARD_5_BULLET_1_TITLE=Elements You Can Interact with on the Map:
HEIST_CARD_5_BULLET_1_TEXT=- White "?" pins, called Points of Interest or "POIs"
HEIST_CARD_5_BULLET_1B_TEXT=- Open space
HEIST_CARD_5_BULLET_1C_TEXT=- Valuables
HEIST_CARD_5_BULLET_1D_TEXT=- Accomplices (see "Special Mechanics" card)
HEIST_CARD_5_BULLET_1E_TEXT=- Bodyguards (see "Special Mechanics" card)
HEIST_CARD_5_BULLET_2_TITLE=Points of Interest ("POIs")
HEIST_CARD_5_BULLET_2_TEXT=Interacting with a POI is how you gain Clues.
HEIST_CARD_5_BULLET_2B_TEXT=Tap a POI and then tap a hero to send them to Investigate.
HEIST_CARD_5_BULLET_2C_TEXT=After a period of investigating, the hero will either: find a clue, get ambushed by creeps, or find the Hideout.
HEIST_CARD_5_BULLET_3_TITLE=Open Spaces
HEIST_CARD_5_BULLET_3_TEXT=The Thief is always moving around the map, mostly unseen.
HEIST_CARD_5_BULLET_3B_TEXT=When one of your heroes is near the Thief, you have a chance to spot her.
HEIST_CARD_5_BULLET_3C_TEXT=If you think you know where the Thief is (use the black circle!), you can position your heroes in her path/area and hope to spot her.
HEIST_CARD_5_BULLET_3D_TEXT=Just tap any open spot on the map and choose the hero you want to move there.
HEIST_CARD_5_BULLET_4_TITLE=Valuables
HEIST_CARD_5_BULLET_4_TEXT=Stealing the Valuables is the Thief's main goal.
HEIST_CARD_5_BULLET_4B_TEXT=You can protect a Valuable by standing guard on it.
HEIST_CARD_5_BULLET_4C_TEXT=Just tap the Valuable and choose the hero to guard it.
HEIST_CARD_5_BULLET_4D_TEXT=You are guaranteed to spot the Thief before she tries to steal the Valuable. If you lose the fight she will take the Valuable.
HEIST_CARD_6_TITLE=Winning a Heist
HEIST_CARD_6_BULLET_1_TITLE=Two Different Ways to Win a Heist:
HEIST_CARD_6_BULLET_1_TEXT=1) Catching the Thief directly on the map. Only available on Easy difficulty.
HEIST_CARD_6_BULLET_1B_TEXT=2) Or defeating her in her Hideout.
HEIST_CARD_6_BULLET_2_TITLE=Catching the Thief on the Map
HEIST_CARD_6_BULLET_2_TEXT=To do this you need to first spot the Thief.
HEIST_CARD_6_BULLET_2B_TEXT=Spot the Thief by positioning heroes near her on the map.
HEIST_CARD_6_BULLET_2C_TEXT=Heroes guarding Valuables have the best chance to spot the Thief.
HEIST_CARD_6_BULLET_2D_TEXT=Once you spot the Thief, you can battle and defeat her.
HEIST_CARD_6_BULLET_2E_TEXT=Because our Thief is a cat burglar, she has several lives.
HEIST_CARD_6_BULLET_2F_TEXT=Defeat her enough times to remove all of her lives and you win the Heist.
HEIST_CARD_6_BULLET_3_TITLE=Finding the Hideout
HEIST_CARD_6_BULLET_3_TEXT=The Thief's Hideout is hidden in one of the POIs.
HEIST_CARD_6_BULLET_3B_TEXT=Collect clues to crack cases which shrinks the white circle and narrows the location of the Hideout.
HEIST_CARD_6_BULLET_3C_TEXT=Once you find the Hideout, you can battle the Thief.
HEIST_CARD_6_BULLET_3D_TEXT=Whether you win or lose, the Heist ends after the Hideout battle.
HEIST_CARD_7_TITLE=Battle Overview
HEIST_CARD_7_BULLET_1_TITLE=Unique Rules
HEIST_CARD_7_BULLET_1_TEXT=Battles in the Heist mostly work like battles in other modes.
HEIST_CARD_7_BULLET_1B_TEXT=But there are some aspects of Heist battles that make them unique.
HEIST_CARD_7_BULLET_2_TITLE=Calling Other Heroes
HEIST_CARD_7_BULLET_2_TEXT=All fights in the Heist are started by a single hero.
HEIST_CARD_7_BULLET_2B_TEXT=When you start the a fight, you have the option to call up to 4 other heroes.
HEIST_CARD_7_BULLET_2C_TEXT=The heroes who come to your aid are always the 4 closest to you, regardless of who owns them.
HEIST_CARD_7_BULLET_2D_TEXT=The closer the hero, the faster they will arrive at the fight.
HEIST_CARD_7_BULLET_2E_TEXT=Heroes who are aiding a fight cannot perform other actions until the fight is resolved.
HEIST_CARD_7_BULLET_3_TITLE=Hero Energy
HEIST_CARD_7_BULLET_3_TEXT=Energy is what heroes use to trigger their main skill in combat.
HEIST_CARD_7_BULLET_3B_TEXT=In the Heist, heroes can also use energy to Sprint.
HEIST_CARD_7_BULLET_3C_TEXT=Heroes sprint automatically when they have energy and are called to aid a battle.
HEIST_CARD_7_BULLET_3D_TEXT=Sprinting heroes move much faster than walking heroes.
HEIST_CARD_7_BULLET_3E_TEXT=Heroes sprint until they run out of energy and then walk.
HEIST_CARD_7_BULLET_3F_TEXT=Heroes can gain energy in the Heist by sitting idle or participating in combat.
HEIST_CARD_7_BULLET_4_TITLE=KO'ed Heroes
HEIST_CARD_7_BULLET_4_TEXT=Any heroes KO'ed in a fight, win or lose, remain KO'ed for a time after the fight.
HEIST_CARD_7_BULLET_4B_TEXT=While KO'ed, the hero cannot take any map actions.
HEIST_CARD_8_TITLE=Battle Types
HEIST_CARD_8_BULLET_1_TITLE=Ambushes
HEIST_CARD_8_BULLET_1_TEXT=After investigating a POI, an unlucky hero can get Ambushed.
HEIST_CARD_8_BULLET_1B_TEXT=While Ambushed, the hero cannot do anything else.
HEIST_CARD_8_BULLET_1C_TEXT=The hero's owner (only) can initiate a fight against the ambushing creeps.
HEIST_CARD_8_BULLET_1D_TEXT=If the fight is a victory, the hero is now available to act!
HEIST_CARD_8_BULLET_2_TITLE=Catching the Thief
HEIST_CARD_8_BULLET_2_TEXT=A hero near the Thief has a chance to spot her.
HEIST_CARD_8_BULLET_2B_TEXT=If spotted the Thief will run from the hero, who will chase and catch her.
HEIST_CARD_8_BULLET_2C_TEXT=One caught, a fight against the Thief must be started within 60 seconds.
HEIST_CARD_8_BULLET_2D_TEXT=ANY player can start this fight.
HEIST_CARD_8_BULLET_2E_TEXT=If you defeat the Thief, she loses one of her lives.
HEIST_CARD_8_BULLET_2F_TEXT=If she still has lives remaining, you gain a large number of clues.
HEIST_CARD_8_BULLET_2G_TEXT=If she is out of lives, you win the Heist.
HEIST_CARD_8_BULLET_3_TITLE=Finding the Hideout
HEIST_CARD_8_BULLET_3_TEXT=Once you find the POI where the Hideout is hidden, you can start the final battle against the Thief.
HEIST_CARD_8_BULLET_3B_TEXT=There is no time limit to start this battle, but the Thief will continue to steal Valuables in the meantime.
HEIST_CARD_8_BULLET_3C_TEXT=ANY player can start this fight.
HEIST_CARD_8_BULLET_3D_TEXT=Whether you win or lose, the Heist ends after the fight.
HEIST_CARD_9_TITLE=Heist Scoring
HEIST_CARD_9_BULLET_1_TITLE=Completing a Heist Awards:
HEIST_CARD_9_BULLET_1_TEXT=20 / 25 / 25 / 30 / 30 / 35 / 35 / 40 Heist Tokens per Valuable not stolen at Easy / Medium / Hard / Very Hard / Super Hard / Insane / Ridiculous / Shocking difficulty.
HEIST_CARD_9_BULLET_1B_TEXT=5 / 5 / 10 / 10 / 15 / 15 / 20 / 20 Heist Tokens per White Clue Circle completed at Easy / Medium / Hard / Very Hard / Super Hard / Insane / Ridiculous / Shocking difficulty.
HEIST_CARD_9_BULLET_1C_TEXT=3 Heist Tokens for every time one of your heroes was in a winning fight (max of 300 tokens).
HEIST_CARD_9_BULLET_2_TITLE=If You Win, You Also Get:
HEIST_CARD_9_BULLET_2_TEXT=500 Guild Influence per player.
HEIST_CARD_9_BULLET_2B_TEXT=0 / 500 / 1000 / 2000 / 3000 / 3500 / 4000 / 4500 Disk Power at Easy / Medium / Hard / Very Hard / Super Hard / Insane / Ridiculous / Shocking difficulty.
HEIST_CARD_10_TITLE=Heist Chat
HEIST_CARD_10_BULLET_1_TITLE=Heist Channel
HEIST_CARD_10_BULLET_1_TEXT=When you join a Heist, a new chat channel called "Heist" appears.
HEIST_CARD_10_BULLET_2_TEXT=All players in your Heist (only) can use this channel to communicate during the Heist.
HEIST_CARD_10_BULLET_2_TITLE=Heist Notifications
HEIST_CARD_10_BULLET_3_TEXT=Messages are also automatically send to Heist chat when:
HEIST_CARD_10_BULLET_3B_TEXT=- A hero is ambushed (only visible to hero's owner).
HEIST_CARD_10_BULLET_3C_TEXT=- The Thief is caught.
HEIST_CARD_10_BULLET_3D_TEXT=- The Hideout is found.
HEIST_CARD_11_TITLE=Special Mechanics
HEIST_CARD_11_BULLET_1_TITLE=Accomplices
HEIST_CARD_11_BULLET_1_TEXT=At Hard difficulty and higher, Accomplice POIs will spawn on the map, outside of the white circle. A Hero can be sent to apprehend an Accomplice. Win an ambush-style fight at that POI to earn a bundle of clues.
HEIST_CARD_11_BULLET_2_TITLE=Thief's Second Wind
HEIST_CARD_11_BULLET_2_TEXT=At Very Hard difficulty and above, the Thief toughens up! If she drops below one-third of her HP, she will regenerate HP over time for a short period.
HEIST_CARD_11_BULLET_3_TITLE=Bodyguards
HEIST_CARD_11_BULLET_3_TEXT=At Super Hard difficulty and higher, Bodyguard POIs will spawn on the map. Each active Bodyguard adds a buff to the Thief's team when fighting her. Send heroes to eliminate Bodyguards. Win an ambush-style fight at that POI to earn clues and remove that Bodyguard's buff.
HEIST_CARD_12_TITLE=Bodyguard Wards
HEIST_CARD_13_TITLE=Tips & Tricks
HEIST_CARD_13_BULLET_1_TITLE=If You Know Where the Thief Is:
HEIST_CARD_13_BULLET_1_TEXT=Send heroes near her (in and around the black circle).
HEIST_CARD_13_BULLET_1B_TEXT=Make sure to guard Valuables near the Thief's location; they are likely her next targets.
HEIST_CARD_13_BULLET_2_TITLE=If You Don't Know Where the Thief Is:
HEIST_CARD_13_BULLET_2_TEXT=Keep heroes busy by investigating POIs.
HEIST_CARD_13_BULLET_2B_TEXT=You'll need a lot of clues to crack cases and reliably find the Thief's Hideout, so always be investigating.
HEIST_CARD_13_BULLET_3_TITLE=Watch Other Players' Heroes & Use Chat
HEIST_CARD_13_BULLET_3_TEXT=The Thief can move pretty quickly.
HEIST_CARD_13_BULLET_3B_TEXT=If everyone clumps their heroes together, she can sneak out and end up far away.
HEIST_CARD_13_BULLET_3C_TEXT=By spreading heroes around, you can watch more of the map, investigate more POIs and guard more valuables.
HEIST_CARD_13_BULLET_4_TITLE=Good Luck and Have Fun!
GUILD_CARD_1_TITLE=Guild Benefits
GUILD_CARD_1_BULLET_1_TITLE=Guild Perks
GUILD_CARD_1_BULLET_1_TEXT=Upgrade all aspects of your game experience with Perks.
GUILD_CARD_1_BULLET_2_TITLE=Mercenaries
GUILD_CARD_1_BULLET_2_TEXT=Hire heroes from guild members to help you in certain game modes.
GUILD_CARD_1_BULLET_3_TITLE=Guild Check-In
GUILD_CARD_1_BULLET_3_TEXT=Earn increasing rewards as more guild members check in.
GUILD_CARD_1_BULLET_4_TITLE=Guild Crates
GUILD_CARD_1_BULLET_4_TEXT=Earn guild coins that you can spend on a special crate.
GUILD_CARD_1_BULLET_5_TITLE=Creep Surge
GUILD_CARD_1_BULLET_5_TEXT=Unlock a new guild based game mode with its own shop.
GUILD_CARD_1_BULLET_6_TITLE=Guild Chat
GUILD_CARD_1_BULLET_6_TEXT=A special chat channel just for your guild.
GUILD_CARD_2_TITLE=More About Guilds
GUILD_CARD_2_BULLET_1_TITLE=Guild Features with Info Popups:
GUILD_CARD_2_BULLET_1_TEXT=Perks, Mercenaries, Check-In, Crates and Creep Surge all have their own detailed info popups. Check them out!
GUILD_CARD_3_TITLE=Guild Ranks
GUILD_CARD_3_BULLET_1_TITLE=Status & Power
GUILD_CARD_3_BULLET_1_TEXT=Promote members inside your guild to give them status and power.
GUILD_CARD_3_BULLET_2_TITLE=Member Management
GUILD_CARD_3_BULLET_2_TEXT=Tap any row in any member list to adjust promote or demote people.
GUILD_CARD_3_BULLET_3_TITLE=Take Care
GUILD_CARD_3_BULLET_3_TEXT=Be careful who you promote. Officers and Champions can kick players and take leadership from an inactive Leader.
GUILD_CARD_3_BULLET_4_TITLE=Who's Active?
GUILD_CARD_3_BULLET_4_TEXT=Use the online list to view member activity and find out who is inactive.
GUILD_CARD_4_TITLE=Guild Rank Details
GUILD_CARD_4_BULLET_A1_TITLE=About
GUILD_CARD_4_BULLET_A1_TEXT=Here is a list of permissions that each rank grants. Higher ranks have all the permissions of lower ranks. Ranks are listed from lowest to highest.
GUILD_CARD_4_BULLET_M1_TITLE=Member
GUILD_CARD_4_BULLET_M1_TEXT=All new people start at the Member rank.
GUILD_CARD_4_BULLET_V1_TITLE=Veteran
GUILD_CARD_4_BULLET_V1_TEXT=Veteran is a rank of prestige, but comes with no additional powers.
GUILD_CARD_4_BULLET_T1_TITLE=Tactician
GUILD_CARD_4_BULLET_T1_TEXT=Can post to the guild wall.
GUILD_CARD_4_BULLET_T2_TEXT=Can mark war targets.
GUILD_CARD_4_BULLET_T3_TEXT=Can move own war lineup.
GUILD_CARD_4_BULLET_O1_TITLE=Officer
GUILD_CARD_4_BULLET_O1_TEXT=Can claim leadership if the leader is inactive for 3 weeks.
GUILD_CARD_4_BULLET_O2_TEXT=Can promote and demote members of lower ranks.
GUILD_CARD_4_BULLET_O3_TEXT=Can kick lower ranked members.
GUILD_CARD_4_BULLET_O4_TEXT=Can approve/deny new member requests.
GUILD_CARD_4_BULLET_O5_TEXT=Can upgrade guild perks.
GUILD_CARD_4_BULLET_O6_TEXT=Can queue and unqueue for war.
GUILD_CARD_4_BULLET_O7_TEXT=Can move allies' war lineups.
GUILD_CARD_4_BULLET_O8_TEXT=Can use the "Guild Officers" chat channel.
GUILD_CARD_4_BULLET_C1_TITLE=Champion
GUILD_CARD_4_BULLET_C1_TEXT=Can claim leadership if the leader is inactive for 1 week.
GUILD_CARD_4_BULLET_C2_TEXT=Can edit the guild's description.
GUILD_CARD_4_BULLET_C3_TEXT=Can edit the guild's emblem.
GUILD_CARD_4_BULLET_C4_TEXT=Can delete guild wall posts.
GUILD_CARD_4_BULLET_C5_TEXT=Can delete guild chat messages.
GUILD_CARD_4_BULLET_C6_TEXT=Can edit bans and protects for war.
GUILD_CARD_4_BULLET_L1_TITLE=Leader
GUILD_CARD_4_BULLET_L1_TEXT=Can edit all guild settings.
GUILD_CARD_4_BULLET_L2_TEXT=Can make another player the Leader.
GUILD_CARD_4_BULLET_L3_TEXT=Note, there can only be one Leader at a time.
GUILD_CARD_4_BULLET_C11_TEXT=Can choose which ranks are allowed to use extra war attacks.
GUILD_CARD_5_TITLE=Leaving a Guild
GUILD_CARD_5_BULLET_1_TITLE=How to Leave
GUILD_CARD_5_BULLET_1_TEXT=You can leave your guild by either tapping the "Leave Guild" button on your guild Settings screen, or by searching for another guild and joining them.
GUILD_CARD_5_BULLET_2_TITLE=Potential Consequences
GUILD_CARD_5_BULLET_2_TEXT=Leaving your guild will result in the loss of rewards from any in-progress Guild War, Invasion, and Guild Contest with that guild.
GUILD_CARD_5_BULLET_3_TITLE=Cooldown Timer and Restrictions
GUILD_CARD_5_BULLET_3_TEXT=Leaving your guild will also start a 24 hour cooldown during which you'll be prevented from doing the following:
GUILD_CARD_5_BULLET_3B_TEXT=- Participating in any in-progress Guild War
GUILD_CARD_5_BULLET_3C_TEXT=- Participating in any in-progress Creep Surge
GUILD_CARD_5_BULLET_3D_TEXT=- Earning rewards from a Guild Contest
GUILD_CARD_5_BULLET_3E_TEXT=- Attacking Invasion bosses that weren't found by you
VIP_CARD_1_TITLE=Why VIP?
VIP_CARD_1_BULLET_A_TITLE=Instant Raiding
VIP_CARD_1_BULLET_A_TEXT=Get free raid tickets every day! Use them to instantly complete fights and find loads of badges.
VIP_CARD_1_BULLET_B_TITLE=Convenience Features
VIP_CARD_1_BULLET_B_TEXT=Get raid tickets, more skill point storage, more stamina buys, quick promote, the ability to raid The Port and Trials, and lots more!
VIP_CARD_1_BULLET_C_TITLE=Extra Resources
VIP_CARD_1_BULLET_C_TEXT=Earn extra Gold, shop Tokens, Hero XP, Disk Power, Guild Coins, Stamina, and more!
VIP_CARD_1_BULLET_D_TITLE=Bonus Diamonds
VIP_CARD_1_BULLET_D_TEXT=Get bonus diamonds with every purchase. The higher your VIP level, the more extra diamonds you get!
VIP_CARD_2_TITLE=Getting VIP
VIP_CARD_2_BULLET_A_TITLE=VIP Rings
VIP_CARD_2_BULLET_A_TEXT=Every purchase you make awards VIP Rings. The more rings you have, the higher your VIP Level.
VIP_CARD_2_BULLET_B_TITLE=VIP Levels
VIP_CARD_2_BULLET_B_TEXT=Each new VIP Level unlocks new features and makes perks you already have more powerful.
VIP_CARD_2_BULLET_C_TITLE=VIP 4 Life
VIP_CARD_2_BULLET_C_TEXT=VIP is a great investment because once you reach a certain VIP Level, you keep those benefits for life. VIP never needs to be activated; it's always there for you.
VIP_CARD_2_BULLET_D_TITLE=Get Your Feet Wet
VIP_CARD_2_BULLET_D_TEXT=Unlocking the first few levels of VIP is pretty affordable and offers a lot of benefits.
VIP_CARD_3_TITLE=Feature & Perk Details
VIP_CARD_3_BULLET_1_TITLE=Bonus Diamonds
VIP_CARD_3_BULLET_1_TEXT=Earn more diamonds with every purchase! If a purchase earns you a new VIP Level, this reward is retroactive. Bonus diamonds arrive in your mailbox. Free offers do not grant bonus diamonds.
VIP_CARD_3_BULLET_2_TITLE=Get More Stamina
VIP_CARD_3_BULLET_2_TEXT=Allows you to buy stamina with diamonds more times each day.
VIP_CARD_3_BULLET_3_TITLE=Get More Gold
VIP_CARD_3_BULLET_3_TEXT=Allows you to buy gold with diamonds more times each day.
VIP_CARD_3_BULLET_4_TITLE=Free Raid Tickets
VIP_CARD_3_BULLET_4_TEXT=Gives you free Raid Tickets every day. Use them to instantly complete fights and quickly earn badges. Don't forget to collect them each day!
VIP_CARD_3_BULLET_5_TITLE=Reset Skill Points
VIP_CARD_3_BULLET_5_TEXT=Allows you to buy more Skill points with diamonds.
VIP_CARD_3_BULLET_6_TITLE=Reset Elite Campaign
VIP_CARD_3_BULLET_6_TEXT=Lets you spend diamonds to reset an Elite Campaign stage so you can earn hero chips faster.
VIP_CARD_3_BULLET_7_TITLE=Enhanced Fast Forward & Auto
VIP_CARD_3_BULLET_7_TEXT=Enabling fast forward and auto for fights no longer requires a 3-star victory. Also unlocks fast forward if you are below Team Level 5.
VIP_CARD_3_BULLET_8_TITLE=Reset Arena
VIP_CARD_3_BULLET_8_TEXT=Lets you buy 5 more attacks in the Arena when you run out.
VIP_CARD_3_BULLET_9_TITLE=Skip Arena Cooldown
VIP_CARD_3_BULLET_9_TEXT=Lets you spend diamonds to skip the Arena attack cooldown.
VIP_CARD_3_BULLET_10_TITLE=Multi-Raiding
VIP_CARD_3_BULLET_10_TEXT=You can now spend more than 1 ticket in a single raid.
VIP_CARD_3_BULLET_11_TITLE=Raid Port & Trials
VIP_CARD_3_BULLET_11_TEXT=You can now raid difficulties that have been 3 starred in The Port and Trials.
VIP_CARD_3_BULLET_12_TITLE=VIP Chat
VIP_CARD_3_BULLET_12_TEXT=Unlocks an exclusive chat channel with other all other VIP players on your server.
VIP_CARD_3_BULLET_13_TITLE=Reduced Gold Crate Cooldown
VIP_CARD_3_BULLET_13_TEXT=Cooldowns for Gold Crates are reduced to 5 minutes.
VIP_CARD_3_BULLET_14_TITLE="X" Skill Point Cap
VIP_CARD_3_BULLET_14_TEXT=Lets you store X more skill points at a time.
VIP_CARD_3_BULLET_15_TITLE=Quick Promote
VIP_CARD_3_BULLET_15_TEXT=Lights up the promote button as soon as you have all the resources to promote a hero. You don't need to craft and equip all their badges.
VIP_CARD_3_BULLET_17_TITLE=Reduced Port & Trials Cooldowns
VIP_CARD_3_BULLET_17_TEXT=Cooldowns for The Port and Trials are reduced to 5 minutes.
VIP_CARD_3_BULLET_18_TITLE=More Creep Surge Tokens
VIP_CARD_3_BULLET_18_TEXT=Earn 50% more Surge Tokens from the Creep Surge. Does not apply to the daily Creep Surge quest.
VIP_CARD_3_BULLET_19_TITLE=More Creep Surge Gold
VIP_CARD_3_BULLET_19_TEXT=Earn double the gold for clearing districts in the Creep Surge.
VIP_CARD_3_BULLET_20_TITLE=Quick Craft Badges
VIP_CARD_3_BULLET_20_TEXT=Tap a button to instantly craft complex badges when you have all of the ingredients.
VIP_CARD_3_BULLET_21_TITLE=Heroes Start at Level "X"
VIP_CARD_3_BULLET_21_TEXT=When you unlock new heroes, they now start at higher levels.
VIP_CARD_3_BULLET_22_TITLE=More Gold From Guild Check-In
VIP_CARD_3_BULLET_22_TEXT=Earn double the gold from Guild Daily Check-In rewards.
VIP_CARD_3_BULLET_23_TITLE=More Disk Power From Infected Fights
VIP_CARD_3_BULLET_23_TEXT=Earn 50% more disk power when beating an infected campaign level.
VIP_CARD_3_BULLET_24_TITLE=More Hero XP From Guild Check-In
VIP_CARD_3_BULLET_24_TEXT=Earn double the hero XP from Guild Daily Check-In rewards.
VIP_CARD_3_BULLET_26_TITLE=More City Watch Tokens
VIP_CARD_3_BULLET_26_TEXT=Earn 50% more City Watch Tokens for each stage you complete.
VIP_CARD_3_BULLET_27_TITLE=More City Watch Gold
VIP_CARD_3_BULLET_27_TEXT=Earn double the gold for each fight you win in the City Watch.
VIP_CARD_3_BULLET_28_TITLE=VIP Crate
VIP_CARD_3_BULLET_28_TEXT=Unlocks the VIP Crate, which drops hero chips, credits and XP drinks. Chips are from a featured hero and a rotating selection of daily heroes.
VIP_CARD_3_BULLET_29_TITLE=More Disk Power From City Watch
VIP_CARD_3_BULLET_29_TEXT=Earn 50% more disk power when finishing a stage in City Watch hard mode.
VIP_CARD_3_BULLET_30_TITLE=More Guild Coins from Mercs
VIP_CARD_3_BULLET_30_TEXT=Earn 50% more gold when your mercenaries are hired by your guild.
VIP_CARD_3_BULLET_31_TITLE=Arena Attacks
VIP_CARD_3_BULLET_31_TEXT=Attack 10 times in the Arena before you need to reset.
VIP_CARD_3_BULLET_32_TITLE=More Guild Coins From Guild Check-In
VIP_CARD_3_BULLET_32_TEXT=Earn 50% more Guild Coins from Guild Daily Check-In rewards.
VIP_CARD_3_BULLET_33_TITLE=Friend XP From Friend Quests
VIP_CARD_3_BULLET_33_TEXT=Receive 1 more Friend XP from every daily Friend Quest you complete.
VIP_CARD_3_BULLET_34_TITLE="X" Extra Stamina Storage
VIP_CARD_3_BULLET_34_TEXT=Your stamina cap increases by X; you will accumulate that much more stamina over time.
VIP_CARD_3_BULLET_35_TITLE=Collect Stamina Quests: "X" Hours
VIP_CARD_3_BULLET_35_TEXT=You now have a longer window of time to collect your daily stamina quests. If this creates an overlap with another stamina quest, you can still collect both.
VIP_CARD_3_BULLET_36_TITLE=More Friend XP From Missions
VIP_CARD_3_BULLET_36_TEXT=Earn 50% more Friend XP from each Mission you complete.
VIP_CARD_3_BULLET_37_TITLE=Free Market Reset
VIP_CARD_3_BULLET_37_TEXT=You can now refresh the items at the Market and Black Market for free this number of times per day.
VIP_CARD_3_BULLET_38_TITLE=More Diamonds From Guild Check-In
VIP_CARD_3_BULLET_38_TEXT=Earn double the diamonds from Guild Daily Check-In rewards.
VIP_CARD_3_BULLET_39_TITLE=Mission Instant Finish: "X" Hours
VIP_CARD_3_BULLET_39_TEXT=Whenver an active Mission has less than this amount of time remaining you can spend diamonds to complete it instantly.
VIP_CARD_3_BULLET_40_TITLE=More Disk Power From Missions
VIP_CARD_3_BULLET_40_TEXT=Earn 50% more Disk Power from each Mission you complete.
VIP_CARD_3_BULLET_41_TITLE=Extra Item From Crates
VIP_CARD_3_BULLET_41_TEXT=Earn a free bonus item whenever you: make a "Buy 10" purchase from the Gold or Diamond Crate, "Buy 5" from the Guild Crate, or buy a VIP Crate.
VIP_CARD_3_BULLET_42_TITLE=Reset Port & Trials
VIP_CARD_3_BULLET_42_TEXT=You can now pay diamonds to restore all of your fight chances in The Port or Team Trials.
VIP_CARD_3_BULLET_43_TITLE=More Heist Tokens
VIP_CARD_3_BULLET_43_TEXT=Earn 50% more Heist Tokens from each Heist you complete.
VIP_CARD_3_BULLET_44_TITLE=Daily Video Skip
VIP_CARD_3_BULLET_44_TEXT=You can claim bonus diamonds from the Daily Video feature without having to watch a video.
VIP_CARD_3_BULLET_45_TITLE=Instant open Video Crates
VIP_CARD_3_BULLET_45_TEXT=You can now instantly open Video Crates without watching a video. All of the other perks come automatically with VIP.
VIP_CARD_3_BULLET_46_TITLE=Double Port Rewards
VIP_CARD_3_BULLET_46_TEXT=You now automatically get double Port rewards without watching a video.
VIP_CARD_3_BULLET_47_TITLE=Remove Coliseum Cooldown
VIP_CARD_3_BULLET_47_TEXT=Removes the attack cooldown for Coliseum
VIP_CARD_3_BULLET_48_TITLE=Max Missions
VIP_CARD_3_BULLET_48_TEXT=Increases the total number of Missions you can run at the same time. Also increases the amount of Memory Missions you can run at once.
VIP_CARD_3_BULLET_49_TITLE=Friendship Campaign: Skip 1 Episode
VIP_CARD_3_BULLET_49_TEXT=This perk skips the 1st Episode of every Friendship Campaign, which allows you to instantly equip Memory Disks from unlocked Friendships! (No loot is directly given from the skipped Episode, but Episode 2 will have increased loot to compensate.)
VIP_CARD_3_BULLET_50_TITLE=Friendship Campaign: Skip "X" Stages per Episode
VIP_CARD_3_BULLET_50_TEXT=In Friendship Campaign Episodes, this perk lets you automatically skip "X" stages. (No Friend Stamina required.) You won't get loot from skipped stages, but the remaining stages in the Episode will have extra loot to compensate.
VIP_CARD_3_BULLET_51_TITLE=Quick Fight Tax Removed
VIP_CARD_3_BULLET_51_TEXT=You'll no longer have to spend extra Stamina to Quick Fight in the Normal and Elite Campaigns.
CAMPAIGN_CARD_1_TITLE=Campaign Overview
CAMPAIGN_CARD_1_BULLET_1_TITLE=Three Flavors of Campaign
CAMPAIGN_CARD_1_BULLET_1_TEXT=In Disney Heroes, you can explore the city in 3 different campaign modes: normal, elite and friends
CAMPAIGN_CARD_1_BULLET_2_TITLE=Normal Campaign
CAMPAIGN_CARD_1_BULLET_2_TEXT=The normal campaign is your main progression. Here you'll follow the game's story while earning badges to promote your heroes.
CAMPAIGN_CARD_1_BULLET_2A_TEXT=Three-star campaign levels to enable raiding. Raiding allows you to earn badges quickly.
CAMPAIGN_CARD_1_BULLET_2B_TEXT=You may spend extra stamina to Quick Fight levels before you three-star them.
CAMPAIGN_CARD_1_BULLET_2C_TEXT=Quick Fighting doesn't guarantee you a Victory but it does allow you to progress through the Campaign much faster while still being able to keep up with the story!
CAMPAIGN_CARD_2_TITLE=Elite Campaign
CAMPAIGN_CARD_2_BULLET_1_TITLE=Earn Hero Chips
CAMPAIGN_CARD_2_BULLET_1_TEXT=The elite campaign is where you can earn precious hero chips to evolve your heroes.
CAMPAIGN_CARD_2_BULLET_1A_TEXT=Each campaign chapter usually features one hero. Make sure to focus your efforts on those heroes first!
CAMPAIGN_CARD_2_BULLET_2_TITLE=Complete Normal First
CAMPAIGN_CARD_2_BULLET_2_TEXT=The elite campaign is definitely harder than normal. And you have to complete the normal levels first before you can fight in elite.
CAMPAIGN_CARD_3_TITLE=Friend Campaign
CAMPAIGN_CARD_3_BULLET_1_TITLE=Unlocking Friend Campaigns
CAMPAIGN_CARD_3_BULLET_1_TEXT=The Friends feature unlocks around Team Level 24. Then unlock both Heroes in a Friend pair to unlock their Friend Campaign. However, beating that Campaign is another matter...some Friend Campaigns are harder than others!
CAMPAIGN_CARD_3_BULLET_2_TITLE=Unique Stories
CAMPAIGN_CARD_3_BULLET_2_TEXT=Each friend campaign tells a story about the relationship between the two heroes. Both heroes are required for every battle. Some campaign also allow a few additional heroes to join as they progress.
CAMPAIGN_CARD_3_BULLET_3_TITLE=Unique Rewards
CAMPAIGN_CARD_3_BULLET_3_TEXT=Beat the 1st episode in a Friend Campaign to unlock a Memory Disk: a powerful equippable item. Each Disk is both a memento of the Heroes' Friendship, and a powerful way to enhance their abilities!
ENCHANTING_CARD_1_TITLE=Enhancement Overview
ENCHANTING_CARD_1_BULLET_1_TITLE=Increase Badge Power
ENCHANTING_CARD_1_BULLET_1_TEXT=Gain an edge in battle by enhancing your heroes' badges. At higher levels, fully enhanced badges can make the difference between winning and losing.
ENCHANTING_CARD_1_BULLET_2_TITLE=Green and Up
ENCHANTING_CARD_1_BULLET_2_TEXT=You can enchant badges that are of green rank and up. Higher rank badges can be enhanced further for better stat bonuses.
ENCHANTING_CARD_1_BULLET_3_TITLE=Use Extra Badges
ENCHANTING_CARD_1_BULLET_3_TEXT=In addition to SD Cards, you can use extra badges as enhancement materials. This is a good way to get rid of "junk" items, but don't throw away badges you'll need down the road!
ENCHANTING_CARD_2_TITLE=Other Enhancement Info
ENCHANTING_CARD_2_BULLET_1_TITLE=Enhancement and Promoting
ENCHANTING_CARD_2_BULLET_1_TEXT=When you promote a hero to a new rank, their badges are "absorbed" into their stats permanently. This does not include stat bonuses from enhancement. After promoting, you'll receive a percentage of your last badge set's enhancements back in the form of SD Cards.
ENCHANTING_CARD_2_BULLET_2_TITLE=Badge Ranks and Enhancement
ENCHANTING_CARD_2_BULLET_2_TEXT=White badges can't be enhanced. Green badges can be enhanced 1 level, blue 3 levels and purple 5 levels.
ENCHANTING_CARD_3_TITLE=Enhancement Strategy
ENCHANTING_CARD_3_BULLET_1_TITLE=Purple Badges Matter Most
ENCHANTING_CARD_3_BULLET_1_TEXT=They benefit most from enchanting because they don't promote as often. Enhancement bonuses on purple badges are also the most powerful.
ENCHANTING_CARD_3_BULLET_2_TITLE=Enhance the Best First
ENCHANTING_CARD_3_BULLET_2_TEXT=Focus on badges with stats that fit heroes' strengths. Energy regen helps healers and damage dealers; HP regen is great for tanks.
ENCHANTING_CARD_3_BULLET_3_TITLE=Spend Extra Badges
ENCHANTING_CARD_3_BULLET_3_TEXT=Raid the Campaign and Trials often to collect extra badges for enhancing.
ENCHANTING_CARD_4_TITLE=Auto Enhancement
ENCHANTING_CARD_4_BULLET_1_TITLE=Max Enhancement
ENCHANTING_CARD_4_BULLET_1_TEXT=Auto Enhancement selects enough materials to fully enhance the badge you've chosen.
ENCHANTING_CARD_4_BULLET_2_TITLE=Material Selection
ENCHANTING_CARD_4_BULLET_2_TEXT=When materials are selected for Auto Enhancement it tries to use your SD Cards first, from largest to smallest. Then for Badges, Plans, and Bits it selects the largest point value items first, then the lowest rarity within that point value and finally the item with the highest quantity within that rarity.
IAP_PURCHASING_CARD_1_TITLE=Diamonds
IAP_PURCHASING_CARD_1_BULLET_1_TITLE=Buying Diamonds
IAP_PURCHASING_CARD_1_BULLET_1_TEXT=Purchase Diamond Packs and/or Daily Diamond Deals to get lots of extra Diamonds.
IAP_PURCHASING_CARD_1_BULLET_2_TITLE=VIP Bonus Diamonds
IAP_PURCHASING_CARD_1_BULLET_2_TEXT=Purchasing diamonds increases your VIP level. The higher your level, the more bonus diamonds you get with each purchase.
IAP_PURCHASING_CARD_1_BULLET_3_TITLE=First Purchase Bonuses
IAP_PURCHASING_CARD_1_BULLET_3_TEXT=Take advantage of our First Purchase Bonuses to kickstart your progress. Combine multiple bonuses together to earn huge amounts of free diamonds!  See the next page for more details.
IAP_PURCHASING_CARD_1_BULLET_4_TITLE=Daily Deals & Mega Daily Deals
IAP_PURCHASING_CARD_1_BULLET_4_TEXT=These two Daily Diamond Deals are the best deals in terms of diamonds/money spent. If you don't know where to start, start here. Both deals can be purchased at the same time and the rewards stack!
IAP_PURCHASING_CARD_2_TITLE=First Purchase Bonuses
IAP_PURCHASING_CARD_2_BULLET_1_TITLE=First Diamond Purchase Bonus
IAP_PURCHASING_CARD_2_BULLET_1_TEXT=Earn bonus diamonds the first time you buy any of the five Diamond Packs or either of the Daily Diamond Deals from the Diamond Store!
IAP_PURCHASING_CARD_2_BULLET_2_TEXT=Diamond Packs award 150 / 300 / 600 / 1500 or 3000 bonus diamonds depending on the pack purchased.  Daily Diamond Deals award 300 / 500 / 750 or 1000 depending on the deal.  Bonuses are included in the yellow diamond count on each Daily Diamond Deal or Diamond Pack card.
IAP_PURCHASING_CARD_2_BULLET_2A_TITLE=First Diamond Pack Bonus
IAP_PURCHASING_CARD_2_BULLET_2A_TEXT=The first time you buy each of the five Diamond Packs, you'll receive bonus diamonds!  Bonuses for the five packs are 320 / 600 / 1200 / 3000 or 5800 diamonds.  Bonuses are included in the yellow diamond count on each Diamond Pack card.
IAP_PURCHASING_CARD_3_TITLE=VIP Diamonds
IAP_PURCHASING_CARD_3_BULLET_1_TITLE=VIP Rings & Levels
IAP_PURCHASING_CARD_3_BULLET_1_TEXT=Each diamond purchase earns you VIP Rings, which increase your VIP Level and unlock awesome benefits.
IAP_PURCHASING_CARD_3_BULLET_2_TITLE=VIP Bonus Diamonds
IAP_PURCHASING_CARD_3_BULLET_2_TEXT=One key VIP benefit is bonus diamonds. Starting with VIP Level 1 you get bonus diamonds with every purchase. This amount can be quite meaningful as your VIP Level increases!
IAP_PURCHASING_CARD_3_BULLET_2A_TEXT=VIP Bonus diamonds are always awarded at the VIP Level you will be *after* making your latest purchase.
IAP_PURCHASING_CARD_3_BULLET_2B_TEXT=VIP Bonus diamonds are sent directly to your mailbox.
IAP_PURCHASING_CARD_4_TITLE=Daily Deal
IAP_PURCHASING_CARD_4_BULLET_1_TITLE=Lots of Diamonds, Cheap!
IAP_PURCHASING_CARD_4_BULLET_1_TEXT=Each Daily Deal purchase awards you a base amount of diamonds immediately *and* additional diamonds *every day* for the duration of the deal.
IAP_PURCHASING_CARD_4_BULLET_2_TITLE=No Loss, No Worry
IAP_PURCHASING_CARD_4_BULLET_2_TEXT=If you forget to log in to collect your daily diamonds, don't worry, you can claim them the next time you log in. Only days you claim your bonus diamonds count towards your deal.
IAP_PURCHASING_CARD_4_BULLET_3_TITLE=No Commitment
IAP_PURCHASING_CARD_4_BULLET_3_TEXT=Daily Deals are NOT recurring payments. You can renew when you have 3 days left.
HERO_STATS_CARD_1_TITLE=Hero Stats Overview
HERO_STATS_CARD_1_BULLET_1_TITLE=Hero Level
HERO_STATS_CARD_1_BULLET_1_TEXT=Use your heroes in combat or give them XP drinks to fill their XP bar. Every time their XP bar fills up they gain a new level.
HERO_STATS_CARD_1_BULLET_2_TITLE=Hero Rank
HERO_STATS_CARD_1_BULLET_2_TEXT=Collect Badges from the Normal Campaign to fill your heroes 6 badge slots. Once full, promote your hero to a new rank (color) to increase their core stats.
HERO_STATS_CARD_1_BULLET_3_TITLE=Hero Stars
HERO_STATS_CARD_1_BULLET_3_TEXT=Collect Hero Chips from the Elite Campaign. Once you have enough chips you can evolve a hero, adding another star to it. The more stars a hero has, the stronger its core stats are.
HERO_STATS_CARD_2_TITLE=Core Stats
HERO_STATS_CARD_2_BULLET_1_TITLE=Basic Damage
HERO_STATS_CARD_2_BULLET_1_TEXT=Basic Damage is how much damage your Hero does with their Basic Attack. Basic Attacks are what Heroes do when they are not using Skills. All Basic Attacks do Normal Damage unless indicated otherwise.
HERO_STATS_CARD_2_BULLET_2_TITLE=Skill Power
HERO_STATS_CARD_2_BULLET_2_TEXT=Skill Power increases the damage that some, but not all, Skills do. Skills displaying a {#17A2ff}blue{} damage number do more damage as {#17A2ff}Skill Power{} increases. The amount of the increase varies by Skill. Skills displaying an {#ff7417}orange{} damage number do more damage as {#ff7417}Basic Damage{} increases. Skills displaying a {#e5ff00}green{} damage number do more damage as the {#e5ff00}Level{} of that Skill increases.
HERO_STATS_CARD_2_BULLET_3_TITLE=Max HP
HERO_STATS_CARD_2_BULLET_3_TEXT=Max HP indicates the total amount of damage a Hero can take before being KO'd.
HERO_STATS_CARD_2_BULLET_4_TITLE=Max Energy
HERO_STATS_CARD_2_BULLET_4_TEXT=All Heroes start combat with 0 Energy but can store up to 1000. Once at 1000, a Hero can use their White (Active) Skill. Heroes gain energy by taking damage, making attacks and from using certain Skills.
HERO_STATS_CARD_3_TITLE=Other Stats
HERO_STATS_CARD_3_BULLET_1_TITLE=HP Regen
HERO_STATS_CARD_3_BULLET_1_TEXT=At the end of each Wave a Hero regains this amount of HP.
HERO_STATS_CARD_3_BULLET_2_TITLE=Energy Regen
HERO_STATS_CARD_3_BULLET_2_TEXT=At the end of each Wave a hero gains this amount of Energy.
HERO_STATS_CARD_3_BULLET_3_TITLE=Armor
HERO_STATS_CARD_3_BULLET_3_TEXT=Armor reduces the amount of damage a Hero takes from Normal Damage. Each point of Armor makes the Hero feel like they have 10 more HP against Normal Damage. Skills displaying a {#FF664D}red{} number scale as {#FF664D}Armor{} increases. The amount of the increase varies by Skill.
HERO_STATS_CARD_3_BULLET_4_TITLE=Reality
HERO_STATS_CARD_3_BULLET_4_TEXT=Reality works just like Armor, but against Fantastic Damage. Skills displaying a {#D43EFF}purple{} number scale as {#D43EFF}Reality{} increases. The amount of the increase varies by Skill.
HERO_STATS_CARD_3_BULLET_5_TITLE=Armor Negation
HERO_STATS_CARD_3_BULLET_5_TEXT=Armor Negation reduces an enemy's Armor allowing you to do more Normal Damage. Each point of Armor Negation above an enemy's level reduces that enemy's Armor by 1% down to 0 Armor.
HERO_STATS_CARD_3_BULLET_6_TITLE=Reality Negation
HERO_STATS_CARD_3_BULLET_6_TEXT=Realiy Negation works just like Armor Negation, but for Reality and Fantastic Damage.
HERO_STATS_CARD_3_BULLET_7_TITLE=Normal Crit
HERO_STATS_CARD_3_BULLET_7_TEXT=The Normal Crit stat increases the chance that your attacks that do Normal Damage will result in a critical strike. Each point of Normal Crit you have above an enemy's level increases your chance of doing twice as much damage, up to a 100% chance.
HERO_STATS_CARD_3_BULLET_8_TITLE=Fantastic Crit
HERO_STATS_CARD_3_BULLET_8_TEXT=Fantastic Crit works just like Normal Crit, but on attacks that do Fantastic Damage.
HERO_STATS_CARD_3_BULLET_8A_TITLE=Super Crits
HERO_STATS_CARD_3_BULLET_8A_TEXT=Every point of Normal Crit above 100 more than the enemy's level equates to a 1% chance to Super Crit. Super Crits deal triple the usual amount of damage. If you have Super Crit chance and you don't Super Crit, you are guaranteed to Normal Crit. Super Critting with Fantastic Damage works just like Normal Damage. Each point of Fantastic Crit above 100 over the enemy's level is a 1% chance to Super Crit.
HERO_STATS_CARD_3_BULLET_9_TITLE=Tenacity
HERO_STATS_CARD_3_BULLET_9_TEXT=Tenacity reduces the length of stuns and disables a hero receives. Each point of Tenacity above the enemy's skill level reduces the length of a stun or disable by 1% up to a max of 90% reduction.
HERO_STATS_CARD_3_BULLET_10_TITLE=Conservation
HERO_STATS_CARD_3_BULLET_10_TEXT=Conservation reduces the amount of energy a hero spends when they use their White Skill.
HERO_STATS_CARD_3_BULLET_11_TITLE=Improved Healing
HERO_STATS_CARD_3_BULLET_11_TEXT=Improved Healing increases the amount of healing a hero's skills do.
HERO_STATS_CARD_3_BULLET_12_TITLE=Crit Damage
HERO_STATS_CARD_3_BULLET_12_TEXT=Crit Damage increases the damage done by both your hero's Normal and Fantastic critical strikes. Each point of Crit Damage you have above an enemy's level increases your crit damage by 1%, up to 100% more.
HERO_STATS_CARD_3_BULLET_13_TITLE=Normal Prowess
HERO_STATS_CARD_3_BULLET_13_TEXT=Normal Prowess increases the Normal damage of all your attacks. Each point of Normal Prowess you have above an enemy's level increases your Normal damage by 1%, up to 100% more.
HERO_STATS_CARD_3_BULLET_14_TITLE=Fantastic Prowess
HERO_STATS_CARD_3_BULLET_14_TEXT=Fantastic Prowess works just like Normal Prowess, but on attacks that do Fantastic Damage.
HERO_STATS_CARD_3_BULLET_15_TITLE=Evasion
HERO_STATS_CARD_3_BULLET_15_TEXT=Evasion gives heroes a chance to avoid enemy disables. Each point of Evasion above the enemy's skill level increases your chances of avoiding a disable by 1%, up to 90%. If a disable is avoided, any other effects on the skill still resolve. Disables include Stun, Freeze, Blind, Silence, and Charm.
HERO_STATS_CARD_3_BULLET_16_TITLE=Attack and Movement Speed
HERO_STATS_CARD_3_BULLET_16_TEXT=Increasing a Hero's move speed increases how quickly they walk across the battlefield  and increasing attack speed increases how quickly they perform basic attacks and skills. It does not reduce the time between basic attacks and skills, however. A hero's attack and movement speeds can be increased to a total of 300% of its original value and reduced by 90% of it's original value.
HERO_STATS_CARD_3_BULLET_17_TITLE=Normal and Fantastic Crit Negation
HERO_STATS_CARD_3_BULLET_17_TEXT=Normal and Fantastic Crit Negation reduce the total damage taken from critical hits by 0% to 100%. Upon reaching 100% Negation, heroes take no damage from Normal or Fantastic critical hits, effectively nullifying the entire attack.
HERO_STATS_CARD_4_TITLE=Damage Types
HERO_STATS_CARD_4_BULLET_1_TITLE=Overview
HERO_STATS_CARD_4_BULLET_1_TEXT=There are 2 primary types of damage: Normal and Fantastic. Basic Attacks deal Normal Damage. Skills can deal either Normal or Fantastic damage; check the specific skill to find out.
HERO_STATS_CARD_4_BULLET_2_TITLE=Normal Damage
HERO_STATS_CARD_4_BULLET_2_TEXT=Normal Damage can be reduced by a target's Armor. Normal Crit determines how frequently Physical Damage is doubled.
HERO_STATS_CARD_4_BULLET_3_TITLE=Fantastic Damage
HERO_STATS_CARD_4_BULLET_3_TEXT=Fantastic Damage can be reduced by a target's Reality. Fantastic Crit determines how frequently Magic Damage is doubled.
HERO_STATS_CARD_4_BULLET_4_TITLE=True Damage
HERO_STATS_CARD_4_BULLET_4_TEXT=True damage is never reduced by Armor or Reality. True damage ignores all type immunities. True damage can not critically strike.
FORCE_TOUCH_CARD_1_TITLE=3D Touch
FORCE_TOUCH_CARD_1_BULLET_A_TITLE=Hero Detail Animations
FORCE_TOUCH_CARD_1_BULLET_A_TEXT=3D Press on a hero in the Hero Details screen to preview its animations!
FORCE_TOUCH_CARD_1_BULLET_B_TITLE=Hero List Detailed Stats
FORCE_TOUCH_CARD_1_BULLET_B_TEXT=3D Press a hero on the Hero List screen to view their detailed stats.
FORCE_TOUCH_CARD_1_BULLET_C_TITLE=Mission Quick Restart
FORCE_TOUCH_CARD_1_BULLET_C_TEXT=3D Press on a mission "collect" button to insta-restart it.
FORCE_TOUCH_CARD_1_BULLET_D_TITLE=Trials and Port Insta-Raid
FORCE_TOUCH_CARD_1_BULLET_D_TEXT=3D Press on the Trials or Port main screen icon to insta-raid any available modes.
FORCE_TOUCH_CARD_1_BULLET_E_TITLE=Add Hero XP Faster
FORCE_TOUCH_CARD_1_BULLET_E_TEXT=3D Press when adding XP Drinks to a hero to add them faster than normal.
JOB_BOARD_CARD_1_TITLE=Overview
JOB_BOARD_CARD_1_BULLET_A_TITLE=About Mercenaries
JOB_BOARD_CARD_1_BULLET_A_TEXT=Post heroes to the Merc Board, where anyone in your guild can hire them. Mercenaries can be used in the City Watch and Creep Surge.
JOB_BOARD_CARD_1_BULLET_B_TITLE=Hiring Rules and Timing
JOB_BOARD_CARD_1_BULLET_B_TEXT=Only heroes level 20 and higher can be posted. Each mercenary posted can be hired once by one guild member. Whether hired or not, that mercenary slot remains filled for 20 hours before opening up again.
JOB_BOARD_CARD_1_BULLET_C_TITLE=Earning Guild Coins
JOB_BOARD_CARD_1_BULLET_C_TEXT=Hired mercenaries earn the poster 100 guild coins. Unhired mercs still earn you 30 guild coins.
JOB_BOARD_CARD_1_BULLET_D_TITLE=Unlocking More Merc Slots
JOB_BOARD_CARD_1_BULLET_D_TEXT=Upgrade your guild's Perks to unlock more mercenary slots per member!
GUILD_PERKS_CARD_1_TITLE=Guild Perks
GUILD_PERKS_CARD_1_BULLET_1_TITLE=Earning Guild Influence
GUILD_PERKS_CARD_1_BULLET_1_TEXT=Earn Guild Influence by spending stamina in the Campaign, completing Daily Quests, checking into the Guild Check-In, and battling in the Creep Surge and Heist.
GUILD_PERKS_CARD_1_BULLET_2_TITLE=Unlocking & Upgrading Perks
GUILD_PERKS_CARD_1_BULLET_2_TEXT=Guild Leaders and Champions (only) can spend Influence to unlock or upgrade various Guild Perks.
GUILD_PERKS_CARD_1_BULLET_3_TITLE=Perk Benefits
GUILD_PERKS_CARD_1_BULLET_3_TEXT=Tap on a perk to see what it does. The big circle on a perk unlocks its initial benefit. Each smaller circle offers an additional upgrade. All members receive benefits from the guild's unlocked/upgraded Perks.
GUILD_PERKS_CARD_1_BULLET_4_TITLE=Timed Perks
GUILD_PERKS_CARD_1_BULLET_4_TEXT=Timed perks are activated with guild influence, but either only last for a specific duration or require a cooldown before needing to be activated again. You can tell them apart from other perks on unlocked pages by their green color (when inactive).
CHAT_RULES_CARD_1_TITLE=Chat Guidelines
CHAT_RULES_CARD_1_BULLET_1_TITLE=Welcome to Disney Heroes Chat!
CHAT_RULES_CARD_1_BULLET_1_TEXT=Chat is intended to help players become part of the Disney Heroes community, answer each other's questions, invite friends to join a guild and interact socially. Players are allowed to participate in the in-game chat channels provided they follow the guidelines outlined below.
CHAT_RULES_CARD_1_BULLET_2_TITLE=Suspension Policy & Warning
CHAT_RULES_CARD_1_BULLET_2_TEXT=Players who choose not to follow these rules are subject to suspension from chat (either temporary or permanent). Suspensions are issued by PerBlue staff and Disney Heroes administrators only, and may be done with or without warning. Players may not dispute suspensions. PerBlue staff and Disney Heroes administrators have a zero-tolerance policy for harassment of other players' beliefs (political, religious or otherwise), insults or slurs about a player's country of origin, nationality, ethnicity or sexual orientation, and derogatory comments regarding race, religion and sexual orientation, whether directed at another player or not.
CHAT_RULES_CARD_1_BULLET_3_TITLE=Chat Block
CHAT_RULES_CARD_1_BULLET_3_TEXT=Use the Chat Block feature to block offensive language posted by others in chat. Tap on the player's name in chat and then tap "Block". No messages from that user will appear in your chat going forward. You can unblock users by tapping on your avatar icon and then "Blocked List". You can also turn off chat previews by tapping "Settings" on the same screen.
CHAT_RULES_CARD_1_BULLET_4_TITLE=Rules for All Chat Channels
CHAT_RULES_CARD_1_BULLET_4_TEXT=General discussions and conversations are welcome. If you are in Disney Heroes to make friends, we welcome you!
CHAT_RULES_CARD_1_BULLET_5_TEXT=Global chat is meant to allow players to ask each other questions about the game, give each other advice, and build a positive Disney Heroes community.
CHAT_RULES_CARD_1_BULLET_6_TEXT={#ffe00f}No{} harassment of other players or of people outside the game.
CHAT_RULES_CARD_1_BULLET_7_TEXT={#ffe00f}No{} discussion of sex (including sex acts, and the sexual orientation of others), drugs, politics, or religion.
CHAT_RULES_CARD_1_BULLET_8_TEXT={#ffe00f}No{} obscenities in any language.
CHAT_RULES_CARD_1_BULLET_9_TEXT={#ffe00f}No{} discussion about moderators, their practices and any banning that has or has not taken place.
CHAT_RULES_CARD_1_BULLET_10_TEXT=You can help us moderate by contacting our Customer Support team through the Support menu in-game. Do not request or discuss moderation within chat.
CHAT_RULES_CARD_1_BULLET_11_TITLE=Reporting Other Players
CHAT_RULES_CARD_1_BULLET_11_TEXT=If you see someone being offensive, breaking the rules, or you feel bullied or harassed in chat, please block the person, and then use the report player option. This will send the player's information and chat logs to PerBlue staff to review. 
CHAT_RULES_CARD_1_BULLET_12_TEXT=We care deeply about our players, and we want you to be a part of this community. We will not catch every comment or remark, but will take the necessary course of action on reported conversations. Please be advised that not every report will result in a suspended player, as all suspensions are at the discretion of PerBlue staff.
CRYPT_CARD_1_TITLE=About Creep Surge
CRYPT_CARD_1_BULLET_1_TITLE=Waves of Creeps
CRYPT_CARD_1_BULLET_1_TEXT=Infected heroes and minions are flooding the city! Your help is needing to fight them off and keep things safe.
CRYPT_CARD_1_BULLET_2_TITLE=Team Work
CRYPT_CARD_1_BULLET_2_TEXT=Work together with your guild members to defeat as many of the waves of Creeps as possible.
CRYPT_CARD_1_BULLET_3_TITLE=Earning Rewards
CRYPT_CARD_1_BULLET_3_TEXT=Make sure to contribute at least one attack to the Surge each day. You'll earn participation rewards for the Surge and for your daily quest. Participants earn Surge Tokens to spend in the Surge Shop.
CRYPT_CARD_1_BULLET_4_TITLE=Raiding
CRYPT_CARD_1_BULLET_4_TEXT=Assemble a team with more power than the enemy, and you may immediately complete that fight by Raiding! But be aware, you may only do this a limited number of times per day. Increase this limit via VIP and Guild perks.
CRYPT_CARD_2_TITLE=Rules & Limits
CRYPT_CARD_2_BULLET_1_TITLE=Hero Limits
CRYPT_CARD_2_BULLET_1_TEXT=Each hero can fight only once per day in the Creep Surge. Unlock and upgrade more heroes to help your guild!
CRYPT_CARD_2_BULLET_2_TITLE=Mercenaries
CRYPT_CARD_2_BULLET_2_TEXT=You can hire one Mercenary per attack in the Creep Surge. Hiring a merc costs gold.
CRYPT_CARD_2_BULLET_3_TITLE=Start & End Times
CRYPT_CARD_2_BULLET_3_TEXT=Surges run from 4am to 12am in your guild time zone (shown on the guild screen). Guild leaders can change this time zone.
CRYPT_CARD_2_BULLET_4_TITLE=Difficulty
CRYPT_CARD_2_BULLET_4_TEXT=Guild officers can set Surge difficulty in guild settings. Increasing difficulty increases both the rewards and the waves needed to be cleared.
CRYPT_CARD_3_TITLE=Scoring & Rewards
CRYPT_CARD_3_BULLET_1_TITLE=Regions and Waves
CRYPT_CARD_3_BULLET_1_TEXT=Surge difficulty sets the number of waves the guild needs to clear, from 3 all the way up to 15.
CRYPT_CARD_3_BULLET_1A_TEXT=Each wave requires clearing any 4 of the 6 regions on the city. Clearing a region means defeating all the creeps in each of its districts. Note that some regions have more districts than others!
CRYPT_CARD_3_BULLET_2_TITLE=Scoring
CRYPT_CARD_3_BULLET_2_TEXT=At the end of the Surge, everyone in the guild who particpated gets 10 Surge Tokens for each region cleared. The guild also receives 1000 Influence for each region cleared.
CRYPT_CARD_3_BULLET_2A_TEXT=If the guild clears ALL of the waves before time runs out, everyone who participates also gets an extra 30 Tokens. The guild gets an extra 5000 Influence.
CRYPT_CARD_3_BULLET_3_TITLE=Daily Quest
CRYPT_CARD_3_BULLET_3_TEXT=Make 1 attack/day to earn another 100 Surge Tokens from your daily quest. Your guild will also get 100 Influence.
CRYPT_CARD_3_BULLET_4_TITLE=Participate to Earn Rewards
CRYPT_CARD_3_BULLET_4_TEXT=Remember that only guild members who particpate in the Creep Surge earn rewards!
CRYPT_CARD_4_TITLE=Strategy
CRYPT_CARD_4_BULLET_1_TITLE=Recommended Attack
CRYPT_CARD_4_BULLET_1_TEXT=When in doubt, look for the gold star. It identifies a creep lineup that makes the most sense to attack, based both on which regions your guild is clearing and which heroes you have remaining.
CRYPT_CARD_4_BULLET_2_TITLE=Change Difficulty
CRYPT_CARD_4_BULLET_2_TEXT=If a Surge is too hard or easy, ask your guild leader to change difficulty.
CRYPT_CARD_4_BULLET_3_TITLE=Less Is More
CRYPT_CARD_4_BULLET_3_TEXT=The key to clearing lots of creeps is only using the minimum force needed to win a battle. You will often want to use less than 5 heroes and/or weaker heroes than normal.
CRYPT_CARD_4_BULLET_4_TITLE=Coordinate
CRYPT_CARD_4_BULLET_4_TEXT=Check the Surge's "Guild Ranks" to see how everyone is doing. Talk with your guild... make sure they're pulling their weight!
FIGHT_PIT_CARD_1_TITLE=About the Arena
FIGHT_PIT_CARD_2_TITLE=Challenger
FIGHT_PIT_CARD_2_BULLET_1_TITLE=Fighting a Challenger
FIGHT_PIT_CARD_2_BULLET_1_TEXT=To fight a {#40acff}Challenger,{} a player must also be a {#40acff}Challenger,{} or a player must be ranked 1st in {#b3b3b3}Platinum I{}
FIGHT_PIT_CARD_2_BULLET_2_TITLE=Promoting to Challenger
FIGHT_PIT_CARD_2_BULLET_2_TEXT=Instead of a promotion timer in {#b3b3b3}Platinum I,{} a player promotes to {#40acff}Challenger{} by defeating a {#40acff}Challenger.{}
FIGHT_PIT_CARD_2_BULLET_3_TITLE=Demoting from Challenger
FIGHT_PIT_CARD_2_BULLET_3_TEXT=Instead of a demotion timer in {#40acff}Challenger,{} players demote back to 1st in {#b3b3b3}Platinum I{} once they drop below the minimum {#40acff}Challenger{} rank.
FIGHT_PIT_CARD_2_BULLET_4_TITLE=Seeing Challengers
FIGHT_PIT_CARD_2_BULLET_4_TEXT={#40acff}Challengers{} will only appear above you in {#b3b3b3}Platinum I{} while you are ranked 1st in {#b3b3b3}Platinum I.{}
FIGHT_PIT_CARD_2_BULLET_5_TITLE=Demotion from Inactivity
FIGHT_PIT_CARD_2_BULLET_5_TEXT=If you do not attack for several consecutive days, you will be demoted.
EXPEDITION_CARD_1_TITLE=About the City Watch
EXPEDITION_CARD_1_BULLET_1_TITLE=Daily Tour
EXPEDITION_CARD_1_BULLET_1_TEXT=The Creeps never rest! Lead your heroes through 15 fights across 5 regions of the city each day to keep them in check.
EXPEDITION_CARD_1_BULLET_2_TITLE=Plan Ahead
EXPEDITION_CARD_1_BULLET_2_TEXT=Heroes retain their HP and energy from previous fights during a City Watch. But KO'ed heroes remain KO'ed until the Watch is reset.
EXPEDITION_CARD_1_BULLET_3_TITLE=Rewards
EXPEDITION_CARD_1_BULLET_3_TEXT=Earn gold after every fight. Earn City Watch Tokens once per region (every 3 fights). Token rewards increase substantially as you progress; it's worth getting to the end!
EXPEDITION_CARD_2_TITLE=Medium Difficulty
EXPEDITION_CARD_2_BULLET_1_TITLE=Not for the Weak
EXPEDITION_CARD_2_BULLET_1_TEXT=Once you beat all 15 fights of the Easy City Watch, you unlock the ability to do a Medium City Watch.
EXPEDITION_CARD_2_BULLET_2_TITLE=No Regen
EXPEDITION_CARD_2_BULLET_2_TEXT=In Medium difficulty, your heroes' HP and energy DON'T regenerate between fights.
EXPEDITION_CARD_2_BULLET_3_TITLE=Sweet Rewards
EXPEDITION_CARD_2_BULLET_3_TEXT=The effort is worth it! Medium difficulty awards 50% more gold along with Disk Power. Disk Power is key resource for upgrading your heroes' Memory Disks (unlocked when heroes reach Purple rank).
EXPEDITION_CARD_3_TITLE=Hard Difficulty
EXPEDITION_CARD_3_BULLET_1_TITLE=Medium Not Hard Enough?
EXPEDITION_CARD_3_BULLET_1_TEXT=Once you beat all 15 fights of City Watch on Medium difficulty, you unlock Hard!
EXPEDITION_CARD_3_BULLET_2_TITLE=Weekly Wards
EXPEDITION_CARD_3_BULLET_2_TEXT=In addition to HP and energy not regenerating, Hard also features Weekly Wards. Each week a new Ward is selected that provides all defenders with a buff or all attackers with a debuff. See page 5 for a list of wards.
EXPEDITION_CARD_3_BULLET_3_TITLE=Even Sweeter Rewards
EXPEDITION_CARD_3_BULLET_3_TEXT=Hard difficulty adds 50% more gold and 100% more Disk Power over Medium difficulty and drops keys to unlock Epic difficulty!
EXPEDITION_CARD_4_TITLE=Epic Difficulty
EXPEDITION_CARD_4_BULLET_1_TITLE=Unlock Epic Difficulty
EXPEDITION_CARD_4_BULLET_1_TEXT=In order to run Epic difficulty, you'll need to own at least one hero at Red Rank, along with Epic Keys which you can earn by playing the Hard difficulty.
EXPEDITION_CARD_4_BULLET_2_TITLE=Red Skill Chips
EXPEDITION_CARD_4_BULLET_2_TEXT=This is where you get Red Skill Chips to unlock and level Red Rank skills for your heroes. Only Red Rank heroes can be used in Epic difficulty. Collect your chips after you clear a region.
EXPEDITION_CARD_4_BULLET_2B_TEXT=To earn Red Skill Chips for a hero, they must win at least 1 fight in the region. The more Red heroes in your lineup, the more Red Skill Chips you're awarded. You will not receive Red Skill Chips for Mercenary heroes used in battle.
EXPEDITION_CARD_4_BULLET_3_TITLE=Weekly and Daily Wards
EXPEDITION_CARD_4_BULLET_3_TEXT=Epic difficulty keeps the weekly ward from the Hard difficulty and then adds one additional ward that changes daily.
EXPEDITION_CARD_4_BULLET_4_TITLE=Epic Raid
EXPEDITION_CARD_4_BULLET_4_TEXT=Complete Epic difficulty to unlock raiding and then use Epic Keys to start the raid.  Starting the raid will ask you to choose up to five Red Rank heroes you own to potentially earn Red Skill Chips for.
EXPEDITION_CARD_5_TITLE=City Watch Wards
EXPEDITION_CARD_6_TITLE=Tips
EXPEDITION_CARD_6_TIP_TITLE=Hire a Merc
EXPEDITION_CARD_6_TIP_TEXT=Hire a strong mercenary from your guild to protect your heroes on their City Watch.
EXPEDITION_CARD_6_BULLET_1_TITLE=Heal and Tank
EXPEDITION_CARD_6_BULLET_1_TEXT=Make sure your team has a good healer (like Yax) whose healing skill is leveled up. Lead your team with a strong tank who will survive multiple battles.
EXPEDITION_CARD_6_BULLET_2_TITLE=Trial and Error
EXPEDITION_CARD_6_BULLET_2_TEXT=You don't have to keep your battle results in City Watch. You can re-run the fight as many times as you need. Experiment with different hero combinations to find the best result.
EXPEDITION_CARD_6_BULLET_3_TITLE=Build Your Energy
EXPEDITION_CARD_6_BULLET_3_TEXT=Use a variety of heroes in the earlier fights to build their energy. Save that energy to trigger their skills in the later regions when things get tough.
EXPEDITION_CARD_6_BULLET_4_TITLE=Raid!
EXPEDITION_CARD_6_BULLET_4_TEXT=Complete a full City Watch run on Easy, Medium, or Hard to earn raid tickets for that difficulty. Use your raid tickets to automatically complete an entire City Watch!
EXPEDITION_CARD_6_BULLET_4B_TEXT=All players earn 1 raid ticket each time you complete an entire City Watch without raiding. VIP Levels 1, 2, 3, and 4 each add an extra raid ticket, up to a max of 5 per City Watch completed.
FRIENDS_CARD_1_TITLE=Friends Overview
FRIENDS_CARD_1_BULLET_1_TITLE=Friends Are Fun!
FRIENDS_CARD_1_BULLET_1A_TEXT=Friendships allow certain Hero pairs to battle through their own unique Campaign story!
FRIENDS_CARD_1_BULLET_1B_TEXT=Progress through {#ffe00f}Friend Campaigns{} to unlock {#ffe00f}Memory Disks{}: Powerful equippable items that give your Heroes new abilities.
FRIENDS_CARD_1_BULLET_1C_TEXT=Send the Friends on {#ffe00f}Missions{} to get friendship related resources.
FRIENDS_CARD_1_BULLET_2_TITLE=Accessing Friendships
FRIENDS_CARD_1_BULLET_2A_TEXT=Access Friend Campaigns and Missions by unlocking both Heroes in a Friendship.
FRIENDS_CARD_2_TITLE=Friend Campaigns
FRIENDS_CARD_2_BULLET_1_TITLE=Unique Stories
FRIENDS_CARD_2_BULLET_1A_TEXT=Each friend campaign tells a story about the relationship between the two Heroes.
FRIENDS_CARD_2_BULLET_1B_TEXT=This story may be re-read on the {#ffe00f}Friendship Wall{}. (Accessible from the Friends tab of the Hero screen.)
FRIENDS_CARD_2_BULLET_2_TITLE=Progression
FRIENDS_CARD_2_BULLET_2A_TEXT=Friend Campaigns can be tough. Make sure your Heroes are strong enough to beat the enemies they face!
FRIENDS_CARD_2_BULLET_2B_TEXT=Note that some Friend Campaigns are much harder than others.
FRIENDS_CARD_2_BULLET_3_TITLE=Specific Heroes
FRIENDS_CARD_2_BULLET_3A_TEXT=Every battle in a Friend Campaign will require the two heroes in the friendship, but some stages will also allow specific other heroes to be used as well.
FRIENDS_CARD_2_BULLET_4_TITLE=Unique Rewards
FRIENDS_CARD_2_BULLET_4A_TEXT=Unlock Memory Disks and their upgrades as you progress through each Friend Campaign episode.
FRIENDS_CARD_2_BULLET_5_TITLE=Power-Ups
FRIENDS_CARD_2_BULLET_5A_TEXT=Earn Friend Campaign Power-Ups primarily through Missions. Power-Ups will increase the stats of all Heroes during that Friend Campaign. Use them to overcome stages that otherwise might be too difficult!
FRIENDS_CARD_2_BULLET_5B_TEXT=Friend Campaign Power-Ups apply to all stages in that Campaign.
FRIENDS_CARD_3_TITLE=Memory Disks
FRIENDS_CARD_3_BULLET_1_TITLE=What are Memory Disks?
FRIENDS_CARD_3_BULLET_1A_TEXT=Memory Disks are special items that heroes can equip and upgrade. Each Disk is designed to enhance key traits of the Hero who equips it.
FRIENDS_CARD_3_BULLET_2_TITLE=Obtaining Disks
FRIENDS_CARD_3_BULLET_2A_TEXT=Beat the 1st episode of a Friend Campaign to unlock a Memory Disk. A Memory Disk is a permanent memento of the heroes' friendship!
FRIENDS_CARD_3_BULLET_2B_TEXT=Most Heroes have multiple Memory Disks available; however, each Hero can only equip one Memory Disk at a time.
FRIENDS_CARD_3_BULLET_3_TITLE=Disk Level
FRIENDS_CARD_3_BULLET_3A_TEXT=Level up Memory Disks using Disk Power. Higher level Disks provide more stats to your Hero.
FRIENDS_CARD_3_BULLET_3B_TEXT=Earn Disk Power through Friend Missions, Daily Quests, Heist, and City Watch.
FRIENDS_CARD_3_BULLET_3C_TEXT=Increase the max Level of a Memory Disk by leveling up both Heroes in the Friendship.
FRIENDS_CARD_3_BULLET_4_TITLE=Disk Stars
FRIENDS_CARD_3_BULLET_4A_TEXT=Like Heroes, Disks also have a Star Level. Increase a Disk's Stars by collecting Memories.
FRIENDS_CARD_3_BULLET_4B_TEXT=Disk Stars are valuable because they enhance the unique ability the Disk grants your Hero.
FRIENDS_CARD_3_BULLET_4C_TEXT=Earn Memories through Missions or purchase them at the Memory Market.
FRIENDS_CARD_3_BULLET_5_TITLE=Disk Star limit
FRIENDS_CARD_3_BULLET_5A_TEXT=When a Disk is first unlocked, it can only have one Star. Progress through the Friend Campaign to increase this Star limit.
FRIENDS_CARD_4_TITLE=Friend Missions
FRIENDS_CARD_4_BULLET_1_TITLE=What Are Missions?
FRIENDS_CARD_4_BULLET_1A_TEXT=Friend Pairs can be sent on Missions to generate rewards over time.
FRIENDS_CARD_4_BULLET_1B_TEXT=Completed Missions automatically restart, but you'll need to claim Mission rewards at least once every 12 hours, otherwise Mission progress will pause. (This limit is increased through VIP Perks.)
FRIENDS_CARD_4_BULLET_2_TITLE=Mission Types
FRIENDS_CARD_4_BULLET_2A_TEXT=Before starting a mission, you'll be asked to choose the type of resource you want to earn: Power-Ups, Memories, or Disk Power.
FRIENDS_CARD_4_BULLET_2B_TEXT=Note that some missions might require a resource cost that's charged each time the mission starts.
FRIENDS_CARD_4_BULLET_3_TITLE=Mission Speed
FRIENDS_CARD_4_BULLET_3A_TEXT=Friends complete Missions faster based on their progression. Increase a Friendship's Mission speed by increasing the Friends': Stars, Rarity, Hero Level, and Skill Level.
FRIENDS_CARD_4_BULLET_3B_TEXT=Missions accrue an extra hour of time for every 100% bonus Mission Speed they have.
FRIENDS_CARD_4_BULLET_3C_TEXT=This means that Missions with 100% bonus Mission Speed will complete in half the time!
FRIENDS_CARD_4_BULLET_4_TITLE=Mission Limits
FRIENDS_CARD_4_BULLET_4A_TEXT=The total number of Missions (as well as of each type) you can run simultaneously is limited.
FRIENDS_CARD_4_BULLET_4B_TEXT=Unlock more Heroes or increase your VIP level to increase these limits.
FRIENDS_CARD_4_BULLET_4C_TEXT=Each Hero can only be on one Mission at a time.
FRIENDS_CARD_4_BULLET_4D_TEXT=Mission limits increased when you have this many Heroes: 11, 16, 22, 29, 37, 45, 53, 62, 71, 80, 90, 100, 110, and 120. Power-Up and Memory Mission limits increased at 16, 37, 71, and 120 Heroes.
COLISEUM_CARD_1_TITLE=About the Coliseum
COLISEUM_CARD_2_TITLE=Challenger
COLISEUM_CARD_2_BULLET_1_TITLE=Fighting a Challenger
COLISEUM_CARD_2_BULLET_1_TEXT=To fight a Challenger, a player must also be a {#40acff}Challenger,{} or a player must be ranked 1st in {#b3b3b3}Platinum I{}
COLISEUM_CARD_2_BULLET_2_TITLE=Promoting to Challenger
COLISEUM_CARD_2_BULLET_2_TEXT=Instead of a promotion timer in {#b3b3b3}Platinum I,{} a player promotes to {#40acff}Challenger{} by defeating a {#40acff}Challenger.{}
COLISEUM_CARD_2_BULLET_3_TITLE=Demoting from Challenger
COLISEUM_CARD_2_BULLET_3_TEXT=Instead of a demotion timer in {#40acff}Challenger,{} players demote back to 1st in {#b3b3b3}Platinum I{} once they drop below the minimum {#40acff}Challenger{} rank.
COLISEUM_CARD_2_BULLET_4_TITLE=Demotion from Inactivity
COLISEUM_CARD_2_BULLET_4_TEXT=If you do not attack for several consecutive days, you will be demoted.
COLISEUM_CARD_2_TIP_TITLE=Seeing Challengers
COLISEUM_CARD_2_TIP_TEXT={#40acff}Challengers{} will only appear above you in {#b3b3b3}Platinum I{} while you are ranked 1st in {#b3b3b3}Platinum I.{}
CONTESTS_CARD_1_TITLE=Contests
CONTESTS_CARD_1_BULLET_1_TITLE=Earn Points, Win Rewards!
CONTESTS_CARD_1_BULLET_1_TEXT=Each contest is a limited-time event where players can earn a variety of rewards by earning points for completing tasks in game.
CONTESTS_CARD_1_BULLET_2_TITLE=Compete with Yourself and Others
CONTESTS_CARD_1_BULLET_2_TEXT=Challenge yourself to earn as many points as possible so that you, your guild or your server can earn Progress Rewards.  Rank Rewards are awarded to the players who accumulate the most points overall.
CONTESTS_CARD_2_TITLE=Earning Points
CONTESTS_CARD_2_BULLET_1_TITLE=Every Contest is Different
CONTESTS_CARD_2_BULLET_1_TEXT=Check the "Scoring" page to see how to win a particular contest. Some might be about winning battles, leveling heroes, collecting stuff, or a mix of everything.
CONTESTS_CARD_2_BULLET_2_TITLE=Different Points for Different Tasks
CONTESTS_CARD_2_BULLET_2_TEXT=Each task shows how many points you get for doing it and whether there's a maximum number of times you can do it during the contest.
CONTESTS_CARD_3_TITLE=Progress Tiers and Prizes
CONTESTS_CARD_3_BULLET_1_TITLE=Progress Tiers
CONTESTS_CARD_3_BULLET_1_TEXT=Each contest has several progress tiers. Each time you, your guild or server earns enough points to cross into the next tier, you earn a star. The progress bar on the main contests screen shows how many stars you've earned and you/your guild's total score.
CONTESTS_CARD_3_BULLET_2_TITLE=Progress Prizes
CONTESTS_CARD_3_BULLET_2_TEXT=Each time you or your guild reach a new tier, you earn its rewards immediately. Rewards are sent directly to your mailbox.
CONTESTS_CARD_4_TITLE=Rankings and Rank Prizes
CONTESTS_CARD_4_BULLET_1_TITLE=Rankings
CONTESTS_CARD_4_BULLET_1_TEXT=Contests pit you or your guild against everyone on your server. Check the rankings page to see how you stack up against the best.
CONTESTS_CARD_4_BULLET_2_TITLE=Rank Prizes
CONTESTS_CARD_4_BULLET_2_TEXT=At the end of the event, you/your guild earns rewards based on your numeric or percentile rank. Rewards are sent directly to your mailbox.
FRIEND_STAMINA_CARD_1_TITLE=How To Get Friend Stamina
FRIEND_STAMINA_CARD_1_BULLET_1_TITLE=Watch Videos
FRIEND_STAMINA_CARD_1_BULLET_1_TEXT=You can watch a certain number of Videos each day to earn more friend stamina.
FRIEND_STAMINA_CARD_1_BULLET_2_TITLE=Spend Diamonds
FRIEND_STAMINA_CARD_1_BULLET_2_TEXT=You can spend diamonds to buy friend stamina a limited number of times each day.
FRIEND_STAMINA_CARD_1_BULLET_3_TITLE=Choose One
FRIEND_STAMINA_CARD_1_BULLET_3_TEXT=You can watch videos or spend diamonds to earn friend stamina, but you don't need to do both. If you spend diamonds on friend stamina, that will use up your remaining videos for the day. Similarly as you watch videos, the amount of diamonds you can spend will decrease for that day.
FRIEND_STAMINA_CARD_1_BULLET_4_TITLE=Use Consumable
FRIEND_STAMINA_CARD_1_BULLET_4_TEXT=You also might find a friend stamina consumable item. If you do you can use that to earn friend stamina. The consumable item doesn't affect your videos or spends for the day.
AIR_DROP_CARD_1_TITLE=Air Drop
AIR_DROP_CARD_1_BULLET_1_TITLE=Lots of Great Rewards, Cheap!
AIR_DROP_CARD_1_BULLET_1_TEXT=Air Drop is a great way to get lots of useful resources cheap. Just make one low IAP purchase to receive daily rewards for the next 30 days. You'll receive over 2500 diamonds worth of awesome rewards!
AIR_DROP_CARD_1_BULLET_1B_TEXT=You also receive VIP Rings for purchasing Air Drop. And your Air Drop purchase qualifies for any active IAP deals that require a purchase less than or equal to the Air Drop purchase amount.
AIR_DROP_CARD_1_BULLET_2_TITLE=Claiming Rewards
AIR_DROP_CARD_1_BULLET_2_TEXT=Make sure to claim your Air Drop reward every day! Unlike the Daily Deal, if you miss a day, you *lose* your reward.
AIR_DROP_CARD_1_BULLET_3_TITLE=The Ultimate Combo
AIR_DROP_CARD_1_BULLET_3_TEXT=A great way to get ahead in Disney Heroes is to purchase a Daily Deal together with Air Drop. These are two of the best deals you'll find and they complement each other well.
AIR_DROP_CARD_1_BULLET_4_TITLE=Renewal
AIR_DROP_CARD_1_BULLET_4_TEXT=Air Drop is not a subscription or recurring payment. You can renew when you have 3 or fewer days remaining.
CHALLENGES_CARD_1_TITLE=Overview
CHALLENGES_CARD_1_BULLET_1_TITLE=Mini Contests
CHALLENGES_CARD_1_BULLET_1_TEXT=Challenges are similar to the server-wide contests we run in Disney Heroes.
CHALLENGES_CARD_1_BULLET_1B_TEXT=Each one requires you to do a certain task in a specific time period to complete it.
CHALLENGES_CARD_1_BULLET_2_TITLE=Earn Stickers and Hero Chips
CHALLENGES_CARD_1_BULLET_2_TEXT=The rewards for challenges are unique icons called Stickers.
CHALLENGES_CARD_1_BULLET_2B_TEXT=You can choose your favorite Stickers and show them off to other players.
CHALLENGES_CARD_1_BULLET_2C_TEXT=You also earn Challenge Tokens you can spend on Hero Chips.
CHALLENGES_CARD_1_BULLET_3_TITLE=Customization
CHALLENGES_CARD_1_BULLET_3_TEXT=Two new challenges are available every week for all players.
CHALLENGES_CARD_1_BULLET_3B_TEXT=Additional challenges can be purchased, either individually or in books.
CHALLENGES_CARD_2_TITLE=Starter & Weekly Challenges
CHALLENGES_CARD_2_BULLET_1_TITLE=Starter Challenges
CHALLENGES_CARD_2_BULLET_1_TEXT=Everyone gets a series of 5 Starter Challenges when they unlock the challenges feature.
CHALLENGES_CARD_2_BULLET_1B_TEXT=These challenges are fairly easy and as soon as you finish one you can start the next one.
CHALLENGES_CARD_2_BULLET_2_TITLE=Weekly Challenges
CHALLENGES_CARD_2_BULLET_2_TEXT=Every Wednesday morning at 5am Central Standard Time, two new Weekly Challenges will appear on your challenges screen.
CHALLENGES_CARD_2_BULLET_2B_TEXT=You have all week to finish these; usually one will be easier and one harder.
CHALLENGES_CARD_2_BULLET_2C_TEXT=If you miss any Weekly Challenges, you can go back to a Weekly Challenge Book and purchase them for completion at any later date.
CHALLENGES_CARD_3_TITLE=Pick 'Em & Book Challenges
CHALLENGES_CARD_3_BULLET_1_TITLE=Need a Bigger Challenge?
CHALLENGES_CARD_3_BULLET_1_TEXT=If you like challenges and want to do more of them, check out Pick 'Em Challenges and Challenge Books.
CHALLENGES_CARD_3_BULLET_2_TITLE=Pick 'Em Challenges
CHALLENGES_CARD_3_BULLET_2_TEXT=These challenges are à la carte.
CHALLENGES_CARD_3_BULLET_2B_TEXT=You can buy one at a time, activate them and work on them as you like.
CHALLENGES_CARD_3_BULLET_3_TITLE=Book Challenges
CHALLENGES_CARD_3_BULLET_3_TEXT=These Challenges require you to purchase a book of several challenges, but offer a 10% discount per challenge.
CHALLENGES_CARD_3_BULLET_3B_TEXT=Each book has a theme or focus that all challenges within it share.
CHALLENGES_CARD_4_TITLE=Challenge Slots
CHALLENGES_CARD_4_BULLET_1_TITLE=Weekly and Starter
CHALLENGES_CARD_4_BULLET_1_TEXT=Weekly Challenges each have their own dedicated slot.
CHALLENGES_CARD_4_BULLET_1B_TEXT=Starter Challenges also have a dedicated slot that is available until all 5 are completed.
CHALLENGES_CARD_4_BULLET_2_TITLE=Other Slots
CHALLENGES_CARD_4_BULLET_2_TEXT=There are two other slots you can use for working on Pick 'Em, Book, and any missed Weekly Challenges.
CHALLENGES_CARD_4_BULLET_2B_TEXT=One of these slots is free and the other can be unlocked for diamonds.
CHALLENGES_CARD_5_TITLE=Viewing Other People's Challenges
CHALLENGES_CARD_5_BULLET_1_TITLE=Where to View
CHALLENGES_CARD_5_BULLET_1_TEXT=You can view other players' challenge/sticker collections from 3 places: chat, your friends list, and your guild member list.
CHALLENGES_CARD_5_BULLET_1B_TEXT=Tap on a player's name and tap the new challenges icon (a trophy with laurels) to see their collection.
CHALLENGES_CARD_5_BULLET_2_TITLE=What You Can See
CHALLENGES_CARD_5_BULLET_2_TEXT=You can see an overview of challenges that person has completed.
CHALLENGES_CARD_5_BULLET_2B_TEXT=You can scroll through the stickers that person has earned.
CHALLENGES_CARD_5_BULLET_2C_TEXT=You can also tap the "View Books" button browse their collection in more detail.
CHALLENGES_CARD_6_TITLE=Tips & Tricks
CHALLENGES_CARD_6_BULLET_1_TITLE=Always Read First!
CHALLENGES_CARD_6_BULLET_1_TEXT=Read challenge description text closely to understand how you make progress.
CHALLENGES_CARD_6_BULLET_1B_TEXT=Some challenges have an info ("i") button that provides additional clarification on the challenge description.
CHALLENGES_CARD_6_BULLET_1C_TEXT=You can find the info button on the back of the challenge (inside a book) or near the small challenge icon (on the main challenges screen).
CHALLENGES_CARD_6_BULLET_2_TITLE=Restarting
CHALLENGES_CARD_6_BULLET_2_TEXT=Once you own a challenge, you can restart it as many times as you want.
CHALLENGES_CARD_6_BULLET_2B_TEXT=So if you're not making good progress, just restart and try again!
CHALLENGES_CARD_6_BULLET_2C_TEXT=Weekly Challenges cannot be restarted; they always give you a full week to complete.
DIAMOND_CRATE_UPGRADES_CARD_1_TITLE=Diamond Crate Upgrades
DIAMOND_CRATE_UPGRADES_CARD_1_BULLET_1_TITLE=Earn Upgrades
DIAMOND_CRATE_UPGRADES_CARD_1_BULLET_1_TEXT=Open Diamond Crates to earn Upgrades!
DIAMOND_CRATE_UPGRADES_CARD_1_BULLET_2_TITLE=Upgrade Rewards
DIAMOND_CRATE_UPGRADES_CARD_1_BULLET_2_TEXT=Each Track of Rewards has a 10% chance to drop bonus Upgrade Rewards with every crate!
DIAMOND_CRATE_UPGRADES_CARD_1_BULLET_2B_TEXT=When you buy 10 crates, you're guaranteed to get an Upgrade Reward from at least one track; but you could get all 3!
DIAMOND_CRATE_UPGRADES_CARD_1_BULLET_3_TITLE=Choose Your Rewards
DIAMOND_CRATE_UPGRADES_CARD_1_BULLET_3_TEXT=When you earn an Upgrade, you choose which Track to upgrade, making that Track's rewards even better!
DIAMOND_CRATE_UPGRADES_CARD_1_BULLET_4_TITLE=Choice Rewards
DIAMOND_CRATE_UPGRADES_CARD_1_BULLET_4_TEXT=Every time you Upgrade, the Tracks you don't choose accumulate a bonus reward that you will get the next time you choose to Upgrade that Track.
VIDEOS_CARD_1_TITLE=Daily Videos
VIDEOS_CARD_1_BULLET_1_TITLE=Watch Videos
VIDEOS_CARD_1_BULLET_1_TEXT=Watch 3 videos each day to earn diamonds, raid tickets, gold, hero XP and daily perks.
VIDEOS_CARD_1_BULLET_1B_TEXT=Daily perks last until 5am the following day.
VIDEOS_CARD_1_BULLET_3_TITLE=Raid Port, Trials and Multi-Raid
VIDEOS_CARD_1_BULLET_3_TEXT=Allows you to raid Port, Trials for the remainder of the day.
VIDEOS_CARD_1_BULLET_3B_TEXT=Allows you to spend multiple raid tickets at once when raiding the campaign for the remainder of the day.
VIDEOS_CARD_1_BULLET_4_TITLE=VIP
VIDEOS_CARD_1_BULLET_4_TEXT=Reaching VIP level 2, 3 and 4 allows you to get the bonuses for the 1st, 2nd and 3rd videos without having to watch a video.
MODS_CARD_1_TITLE=Mods Summary
MODS_CARD_1_BULLET_A_TITLE=Equip
MODS_CARD_1_BULLET_A_TEXT=Equip Mods to your Heroes to improve their stats. When you view a hero's Detailed Stats, you can see bonuses added by Mods in {#c069ff}purple{}.
MODS_CARD_1_BULLET_B_TITLE=Improve
MODS_CARD_1_BULLET_B_TEXT=Use Mod Power to Level Up your Mods to make them stronger.
MODS_CARD_2_TITLE=Meet your Mod
MODS_CARD_2_BULLET_A_TITLE=Shape
MODS_CARD_2_BULLET_A_TEXT=The shape of a Mod determines if it gives your hero HP, Basic Damage or Skill Power.
MODS_CARD_2_BULLET_C_TITLE=Level
MODS_CARD_2_BULLET_C_TEXT=The level of a Mod controls the strength of that bonus.
MODS_CARD_2_BULLET_C1_TEXT=Spend Mod Power to increase the level of your Mods.
MODS_CARD_2_BULLET_D_TITLE=Tier
MODS_CARD_2_BULLET_D_TEXT=Certain Mods are stronger, indicated by having a "+1" at the end of their name.
MODS_CARD_2_BULLET_D1_TEXT="+1" Mods can also be Leveled Up additional levels.
MODS_CARD_2_BULLET_E_TITLE=Attuned
MODS_CARD_2_BULLET_E_TEXT="+1" Mods are Attuned to a specific hero.
MODS_CARD_2_BULLET_E1_TEXT=Equipping an Attuned Mod to a different hero costs Hero Chips.
MODS_CARD_2_BULLET_F_TITLE=Hybrid Mods
MODS_CARD_2_BULLET_F_TEXT=Introduced at Sapphire Rank, Hybrid Mods combine the benefits of two types into one.
MODS_CARD_2_BULLET_F1_TEXT=They are available in two varieties: HP/BD or HP/SP.
MODS_CARD_2_BULLET_F2_TEXT=Additionally, these Mods grant access to two exclusive new upgrades: Normal Crit Negation and Fantastic Crit Negation.
