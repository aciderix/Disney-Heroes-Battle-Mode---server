MODS_UPDATE_2_CARD_3_TITLE=Recommended Mods
MODS_UPDATE_2_CARD_3_BULLET_A_TITLE=Best Available Mods
MODS_UPDATE_2_CARD_3_BULLET_A_TEXT="Recommended Mods" suggest the best available mods for a hero based on your current inventory. Only mods that are not equipped and not attuned to other heroes can be recommended.
MODS_UPDATE_2_CARD_3_BULLET_B_TITLE=Best Possible Mods
MODS_UPDATE_2_CARD_3_BULLET_B_TEXT=If you're looking for a suggestion of what the best overall mods in the game are for a hero, make sure to tap the "Best Possible" info button. Be sure to check back from time to time as the best mods for each hero can change as new heroes are introduced.
MODS_UPDATE_2_CARD_3_BULLET_C_TITLE=Equipping Mods
MODS_UPDATE_2_CARD_3_BULLET_C_TEXT=If you're satisfied with the mods being recommended for your hero, just tap the "Equip Mods" button and they'll be automatically equipped all at once. Remember, you can always change individual mods afterwards from the Mods tab by just tapping on each one.
MODS_UPDATE_2_CARD_4_TITLE=Upgrading Mods
MODS_UPDATE_2_CARD_4_BULLET_A_TITLE=Earning Upgrades
MODS_UPDATE_2_CARD_4_BULLET_A_TEXT=Earn Mod Upgrade Pieces from Invasion
MODS_UPDATE_2_CARD_4_BULLET_B_TITLE=Applying Upgrades
MODS_UPDATE_2_CARD_4_BULLET_B_TEXT=Use Mod Upgrade Pieces to give your Mod extra effects.
MODS_UPDATE_2_CARD_4_BULLET_B1_TEXT=A Mod must be a high enough level before it can be upgraded.
MODS_UPDATE_2_CARD_4_BULLET_B2_TEXT=Each Mod Shape has a limited set of upgrades it can have.
MODS_UPDATE_2_CARD_4_BULLET_C_TITLE=Improving Upgrades
MODS_UPDATE_2_CARD_4_BULLET_C_TEXT=Once upgraded, you can make the extra effect stronger.
MODS_UPDATE_2_CARD_4_BULLET_C1_TEXT=You will need to collect more Mod Upgrade Pieces and level up your Mod even further before you can improve your Mod.
