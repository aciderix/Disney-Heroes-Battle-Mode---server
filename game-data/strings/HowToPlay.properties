MODS_UPDATE_3_CARD_5_TITLE=Mod Upgrades
MODS_UPDATE_3_CARD_6_TITLE=Disassembly
MODS_UPDATE_3_CARD_6_BULLET_A_TITLE=Basics
MODS_UPDATE_3_CARD_6_BULLET_A_TEXT=You can disassemble an unwanted Mod to get Mod Fragments.
MODS_UPDATE_3_CARD_6_BULLET_B_TITLE=Fragment Type
MODS_UPDATE_3_CARD_6_BULLET_B_TEXT=Disassembling a Mod will reward you with Mod Fragments used to advance other Mods of that same color, shape, and tier.
MODS_UPDATE_3_CARD_6_BULLET_B1_TEXT=The rewarded Fragments will be the rarest type needed to advance a Mod of the same color, shape, and tier as the disassembled Mod.
MODS_UPDATE_3_CARD_6_BULLET_C_TITLE=Number of Fragments
MODS_UPDATE_3_CARD_6_BULLET_C_TEXT=The amount of Mod Fragments you receive is equal to the level of the Mod.
INVASION_CARD_3_TITLE=Breaker Quest
INVASION_CARD_3_BULLET_A_TITLE=Breaker Fights
INVASION_CARD_3_BULLET_A_TEXT=The rank of your breaker fight enemies is based on your team level.
INVASION_CARD_3_BULLET_A2_TEXT=After team level 56, these enemies gain 1 rank every 5 team levels but their rank never increases during an active Invasion.
INVASION_CARD_3_BULLET_A3_TEXT=Use Invasion stamina to win fights in the breaker quest to earn breakers.
INVASION_CARD_3_BULLET_B_TITLE=Ward Fights
INVASION_CARD_3_BULLET_B_TEXT=Each breaker fight has 4 wards making the enemies stronger.
INVASION_CARD_3_BULLET_B1_TEXT=If you need to, you can attack the ward directly to destroy the ward, making the breaker fight easier.
INVASION_CARD_3_BULLET_C_TITLE=Hero Pool
INVASION_CARD_3_BULLET_C_TEXT=Your hero's HP and energy persist between fights in the Breaker Quest.
INVASION_CARD_3_BULLET_C1_TEXT=Use hero revives to revive KO'ed heroes and continue the fight.
INVASION_CARD_3_BULLET_D_TITLE=Auto Quick Fight
INVASION_CARD_3_BULLET_D_TEXT=This allows you to quick fight multiple breaker fights in a row.
INVASION_CARD_3_BULLET_D1_TEXT=Quick fights continue until you either run out of Invasion Stamina, lose a fight, or complete an entire breaker quest wave.
INVASION_CARD_3_BULLET_D2_TEXT=Boosts can't be used for these fights. Hero revives and hero power-ups cannot be used between fights.
INVASION_CARD_4_TITLE=Boss Battle
INVASION_CARD_4_BULLET_A_TITLE=Use Breakers
INVASION_CARD_4_BULLET_A_TEXT=You need breakers to attack a Boss.
INVASION_CARD_4_BULLET_A2_TEXT=Bosses that you find will have the same rank as your breaker fight enemies.
INVASION_CARD_4_BULLET_A1_TEXT=You can spend 3 breakers at once to make a strong attack which does 5 times as much damage.
INVASION_CARD_4_BULLET_B_TITLE=Work as a Group
INVASION_CARD_4_BULLET_B_TEXT=If you can't defeat the boss you find in one attack, your guild can help you out by attacking the boss as well.
INVASION_CARD_4_BULLET_B1_TEXT=You have to attack your boss once before your guild will see the boss.
INVASION_CARD_4_BULLET_B2_TEXT=Attack each boss once to maximize your rewards.
INVASION_CARD_4_BULLET_C_TITLE=Rewards
INVASION_CARD_4_BULLET_C_TEXT=Rewards for a boss are handed out only when that boss is finally defeated.
INVASION_CARD_4_BULLET_C1_TEXT=Rewards are given to people who participated in attacking that boss.
INVASION_CARD_4_BULLET_C2_TEXT=Extra rewards are given out for doing large amounts of damage and other objectives.
INVASION_CARD_4_BULLET_C3_TEXT=You can see all the possible rewards by pressing the view button next to the rewards.
INVASION_CARD_4_BULLET_C4_TEXT=Fighting higher ranked Bosses will generally award more Invasion Points.
INVASION_CARD_4_BULLET_D_TITLE=Hero Pool
INVASION_CARD_4_BULLET_D_TEXT=Your hero's HP and energy persist between fights against bosses.
INVASION_CARD_4_BULLET_D1_TEXT=This HP and energy is different from that in the breaker quest.
INVASION_CARD_4_BULLET_D2_TEXT=You will need to use hero revives to prolong your fight against the bosses.
INVASION_CARD_5_TITLE=Boss Traits
INVASION_CARD_5_BULLET_A_TITLE=What Are Boss Traits
INVASION_CARD_5_BULLET_A_TEXT=Boss Traits are modifiers that define a Boss's strength and weaknesses. They will enhance the Boss with powerful passive effects, as well grant exploitable weaknesses.
INVASION_CARD_5_BULLET_A1_TEXT=Boss Traits only take effect on Guild Bosses.
INVASION_CARD_5_BULLET_B_TITLE=Boss Augments
INVASION_CARD_5_BULLET_B_TEXT=Augments are buffs that empower the Boss, providing advantages against certain teams.
INVASION_CARD_5_BULLET_B1_TEXT=Effects vary widely, from damage immunity and stat buffs to periodic AoE damage and automatic cleansing
INVASION_CARD_5_BULLET_B2_TEXT=Adapt your team composition to counter these effects for the best results.
INVASION_CARD_5_BULLET_C_TITLE=Boss Breakpoints
INVASION_CARD_5_BULLET_C_TEXT=Breakpoints are exploitable weaknesses that enhance your combat performance.
INVASION_CARD_5_BULLET_C1_TEXT=Triggering these breakpoints allows your team to deal massive damage or even inflict permanent debuffs on the Boss.
INVASION_CARD_5_BULLET_D_TITLE=Cooperation is Key!
INVASION_CARD_5_BULLET_D_TEXT=Coordinate with your Guild to trigger Boss Breakpoints faster and secure swifter victories.
INVASION_CARD_6_TITLE=Invasion Shop
INVASION_CARD_6_BULLET_A_TITLE=Boss Tech
INVASION_CARD_6_BULLET_A_TEXT=Boss tech is awarded when you help successfully defeat a boss.
INVASION_CARD_6_BULLET_A1_TEXT=Spend it in the Invasion shop to buy more items to help with the current Invasion.
INVASION_CARD_6_BULLET_B_TITLE=Boosts
INVASION_CARD_6_BULLET_B_TEXT=Boosts are one time use items that will help you in the breaker quest and boss battles.
INVASION_CARD_6_BULLET_B1_TEXT=Use them to defeat particularly nasty enemy combinations.
INVASION_CARD_6_BULLET_C_TITLE=Use it or Lose it
INVASION_CARD_6_BULLET_C_TEXT=Your boss tech and items will expire at the end of the Invasion so make the most of them.
INVASION_CARD_7_TITLE=Power-Up
INVASION_CARD_7_BULLET_A_TITLE=Power-Up for Invasion
INVASION_CARD_7_BULLET_A_TEXT=At the start of each Invasion certain heroes are automatically powered up, making them stronger in all Invasion fights.
INVASION_CARD_7_BULLET_B_TITLE=Hero Power-Up Item
INVASION_CARD_7_BULLET_B_TEXT=During the invasion you will earn hero power-up items that you can use to power-up your heroes further.
INVASION_CARD_7_BULLET_B1_TEXT=Depending on the rules of the Invasion, Power-Up items can present you with options to power up different heroes or give a weaker power-up to a whole team of heroes.
INVASION_CARD_7_BULLET_C_TITLE=Powered-Up Mods
INVASION_CARD_7_BULLET_C_TEXT=Mods you get from an Invasion are also Powered-Up.
INVASION_CARD_7_BULLET_C1_TEXT=Powered-Up mods power up the hero they are equipped to.
INVASION_CARD_7_BULLET_D_TITLE=Power-Ups are Strong
INVASION_CARD_7_BULLET_D_TEXT=Each point of power up increases your hero's stats and adds 3 extra levels to your skills (except for Red Skills).
INVASION_CARD_7_BULLET_D1_TEXT=Power-Up only applies to Invasion Fights.
INVASION_CARD_7_BULLET_D2_TEXT=Power-Up resets each week when the Invasion ends.
INVASION_CARD_7_BULLET_E_TITLE=It's Temporary
INVASION_CARD_7_BULLET_E_TEXT=Powered-Up heroes and mods only last for the current Invasion.
INVASION_CARD_8_TITLE=Supply Crates
INVASION_CARD_8_BULLET_A_TITLE=Goodies
INVASION_CARD_8_BULLET_A_TEXT=Players can buy supply crates to help them out in the Invasion.
INVASION_CARD_8_BULLET_A1_TEXT=Supply Crates also contain Mods and Mod power that will make your heroes stronger outside of the Invasion as well.
INVASION_CARD_8_BULLET_B_TITLE=Increasing Package
INVASION_CARD_8_BULLET_B_TEXT=There are multiple supply crates available each Invasion.
INVASION_CARD_8_BULLET_B1_TEXT=Each one has bigger and better rewards than the previous one.
INVASION_CARD_8_BULLET_C_TITLE=Drop Rates
INVASION_CARD_8_BULLET_C_TEXT=Hero Chips - Only drops the 3 featured heroes. Each hero has an equal chance of dropping.
INVASION_CARD_8_BULLET_C1_TEXT=Mod Level - Mod from the 1st supply crate is between level 2 and 4. Mod from the 3rd supply crate is between level 5 and 7. Mod from the 5th supply crate is between level 8 and 10. Each level in the range has an equal chance.
INVASION_CARD_9_TITLE=Points and Rewards
INVASION_CARD_9_BULLET_A_TITLE=Invasion Points
INVASION_CARD_9_BULLET_A_TEXT=Earn Invasion Points by beating Breaker Fights
INVASION_CARD_9_BULLET_A1_TEXT=Earn even more Invasion Points when your guild defeats a Boss you attacked.
INVASION_CARD_9_BULLET_B_TITLE=Progress Rewards
INVASION_CARD_9_BULLET_B_TEXT=Reach certain threshold of Invasion Points to earn a Mod, Mod Power, Gold, Hero XP, Stamina, Disk Power and more rewards.
INVASION_CARD_9_BULLET_C_TITLE=Rank Rewards
INVASION_CARD_9_BULLET_C_TEXT=Compete against other players to earn the most Invasion Points.
INVASION_CARD_9_BULLET_C1_TEXT=The higher ranked you get, the more Mod Power you will earn at the end of the Invasion.
INVASION_CARD_9_BULLET_D_TITLE=Invasion Leagues
INVASION_CARD_9_BULLET_D_TEXT=Top players will be promoted to a new League and will be eligible for better rewards next Invasion.
INVASION_CARD_9_BULLET_D1_TEXT=Once you get promoted though you can be demoted if you don't do well enough.
INVASION_CARD_9_BULLET_E_TITLE=Guild Rank
INVASION_CARD_9_BULLET_E_TEXT=Guilds are also Ranked in a similar manner.
INVASION_CARD_9_BULLET_E1_TEXT=Guild Rank and Individual Rank are separate from each other.
INVASION_CARD_10_TITLE=Invasion Schedule
INVASION_CARD_10_BULLET_A_TITLE=Weekly Reset
INVASION_CARD_10_BULLET_A_TEXT=Invasions start each week on Monday at noon CST.
INVASION_CARD_10_BULLET_A1_TEXT=Invasions last 5 days, until Saturday at noon CST.
INVASION_CARD_10_BULLET_A2_TEXT=Invasion items and resources reset each Invasion.
INVASION_CARD_10_BULLET_B_TITLE=Featured Team
INVASION_CARD_10_BULLET_B_TEXT=Each Invasion features a team of heroes that are more likely to start Powered-Up for that Invasion.
INVASION_CARD_10_BULLET_C_TITLE=Featured Heroes
INVASION_CARD_10_BULLET_C_TEXT=Each Invasion also includes a specific selection of featured heroes that will start more powered up than the Featured Team heroes.
INVASION_CARD_10_BULLET_C1_TEXT=Mods for those heroes can be found in Supply Crates.
INVASION_CARD_10_BULLET_D_TITLE=Featured Mod Shape
INVASION_CARD_10_BULLET_D_TEXT=Each Invasion features a specific shape of mod.
INVASION_CARD_10_BULLET_D1_TEXT=All mods earned in the Invasion will be that shape.
INVASION_CARD_11_TITLE=Breaker Wards
INVASION_CARD_12_TITLE=Invasion Items
COLLECTIONS_CARD_1_TITLE=Overview
COLLECTIONS_CARD_1_BULLET_1_TITLE=What are Collections?
COLLECTIONS_CARD_1_BULLET_1A_TEXT=Collections are groups of heroes who share something in common.
COLLECTIONS_CARD_1_BULLET_1B_TEXT=Heroes in a collection can share the same: combat role, mechanics, theme, or be from the same Disney-Pixar movie.
COLLECTIONS_CARD_1_BULLET_2_TITLE=Master Heroes
COLLECTIONS_CARD_1_BULLET_2A_TEXT=You can make progress in a collection by winning battles using heroes from the collection.
COLLECTIONS_CARD_1_BULLET_2B_TEXT=This is called "mastering" a hero.
COLLECTIONS_CARD_1_BULLET_2C_TEXT=By mastering enough heroes, you can complete collection "levels".
COLLECTIONS_CARD_1_BULLET_3_TITLE=Earn Rewards
COLLECTIONS_CARD_1_BULLET_3A_TEXT=Each time you complete a collection level, you earn rewards.
COLLECTIONS_CARD_1_BULLET_3B_TEXT=Base rewards are things like gold, hero XP, stamina, and more!
COLLECTIONS_CARD_1_BULLET_3C_TEXT=You also earn Mastery Tokens, which are used to buy cosmetic items from the Collection Shop.
COLLECTIONS_CARD_1_BULLET_3D_TEXT=Last but not least, you earn a permanent stat buff, for all heroes in the collection.
COLLECTIONS_CARD_2_TITLE=Collection Structure
COLLECTIONS_CARD_2_BULLET_1_TITLE=Collection Tiers
COLLECTIONS_CARD_2_BULLET_1A_TEXT=Each collection has 4 tiers: Bronze, Silver, Gold, and Platinum.
COLLECTIONS_CARD_2_BULLET_1B_TEXT=These tiers correspond to 3-star, 4-star, 5-star, and 6-star heroes, respectively.
COLLECTIONS_CARD_2_BULLET_2_TITLE=Collection Levels
COLLECTIONS_CARD_2_BULLET_2A_TEXT=Each collection tier has 1 or more levels, depending on the size of the collection.
COLLECTIONS_CARD_2_BULLET_2B_TEXT=So a collection with 4 levels per tier would have a total of 16 levels to progress through.
COLLECTIONS_CARD_2_BULLET_3_TITLE=Collection Progress
COLLECTIONS_CARD_2_BULLET_3A_TEXT=When you start working on a new collection, you always start at Bronze Tier, Level I.
COLLECTIONS_CARD_2_BULLET_3B_TEXT=Once you've completed that level, you unlock both Bronze II and Silver I.
COLLECTIONS_CARD_2_BULLET_3C_TEXT=You can then choose which level to work on next (or sometimes work on both at once; see "Hero Mastery").
COLLECTIONS_CARD_3_TITLE=Hero Mastery
COLLECTIONS_CARD_3_BULLET_1_TITLE=What is Hero Mastery?
COLLECTIONS_CARD_3_BULLET_1A_TEXT=To complete a single collection level, you must "master" a certain number of heroes.
COLLECTIONS_CARD_3_BULLET_1B_TEXT=This means winning a certain number of battles with each of those heroes in certain game modes.
COLLECTIONS_CARD_3_BULLET_2_TITLE=Example: Tank Collection, Bronze I.
COLLECTIONS_CARD_3_BULLET_2A_TEXT=To master Level I in the Bronze Tier of the Tank Collection, you must master 3 heroes.
COLLECTIONS_CARD_3_BULLET_2B_TEXT=This means you must win 20 battles with each of 3 heroes in the collection.
COLLECTIONS_CARD_3_BULLET_2C_TEXT=Each of those heroes must be at least 3 stars or higher.
COLLECTIONS_CARD_3_BULLET_3_TITLE=Specific Game Modes
COLLECTIONS_CARD_3_BULLET_3A_TEXT=Only battles won in Creep Surge, City Watch, and Breaker Fights in Invasion count toward mastery.
COLLECTIONS_CARD_3_BULLET_3B_TEXT=Raids in these modes do not count toward mastery.
COLLECTIONS_CARD_3_BULLET_3C_TEXT=Heroes hired as Mercenaries also do not count.
COLLECTIONS_CARD_3_BULLET_4_TITLE=Higher Mastery Levels
COLLECTIONS_CARD_3_BULLET_4A_TEXT=As you progress through a collection's TIERS, you will need to have HIGHER STAR heroes, and win more battles per hero.
COLLECTIONS_CARD_3_BULLET_4B_TEXT=As you progress through the levels within a tier, you will need to master MORE heroes, and win more battles per hero.
COLLECTIONS_CARD_3_BULLET_4C_TEXT=Note that it is possible to make progress in multiple tiers at the same time by focusing on the same set of heroes.
COLLECTIONS_CARD_4_TITLE=Rewards and Shop
COLLECTIONS_CARD_4_BULLET_1_TITLE=Base Rewards
COLLECTIONS_CARD_4_BULLET_1A_TEXT=Each time you complete a collection level, you will earn some "base" rewards.
COLLECTIONS_CARD_4_BULLET_1B_TEXT=These rewards vary from level to level, but include things like diamonds, stamina, gold, and hero XP.
COLLECTIONS_CARD_4_BULLET_2_TITLE=Cosmetics
COLLECTIONS_CARD_4_BULLET_2A_TEXT=You will also earn Mastery Tokens, which can be exchanged for special cosmetic items in the Hero Mastery Shop.
COLLECTIONS_CARD_4_BULLET_2B_TEXT=The Hero Mastery Shop offers two types of cosmetics: avatar borders and avatar badges.
COLLECTIONS_CARD_4_BULLET_2C_TEXT=Avatar borders are organized in tiers: purchase a border from tier 1 to unlock access to tier 2 borders, etc.
COLLECTIONS_CARD_4_BULLET_2D_TEXT=Avatar badges require a certain number of mastery levels in a collection to unlock; once unlocked, they can be purchased for Mastery Tokens.
COLLECTIONS_CARD_4_BULLET_3_TITLE=Stat Buffs
COLLECTIONS_CARD_4_BULLET_3A_TEXT=Each collection has a unique stat buff associated with it.
COLLECTIONS_CARD_4_BULLET_3B_TEXT=When you earn your first level in a collection, you gain that buff for ALL heroes in the collection.
COLLECTIONS_CARD_4_BULLET_3C_TEXT=Then each time you complete additional levels in the collection, you gain additional power in that buff.
COLLECTIONS_CARD_4_BULLET_3D_TEXT=It doesn't matter whether you complete a level in a new tier or an existing tier; all levels add the same additional power to the buff.
COLLECTIONS_CARD_5_TITLE=Collection Buffs
COSMETIC_COLLECTIONS_CARD_1_TITLE=Overview
COSMETIC_COLLECTIONS_CARD_1_BULLET_1_TITLE=What are Cosmetic Collections?
COSMETIC_COLLECTIONS_CARD_1_BULLET_1A_TEXT=Cosmetic Collections allow you to complete Sets of cosmetics and gain rewards that permanently power up your heroes!
COSMETIC_COLLECTIONS_CARD_1_BULLET_1B_TEXT=Get more Cosmetics by buying and opening crates from events. Opening a crate gives you a 40% chance for common, 35% chance for uncommon, 20% chance for rare, and 5% chance for legendary rarity cosmetics.
COSMETIC_COLLECTIONS_CARD_1_BULLET_2_TITLE=Rewards
COSMETIC_COLLECTIONS_CARD_1_BULLET_2A_TEXT=Completing a Cosmetic Set will grant you a consumable reward such as hero shards or a crate, plus Reward Level points.
COSMETIC_COLLECTIONS_CARD_1_BULLET_2B_TEXT=These level up points increase your Rewards Level and give all of your heroes bonuses.
COSMETIC_COLLECTIONS_CARD_1_BULLET_2C_TEXT=Each Reward Level will boost a core hero stat (Max HP, Armor, Reality, Basic Damage or Skill Power) by 0.5% for all of your heroes, and every 20th Reward Level will boost a powerful stat (Attack Speed, Improved Healing or Energy Gain) by 2.5%.
HALL_OF_FAME_CARD_1_TITLE=Hall of Fame
HALL_OF_FAME_CARD_1_BULLET_1_TITLE=Become a Legend!
HALL_OF_FAME_CARD_1_BULLET_1A_TEXT=The Hall of Fame is a place to showcase top performers in previous contests.
HALL_OF_FAME_CARD_1_BULLET_1B_TEXT=You can view previous winners using two different views.
HALL_OF_FAME_CARD_1_BULLET_2_TITLE=Contest View
HALL_OF_FAME_CARD_1_BULLET_2A_TEXT=In the Contest View, you can see all previous contests with their dates, titles, and contest type.
HALL_OF_FAME_CARD_1_BULLET_2B_TEXT=Below those are shown the top 5 ranked individuals or guilds for each contest.
HALL_OF_FAME_CARD_1_BULLET_3_TITLE=Ranking View
HALL_OF_FAME_CARD_1_BULLET_3A_TEXT=In the Ranking View, you can see *all-time* rankings of contest performance.
HALL_OF_FAME_CARD_1_BULLET_3B_TEXT=You can view either player rankings or guild rankings.
HALL_OF_FAME_CARD_1_BULLET_3C_TEXT=For both individuals and guilds, top 10 placements are called out, showing the number of times that player/guild has finished ranked 1/2/3/4-5/6-10 in previous contests.
HALL_OF_FAME_CARD_1_BULLET_4_TITLE=All-Time Scoring
HALL_OF_FAME_CARD_1_BULLET_4A_TEXT=Anytime a player or guild places in the top 100 in a contest, they earn points.
HALL_OF_FAME_CARD_1_BULLET_4B_TEXT=100 points are awarded for placing first, down to 1 point for placing last.
HALL_OF_FAME_CARD_1_BULLET_4C_TEXT=All-time score is an aggregate of these points from all previous individual or guild contests.
HALL_OF_FAME_CARD_1_BULLET_5_TITLE=Chat Bling
HALL_OF_FAME_CARD_1_BULLET_5A_TEXT=For individual contests, the top ranked player (the champion!) receives a special medal next to their name in chat and other places where their name appears.
HALL_OF_FAME_CARD_1_BULLET_5B_TEXT=For guild contests, all members of the top ranked guild receive a special medal next to their names in chat and other places where their names appear.
AUTO_ENHANCE_SETTINGS_CARD_1_TITLE=Auto Enhance Settings
AUTO_ENHANCE_SETTINGS_CARD_1_BULLET_1_TITLE=Overview
AUTO_ENHANCE_SETTINGS_CARD_1_BULLET_1A_TEXT=This window allows you to control which materials get used when you auto enhance a badge.
AUTO_ENHANCE_SETTINGS_CARD_1_BULLET_2_TITLE=Material
AUTO_ENHANCE_SETTINGS_CARD_1_BULLET_2A_TEXT=The left column of the window lists all of the possible material types.
AUTO_ENHANCE_SETTINGS_CARD_1_BULLET_2B_TEXT=Badges includes full badges and badge plans.
AUTO_ENHANCE_SETTINGS_CARD_1_BULLET_2C_TEXT=Bits includes badge bits and plan bits.
AUTO_ENHANCE_SETTINGS_CARD_1_BULLET_3_TITLE=Use with Auto?
AUTO_ENHANCE_SETTINGS_CARD_1_BULLET_3A_TEXT=The center column of the window let's you set which materials will be used.
AUTO_ENHANCE_SETTINGS_CARD_1_BULLET_3B_TEXT=If a material is set to ON, it will be used for auto enhancement.
AUTO_ENHANCE_SETTINGS_CARD_1_BULLET_3C_TEXT=If a material is set to OFF, it will NOT be used for auto enhancement.
AUTO_ENHANCE_SETTINGS_CARD_1_BULLET_4_TITLE=Number to Save
AUTO_ENHANCE_SETTINGS_CARD_1_BULLET_4A_TEXT=The right column of the window controls how many units of each material type is used.
AUTO_ENHANCE_SETTINGS_CARD_1_BULLET_4B_TEXT=For example, if you set "Purple Bits" to "100", auto enhance will only consume bits if you have over 100 of a specific purple bit/plan bit in your inventory.
AUTO_ENHANCE_SETTINGS_CARD_1_BULLET_4C_TEXT=Use the slider to adjust how many materials you want to save after auto enhancing.
AUTO_ENHANCE_SETTINGS_CARD_1_BULLET_4D_TEXT=Make sure to save enough of your valuable badges and badge bits! You will need them for your heroes later on.
RED_SKILLS_CARD_1_TITLE=Red Skills Overview
RED_SKILLS_CARD_1_BULLET_1_TITLE=Red Skill Access
RED_SKILLS_CARD_1_BULLET_1_TEXT=Like other skills, you'll need to promote your hero to Red rank in order to gain access to their Red skill. Unlike previous skills, you'll also need to unlock the Red skill before you can use it.
RED_SKILLS_CARD_1_BULLET_2_TITLE=Unlocking Red Skills
RED_SKILLS_CARD_1_BULLET_2_TEXT=Before you can use a Red Skill, you'll need to unlock it. To unlock a Red skill you'll need to collect Hero Chips and Red Skill Chips. Red Skill Chips can be earned by playing through the Epic difficulty in City Watch.
DONATIONS_CARD_1_TITLE=Guild Aid
DONATIONS_CARD_1_BULLET_1_TITLE=Guild Aid Request Types
DONATIONS_CARD_1_BULLET_1A_TEXT=If you've been having trouble progressing all of your heroes, request some help from your guildmates! You can make requests for XP to help level up a hero, gold to level up a hero skill or stamina to help earn hero badges.
DONATIONS_CARD_1_BULLET_2_TITLE=Request Limits
DONATIONS_CARD_1_BULLET_2A_TEXT=By default you can only request each type of aid once every 20 hours, but additional requests can be unlocked through Guild Perks.  Every active request will have 24 hours to collect donations before it expires.
DONATIONS_CARD_2_TITLE=Hero XP Level Aid
DONATIONS_CARD_2_BULLET_1_TITLE=Asking For Aid
DONATIONS_CARD_2_BULLET_1A_TEXT=To ask for XP help with a hero, tap the "+" button next to their Level meter and look for the "Ask For Aid" button.  XP help requests are limited to heroes who are 20 or more levels below your server's Team Level cap.
DONATIONS_CARD_2_BULLET_2_TITLE=Cancelled Requests
DONATIONS_CARD_2_BULLET_2A_TEXT=Whenever you make an XP request for aid, you can still level up that hero, however if you reach their max level the request you made will be automatically cancelled.  Keep in mind that if you cancel your request, you'll have to wait until it resets before being able to ask for aid again.
DONATIONS_CARD_2_BULLET_3_TITLE=Expired Requests
DONATIONS_CARD_2_BULLET_3A_TEXT=Expired XP aid requests will allow you keep any donations that were made to the request along the way.
DONATIONS_CARD_3_TITLE=Hero Skill Level Aid
DONATIONS_CARD_3_BULLET_1_TITLE=Asking For Aid
DONATIONS_CARD_3_BULLET_1A_TEXT=For Skill Level help, look under your hero's "Skills" tab and tap the Aid button to see which skills are eligible for aid.
DONATIONS_CARD_3_BULLET_1B_TEXT=Skill level help is limited based on the skill color. White and Green skill help can be requested for skills up to 20 levels below the cap, blue skills are up to 40 levels below the cap and Purple skills are up to 60 levels below.
DONATIONS_CARD_3_BULLET_2_TITLE=Cancelled Requests
DONATIONS_CARD_3_BULLET_2A_TEXT=Skill level requests will automatically cancel when you upgrade that skill to the next level. Keep in mind that if you cancel your request, you'll have to wait until it resets before being able to ask for aid again.
DONATIONS_CARD_3_BULLET_3_TITLE=Expired Requests
DONATIONS_CARD_3_BULLET_3A_TEXT=When a request for Skill Level aid expires, all gold donations are returned back to their original donors.
DONATIONS_CARD_4_TITLE=Stamina Aid
DONATIONS_CARD_4_BULLET_1_TITLE=Asking For Aid
DONATIONS_CARD_4_BULLET_1A_TEXT=Stamina aid can be requested from the "Get More Stamina" screen which can found by tapping on the "+" button next to your Stamina count at the top of the screen.
DONATIONS_CARD_4_BULLET_2_TITLE=Expired Requests
DONATIONS_CARD_4_BULLET_2A_TEXT=Expired Stamina aid requests will allow you keep any donations that were made to the request along the way.
DONATIONS_CARD_4_BULLET_3_TITLE=Stamina Donations
DONATIONS_CARD_4_BULLET_3A_TEXT=Stamina donations to other players are done using your Stamina Items.  Non-Premium Stamina items will be donated first, followed by Premium Stamina items, but don't worry you'll be asked if you want to donate Premium Stamina before the donation is made.
DONATIONS_CARD_5_TITLE=Donations
DONATIONS_CARD_5_BULLET_1_TITLE=Giving Aid
DONATIONS_CARD_5_BULLET_1A_TEXT=From the Guild Aid screen, you can see all of the aid requests currently being made by your guild, including your own. While you're only able to donate to each request once, you can donate to as many individual requests as you want, so don't be shy and help as many people as you can!
DONATIONS_CARD_5_BULLET_2_TITLE=Aid All
DONATIONS_CARD_5_BULLET_2A_TEXT=The "Aid All" buttons at the top of the Guild Aid screen can be used to conveniently send aid to every request of a specific type all at once.  Whenever you tap one of the Aid All buttons, you'll be shown the total amount of resources or items you'd be donating and asked if you'd like to continue.
DONATIONS_CARD_5_BULLET_3_TITLE=Lifetime Donations
DONATIONS_CARD_5_BULLET_3A_TEXT=If you're interested in seeing how helpful and generous you and the rest of your guild are, make sure to check out the "Donations" filter on your Guild Members board!
DAILY_HERO_CRATES_CARD_1_TITLE=Daily Hero Crates
DAILY_HERO_CRATES_CARD_1_BULLET_1_TITLE=Daily Hero Crate Rotation
DAILY_HERO_CRATES_CARD_1_BULLET_1A_TEXT=Each day features a different hero team or role crate. Monday, Wednesday, and Friday feature red, yellow, and blue heroes. Tuesday, Thursday, Saturday, and Sunday feature Control, Support, Damage, and Tank heroes.
DAILY_HERO_CRATES_CARD_1_BULLET_2_TITLE="Buy 1" Drop Rates
DAILY_HERO_CRATES_CARD_1_BULLET_2A_TEXT={#ffe00f}Badges:{} 32% (Purple or Orange badge bits and plan bits.)
DAILY_HERO_CRATES_CARD_1_BULLET_2B_TEXT={#ffe00f}Hero Chips:{} 35.6% (For any hero of that day's team or role. Does not include Special Event Exclusive, Sign-In monthly, Guild Crate feature or VIP Crate feature heroes.)
DAILY_HERO_CRATES_CARD_1_BULLET_2C_TEXT={#ffe00f}Full Hero:{} 11.1% (For any hero of that day's team or role. Does not include Special Event Exclusive, Sign-In monthly, Guild Crate feature or VIP Crate feature heroes.)
DAILY_HERO_CRATES_CARD_1_BULLET_2D_TEXT={#ffe00f}Credits:{} 14.2% (Sapphire)
DAILY_HERO_CRATES_CARD_1_BULLET_2E_TEXT={#ffe00f}XP Drinks:{} 7.1% (Mega or Turbo)
DAILY_HERO_CRATES_CARD_1_BULLET_3_TITLE="Buy 10" Special Rules
DAILY_HERO_CRATES_CARD_1_BULLET_3_TEXT="Buy 10" guarantees 1 of the 10 drops is a hero. (For any hero of that day's team or role. Does not include Special Event Exclusive, Sign-In monthly, Guild Crate feature or VIP Crate feature heroes.) If the hero is one you already own, you will receive that hero's chips instead: 7 for 1-star hero, 18 for 2-star or 30 for a 3-star.
DAILY_HERO_CRATES_CARD_1_BULLET_3A_TEXT=The other 9 drops have the same odds as listed above.
BATTLE_PASS_CARD_1_TITLE=Diamond Quest
BATTLE_PASS_CARD_1_BULLET_1_TITLE=Event Details
BATTLE_PASS_CARD_1_BULLET_1A_TEXT=Diamond Quest events are a new way for you to earn lots of rewards for playing the game and completing quests. You have 49 days from the beginning of each Diamond Quest to make as much progress and earn as many rewards as you can.
BATTLE_PASS_CARD_1_BULLET_2_TITLE=Event Cooldown
BATTLE_PASS_CARD_1_BULLET_2A_TEXT=At the end of each event, there's a 24 hour "cool down" period before the next Diamond Quest begins. During this time, you can still collect unclaimed rewards that you earned during the event.
BATTLE_PASS_CARD_2_TITLE=Making Progress
BATTLE_PASS_CARD_2_BULLET_1_TITLE=Quest Points
BATTLE_PASS_CARD_2_BULLET_1A_TEXT=Earn Quest Points to make progress through reward levels during a Diamond Quest event. Quest Points are awarded when claiming most Quest rewards. (Free Stamina, Daily Deal and Commuter Quests are excluded).
BATTLE_PASS_CARD_2_BULLET_2_TITLE=Daily Quest Point Limit
BATTLE_PASS_CARD_2_BULLET_2A_TEXT=Each day, you'll be limited to earning a total of 10 Quest Points towards your Diamond Quest, so make sure you're hitting that limit every day. If you ever end up having less than 10 total quests available in a day, don't worry, your quests will adjust to award you more points so you can still reach your limit.
BATTLE_PASS_CARD_3_TITLE=Rewards
BATTLE_PASS_CARD_3_BULLET_1_TITLE=Free Rewards
BATTLE_PASS_CARD_3_BULLET_1A_TEXT=Free rewards are available to everyone and you'll always get your first reward level for free! To collect more free rewards, you just need to keep earning enough Quest Points to reach the next reward level.
BATTLE_PASS_CARD_3_BULLET_2_TITLE=Premium Rewards
BATTLE_PASS_CARD_3_BULLET_2A_TEXT=Premium rewards give you access to much higher value rewards like newly released heroes and Diamonds. These rewards are locked at the beginning of every Diamond Quest event and can't be collected unless you have a Premium Pass.
BATTLE_PASS_CARD_3_BULLET_3_TITLE=Premium Pass
BATTLE_PASS_CARD_3_BULLET_3A_TEXT=The Premium Pass unlocks access to the Premium rewards and can be purchased by tapping the "Unlock" button. Premium passes only last for the duration of the current Diamond Quest event.
BATTLE_PASS_CARD_3_BULLET_3B_TEXT=You can buy a Premium Pass and unlock Premium rewards at any point during a Diamond Quest event, but the best part is that you can then collect all the Premium rewards up to your current reward level!
CHALLENGER_SEASONS_CARD_1_TITLE=About The Arena
CHALLENGER_SEASONS_CARD_2_TITLE=Challenger Tier
CHALLENGER_SEASONS_CARD_2_BULLET_1_TITLE=What is the Challenger Tier?
CHALLENGER_SEASONS_CARD_2_BULLET_1A_TEXT=The Challenger Tier is where the best of the best players compete over the course of a season to be crowned the Season Champion!
CHALLENGER_SEASONS_CARD_2_BULLET_2_TITLE=Promoting into Challenger
CHALLENGER_SEASONS_CARD_2_BULLET_2A_TEXT=To enter the Challenger Tier, you'll need to occupy the #1 rank in Platinum I for the entire duration of your promotion timer.
CHALLENGER_SEASONS_CARD_2_BULLET_3_TITLE=Challenger Seasons
CHALLENGER_SEASONS_CARD_2_BULLET_3A_TEXT=Challenger seasons reset every four weeks, during which players will fight opponents with limited a limited pool of Heroes, adapt to new rules and earn rewards for holding high ranks.
CHALLENGER_SEASONS_CARD_2_BULLET_4_TITLE=Fighting Challenger Opponents
CHALLENGER_SEASONS_CARD_2_BULLET_4A_TEXT=Fight opponents to earn Fight Points which are used to determine your rank on the Leaderboard.
CHALLENGER_SEASONS_CARD_3_TITLE=Challenger Seasons
CHALLENGER_SEASONS_CARD_3_BULLET_1_TITLE=Season Format
CHALLENGER_SEASONS_CARD_3_BULLET_1A_TEXT=The Challenger Tier uses a season format that lasts four weeks long. At the beggining of the season players will only be able to use a limited set of Franchises. After four weeks ranks, franchises, rules, and bonuses of the competition are reset, and the season starts all over again with new franchises and rules.
CHALLENGER_SEASONS_CARD_3_BULLET_2_TITLE=Seasonal Rules and Scoring Bonuses
CHALLENGER_SEASONS_CARD_3_BULLET_2A_TEXT=New franchises and franchise related skill based rules will be added to challenge players as they progress every week.\nEnergy gains in the Arena will be decreased globally.
CHALLENGER_SEASONS_CARD_3_BULLET_2B_TEXT=Scoring Bonuses last for the entire season and provide a way to earn points every time you fight.
CHALLENGER_SEASONS_CARD_3_BULLET_3_TITLE=Season Champion
CHALLENGER_SEASONS_CARD_3_BULLET_3A_TEXT=Players who manage to promote into Division I, will compete to become the Season Champion and earn exclusive rewards.
CHALLENGER_SEASONS_CARD_3_BULLET_4_TITLE=Legacy Score
CHALLENGER_SEASONS_CARD_3_BULLET_4A_TEXT=At the end of each season, you'll earn Legacy Points based on your final division and rank. Your Legacy Score is the total number of Legacy Points earned across all seasons. See how you rank all-time against other players on the Legacy Leaderboard screen.
CHALLENGER_SEASONS_CARD_4_TITLE=Challenger Fights
CHALLENGER_SEASONS_CARD_4_BULLET_1_TITLE=Opponent Keys and Fight Attempts
CHALLENGER_SEASONS_CARD_4_BULLET_1A_TEXT=Each day you'll be given a number of "Opponent Keys" based on the size of your league.  Each key is used to "unlock" one opponent along with three Fight Attempts.
CHALLENGER_SEASONS_CARD_4_BULLET_2_TITLE=Fight Scoring
CHALLENGER_SEASONS_CARD_4_BULLET_2A_TEXT=A Fight Score is calculated after each Fight Attempt based on the result and any bonuses. Your Best Fight Score is the highest Fight Score against that opponent.
CHALLENGER_SEASONS_CARD_4_BULLET_3_TITLE=Total Fight Score
CHALLENGER_SEASONS_CARD_4_BULLET_3A_TEXT=Your Total Fight Score is the total of all your Best Fight Scores for that week and used to determine your Leaderboard ranking. Total Fight Scores are reset weekly.
CHALLENGER_SEASONS_CARD_4_BULLET_4_TITLE=Promoting Between Divisions
CHALLENGER_SEASONS_CARD_4_BULLET_4A_TEXT=At the end of each of the first three weeks, the top ranked players in each league are promoted. Players can promote 1 or 2 divisions at a time based on rank and available slots.
CHALLENGER_SEASONS_CARD_4_BULLET_5_TITLE=Extra Fight Attempts
CHALLENGER_SEASONS_CARD_4_BULLET_5A_TEXT=If you run out of Fight Attempts for an opponent, you can still use your Extra Fight attempts. Each day (at 5AM local time) you'll receive 5 Extra Fights to use against any opponents and you can add even more through VIP and Guild Perks. After those run out, you can still fight by spending Diamonds.
CHALLENGER_SEASONS_CARD_5_TITLE=Challenger Rewards
CHALLENGER_SEASONS_CARD_5_BULLET_1_TITLE=Daily Rewards
CHALLENGER_SEASONS_CARD_5_BULLET_1A_TEXT=Earn rewards every day which will increase based on the Division you're in and your final ranking for the day.
CHALLENGER_SEASONS_CARD_5_BULLET_1B_TEXT=Daily rewards will only be received if you've made an attack in the past 7 days.
CHALLENGER_SEASONS_CARD_5_BULLET_2_TITLE=Weekly Rewards
CHALLENGER_SEASONS_CARD_5_BULLET_2A_TEXT=At the end of each week, you'll receive 1-3 Challenger Crates which come in five different quality tiers: Bronze, Copper, Silver, Gold and Platinum.
CHALLENGER_SEASONS_CARD_5_BULLET_2B_TEXT=The quality of the crates you earn will depend on the Division you were in and your final ranking for the week.  All Challenger Crates contain exclusive Hero Chips.
CHALLENGER_SEASONS_CARD_5_BULLET_3_TITLE=Exclusive Season Rewards
CHALLENGER_SEASONS_CARD_5_BULLET_3A_TEXT=Players who finish their season in Division I will receive an exclusive cosmetic reward to show off to the rest of the community.  However, these rewards can only be used until the end of the following season when they're awarded to the next group of Division I players.
CHALLENGER_SEASONS_CARD_6_TITLE=Franchise Rules and Fight Points
CHALLENGER_SEASONS_CARD_6_BULLET_1_TITLE=Franchise Rules
CHALLENGER_SEASONS_CARD_6_BULLET_1A_TEXT=To ensure the viability of all the Franchises available on Challenger Arena, some franchises will be releasing with a special set of rules that will only apply to them.
CHALLENGER_SEASONS_CARD_6_BULLET_1B_TEXT=These rules will only work if you commit to using a certain number of heroes from that Franchise but will provide greater benefits than usual rules.
CHALLENGER_SEASONS_CARD_6_BULLET_2_TITLE=Fight Point Bonuses
CHALLENGER_SEASONS_CARD_6_BULLET_2A_TEXT=Fight Point Bonuses now remain the same throughout Seasons and will be the following:
CHALLENGER_SEASONS_CARD_6_BULLET_2B_TEXT=Heroes Remaining : Players will be awarded more points for finishing combat with more heroes still standing.
CHALLENGER_SEASONS_CARD_6_BULLET_2C_TEXT=Time Remaining : Players will be awarded more more points for finishing Combat quicker.
GUILD_GIFTING_CARD_1_TITLE=Guild Gifting
GUILD_GIFTING_CARD_1_BULLET_1_TITLE=What is it?
GUILD_GIFTING_CARD_1_BULLET_1A_TEXT=Guild Gifts are special deals which give items to both you and your entire guild!
GUILD_GIFTING_CARD_1_BULLET_2_TITLE=Claiming Gifts
GUILD_GIFTING_CARD_1_BULLET_2A_TEXT=Any gifts your guild members purchase will show up on the guild gifting screen for you to collect.
GUILD_GIFTING_CARD_1_BULLET_2B_TEXT=Don't forget to thank your guild when you get a gift!
GUILD_GIFTING_CARD_1_BULLET_3_TITLE=Anonymity
GUILD_GIFTING_CARD_1_BULLET_3A_TEXT=In the lower left you can toggle if you want your gift to be anonymous to the rest of your guild or not.
GUILD_GIFTING_CARD_1_BULLET_4_TITLE=Other Details
GUILD_GIFTING_CARD_1_BULLET_4A_TEXT=Guild gifts do not trigger additional Guild Token rewards like normal deals.
GUILD_GIFTING_CARD_1_BULLET_4B_TEXT=This deal can be purchased only a limited amount of times per event.
GUILD_GIFTING_CARD_1_BULLET_4C_TEXT=Unclaimed rewards at the end of the event will be sent to your mailbox.
SURGE_CARD_1_TITLE=Creep Surge Overview
SURGE_CARD_1_BULLET_1_TITLE=Waves of Creeps
SURGE_CARD_1_BULLET_1_TEXT=Infected heroes are flooding the city! Your help is needed to fight these Creeps off and keep things safe.
SURGE_CARD_1_BULLET_2_TITLE=Team Work
SURGE_CARD_1_BULLET_2_TEXT=Everyone in your Guild contributes to Creep Surge. Work together to maximize rewards for everyone!
SURGE_CARD_1_BULLET_3_TITLE=Rewards
SURGE_CARD_1_BULLET_3_TEXT=Surge is a great way to earn Gold, Guild influence, and Surge shop tokens. But only if you participate! The higher your lineup's total Rarity, the more Gold you'll get!
SURGE_CARD_1_BULLET_3A_TEXT=As a bonus, your Guild starts with 30 Surge shop tokens and 5000 Guild influence.
SURGE_CARD_1_BULLET_4_TITLE=Scoring
SURGE_CARD_1_BULLET_4_TEXT=Individuals earn points for the guild as they participate in Surge. Points are important because the Guild's point total determines how much extra gold everyone gets at the end of Surge!
SURGE_CARD_2_TITLE=The Map
SURGE_CARD_2_BULLET_1_TITLE=Districts
SURGE_CARD_2_BULLET_1_TEXT=A district is any numbered area on the map. Complete its fight to clear the district, earn gold for you, and points for yourself.
SURGE_CARD_2_BULLET_1A_TEXT=The points earned are based on the enemy's power in the region. Higher powered regions have better power to point ratios.
SURGE_CARD_2_BULLET_2_TITLE=Regions
SURGE_CARD_2_BULLET_2_TEXT=Regions are groups of same-colored districts.
SURGE_CARD_2_BULLET_2A_TEXT=Clear a region by clearing all its districts. Clearing a region earns the Guild 1350 influence and 14 Surge shop tokens.
SURGE_CARD_2_BULLET_3_TITLE=Waves
SURGE_CARD_2_BULLET_3_TEXT=Waves are cleared when any 3 regions have been cleared.
SURGE_CARD_2_BULLET_3A_TEXT=Clearing waves rewards the Guild with a huge point bonus! Those regions are also reset with new Creeps.
SURGE_CARD_2_BULLET_3B_TEXT=There's no limit to the number of waves your Guild can clear. So it's important to coordinate!
SURGE_CARD_2_BULLET_4_TITLE=Guild HQ
SURGE_CARD_2_BULLET_4_TEXT=This island location lets you contribute heroes to help the Surge. These heroes will earn points for your Guild, but can't participate in any Surge fights.
SURGE_CARD_2_BULLET_4A_TEXT=Note that contributing to the HQ uses all your remaining Heroes. So make sure it's the last thing you do!
SURGE_CARD_3_TITLE=Gameplay
SURGE_CARD_3_BULLET_1_TITLE=Earning Points
SURGE_CARD_3_BULLET_1_TEXT=The three ways to earn points are by clearing districts, clearing waves, and contributing to the guild HQ.
SURGE_CARD_3_BULLET_2_TITLE=End of Surge Gold & The Gold Multiplier
SURGE_CARD_3_BULLET_2_TEXT=At the end of Surge, you'll receive extra Gold! The amount of extra Gold equals all gold you earned throughout surge multiplied by your Guild's gold multiplier (which is increased by earning more Surge points). Also, the higher your lineup's Total Rarity, the higher the Gold multiplier will be, so make sure to use your best Heroes!
SURGE_CARD_3_BULLET_3_TITLE=Hero Limits
SURGE_CARD_3_BULLET_3_TEXT=Each hero can fight only once per day in the Creep Surge. Unlock and upgrade more heroes to help your guild!
SURGE_CARD_3_BULLET_4_TITLE=Mercenaries
SURGE_CARD_3_BULLET_4_TEXT=Mercanaries posted by your Guild can be hired by you for Gold. Only one mercenary per fight is allowed though!
SURGE_CARD_3_BULLET_5_TITLE=Raids & Auto Select
SURGE_CARD_3_BULLET_5_TEXT=Raiding lets you instantly win a fight without actually fighting. Though, unlike other modes, to Raid in Surge you'll first need to assemble a team with more power than the enemy.
SURGE_CARD_3_BULLET_5A_TEXT=You have a limited number of Raids per day. Increase this limit via VIP and Guild perks.
SURGE_CARD_3_BULLET_5B_TEXT=Auto select helps you quickly pick a team that can Raid. Be careful when using Auto select to fight normally--there's no guarantee that team will win!
SURGE_CARD_3_BULLET_6_TITLE=Bonuses
SURGE_CARD_3_BULLET_6_TEXT=Surge has daily bonuses that will reward you for winning using teams which meet specific requirements. These bonuses are visible when selecting heroes.
SURGE_CARD_3_BULLET_6A_TEXT=Bonuses will only apply to a limited number of your wins. So try to beat the hardest teams you can to maximize your rewards.
SURGE_CARD_3_BULLET_6B_TEXT=The color of the bonus gold percent indicates how valuable that bonus is. Some days will have very valuable bonuses, so make sure to check them every day!
SURGE_CARD_4_TITLE=Strategy
SURGE_CARD_4_BULLET_1_TITLE=Recommended Attack
SURGE_CARD_4_BULLET_1_TEXT=When in doubt, look for the gold star. It identifies a creep lineup that makes the most sense to attack, based both on which regions your guild is clearing and which heroes you have remaining.
SURGE_CARD_4_BULLET_2_TITLE=High Rarity, High Gains
SURGE_CARD_4_BULLET_2_TEXT=The key to clearing lots of creeps is picking your strongest lineup. You will often want to use 5 high Rarity Heroes to make sure you clear the creeps and get more Gold gains.
SURGE_CARD_4_BULLET_3_TITLE=Coordinate
SURGE_CARD_4_BULLET_3_TEXT=Check the Surge's "Guild Ranks" to see how everyone is doing. Talk with your guild... make sure they're pulling their weight!
SURGE_CARD_4_BULLET_4_TITLE=Low on Time?
SURGE_CARD_4_BULLET_4_TEXT=Make sure to at least contribute heroes at the Guild HQ.
BATTLE_BADGE_CARD_1_TITLE=Battle Badges Overview
BATTLE_BADGE_CARD_1_BULLET_1_TITLE=Unlocking Battle Badges
BATTLE_BADGE_CARD_1_BULLET_1_TEXT=Battle Badges are unlocked with Megabits earned from The Codebase Trial.  Each Battle Badge requires a specific type of Megabit related to the Role of the hero the badge belongs to.
BATTLE_BADGE_CARD_1_BULLET_2_TITLE=Using Battle Badges
BATTLE_BADGE_CARD_1_BULLET_2_TEXT=Once unlocked, a Battle Badge will gain access to three buffs which can be activated in battle once per wave each time the badge's charging condition is completed.
BATTLE_BADGE_CARD_1_BULLET_3_TITLE=Upgrading Battle Badges
BATTLE_BADGE_CARD_1_BULLET_3_TEXT=Enhancing a Battle Badge will temporarily upgrade the values on its first two buffs and unlock access to the third.  Leveling up the badge permanently upgrades the first two buffs and resets any enhancement.
BATTLE_BADGE_CARD_2_TITLE=Battle Badge Buffs
BATTLE_BADGE_CARD_2_BULLET_1_TITLE=Badge Buffs
BATTLE_BADGE_CARD_2_BULLET_1_TEXT=Each Battle Badge comes with three unique buffs that can be activated during battle: a Stat Buff, a Lineup Based Buff and an Effect Buff.
BATTLE_BADGE_CARD_2_BULLET_2_TITLE=Stat Buffs
BATTLE_BADGE_CARD_2_BULLET_2_TEXT=Stat Buffs increase one of the hero's core stats by a specific amount.  Core stats include: Basic Damage, Skill Power, Max HP, Armor, or Reality.
BATTLE_BADGE_CARD_2_BULLET_3_TITLE=Lineup Based Buffs
BATTLE_BADGE_CARD_2_BULLET_3_TEXT=Lineup Based Buffs increase one of the hero's core stats by a scaled amount that's based on the number of heroes in your lineup matching a specific Team Color or Role.
BATTLE_BADGE_CARD_2_BULLET_4_TITLE=Effect Buffs
BATTLE_BADGE_CARD_2_BULLET_4_TEXT=Effect Buffs add a specific status effect to either the hero or their team, but are only available if the badge is Enhanced.  Effect Buff values do not increase when a badge is enhanced or leveled up.
BATTLE_BADGE_CARD_3_TITLE=Using the Battle Badge
BATTLE_BADGE_CARD_3_BULLET_1_TITLE=Charging the Battle Badge
BATTLE_BADGE_CARD_3_BULLET_1_TEXT=A Battle Badge needs to be charged before it can activate its buffs in battle.  Every badge has its own charging condition to complete, but both the hero and their allies can help to charge each other's badges.
BATTLE_BADGE_CARD_3_BULLET_2_TITLE=Duration
BATTLE_BADGE_CARD_3_BULLET_2_TEXT=A Battle Badge will only stay charged until the end of a wave, but they can be charged in every wave of a battle.
BATTLE_BADGE_CARD_4_TITLE=Battle Badge Enhancement
BATTLE_BADGE_CARD_4_BULLET_1_TITLE=Unlock Additional Power
BATTLE_BADGE_CARD_4_BULLET_1_TEXT=Enhancing a Battle Badge will instantly improve the stat values increased by the Stat and Lineup Based Buffs.  It also unlocks the badge's Effect Buff and allows it to be activated during battle.
BATTLE_BADGE_CARD_4_BULLET_2_TITLE=Enhancement Costs
BATTLE_BADGE_CARD_4_BULLET_2_TEXT=To enhance a Battle Badge, you'll need to use both Megabits and Hero XP.  The amount required of each will increase or decrease based on the total number of Battle Badges currently enhanced.
BATTLE_BADGE_CARD_4_BULLET_2A_TEXT=If no badges are enhanced, the cost to enhance the first badge is free.
BATTLE_BADGE_CARD_4_BULLET_3_TITLE=Reset and Refund
BATTLE_BADGE_CARD_4_BULLET_3_TEXT=Whenever you level up a Battle Badge, its enhancement will be reset, but a percentage of the Megabits spent on the last enhancement you made will be returned to you.
THE_CODEBASE_CARD_1_TITLE=The Codebase Overview
THE_CODEBASE_CARD_1_BULLET_1_TITLE=The Mega Virus
THE_CODEBASE_CARD_1_BULLET_1_TEXT=Fight the Mega Virus in The Codebase!  The more damage you do, the angrier it gets and the more rewards it'll drop.
THE_CODEBASE_CARD_1_BULLET_2_TITLE=Vulnerabilities
THE_CODEBASE_CARD_1_BULLET_2_TEXT=Although the Mega Virus is powerful, it does have a weakness.  Make sure to take note of it's vulnerability before battle and then use that info to recruit heroes that can take advantage of it.
THE_CODEBASE_CARD_1_BULLET_3_TITLE=Rewards
THE_CODEBASE_CARD_1_BULLET_3_TEXT=During the battle, the Mega Virus will drop random Megabits which you can use to upgrade the Battle Badges of your heroes.
THE_CODEBASE_CARD_1_BULLET_3A_TEXT=Before each battle, you can increase the drop chance of a specific Megabit type by tapping the button with the heart icon beneath it.
THE_CODEBASE_CARD_1_BULLET_4_TITLE=Scoring
THE_CODEBASE_CARD_1_BULLET_4_TEXT=The more damage done to the Mega Virus, the more points you'll earn.  Use vulnerabilities to increase the rate at which your points accumulate and reach higher totals.
THE_CODEBASE_CARD_1_BULLET_4A_TEXT=Do your best and try to beat your High Score and Best Rage Level reached!
THE_CODEBASE_CARD_1_BULLET_5_TITLE=Trial Reset
THE_CODEBASE_CARD_1_BULLET_5_TEXT=You'll only have a limited number of chances each day to battle the Mega Virus, but those chances will be reset at 5am of your local time every day.
THE_CODEBASE_CARD_1_BULLET_5A_TEXT=Every three days, The Codebase will reset itself and the Mega Virus will mutate to have a new vulnerability and new minor rage levels.
THE_CODEBASE_CARD_2_TITLE=Gameplay
THE_CODEBASE_CARD_2_BULLET_1_TITLE=Rage Levels
THE_CODEBASE_CARD_2_BULLET_1_TEXT=As the Mega Virus takes damage, its rage increases and climbs through multiple levels.
THE_CODEBASE_CARD_2_BULLET_1A_TEXT=Every minor level you reach will cause the Mega Virus to drop an amount of random Megabits, increase one of its stats and add extra time to the battle.
THE_CODEBASE_CARD_2_BULLET_1B_TEXT=Every 5th level will award an even larger amount of Megabits and extra time, but also activates a new skill on the Mega Virus!
THE_CODEBASE_CARD_2_BULLET_2_TITLE=Rage Multiplier
THE_CODEBASE_CARD_2_BULLET_2_TEXT=When a hero hits the Mega Virus with something it's vulnerable to, the Rage Multiplier will increase.  The higher it climbs, the faster you'll score points, reach higher Rage Levels and earn more rewards!
THE_CODEBASE_CARD_2_BULLET_3_TITLE=Extra Time
THE_CODEBASE_CARD_2_BULLET_3_TEXT=Reach new Rage Levels to earn additional time to deal more damage and collect more rewards.  Every fifth Rage Level gives you a larger time boost than the minor levels do.
THE_CODEBASE_CARD_2_BULLET_4_TITLE=Mega Virus Special Skills
THE_CODEBASE_CARD_2_BULLET_4_TEXT=In The Codebase, the Mega Virus has access to special skills. During battle it can suppress buffs and prevent heroes from having more than 2 of the same buff applied to them from a single ally.
THE_CODEBASE_CARD_2_BULLET_4A_TEXT=The Mega Virus will also purge Heroes from The Codebase whenever the battle timer expires.
THE_CODEBASE_CARD_3_TITLE=Minor Rage Levels
THE_CODEBASE_CARD_3_BULLET_1_TITLE=Stat Increases
THE_CODEBASE_CARD_3_BULLET_1_TEXT=At each minor Rage Level, the Mega Virus will increase one of the stats below.  Each stat can be increased a maximum of four times over the course of a battle.
THE_CODEBASE_CARD_3_BULLET_1A_TEXT=The stat increased at each level will stay the same for every battle until the Trial is reset (every three days).
THE_CODEBASE_CARD_3_BULLET_2_TITLE=Damage
THE_CODEBASE_CARD_3_BULLET_2_TEXT=This stat will be increased in the following order: +40% / +75% / +75% / +100%
THE_CODEBASE_CARD_3_BULLET_2A_TEXT=Stat values are additive, meaning that the final increase for this stat will be for 650%.
THE_CODEBASE_CARD_3_BULLET_3_TITLE=Armor
THE_CODEBASE_CARD_3_BULLET_3_TEXT=This stat will be increased in the following order: +30% / +50% / +50% / +75%
THE_CODEBASE_CARD_3_BULLET_3A_TEXT=Stat values are additive, meaning that the final increase for this stat will be for 475%.
THE_CODEBASE_CARD_3_BULLET_4_TITLE=Reality
THE_CODEBASE_CARD_3_BULLET_4_TEXT=This stat will be increased in the following order: +30% / +50% / +50% / +75%
THE_CODEBASE_CARD_3_BULLET_4A_TEXT=Stat values are additive, meaning that the final increase for this stat will be for 475%.
THE_CODEBASE_CARD_3_BULLET_5_TITLE=Slow Effectiveness Reduction
THE_CODEBASE_CARD_3_BULLET_5_TEXT=This stat will be increased in the following order: +50% / +25% / +15% / Slow Immunity
THE_CODEBASE_CARD_3_BULLET_5A_TEXT=Stat values are additive, meaning that the third increase for this stat will be for 90%.  Slow immunity includes both Move Speed and Attack Speed decreases.
THE_CODEBASE_CARD_3_BULLET_6_TITLE=Armor Negation
THE_CODEBASE_CARD_3_BULLET_6_TEXT=This stat will be increased in the following order: +25 / +25 / +25 / +25
THE_CODEBASE_CARD_3_BULLET_7_TITLE=Reality Negation
THE_CODEBASE_CARD_3_BULLET_7_TEXT=This stat will be increased in the following order: +25 / +25 / +25 / +25
THE_CODEBASE_CARD_4_TITLE=Major Rage Levels
THE_CODEBASE_CARD_4_BULLET_1_TITLE=Level 5 - Flash Drive
THE_CODEBASE_CARD_4_BULLET_1_TEXT=The Mega Virus launches a projectile at the closest hero on your team, dealing damage and reducing their Armor by 75% for 10 seconds.  It's Tenacity will also be increased by +50.
THE_CODEBASE_CARD_4_BULLET_2_TITLE=Level 10 - DDoS Attack
THE_CODEBASE_CARD_4_BULLET_2_TEXT=The Mega Virus targets the frontmost hero on your team with multiple tendril attacks that knocks them back, deals damage, and stuns them for 5 seconds.  It's Tenacity will also be increased by +35.
THE_CODEBASE_CARD_4_BULLET_3_TITLE=Level 15 - Viral Strike
THE_CODEBASE_CARD_4_BULLET_3_TEXT=Basic attacks are now faster and also remove a random buff from the hero they hit.  The Mega Virus's Tenacity will also be increased by +10.
THE_CODEBASE_CARD_4_BULLET_4_TITLE=Level 20 - System Failure
THE_CODEBASE_CARD_4_BULLET_4_TEXT=Every 4 seconds, the Mega Virus will apply a random disable or debuff from the list below to a random hero on your team.  The Mega Virus will also become immune to all disable effects.
THE_CODEBASE_CARD_4_BULLET_4A_TEXT=Possible disables or debuffs:  Stun ,Freeze, Blind, Silence, Charm, Sap, Curse, Weakness, Scare, Study, Attack Speed Decrease
THE_CODEBASE_CARD_4_BULLET_5_TITLE=Level 25 - Firewall
THE_CODEBASE_CARD_4_BULLET_5_TEXT=The Mega Virus becomes immune to all debuffs.
THE_CODEBASE_CARD_4_BULLET_6_TITLE=Level 30 - Mega Charge
THE_CODEBASE_CARD_4_BULLET_6_TEXT=The Mega Virus rages and begins to deal 50% more damage, can launch DDos Attacks every 1.5 seconds and perform Viral Strikes every 3 seconds.
WISH_CRATE_CARD_1_TITLE=The Wish Crate Overview
WISH_CRATE_CARD_1_BULLET_1_TITLE=Choose Your Reward
WISH_CRATE_CARD_1_BULLET_1_TEXT=The Wish Crate is a special crate that can award you with hero chips for exactly the hero that you want, including a Jackpot of 1000 hero chips! The crate can also give you other rewards like resources or items related to the hero you chose, like their Red Skill Chips.
WISH_CRATE_CARD_1_BULLET_2_TITLE=List of Heroes
WISH_CRATE_CARD_1_BULLET_2_TEXT=You will be able to choose any hero you want with a few exceptions. You cannot select the Sign-In hero, the VIP Crate hero, the Challenger Hero, or any Event Exclusive Heroes.
WISH_CRATE_CARD_1_BULLET_3_TITLE=Increasing Your Chances
WISH_CRATE_CARD_1_BULLET_3_TEXT=When you open a Wish Crate, you will have a chance to either win the Jackpot, Regular Hero Chips, or another reward. Your chances of winning hero chips from the Wish Crate will ALWAYS increase whenever you open a Wish Crate without hero chips.
WISH_CRATE_CARD_1_BULLET_4_TITLE=Other Rewards at a Glance
WISH_CRATE_CARD_1_BULLET_4_TEXT=The Wish Crate can also drop other rewards that are specific to your selected hero, such as their Red Skill Chips, their memories, relevant mod fragments, and badges they need. Beyond that, the Wish Crate can also award generic rewards like gold, disk power, and even another jackpot of 30,000 Diamonds!
WISH_CRATE_CARD_2_TITLE=Choosing a Hero
WISH_CRATE_CARD_2_BULLET_1_TITLE=Different Starting Chances
WISH_CRATE_CARD_2_BULLET_1_TEXT=Each hero is placed into a specific category depending on how new that hero is and where their hero chips can be earned. Those categories determine the starting chances of winning the Regular Hero Chips.The New heroes will be the least likely to drop, while the Older heroes will be the most likely to drop.
WISH_CRATE_CARD_2_BULLET_2_TITLE=Jackpot Chance
WISH_CRATE_CARD_2_BULLET_2_TEXT=The Jackpot chances will always start at the same value regardless of the hero you choose.
WISH_CRATE_CARD_3_TITLE=Starting Chances
WISH_CRATE_CARD_3_BULLET_1_TITLE=Dynamic Chances
WISH_CRATE_CARD_3_BULLET_1_TEXT=All of the chances listed below ARE JUST THE STARTING CHANCES. Your chances may be different than what is displayed here.
WISH_CRATE_CARD_3_BULLET_2_TITLE=Starting Jackpot Chances
WISH_CRATE_CARD_3_BULLET_2_TEXT=Starting Jackpot Chance: 1%, All Other Rewards 99%
WISH_CRATE_CARD_3_BULLET_3_TITLE=Other Rewards Chances
WISH_CRATE_CARD_3_BULLET_3_TEXT=Remember, the hero you select will determine your starting chances for getting Hero Chips based off of their category. This will also affect the chances of the other types of rewards.
WISH_CRATE_CARD_3_BULLET_3A_TEXT=New Heroes: Hero Chips: 2%, Hero Specific Rewards: 35%, General Rewards: 63%
WISH_CRATE_CARD_3_BULLET_3B_TEXT=Recent Heroes: Hero Chips: 6%, Hero Specific Rewards: 35%, General Rewards: 59%
WISH_CRATE_CARD_3_BULLET_3C_TEXT=Older Heroes: Hero Chips: 10%, Hero Specific Rewards: 35%, General Rewards: 55%
WISH_CRATE_CARD_4_TITLE=Dynamic Chances
WISH_CRATE_CARD_4_BULLET_1_TITLE=Dynamic Jackpot Chances
WISH_CRATE_CARD_4_BULLET_1A_TEXT=The chances of winning hero chips in Jackpot or Regular quantities will change over time.
WISH_CRATE_CARD_4_BULLET_1B_TEXT=Each time you open a Wish Crate but don't win the Jackpot, will increase your chances of winning the Jackpot by AT LEAST 0.01% for the next Wish Crate.
WISH_CRATE_CARD_4_BULLET_1C_TEXT=Additionally, for every Buy 10, your Jackpot chances will increase by AT LEAST 0.05% BEFORE any of the crates have even been opened.
WISH_CRATE_CARD_4_BULLET_1D_TEXT=The Wish Crate works in a unique way which means your chances will increase with each wish AND the increase will grow over time, which makes getting the Jackpot even more likely!
WISH_CRATE_CARD_4_BULLET_1E_TEXT=Everytime you win the Jackpot, your Jackpot chances will reset.
WISH_CRATE_CARD_4_BULLET_2_TITLE=Dynamic Regular Hero Chip Chances
WISH_CRATE_CARD_4_BULLET_2A_TEXT=Your chances of winning hero chips from the Wish Crate will ALWAYS increase whenever you open a Wish Crate without hero chips.
WISH_CRATE_CARD_4_BULLET_2B_TEXT=Typically, every time you don't win the Jackpot AND you don't win the Regular Hero Chips, your chances of winning Regular Hero Chips will increase.
WISH_CRATE_CARD_4_BULLET_2C_TEXT=But remember, your chance of winning Regular Hero Chips is tied to if you win the Jackpot or not. This means your chance of getting Regular Hero Chips won't always be the same or increase by the same amount.
WISH_CRATE_CARD_4_BULLET_2D_TEXT=Additionally, every time you receive Regular Hero Chips or the Jackpot, your chances of getting Regular Hero Chips will reset.
WISH_CRATE_CARD_5_TITLE=Wish Crate Rewards
WISH_CRATE_CARD_5_BULLET_1_TITLE=Hero Chip Jackpot
WISH_CRATE_CARD_5_BULLET_1_TEXT=1000 Hero Chips for the chosen hero
WISH_CRATE_CARD_5_BULLET_2_TITLE=Hero Specific Rewards:
WISH_CRATE_CARD_5_BULLET_3_TITLE=Badges
WISH_CRATE_CARD_5_BULLET_3_TEXT=Only badges that are used by the chosen hero
WISH_CRATE_CARD_5_BULLET_3A_TEXT=The badges chosen will be for Ranks near the maximum Rank you have reached on any hero
WISH_CRATE_CARD_5_BULLET_4_TITLE=Red Skill Chips
WISH_CRATE_CARD_5_BULLET_4_TEXT=Only red skill chips for the chosen hero
WISH_CRATE_CARD_5_BULLET_4A_TEXT=The amount scales with your Team Level of the player
WISH_CRATE_CARD_5_BULLET_5_TITLE=Memories
WISH_CRATE_CARD_5_BULLET_5_TEXT=Only drops memories for the chosen hero
WISH_CRATE_CARD_5_BULLET_5A_TEXT=Only memories for disks that are not at 5 stars will be awarded
WISH_CRATE_CARD_5_BULLET_5B_TEXT=Otherwise it will provide a different Hero Specific Reward
WISH_CRATE_CARD_5_BULLET_6_TITLE=Mod Fragments
WISH_CRATE_CARD_5_BULLET_6_TEXT=Drops mod fragments for the mod types that are of the same color or type for the chosen hero
WISH_CRATE_CARD_5_BULLET_6A_TEXT=The mod fragments chosen will be for Tiers near the maximum Mod Tier you have reached on any Mod of the same color
WISH_CRATE_CARD_5_BULLET_7_TITLE=General Rewards
WISH_CRATE_CARD_5_BULLET_7_TEXT=Mod Power, Disk Power, Red Skill Crates, Gear Tokens, and Memory Tokens
WISH_CRATE_CARD_5_BULLET_7A_TEXT=All reward quantities except Memory Tokens will scale with your Team Level
WISH_CRATE_CARD_5_BULLET_7B_TEXT=There is also a small chance to earn 30,000 Diamonds
EVENT_TRIALS_CARD_1_TITLE=Overview
EVENT_TRIALS_CARD_1_BULLET_1_TITLE=Objective
EVENT_TRIALS_CARD_1_BULLET_1_TEXT=Help Fozzie take out the Creeps to earn a Victory and win some of his Hero Chips along the way!
EVENT_TRIALS_CARD_1_BULLET_2_TITLE=Rules
EVENT_TRIALS_CARD_1_BULLET_2_TEXT=Lineups are limited to three heroes (including Fozzie).
EVENT_TRIALS_CARD_1_BULLET_2A_TEXT=All heroes are at the max level, rank, skills and badges for the server.  Any equipped Memory Disks and Mods (tier and level) will also be at max.
EVENT_TRIALS_CARD_1_BULLET_3_TITLE=Duration
EVENT_TRIALS_CARD_1_BULLET_3_TEXT=This Trial is only available until the end of the 3rd Anniversary event or when all Hero Chips have been won, whichever comes first.
POWER_PROMOTE_CARD_1_TITLE=Power Promote
POWER_PROMOTE_CARD_1_BULLET_1_TITLE=Overview
POWER_PROMOTE_CARD_1_BULLET_1_TEXT=You can use Power Promote to easily promote a hero to any Rank you want just by using the slider
POWER_PROMOTE_CARD_1_BULLET_1A_TEXT=Power Promote uses all of the resources and items that you already have to make it the ultimate time saver!
POWER_PROMOTE_CARD_1_BULLET_3_TITLE=Resources
POWER_PROMOTE_CARD_1_BULLET_3_TEXT=If you can afford to Power Promote to the selected rarity, each popup will tell you exactly how much of each resource you will spend
POWER_PROMOTE_CARD_1_BULLET_3A_TEXT=If you cannot afford to Power Promote, the popup will tell you how many additional resources you will need.
POWER_PROMOTE_CARD_1_BULLET_3B_TEXT=The Stamina Popup isn't charging you triple! It is just letting you know the different ways you can pay for the remainder.
TRIALS_CARD_1_TITLE=Overview
TRIALS_CARD_1_BULLET_1_TITLE=What are Trials?
TRIALS_CARD_1_BULLET_1_TEXT=Trials are scheduled mini-events, each with unique rules, battles and rewards.
TRIALS_CARD_1_BULLET_2_TITLE=Daily Chances
TRIALS_CARD_1_BULLET_2_TEXT=Each Trial will give you a limited number of chances to complete it per day. The number of chances and the conditions for when a chance is used can vary per Trial, so make sure to check the rules for each one.
TRIALS_CARD_1_BULLET_3_TITLE=Cooldown Timers
TRIALS_CARD_1_BULLET_3_TEXT=There's a 10-minute cooldown after each Victory before you can try again. Cooldowns can be reduced or removed at certain VIP levels, so make sure to check out the VIP Benefits screen!
TRIALS_CARD_2_TITLE=Franchise Trials Overview
TRIALS_CARD_2_BULLET_1_TITLE=Rules
TRIALS_CARD_2_BULLET_1A_TEXT=There are 3 types of Franchise Trials - Major, Merge, and Unity. Franchise Trials are your main source of Patch Essence and limit you to only using Heroes that belong to its Featured Franchises.
TRIALS_CARD_2_BULLET_1B_TEXT=Major Franchise Trials feature 1 Franchise.
TRIALS_CARD_2_BULLET_1C_TEXT=Merge Franchise Trials feature 2-3 Franchises.
TRIALS_CARD_2_BULLET_1D_TEXT=Unity Franchise Trials showcase all of this Season's Featured Franchises.
TRIALS_CARD_2_BULLET_1E_TEXT=Each Season offers 3 Major or Merge Trials, and 1 Unity Franchise Trial.
TRIALS_CARD_2_BULLET_2_TITLE=Schedule
TRIALS_CARD_2_BULLET_2A_TEXT=Franchise Trial A: Open Sun, Mon, Thu.
TRIALS_CARD_2_BULLET_2B_TEXT=Franchise Trial B: Open Sun, Tue, Fri.
TRIALS_CARD_2_BULLET_2C_TEXT=Franchise Trial C: Open Sun, Wed, Sat.
TRIALS_CARD_2_BULLET_2D_TEXT=Unity Franchise Trial: Open every day.
TRIALS_CARD_2_BULLET_3_TITLE=Chances
TRIALS_CARD_2_BULLET_3_TEXT=Each Franchise Trial offers one chance per day, and a chance is only used when you earn a Victory.
TRIALS_CARD_2_BULLET_4_TITLE=Raiding
TRIALS_CARD_2_BULLET_4_TEXT=Speed up the time it takes to complete Franchise Trials by unlocking the Raid feature through VIP Benefits. When unlocked, you can Raid each Difficulty that you've earned a 3-Star Victory on this Season. Each Season, Franchise Trials' Stars are reset.
TEAM_TRIALS_CARD_1_TITLE=Team Trials Overview
TEAM_TRIALS_CARD_1_BULLET_1_TITLE=Rules
TEAM_TRIALS_CARD_1_BULLET_1_TEXT=There are three different Team Trials, one for each of the different Hero Teams (Red, Blue and Yellow). Each version will limit you to only using heroes that belong to the team for that Trial.
TEAM_TRIALS_CARD_1_BULLET_2_TITLE=Schedule
TEAM_TRIALS_CARD_1_BULLET_2_TEXT=Red Team: Open Sun, Tue, Fri.
TEAM_TRIALS_CARD_1_BULLET_2A_TEXT=Blue Team: Open Sun, Wed, Sat.
TEAM_TRIALS_CARD_1_BULLET_2B_TEXT=Yellow Team: Open Sun, Mon, Thu.
TEAM_TRIALS_CARD_1_BULLET_3_TITLE=Chances
TEAM_TRIALS_CARD_1_BULLET_3_TEXT=Each Team Trial will give you five chances per day and a chance will only be used when you earn a Victory. Earn additional chances either through VIP Perks or by using Team Trial Reset Items.
TEAM_TRIALS_CARD_1_BULLET_4_TITLE=Raiding
TEAM_TRIALS_CARD_1_BULLET_4_TEXT=Speed up the time it takes to complete Team Trials by unlocking the Raid feature through VIP Benefits. When unlocked, you can Raid each difficulty level that you've earned a 3-star Victory on.
TEAM_TRIALS_CARD_1_BULLET_5_TITLE=Difficulty
TEAM_TRIALS_CARD_1_BULLET_5_TEXT=The higher the difficulty level, the more and better rewards you'll receive!
TEAM_TRIALS_CARD_2_TITLE=Rewards & Heroes
TEAM_TRIALS_CARD_2_BULLET_1_TITLE=<mode_name> Rewards:
TEAM_TRIALS_CARD_2_BULLET_1_TEXT=<mode_rewards>
TEAM_TRIALS_CARD_2_BULLET_2_TITLE=<mode_name> Heroes:
TEAM_TRIALS_CARD_2_BULLET_2_TEXT=<mode_heroes>
PRIZE_WALL_CARD_1_TITLE=Overview
PRIZE_WALL_CARD_1_BULLET_1_TITLE=Win Big With The Prize Wall!
PRIZE_WALL_CARD_1_BULLET_1_TEXT=Each square on the wall has a reward behind it waiting for you - and one of them may include one grand prize! Don't be sad if your Prize Wall didn't contain a Grand Prize, you will be guaranteed to find one in the next one! So count your tokens because it's going to be worth it!
PRIZE_WALL_CARD_1_BULLET_2_TEXT=Every time you find the grand prize, the wall will reset and randomize all over again, furthermore the grand prize increases for even better future Jackpots!
PRIZE_WALL_CARD_1_BULLET_3_TEXT=Earn more tokens by completing special daily quests, achievements, or through limited time deals. Make sure to use them all - unused tokens will be removed at the end of the event.
PRIZE_WALL_CARD_1_BULLET_4_TEXT=Reach stages 30, 70 and 100 to earn special cosmetic rewards. These rewards are temporary and last for 7 days after the Prize Wall ends. Earn them again with each new Prize Wall!
PRIZE_WALL_CARD_2_TITLE=Grand Prize
PRIZE_WALL_CARD_2_BULLET_1_TITLE=Mastery Skins
PRIZE_WALL_CARD_2_BULLET_1_TEXT=The grand prize rewards you with mastery skin threads for the featured hero!
PRIZE_WALL_CARD_2_BULLET_2_TEXT=Mastery skins are exclusive cosmetics to bring a fun new flair to refreshed heroes! They're a great way to show off a style unique to the game.
PRIZE_WALL_CARD_2_BULLET_3_TEXT=There are 3 tiers you can unlock: Gold, Platinum, and Challenger. Each skin can be unlocked using the same threads, but at a scaling cost so make sure to earn as many threads as you can to unlock all three!
PRIZE_WALL_CARD_2_BULLET_4_TEXT=Unlocking these skins also allows you to earn special avatars by completing quests while the mastery skins are equipped on the hero. These medals are not time-limited, but they are meant to be challenging!
TRIAL_EVENT_CARD_1_TITLE=Trial Events Overview
TRIAL_EVENT_CARD_1_BULLET_1_TITLE=Limited Time Challenges
TRIAL_EVENT_CARD_1_BULLET_1_TEXT=Trial Events are limited-time events that provide a special challenge and extra rewards
TRIAL_EVENT_CARD_1_BULLET_2_TEXT=While the Trial is running, you will get a number of chances to fight per day, just like Team Trials
TRIAL_EVENT_CARD_1_BULLET_3_TITLE=Unique Gameplay
TRIAL_EVENT_CARD_1_BULLET_3_TEXT=Each Trial Event can be different and offer unique gameplay
TRIAL_EVENT_CARD_1_BULLET_4_TEXT=Some will be similar to the Team Trials while others might even be like a small campaign
TRIAL_EVENT_CARD_1_BULLET_5_TEXT=This means that rewards can be awarded differently depending on the Trial Type
TRIAL_EVENT_CARD_1_BULLET_6_TITLE=Special Rules
TRIAL_EVENT_CARD_1_BULLET_6_TEXT=Trials can also have special rules that modify the gameplay
TRIAL_EVENT_CARD_1_BULLET_7_TEXT=These rules can adjust how combat works or even what Heroes can be used
TRIAL_EVENT_CARD_1_BULLET_8_TITLE=Different Difficulties and Stages
TRIAL_EVENT_CARD_1_BULLET_8_TEXT=Some Trial Events might have multiple difficulties or stages, so make sure to select the difficulty that is right for you
TRIAL_EVENT_CARD_1_BULLET_9_TEXT=Beating a stage at one difficulty will NOT automatically beat the same stage at a lower difficulty
SKILL_TAGS_CARD_1_TITLE=Skill Tags Overview
SKILL_TAGS_CARD_1_BULLET_1_TITLE=Skill Tags
SKILL_TAGS_CARD_1_BULLET_1_TEXT=The Skill Tags tab offers a complete overview of what a Hero can do in combat by displaying all of their Skills' Tags in one place!
SKILL_TAGS_CARD_1_BULLET_1A_TEXT=A Skill Tag represents a single status or effect that a Hero can provide in combat.
SKILL_TAGS_CARD_1_BULLET_1B_TEXT=Each Skill Tag directly corresponds to an Individual Filter from Hero Filters.
SKILL_TAGS_CARD_1_BULLET_2_TITLE=Skill Tooltips
SKILL_TAGS_CARD_1_BULLET_2_TEXT=Skill Tags also display within Skill Tooltips to highlight the key components of a Skill.
SKILL_TAGS_CARD_1_BULLET_2A_TEXT=Tapping on a Skill Tag within a Skill's Tooltip will display an explanation of that Skill Tag's status or effect.
BATTLE_PASS_V2_CARD_1_TITLE=Battle Pass
BATTLE_PASS_V2_CARD_1_BULLET_1_TITLE=Event Details
BATTLE_PASS_V2_CARD_1_BULLET_1A_TEXT=Battle Pass events are a new way for you to earn rewards for playing the game and completing quests. You have one month from the beginning of each Battle Pass to make as much progress and earn as many rewards as you can.
BATTLE_PASS_V2_CARD_1_BULLET_2_TITLE=Seasons
BATTLE_PASS_V2_CARD_1_BULLET_2A_TEXT=The Battle Pass event runs for 4 weeks. This interval is called a season.
BATTLE_PASS_V2_CARD_2_TITLE=Making Progress
BATTLE_PASS_V2_CARD_2_BULLET_1_TITLE=Quest Points
BATTLE_PASS_V2_CARD_2_BULLET_1A_TEXT=Earn Quest Points to make progress through reward levels during a Battle Pass event. Quest Points are awarded when claiming most Quest rewards. (Free Stamina, Daily Deal and Commuter Quests are excluded).
BATTLE_PASS_V2_CARD_2_BULLET_2_TITLE=Daily Quest Point Limit
BATTLE_PASS_V2_CARD_2_BULLET_2A_TEXT=Each day you'll be limited to earning a particular amount of Quest Points towards your Battle Pass, make sure you're hitting that limit every day.
BATTLE_PASS_V2_CARD_2_BULLET_2B_TEXT=If you ever end up having less than needed total quests available in a day, don't worry, your quests will adjust to award you more points so you can still reach your limit.
BATTLE_PASS_V2_CARD_2_BULLET_3_TITLE=Quest Points Buyout
BATTLE_PASS_V2_CARD_2_BULLET_3A_TEXT=A few days before the end of the season you can buyout quest points needed for the completion of the season.
BATTLE_PASS_V2_CARD_3_TITLE=Rewards
BATTLE_PASS_V2_CARD_3_BULLET_1_TITLE=Free Rewards
BATTLE_PASS_V2_CARD_3_BULLET_1A_TEXT=Free rewards are available to everyone and you'll always get your first reward level for free! To collect more free rewards, keep earning enough Quest Points to reach the next reward level.
BATTLE_PASS_V2_CARD_3_BULLET_2_TITLE=Premium Rewards
BATTLE_PASS_V2_CARD_3_BULLET_2A_TEXT=Premium rewards give you access to much higher value rewards. These rewards are locked at the beginning of every Battle Pass event and can't be collected unless you have a Premium Pass.
BATTLE_PASS_V2_CARD_3_BULLET_3_TITLE=Premium Pass
BATTLE_PASS_V2_CARD_3_BULLET_3A_TEXT=The Premium Pass unlocks access to the Premium rewards and can be purchased by tapping the "Unlock" button. Premium passes only last for the duration of the current Battle Pass event.
BATTLE_PASS_V2_CARD_3_BULLET_3B_TEXT=You can buy a Premium Pass and unlock Premium rewards at any point during a Battle Pass event, but the best part is that you can then collect all the Premium rewards up to your current reward level!
BATTLE_PASS_V2_CARD_3_BULLET_4_TITLE=Scaling Rewards
BATTLE_PASS_V2_CARD_3_BULLET_4A_TEXT=Some reward quantities are affected by the server's max Team Level. Future Team Level increases, increase these rewards.
BATTLE_PASS_V2_CARD_3_BULLET_4B_TEXT=Rewards do not scale during an active Battle Pass season.
BATTLE_PASS_V2_PREMIUM_CARD_1_TITLE=Premium Pass
BATTLE_PASS_V2_PREMIUM_CARD_1_BULLET_1_TITLE=Premium Pass Details
BATTLE_PASS_V2_PREMIUM_CARD_1_BULLET_1A_TEXT=The Premium Pass unlocks access to the Premium rewards and can be purchased by tapping the "Unlock" button. Premium passes only last for the duration of the current Battle Pass event.
BATTLE_PASS_V2_PREMIUM_CARD_1_BULLET_1B_TEXT=You can buy a Premium Pass and unlock Premium rewards at any point during a Battle Pass event, but the best part is that you can then collect all the Premium rewards up to your current reward level!
BATTLE_PASS_V2_PREMIUM_CARD_1_BULLET_1C_TEXT=Purchasing a Premium Pass will also ensure that you have the opportunity to buyout quest points needed for the completion of the season before it ends!
PATCHED_HEROES_CARD_1_TITLE=Patch Overview
PATCHED_HEROES_CARD_1_BULLET_1_TITLE=What is Patch?
PATCHED_HEROES_CARD_1_BULLET_1A_TEXT=Patch is a powerful addition to Heroes that grants them exciting new Patch Talents and Core Stats.
PATCHED_HEROES_CARD_1_BULLET_1B_TEXT=For Heroes to become Patchable, they need to be Featured in a Franchise Trial during a Patch Season.
PATCHED_HEROES_CARD_1_BULLET_1C_TEXT=Once Featured, Heroes Red+10 and above can always be Patched.
PATCHED_HEROES_CARD_1_BULLET_1D_TEXT=Patching Heroes requires Patch Essence, which can be gained from the Franchise Trials.
PATCHED_HEROES_CARD_1_BULLET_1E_TEXT=Patch as many Heroes as you can to unlock everything Patch has to offer!
PATCHED_HEROES_CARD_1_BULLET_2_TITLE=Patch Talents and Levels
PATCHED_HEROES_CARD_1_BULLET_2A_TEXT=Patch Talents are powerful new combat Abilities for Patchable Heroes.
PATCHED_HEROES_CARD_1_BULLET_2B_TEXT=Each Hero can gain 5 Patch Talents.
PATCHED_HEROES_CARD_1_BULLET_2C_TEXT=Patch Talents unlock at 1 Star and reach their full potential at 5 Stars.
PATCHED_HEROES_CARD_1_BULLET_2D_TEXT=New Patch Talents are unlocked at Patch Levels 1, 6, 11, 16, and 21.
PATCHED_HEROES_CARD_1_BULLET_2E_TEXT=Each of those Talents are upgraded from 1 to 5 Stars, across Patch Levels 1-5, 6-10, 11-15, 16-20, and 21-25 respectively.
PATCHED_HEROES_CARD_1_BULLET_2F_TEXT=In addition to unlocking and upgrading Talents, each Patch Level added to a Hero also offers Core Stats.
PATCHED_HEROES_CARD_1_BULLET_3_TITLE=Patch Power
PATCHED_HEROES_CARD_1_BULLET_3A_TEXT=Patch Power multiplies the Core Stats granted by your Patch Levels.
PATCHED_HEROES_CARD_1_BULLET_3B_TEXT=Your Patch Power also sets your current Max Patch Level.
PATCHED_HEROES_CARD_1_BULLET_3C_TEXT=Each Patch Level gained across all of your Heroes gets you closer to the next Patch Power Milestone!
PATCHED_HEROES_CARD_1_BULLET_3D_TEXT=Check your progress towards Patch Power Milestones by tapping on "Patch Power" in any Heroes' Patch Tab.
PATCHED_HEROES_CARD_1_BULLET_3E_TEXT=You can find Heroes that need Patch Levels by using the Patch Sort option on the Heroes Screen
PATCHED_HEROES_CARD_1_BULLET_3F_TEXT=Add Patch Levels to all of your Heroes to reach peak Patch Power!
PATCHED_HEROES_CARD_1_BULLET_4_TITLE=Patch Essence and Tiers
PATCHED_HEROES_CARD_1_BULLET_4A_TEXT=Each Patch Level costs Patch Essence, a new Resource gathered during Franchise Trials.
PATCHED_HEROES_CARD_1_BULLET_4B_TEXT=Higher Patch Levels require higher Tier Essence.
PATCHED_HEROES_CARD_1_BULLET_4C_TEXT=Patch Levels 1-5 (for Talent 1) cost Tier 1 Essence.
PATCHED_HEROES_CARD_1_BULLET_4D_TEXT=Patch Levels 6-10 (for Talent 2) cost Tier 2 Essence.
PATCHED_HEROES_CARD_1_BULLET_4E_TEXT=Patch Levels 11-15 (for Talent 3) cost Tier 3 Essence.
PATCHED_HEROES_CARD_1_BULLET_4F_TEXT=Patch Levels 16-20 (for Talent 4) cost Tier 4 Essence.
PATCHED_HEROES_CARD_1_BULLET_4G_TEXT=Patch Levels 21-25 (for Talent 5) cost Tier 5 Essence.
PATCHED_HEROES_CARD_2_TITLE=Franchise Trial Overview
PATCHED_HEROES_CARD_2_BULLET_1_TITLE=Franchise Trials
PATCHED_HEROES_CARD_2_BULLET_1A_TEXT=Franchise Trials require the use of Heroes from Featured Franchises.
PATCHED_HEROES_CARD_2_BULLET_1B_TEXT=Higher difficulties offer various Tiers of Patch Essence.
PATCHED_HEROES_CARD_2_BULLET_1C_TEXT=There are three types of Franchise Trials: Major, Merge, and Unity.
PATCHED_HEROES_CARD_2_BULLET_1D_TEXT=Major Franchise Trials Feature 1 Franchise.
PATCHED_HEROES_CARD_2_BULLET_1E_TEXT=Merge Franchise Trials Feature 2 or more Franchises.
PATCHED_HEROES_CARD_2_BULLET_1F_TEXT=Unity Franchise Trials showcase all Featured Franchises from the ongoing Patch Season.
PATCHED_HEROES_CARD_2_BULLET_2_TITLE=Patch Seasons
PATCHED_HEROES_CARD_2_BULLET_2A_TEXT=Patch Seasons run every month.
PATCHED_HEROES_CARD_2_BULLET_2B_TEXT=Each Season Features different Franchises.
PATCHED_HEROES_CARD_2_BULLET_2C_TEXT=Eventually all Franchises will be Featured!
PATCHED_HEROES_CARD_2_BULLET_2D_TEXT=Seasons offer 4 Franchise Trials - 3 Major or Merge, and 1 Unity - that are available on specific days.
PATCHED_HEROES_CARD_2_BULLET_3_TITLE=Franchise Trial Schedule
PATCHED_HEROES_CARD_2_BULLET_3A_TEXT=Major or Merge Trial A: Open Sun, Mon, Thu.
PATCHED_HEROES_CARD_2_BULLET_3B_TEXT=Major or Merge Trial B: Open Sun, Tue, Fri.
PATCHED_HEROES_CARD_2_BULLET_3C_TEXT=Major or Merge Trial C: Open Sun, Wed, Sat.
PATCHED_HEROES_CARD_2_BULLET_3D_TEXT=Unity Trial: Open daily.
PATCHED_HEROES_CARD_3_TITLE=Patch talents
EMERALD_RANK_CARD_1_TITLE=Emerald Rank Overview
EMERALD_RANK_CARD_1_BULLET_1_TITLE=What is Emerald Rank
EMERALD_RANK_CARD_1_BULLET_1A_TEXT=Emerald Rank is the next big Rank milestone after Yellow and unlocks the ability for you to create Subclasses for your Heroes!
EMERALD_RANK_CARD_1_BULLET_2_TITLE=How Does it Work?
EMERALD_RANK_CARD_1_BULLET_2A_TEXT=Upon promoting to the first Rank of Emerald, Heroes will unlock Subclasses and gain enough stats to have at least 390 of each Level Scaling Stat. Level Scaling Stats that are already at or above 390 will not be affected.
EMERALD_RANK_CARD_1_BULLET_2B_TEXT=Hero Subclasses are comprised of a combination of Stat Slots. Stat Slots can be filled in by selecting one of the seven Level Scaling Stats from the drop down menu.
EMERALD_RANK_CARD_1_BULLET_2C_TEXT=These selections will grant that Hero an amount of each selected Level Scaling Stat to be used in combat.
EMERALD_RANK_CARD_1_BULLET_2D_TEXT=If you don't want to make a choice right away that's ok! These Stat Slots will come pre filled with default selections so your Hero is ready for battle right after promoting!
EMERALD_RANK_CARD_2_TITLE=Creating a Subclass!
EMERALD_RANK_CARD_2_BULLET_1_TITLE=Choose Your Stats!
EMERALD_RANK_CARD_2_BULLET_1A_TEXT=To create a Subclass for a Hero all you need to do is select the Level Scaling Stats that you think work best for them!
EMERALD_RANK_CARD_2_BULLET_1B_TEXT=Heroes will only gain stats for the Level Scaling Stats you have selected and you cannot select the same stat more than once.
EMERALD_RANK_CARD_2_BULLET_1D_TEXT=After selecting a stat you'll be able to see its new base effectiveness against max level enemies in the stat selection tooltip.
EMERALD_RANK_CARD_2_BULLET_1E_TEXT=Feel free to experiment with different stat combinations since there is no cost to changing your stat selections!
EMERALD_RANK_CARD_2_BULLET_2_TITLE=Emerald Stat Tiers
EMERALD_RANK_CARD_2_BULLET_2A_TEXT=Every Hero is assigned an Emerald Stat Tier, ranging from 1-3.
EMERALD_RANK_CARD_2_BULLET_2B_TEXT=These Tiers control how many Stat Slots a Hero has available.
EMERALD_RANK_CARD_2_BULLET_2C_TEXT=Tier 1 Heroes gain the most, while Tier 3 Heroes gain the least.
EMERALD_RANK_CARD_2_BULLET_2D_TEXT=Tier assignments may change over time.
EMERALD_RANK_CARD_2_BULLET_3_TITLE=Maintaining Maximum Effectiveness for Subclasses
EMERALD_RANK_CARD_2_BULLET_3A_TEXT=To keep up with increasing Team Levels, Heroes will need to keep gaining Level Scaling Stats to maintain the effectiveness of their Subclasses.
EMERALD_RANK_CARD_2_BULLET_3B_TEXT=For each Rank, from Emerald +1 and on, 5 of each Level Scaling Stat will be available within a single Badge.
EMERALD_RANK_CARD_2_BULLET_3C_TEXT=Promote your Heroes to max Rank and equip your Badges to ensure that your Subclasses remain as effective as possible.
EMERALD_RANK_CARD_2_BULLET_4_TITLE=Max Effectiveness for Level Scaling Stats
EMERALD_RANK_CARD_2_BULLET_4A_TEXT=Normal and Fantastic Crit each have a max effectiveness of 200%.
EMERALD_RANK_CARD_2_BULLET_4B_TEXT=Armor and Reality Negation, as well as Crit Damage each have a max effectiveness of 100%.
EMERALD_RANK_CARD_2_BULLET_4C_TEXT=Tenacity and Evasion each have a max effectiveness of 90%.
EMERALD_RANK_CARD_2_BULLET_5_TITLE=Max Stat Warnings
EMERALD_RANK_CARD_2_BULLET_5A_TEXT=When selecting stats you'll be notified if that particular stat already had max effectiveness from other sources on the Hero.
EMERALD_RANK_CARD_2_BULLET_5B_TEXT=When this happens you should consider choosing a different stat for that Hero since they won't be gaining any extra benefit from it.
EMERALD_RANK_CARD_2_BULLET_5C_TEXT=You can turn these warnings off on the Edit Subclass screen or in your Settings if you don't want to see them.
EMERALD_RANK_CARD_3_TITLE=How do Level Scaling Stats Work?
EMERALD_RANK_CARD_3_BULLET_1_TITLE=Armor Negation
EMERALD_RANK_CARD_3_BULLET_1A_TEXT=Armor Negation reduces an enemy's Armor allowing you to do more Normal Damage. Each point of Armor Negation above an enemy's level reduces that enemy's Armor by 1% down to 0 Armor.
EMERALD_RANK_CARD_3_BULLET_2_TITLE=Reality Negation
EMERALD_RANK_CARD_3_BULLET_2A_TEXT=Realiy Negation works just like Armor Negation, but for Reality and Fantastic Damage.
EMERALD_RANK_CARD_3_BULLET_3_TITLE=Normal Crit
EMERALD_RANK_CARD_3_BULLET_3A_TEXT=The Normal Crit stat increases the chance that your attacks that do Normal Damage will result in a critical strike. Each point of Normal Crit you have above an enemy's level increases your chance of doing twice as much damage, up to a 100% chance.
EMERALD_RANK_CARD_3_BULLET_4_TITLE=Fantastic Crit
EMERALD_RANK_CARD_3_BULLET_4A_TEXT=Fantastic Crit works just like Normal Crit, but on attacks that do Fantastic Damage.
EMERALD_RANK_CARD_3_BULLET_5_TITLE=Super Crits
EMERALD_RANK_CARD_3_BULLET_5A_TEXT=Every point of Normal Crit above 100 more than the enemy's level equates to a 1% chance to Super Crit. Super Crits deal triple the usual amount of damage. If you have Super Crit chance and you don't Super Crit, you are guaranteed to Normal Crit. Super Critting with Fantastic Damage works just like Normal Damage. Each point of Fantastic Crit above 100 over the enemy's level is a 1% chance to Super Crit.
EMERALD_RANK_CARD_3_BULLET_6_TITLE=Crit Damage
EMERALD_RANK_CARD_3_BULLET_6A_TEXT=Crit Damage increases the damage done by both your hero's Normal and Fantastic critical strikes. Each point of Crit Damage you have above an enemy's level increases your crit damage by 1%, up to 100% more.
EMERALD_RANK_CARD_3_BULLET_7_TITLE=Tenacity
EMERALD_RANK_CARD_3_BULLET_7A_TEXT=Tenacity reduces the length of stuns and disables a hero receives. Each point of Tenacity above the enemy's skill level reduces the length of a stun or disable by 1% up to a max of 90% reduction.
EMERALD_RANK_CARD_3_BULLET_8_TITLE=Evasion
EMERALD_RANK_CARD_3_BULLET_8A_TEXT=Evasion gives heroes a chance to avoid enemy disables. Each point of Evasion above the enemy's skill level increases your chances of avoiding a disable by 1%, up to 90%. If a disable is avoided, any other effects on the skill still resolve.
