FRENZIED_VENGEANCE=Frenzied Vengeance
FRENZIED_VENGEANCE_DESCRIPTION=When this Hero falls below <healthPercent> of their Max HP, they Cleanse themself and go Berserk for <berserkDuration> seconds. While this Hero is Berserk, if an enemy is KO'd, this Hero is Healed up to <healPercent> of their Max HP. This can happen once every <berserkCooldown> seconds.
FRENZIED_VENGEANCE_DELTA=+<healPercent> Healing
INVINCIBLE_RETRIBUTION=Invincible Retribution
INVINCIBLE_RETRIBUTION_DESCRIPTION=Once per wave when this Hero falls below <healthPercent> of their Max HP, they become Invincible for <invincibleDuration> seconds. When this happens, other allies gain <increaseBdSpPercent> Basic Damage and Skill Power for the rest of the wave. These Basic Damage and Skill Power Increases cannot be Removed.
INVINCIBLE_RETRIBUTION_DELTA=+<increaseBdSpPercent> Basic Damage and Skill Power
REFLECTIVE_REFUGE=Reflective Refuge
REFLECTIVE_REFUGE_DESCRIPTION=When this Hero falls below <healthPercent> of their Max HP, they gain Reflect for <reflectDuration> seconds and are Healed for <healPercent> of their Max HP. This can happen once per <reflectCooldown> seconds.
REFLECTIVE_REFUGE_DELTA=+<reflectDuration> seconds
REFLECTION_WEAKEN=Reflection Weaken
REFLECTION_WEAKEN_DESCRIPTION=When this Hero would damage or Debuff enemies with Reflect, that Reflect is Removed and those enemies gain <weakAmt> stacks of Weakness for <weakDuration> seconds. This can happen to each enemy once every <weakCooldown> seconds.
REFLECTION_WEAKEN_DELTA=+<weakAmt> Stacks of Weakness
EXTREME_ACCURACY=Extreme Accuracy
EXTREME_ACCURACY_DESCRIPTION=When this Hero triggers Precise, targets have their Tenacity Reduced by <tenacityReducePercent> and are Sapped for <debuffDuration> seconds. Invisible targets also have their Invisibility Removed.
EXTREME_ACCURACY_DELTA=+<tenacityReducePercent> Tenacity Reduction
HAUNT=Haunt
HAUNT_DESCRIPTION=When this Hero gains Invisibility, all enemies are Sapped and Cursed for <sapCurseDuration> seconds. This can happen once every <sapCurseCooldown> seconds. While Invisible, this Hero deals <increasedDamagePercent> Increased Damage to enemies below <healthPercent> of their Max HP.
HAUNT_DELTA=+<increasedDamagePercent> Increased Damage
INVINCIBLE_MOMENTUM=Invincible Momentum
INVINCIBLE_MOMENTUM_DESCRIPTION=While Invincible, Basic Attacks from this Hero deal an additional <trueDamagePercent> of their Max HP as True Damage. When this Hero loses Invincibility, all enemies are Stunned for <stunDuration> seconds. This can happen once every <stunCooldown> seconds.
INVINCIBLE_MOMENTUM_DELTA=+<trueDamagePercent> True Damage
ENABLING_SHIELD=Enabling Shield
ENABLING_SHIELD_DESCRIPTION=While Shielded, this Hero is Immune to Disables. When a Disable would be applied, this Hero instead gains <shieldPercent> of their Max HP as a Shield for <shieldDuration> seconds. This can happen once every <shieldCooldown> seconds.\n\nDisables include Stun, Freeze, Blind, Silence, and Charm.
ENABLING_SHIELD_DELTA=+<shieldPercent> Shielding
DEVASTATING_BLOWS=Devastating Blows
DEVASTATING_BLOWS_DESCRIPTION=When this Hero damages Shielded enemies, those enemies lose all Shielding and are Shattered and Pierced for <shatterPierceDuration> seconds. This can happen once every <shatterPierceCooldown> seconds.
DEVASTATING_BLOWS_DELTA=+<shatterPierceDuration> seconds
SHREWD_STRIKES=Shrewd Strikes
SHREWD_STRIKES_DESCRIPTION=Damage from this Hero ignores <ignorePercent> of enemy Damage Reduction.
SHREWD_STRIKES_DELTA=+<ignorePercent> Reduction Ignored
CORRUPTED_DOSE=Corrupted Dose
CORRUPTED_DOSE_DESCRIPTION=When this Hero damages an enemy who had been Healed within the last <healRecencyTime> seconds, that enemy is Cursed for <curseDuration> seconds.|If enemies are Healed while Cursed, they take <trueDamagePercent> of their Max HP as True Damage. Each enemy can be damaged this way once every <damageCooldown> seconds.
CORRUPTED_DOSE_DELTA=+<trueDamagePercent> True Damage
BOUNTIFUL_GROWTH=Bountiful Growth
BOUNTIFUL_GROWTH_DESCRIPTION=This Hero is Immune to Reductions in Max HP. Once per wave, when this Hero benefits from Heal over Time for <goalDuration> total seconds, they gain <growthPercent> Max HP and continue Healing for <healPercent> of their Max HP each second for the rest of the wave. These Buffs cannot be Removed.
BOUNTIFUL_GROWTH_DELTA=+<growthPercent> Max HP
FREEZE_FRACTURE=Freeze Fracture
FREEZE_FRACTURE_DESCRIPTION=When this Hero Freezes enemies, those enemies are also Shattered for <shatterDuration> seconds.|When enemies Frozen by any source remain Frozen for <goalDuration> seconds, those enemies take <fantasticDamagePercent> of their Max HP as Fantastic Damage. Each enemy can take damage this way once every <damageCooldown> seconds.
FREEZE_FRACTURE_DELTA=+<fantasticDamagePercent> Fantastic Damage
AUGMENTED_STUN=Augmented Stun
AUGMENTED_STUN_DESCRIPTION=Stuns from this Hero Reduce enemy Tenacity by <tenacityReducePercent>, and prevent enemies from being Cleansed for their duration. Enemies Stunned by this Hero also gain <weakAmt> stacks of Weakness for <weakDuration> seconds.
AUGMENTED_STUN_DELTA=+<weakAmt> stacks of Weakness
DEVIOUS_PLOT=Devious Plot
DEVIOUS_PLOT_DESCRIPTION=This Hero starts combat Invisible for <initInvisDuration> seconds. Each time an enemy is KO'd, this Hero gains <increaseBdSpPercent> Basic Damage and Skill Power for the rest of the wave, and gains Invisibility for <koInvisDuration> seconds.
DEVIOUS_PLOT_DELTA=+<increaseBdSpPercent> Basic Damage and Skill Power
ATTENTIVE_HONING=Attentive Honing
ATTENTIVE_HONING_DESCRIPTION=This Hero is Immune to Distract. This Hero favors an enemy players choose at the start of each wave. When this Hero uses "<skill1>", players can choose a new favored enemy. If on Auto, this Hero chooses the enemy with the least HP.|When this Hero damages the favored enemy, <trueDamagePercent> of that damage is converted into True Damage.
ATTENTIVE_HONING_DELTA=+<trueDamagePercent> True Damage
EXHAUSTING_ATTACKS=Exhausting Attacks
EXHAUSTING_ATTACKS_DESCRIPTION=Basic Attacks from this Hero Remove <removeBuffAmt> random Buffs from targets hit, and apply <fatigueAmt> stacks of Fatigue. While Fatigued from any source, enemies deal <reduceDmgDealtPercent> less damage.
EXHAUSTING_ATTACKS_DELTA=+<reduceDmgDealtPercent> Damage Reduction
FORTIFYING_CLEANSE=Fortifying Cleanse
FORTIFYING_CLEANSE_DESCRIPTION=Cleanses from this Hero also grant <hardyAmt> stacks of Hardy. Each Hero can gain Hardy this way once every <hardyCooldown> seconds. While this Hero or allies benefit from Hardy, they take <reduceDmgTakenPercent> Reduced Damage.
FORTIFYING_CLEANSE_DELTA=+<reduceDmgTakenPercent> Damage Reduction
INVINCIBLE_REJUVENATION=Invincible Rejuvenation
INVINCIBLE_REJUVENATION_DESCRIPTION=When this Hero loses their last stacks of Hardy or Fatigue, they become Immune to Debuffs and gain Invincibility for <invincibleDuration> seconds. During this time, this Hero Heals for <healPercent> of their Max HP each second. This can happen once every <invincibleCooldown> seconds.
INVINCIBLE_REJUVENATION_DELTA=+<healPercent> Healing
FRUITFUL_REVENGE=Fruitful Revenge
FRUITFUL_REVENGE_DESCRIPTION=When this Hero is KO'd, all of their allies get Cleansed and Heal for <healPercent> of their Max HP. The enemy responsible for the KO has all of their Hardy Stacks removed, gains <weaknessStackAmt> stacks of Weakness, and becomes Hexed for <weaknessHexDuration> seconds. These Weakness and Hex effects cannot be removed by Cleanse.| This Talent triggers once per wave and can only happen when this Hero has at least one surviving ally.
FRUITFUL_REVENGE_DELTA=+<healPercent> Healing
TIRELESS=Tireless
TIRELESS_DESCRIPTION=This Hero and all allies are Immune to Fatigue. When enemies would apply stacks of Fatigue, they instead lose <removeBuffAmt> random Buffs. This can happen to each enemy once every second.
TIRELESS_DELTA=+<removeBuffAmt> Buffs Removed
TENDERIZE=Tenderize
TENDERIZE_DESCRIPTION=When this Hero Heals or Buffs allies, all enemies lose <removeHardyAmt> stacks of Hardy. For each stack of Hardy Removed this way, enemies also lose a Random Buff.
TENDERIZE_DELTA=+<removeHardyAmt> Stacks Removed
LACERATE=Lacerate
LACERATE_DESCRIPTION=When this Hero deals non-Damage Over Time damage, they also deal <bonusDmgPercent> of that damage as additional Damage Over Time across the next <debuffDuration> seconds.|When this Hero deals Damage Over Time, the damage is increased by <dotAmplifyPercent>, stretched across <dotAmplifyPercent> more time. Each time enemies suffer from Damage Over Time, they also lose <reduceSpeedPercent> Movement and Attack Speed for <debuffDuration> seconds.
LACERATE_DELTA=+<dotAmplifyPercent> Damage and Duration
ALLURING_LOYALTY=Alluring Loyalty
ALLURING_LOYALTY_DESCRIPTION=Charms from this Hero cannot be Cleansed.|When this Hero Heals or Buffs allies, the enemy with the highest Basic Damage is Charmed for <charmDuration> seconds. This can happen once every <charmCooldown> seconds.|While any enemy is Charmed by any source, this Hero, all allies, and Charmed enemies gain <increaseSpeedPercent> Movement and Attack Speed.
ALLURING_LOYALTY_DELTA=+<increaseSpeedPercent> Movement and Attack Speed
