ARMOR_DEBILITATION=Armor Debilitation
ARMOR_DEBILITATION_DESCRIPTION=When this Hero Debuffs enemies, those enemies lose <reduceArmorPercent> Armor for <debuffDuration> seconds. This can happen to each enemy once every <reduceCooldown> seconds.
