MOWGLI_RED=Gentle Help
MOWGLI_RED_DESCRIPTION=Mowgli and his allies Armor and Reality cannot be negated.|If Mowgli has not Healed any ally for <noHealDur> seconds, he grants himself and all allies <enduranceAmt> Endurance stacks and Overload for <overloadDur> seconds.|After the "<skill2>" Armor and Reality Increase ends, if the allies still have at least <hardyAmt> Hardy stacks they become Berserk for <berserkDur> seconds. This effect can happen <berserkAmt> times per wave.|"<skill4>" additionally grants all allies <normalFantasticCritAmt> Normal and Fantastic Crit, and <critDamageAmt> Crit Damage.
