BENJAMIN_FRANKLIN_GATES_GREEN_DESCRIPTION=Benjamin Franklin Gates takes the Declaration of Independence from his document holder, dealing <dmgAmt> Normal Damage per second for <dmgDur> seconds to all enemies and making the <enemyAmt> enemies with most Skill Power or Basic Damage, to deal <reduceDmgPer> reduced Damage for the next <dmgReductionNextSec> seconds.|When the Reduced Damaged Dealt effect is over, the target enemies are dealt <dmgPer> more damage for the next <increasedDmgDur> seconds.
BENJAMIN_FRANKLIN_GATES_GREEN_DELTA=+<dmgAmt> Normal Damage
BENJAMIN_FRANKLIN_GATES_BLUE=Threat Scanner
BENJAMIN_FRANKLIN_GATES_BLUE_DESCRIPTION=Benjamin Franklin Gates puts on his Ocular Device to Study, Scare, Shatter and Pierce the <enemyAmt> enemy with most Skill Power or Basic Damage for <debuffDur> seconds and forces that target to Distract <allyAmt> of Benjamin's allies for <distractDur> seconds. Benjamin also grants <momentumStacks> Momentum Stacks to all allies and Removes all Momentum Buffs from the enemy team.|Additionally, Benjamin deals <dmgAmt> Normal Damage to <enemyAmt> enemies that were not targeted with the debuffs.
BENJAMIN_FRANKLIN_GATES_BLUE_DELTA=+<dmgAmt> Normal Damage
BENJAMIN_FRANKLIN_GATES_PURPLE=Wayfinder Torch
BENJAMIN_FRANKLIN_GATES_PURPLE_DESCRIPTION=Benjamin Franklin Gates and his allies are Immune to Normal Crit and Fantastic Crit damage. Every time the enemy attempts to Crit Benjamin or an ally, Benjamin prevents Max HP increases on that target for the next <maxHpPreventionDur> seconds. This effect can only happen once every <maxHpPreventionCooldown> seconds.|If an ally falls below <hpPer> HP and has less than <momentumStacks> Momentum Stacks, Benjamin Franklin Gates grants them Invincibility for <invincibleDur> seconds. This effect can only happen once every <invincibleCooldown> seconds.|After an enemy gets their Damage Dealt Reduced, Benjamin Increases the Skill Power and Basic Damage for <spBdncreasePer> of the <allyAmt> allies with most Skill Power or Basic Damage for <statIncreaseDur> seconds.
BENJAMIN_FRANKLIN_GATES_PURPLE_EXTRA=Skill Power and Basic Damage Increase have a chance to fail if Allies are above level <lvl>.
BENJAMIN_FRANKLIN_GATES_PURPLE_DELTA=+<lvl> Level
BENJAMIN_FRANKLIN_GATES_RED=Relic Pipe
BENJAMIN_FRANKLIN_GATES_RED_DESCRIPTION=If Benjamin Franklin Gates fails to apply any debuff from "<Skill3>" to each enemy, he additionally applies Hex and Drain for <hexDrainDur> seconds to that same target.|The ally with the highest Skill Power or Basic Damage stores the damage they fail to deal while the target enemy is Invincible. When the enemy Invincibility is over, that ally immediately deals <dmgPer> of the stored damage to them, up to a maximum of <dmgAmt> damage. |When an enemy deals more than <enemyDmgPer> of an ally's Max HP in one hit, Benjamin applies Stun for <stunDur> seconds, grants <weaknessStacks> Weakness Stacks and <decayStacks> Decay Stacks. This effect can only happen every <debuffCooldown> seconds.
SCUTTLE_WHITE=Goofy Lookout
SCUTTLE_WHITE_DESCRIPTION=Passive: Scuttle deals <dmgIncreasePer> Increased Normal Damage when above <maxHpDmgPer> Max HP. Additionally, when Healed above <hpAbovePer> HP of his current Max HP, his Max HP increases by <maxHpPer> of his base Max HP. This effect can happen once every <secAmt> seconds. Scuttle can have up to a maximum of <maxHpMaxAmt> Max HP this way, and it resets between waves.|Active: Scuttle grabs a monocular and looks through it backwards, marking the <enemyAmt> enemy with the most Max HP, dealing <dmgAmt> Normal Damage, Hexing them for <hexDur> seconds, and decreasing <armorRealityPer> of their Armor and Reality for <armorRealityDur> seconds.|Additionally, Scuttle will gain back <hpPer> of the HP enemies had before he hit them.
SCUTTLE_WHITE_DELTA=+<maxHpMaxAmt> Max HP, +<dmgAmt> Normal Damage
SCUTTLE_GREEN=Bird Nod
SCUTTLE_GREEN_DESCRIPTION=Scuttle makes an acknowledging gesture with his wing on his head, increasing his Max HP by <maxHpAmt> for <maxHpDur> seconds and Healing for <hpPer> of his Max HP.|Any enemy that hits Scuttle in the next <nextSecs> seconds after this skill is activated will be dealt <dmgAmt> Normal Damage. Scuttle can only damage each enemy this way once every <retaliationCd> seconds.
SCUTTLE_GREEN_DELTA=+<maxHpAmt> Max HP, +<dmgAmt> Normal Damage
SCUTTLE_BLUE=Bad Notes
SCUTTLE_BLUE_DESCRIPTION=Scuttle sings very poorly and loudly, Distracting <enemyAmt> enemies with the highest Max HP for <distractDur> seconds. For each hit, enemies will deal <dmgReducedPer> reduced Damage, have their Max HP decreased by <maxHPDecreasePer> and get <buffAmt> buffs removed.|When the Distract is over, Scuttle will deal <dmgPer> Normal Damage of the total damage received to the target enemies and Heal by <healAmt> HP.
SCUTTLE_BLUE_DELTA=+<healAmt> HP
SCUTTLE_PURPLE=Hair Fork
SCUTTLE_PURPLE_DESCRIPTION=Scuttle gains <attackMovSpeedPer> Attack and Movement Speed whenever he is above <maxHPPer> Max HP.|Scuttle gains <armorRealityAmt> Armor and Reality and <enduranceAmt> Endurance Stacks for each second he is Disabled or Hexed. Scuttle can gain a maximum of <armorRealityMaxAmt> Armor and Reality this way.|The enemy with the highest Max HP will always be Pierced and Shattered by Scuttle. If that target enemy has a Shield, Scuttle gains <momentumAmt> Momentum Stacks for each hit.
SCUTTLE_PURPLE_EXTRA=Disables include Stun, Freeze, Blind, Silence and Charm.
SCUTTLE_PURPLE_DELTA=+<armorRealityAmt> Armor and Reality
SCUTTLE_RED=Pipe Noises
SCUTTLE_RED_DESCRIPTION=When Scuttle reaches below <lowHpPer> HP, he gains <highHpAmt> HP. This can happen <timesMax> times per wave. This time per wave can increase by <timePerWaveAmt> time for each KO'd enemy. This effect cannot be affected by Curse.|All enemy heroes with higher Max HP than Scuttle will have their Tenacity and Evasion decreased by <tenEvaDecreasePer>.|Every time Scuttle is the "Most Wanted", he will be Immune to Max HP Decreases and gain <critDmgAmt> Crit Damage.
SCUTTLE_RED_STAT_BOOSTS=+<critDmgAmt> Crit Damage
