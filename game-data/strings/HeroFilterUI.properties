NORMAL_DAMAGE_FULLDAMAGE_DESCRIPTION=These Heroes deal only Normal Damage with their skills.
FANTASTIC_DAMAGE_FULLDAMAGE=Fantastic Damage Only
FANTASTIC_DAMAGE_FULLDAMAGE_DESCRIPTION=These Heroes deal only Fantastic Damage with their skills.
TRUE_DAMAGE_FULLDAMAGE=True Damage Only
TRUE_DAMAGE_FULLDAMAGE_DESCRIPTION=These Heroes deal only True Damage with their skills.
STUN=Stun
STUN_DESCRIPTION=Stunned units are unable to move, attack, or use skills.
FREEZE=Freeze
FREEZE_DESCRIPTION=Units affected by Freeze slowly become unable to move, attack, or use skills for a period of time.
BLIND=Blind
BLIND_DESCRIPTION=Basic attacks from Blinded units always miss.
SILENCE=Silence
SILENCE_DESCRIPTION=Silenced units are unable to use skills.
CHARM=Charm
CHARM_DESCRIPTION=Charmed units attack their allies but are still targeted by their enemies. Charmed units cannot use their White Skills.
DISTRACT=Distract
DISTRACT_DESCRIPTION=Distracted units target all of their skills and attacks towards the enemy causing the Distraction.
CURSE=Curse
CURSE_DESCRIPTION=All healing received by Cursed units is reduced by half.
HEX=Hex
HEX_DESCRIPTION=Hexed units will be Stunned when using their White Skill. They still consume energy when when this happens.
ENERGY_REMOVAL=Energy Removal
ENERGY_REMOVAL_DESCRIPTION=Instantly removes an amount of energy from the target.
SAP=Sap
SAP_DESCRIPTION=All energy gained by Sapped units is reduced by half.
STUDY=Study
STUDY_DESCRIPTION=Normal Damage always Crits against Studied units.
SCARE=Scare
SCARE_DESCRIPTION=Fantastic Damage always Crits against Scared units.
PIERCE=Pierce
PIERCE_DESCRIPTION=Pierced units take 5% of their Max HP as True Damage each time they are dealt Normal Damage. Skills that deal damage over time can only trigger Pierce once per second.
SHATTER=Shatter
SHATTER_DESCRIPTION=Shattered units take 8% of their Max HP as True Damage each time they are dealt Fantastic Damage. Skills that deal damage over time can only trigger Shatter once per second.
FATIGUE=Fatigue
FATIGUE_DESCRIPTION=Each stack of Fatigue on a unit will block one buff from being applied to it.
WEAKNESS=Weakness
WEAKNESS_DESCRIPTION=Enemies with Weakness take 10% more damage per stack and can only have a max of 5 stacks.
KNOCKBACK=Knock Back
KNOCKBACK_DESCRIPTION=Pushes the target back a distance.
SNARE=Snare
SNARE_DESCRIPTION=Snared enemies have their Movement Speed reduced to 0%. They can still use Basic Attacks and Skills that are within range.
DAMAGE_OVER_TIME=Damage Over Time
DAMAGE_OVER_TIME_DESCRIPTION=Damage is dealt over a period of time to the target.
REMOVE_BUFF=Remove Buff
REMOVE_BUFF_DESCRIPTION=Removes specific Buffs or a number of Buffs from the target.
REDUCED_DAMAGE_DEALT=Reduced Damage Dealt
REDUCED_DAMAGE_DEALT_DESCRIPTION=Unit deals reduced damage for an amount of time.
INCREASED_DAMAGE_TAKEN=Increased Damage Taken
INCREASED_DAMAGE_TAKEN_DESCRIPTION=While this Effect is active, unit takes increased damage.
LIMIT=Limit
LIMIT_DESCRIPTION=Limited units have their Skill levels reduced by 50%. Reductions are always rounded down.
DECAY=Decay
DECAY_DESCRIPTION=Each stack of Decay on a unit blocks Cleanse from being applied once. Enemies can have a maximum of 3 stacks.
DRAIN=Drain
DRAIN_DESCRIPTION=Drained units lose 50 Energy per second.
CORRUPTION=Corruption
CORRUPTION_DESCRIPTION=Each stack of Corruption reduces an enemy's Healable HP by 20%. Enemies can have a maximum of 4 stacks.
CONFUSION=Confusion
CONFUSION_DESCRIPTION=Confusion allows units to initiate Basic Attacks and Skills that require an animation but interrupts them, preventing them from finishing. Skills interrupted in this way will still consume Energy and go on Cooldown.\n\nConfusion does not work against Revives.
MOST_WANTED=Most Wanted
MOST_WANTED_DESCRIPTION=The Most Wanted enemy is the one who has dealt the most damage in the battle.
VULNERABLE=Vulnerable
VULNERABLE_DESCRIPTION=Vulnerable heroes receive 5% of their max HP as True Damage each time they receive a buff. The same hero cannot trigger this effect on the same target more than once every 0.5 seconds.
DECEPTION=Deception
DECEPTION_DESCRIPTION=Deception makes all enemies lose Armor and Tenacity
HEAL_SELF=Heal Self
HEAL_SELF_DESCRIPTION=Heals self.
HEAL_TEAM=Heal Team
HEAL_TEAM_DESCRIPTION=Can heal at least one ally.
HEAL_OVER_TIME_SELF=Heal Over Time Self
HEAL_OVER_TIME_SELF_DESCRIPTION=Heals self over a period of time
HEAL_OVER_TIME_TEAM=Heal Over Time Team
HEAL_OVER_TIME_TEAM_DESCRIPTION=Can heal at least one ally over a period of time.
SHIELD_SELF=Shield Self
SHIELD_SELF_DESCRIPTION=Shields self.
SHIELD_TEAM=Shield Team
SHIELD_TEAM_DESCRIPTION=Can shield at least one ally.
REVIVE_SELF=Revive Self
REVIVE_SELF_DESCRIPTION=Can bring self back to life after being KO'd.
REVIVE_TEAM=Revive Team
REVIVE_TEAM_DESCRIPTION=Can bring at least one ally back to life after being KO'd.
ENERGY_SELF=Energy Self
ENERGY_SELF_DESCRIPTION=Grants energy to self.
ENERGY_TEAM=Energy Team
ENERGY_TEAM_DESCRIPTION=Can grant energy to at least one ally.
ENERGIZE=Energize
ENERGIZE_DESCRIPTION=Energized units gain more energy each time they perform a basic attack.
HARDY=Hardy
HARDY_DESCRIPTION=Each stack of Hardy on a unit will block one Debuff from being applied to them.
CLEANSE=Cleanse
CLEANSE_DESCRIPTION=Removes all Debuffs from a unit.
COPY_BUFF=Copy Buff
COPY_BUFF_DESCRIPTION=Copies Buffs from other Heroes.
REFLECT=Reflect
REFLECT_DESCRIPTION=Heroes with Reflect prevent %d%% of incoming damage. %d%% of incoming damage is also returned to the enemy who dealt the damage.\n\nReflected damage cannot Crit, be Dodged, or Reflected again.
BERSERK=Berserk
BERSERK_DESCRIPTION=Berserking units cannot fall below 1 HP.
REDUCED_DAMAGE_TAKEN=Reduced Damage Taken
REDUCED_DAMAGE_TAKEN_DESCRIPTION=Unit takes reduced damage for an amount of time.
INVINCIBLE=Invincible
INVINCIBLE_DESCRIPTION=Invincible units are immune to damage from all sources.
DODGE=Dodge
DODGE_DESCRIPTION=Units with Dodge have a chance to not be hit by skills and attacks.
INVISIBLE=Invisible
INVISIBLE_DESCRIPTION=Invisible units cannot be targeted by enemies.
PRECISE=Precise
PRECISE_DESCRIPTION=Units affected by Precise can target Invisible enemies and their attacks cannot be Dodged or Evaded.
IMMUNITY=Immunity
IMMUNITY_DESCRIPTION=While Immune to specific Effects, this unit cannot suffer from those Effects.
INCREASED_DAMAGE_DEALT=Increased Damage Dealt
INCREASED_DAMAGE_DEALT_DESCRIPTION=While this Effect is active, unit deals increased damage.
DETERMINATION=Determination
DETERMINATION_DESCRIPTION=Each stack of Determination reduces an instance of Normal Crit or Fantastic Crit to regular damage.
ENDURANCE=Endurance
ENDURANCE_DESCRIPTION=Each Stack of Endurance on a unit will block one instance of damage.
EMPOWERED=Empowered
EMPOWERED_DESCRIPTION=Empowered stacks protect units from having their energy stolen.
OVERLOAD=Overload
OVERLOAD_DESCRIPTION=Overload increases Heroes Skill Levels by a certain amount.
MOMENTUM=Momentum
MOMENTUM_DESCRIPTION=Momentum reduces the damage received from the next attack by %d%%. Each attack received consumes one Momentum stack and increases the hero's damage by %d%% for %.1f seconds. This damage increase can stack, and heroes can hold up to %d Momentum stacks.
