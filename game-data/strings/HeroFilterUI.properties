PINOCCHIO_LIES_DESCRIPTION="Lie" stacks improves some of Pinocchio's skills. "Lie" stacks cannot be Copied, Stolen, or Removed and they only reset between waves.
SCRAP_STACK_BUFF=Scrap
SCRAP_STACK_BUFF_DESCRIPTION=Each stack of "Scrap" grants Mater increased Shield HP and makes some of his Skills more powerful.
ACID_BUFF=Acid
ACID_BUFF_DESCRIPTION="Acid" is a stack that deals True Damage upon explosion.
