COMPLETE_FORTIFICATION_DESCRIPTION=Hero is Immune to Study and Pierce for the first few seconds of combat.
BOLD_STURDINESS_DESCRIPTION=Hero is Immune to Scare and Shatter for the first few seconds of combat.
DAUNTLESS_DESCRIPTION=Hero is Immune to Stun and Freeze for the first few seconds of combat.
STOUT_SENSES_DESCRIPTION=Hero is Immune to Blind and Silence for the first seconds of combat.
SELF_PURIFICATION_DESCRIPTION=Hero is Immune to Curse and Sap for the first seconds of combat.
STOIC_DETERMINATION_DESCRIPTION=Hero is Immune to Charm and Hex for the first seconds of combat.
NIMBLE_DESCRIPTION=Hero is Immune to Slows for the first few seconds of combat. Slows include Snares, as well as reductions in Movement and Attack Speed.
RELENTLESS_DESCRIPTION=Hero and allies are Immune to Knockbacks for the first few seconds of combat.
HEAL_SHARE_DESCRIPTION=When the Hero is Healed, all allies are also Healed. Healing from this Talent cannot trigger other copies of this Talent.
SHIELD_SHARE_DESCRIPTION=When the Hero is Shielded, all allies are also Shielded for a few seconds. Shielding from this Talent cannot trigger other copies of this Talent.
ARMOR_SHARE_DESCRIPTION=When the Hero gains Armor, all allies also gain Armor for a few seconds. Armor gains from this Talent cannot trigger other copies of this Talent.
REALITY_SHARE_DESCRIPTION=When the Hero gains Reality, all allies also gain Reality for a few seconds. Reality gains from this Talent cannot trigger other copies of this Talent.
ARMOR_BLIGHT_DESCRIPTION=Enemies damaged by the Hero lose Armor for a few seconds.
REALITY_BLIGHT_DESCRIPTION=Enemies damaged by the Hero lose Reality for a few seconds.
HEALTH_DRAIN_DESCRIPTION=Hero Heals for a percent of the damage they deal.
TANK_AGGRESSIVE_DESCRIPTION=Hero deals more damage to Tank Role enemies.
SUPPORT_AGGRESSIVE_DESCRIPTION=Hero deals more damage to Support Role enemies.
CONTROL_AGGRESSIVE_DESCRIPTION=Hero deals more damage to Control Role enemies.
DAMAGE_AGGRESSIVE_DESCRIPTION=Hero deals more damage to Damage Role enemies.
DOMINANCE_DESCRIPTION=When the Hero triggers Weakness, their damage is amplified per stack.
CRUELTY_DESCRIPTION=When the Hero applies Curse, target Healing is Reduced.
DEVASTATING_SAP_DESCRIPTION=When the Hero applies Sap, target Energy gains are Reduced.
ARMOR_DEBILITATION_DESCRIPTION=When the Hero Debuffs enemies, those enemies lose Armor for a few seconds. This can happen to each enemy once every few seconds.
REALITY_DEBILITATION_DESCRIPTION=When the Hero Debuffs enemies, those enemies lose Reality for a few seconds. This can happen to each enemy once every few seconds.
POWER_DEBILITATION_DESCRIPTION=When the Hero Debuffs enemies, those enemies lose Basic Damage and Skill Power for a few seconds. This can happen to each enemy once every few seconds.
SPEED_DEBILITATION_DESCRIPTION=When the Hero Debuffs enemies, those enemies lose Movement and Attack Speed for a few seconds. This can happen to each enemy once every few seconds.
PREDICTIVE_DEBILITATION_DESCRIPTION=When the Hero Debuffs enemies, those enemies lose Tenacity and Evasion for a few seconds. This can happen to each enemy once every few seconds.
DAMAGE_DEBILITATION_DESCRIPTION=When the Hero Debuffs enemies, those enemies deal Reduced Damage for a few seconds. This can happen to each enemy once every few seconds.
ARMOR_BENEVOLENCE_DESCRIPTION=Buffs and Heals from the Hero also grant Armor for a few seconds. This can happen to each Hero once every few seconds.
REALITY_BENEVOLENCE_DESCRIPTION=Buffs and Heals from the Hero also grant Reality for a few seconds. This can happen to each Hero once every few seconds.
POWER_BENEVOLENCE_DESCRIPTION=Buffs and Heals from the Hero also grant Basic Damage and Skill Power for a few seconds. This can happen to each Hero once every few seconds.
SPEED_BENEVOLENCE_DESCRIPTION=Buffs and Heals from the Hero also grant Movement and Attack Speed for a few seconds. This can happen to each Hero once every few seconds.
PRECISION_BENEVOLENCE_DESCRIPTION=Buffs and Heals from the Hero also grant Precise for a few seconds.
SILENCING_ATTACKS_DESCRIPTION=Basic Attacks from the Hero apply Silence to enemies struck for a few seconds.
BLINDING_ATTACKS_DESCRIPTION=Basic Attacks from the Hero apply Blind to enemies struck for a few seconds.
CLOAKING_ATTACKS_DESCRIPTION=Every few Basic Attacks, the Hero gains Invisibility for a few seconds.
FRENZIED_VENGEANCE_DESCRIPTION=When the Hero falls below a percent of their Max HP, they Cleanse themselves and go Berserk for a few seconds. While Berserk, if an enemy is KO'd, the Hero is Healed for a percent of their Max HP. This can happen once every few seconds.
INVINCIBLE_RETRIBUTION_DESCRIPTION=Once per wave, when the Hero falls below a percent of their Max HP, they become Invincible for a few seconds. When this happens, other allies gain Increased Basic Damage and Skill Power for the rest of the wave. These Basic Damage and Skill Power Increases cannot be Removed.
REFLECTIVE_REFUGE_DESCRIPTION=When the Hero falls below a percent of their Max HP, they gain Reflect for a few seconds and are Healed for a percent of their Max HP. This can happen once every few seconds.
REFLECTION_WEAKEN_DESCRIPTION=When the Hero would damage or Debuff enemies with Reflect, that Reflect is Removed and those enemies gain stacks of Weakness for a few seconds. This can happen to each enemy once every few seconds.
EXTREME_ACCURACY_DESCRIPTION=When the Hero triggers Precise, targets have their Tenacity Reduced and are Sapped for a few seconds. Invisible targets also have their Invisibility Removed.
HAUNT_DESCRIPTION=When the Hero gains Invisibility, all enemies are Sapped and Cursed for a few seconds. This can happen once every few seconds. While Invisible, the Hero deals Increased Damage to enemies below a percent of their Max HP.
INVINCIBLE_MOMENTUM_DESCRIPTION=While Invincible, Basic Attacks from the Hero deal an additional percent of their Max HP as True Damage. When Invincibility ends, all enemies are Stunned for a few seconds. This can happen once every few seconds.
ENABLING_SHIELD_DESCRIPTION=While Shielded, the Hero is Immune to Disables. When a Disable would be applied, the Hero instead gains a percent of their Max HP as a Shield for a few seconds. This can happen once every few seconds.
DEVASTATING_BLOWS_DESCRIPTION=When the Hero damages Shielded enemies, those enemies lose all Shielding and are Shattered and Pierced for a few seconds. This can happen once every few seconds.
SHREWD_STRIKES_DESCRIPTION=Damage from the Hero ignores some enemy Damage Reduction.
CORRUPTED_DOSE_DESCRIPTION=When the Hero damages an enemy who was Healed recently, that enemy is Cursed for a few seconds. If enemies are Healed while Cursed, they take a percent of their Max HP as True Damage. Each enemy can be damaged this way once every few seconds.
BOUNTIFUL_GROWTH_DESCRIPTION=Hero is Immune to Reductions in Max HP. Once per wave, when the Hero benefits from Heal over Time for a certain amount of seconds, they gain Max HP and continue Healing for a percent of their Max HP each second for the rest of the wave. These Buffs cannot be Removed.
FREEZE_FRACTURE_DESCRIPTION=When the Hero Freezes enemies, those enemies are also Shattered for a few seconds. If enemies remain Frozen for a certain amount of seconds, they take a percent of their Max HP as Fantastic Damage. Each enemy can take this damage once every few seconds.
AUGMENTED_STUN_DESCRIPTION=Stuns from the Hero Reduce enemy Tenacity and prevent Cleansing for their duration. Enemies Stunned by the Hero also gain stacks of Weakness for a few seconds.
DEVIOUS_PLOT_DESCRIPTION=Hero starts combat Invisible for a few seconds. Each time an enemy is KO'd, the Hero gains Basic Damage and Skill Power for the rest of the wave and gains Invisibility for a few seconds.
EXHAUSTING_ATTACKS_DESCRIPTION=Basic Attacks from the Hero Remove a few random Buffs from targets hit and apply stacks of Fatigue. While Fatigued, enemies deal less damage.
FORTIFYING_CLEANSE_DESCRIPTION=Cleanses from the Hero also grant stacks of Hardy. Each Hero can gain Hardy this way once every few seconds. While the Hero or allies benefit from Hardy, they take Reduced Damage.
INVINCIBLE_REJUVENATION_DESCRIPTION=When the Hero loses their last stacks of Hardy or Fatigue, they become Immune to Debuffs and gain Invincibility for a few seconds. During this time, the Hero Heals for a percent of their Max HP each second. This can happen once every few seconds.
FRUITFUL_REVENGE_DESCRIPTION=When the Hero is KO'd, all allies are Cleansed and Heal for a percent of their Max HP. The enemy responsible for the KO loses all Hardy stacks, gains stacks of Weakness, and becomes Hexed for a few seconds. This Talent triggers once per wave and can only happen when the Hero has at least one surviving ally.
TIRELESS_DESCRIPTION=Hero and allies are Immune to Fatigue. When enemies would apply Fatigue, they instead lose a few random Buffs. This can happen to each enemy once every few seconds.
TENDERIZE_DESCRIPTION=When the Hero Heals or Buffs allies, all enemies lose stacks of Hardy. For each stack of Hardy Removed this way, enemies also lose a Random Buff.
LACERATE_DESCRIPTION=When the Hero deals non-Damage Over Time damage, they also deal a percent of that damage as additional Damage Over Time across the next few seconds. When the Hero deals Damage Over Time, the damage is increased, stretched across more time. Each time enemies suffer from Damage Over Time, they also lose Movement and Attack Speed for a few seconds.
ALLURING_LOYALTY_DESCRIPTION=Charms from the Hero cannot be Cleansed. When the Hero Heals or Buffs allies, the enemy with the highest Basic Damage is Charmed for a few seconds. This can happen once every few seconds. While any enemy is Charmed by any source, the Hero, all allies, and Charmed enemies gain Movement and Attack Speed.
