SOULLESS_SWORD_F_DESCRIPTION_GREEN=Ninja creep that does Fantastic damage with its sword. Boosts team's damage until defeated.
SOULLESS_BRUTE_SHORT=Brute
SOULLESS_BRUTE_DESCRIPTION=Brute creep that does Normal damage with its cricket bat.
SOULLESS_BRUTE_DESCRIPTION_GREEN=Brute creep that does Normal damage with its cricket bat. Immune to Normal damage.
SOULLESS_CANNON_SHORT=Cannon
SOULLESS_CANNON_DESCRIPTION=Cannon creep that does Normal ranged damage.
SOULLESS_MAGE_N_SHORT=Blue Mage
SOULLESS_MAGE_N_DESCRIPTION=Mage creep that specializes in Normal ranged attacks.
SOULLESS_MAGE_N_DESCRIPTION_BLUE=Mage creep that specializes in Normal ranged attacks. Heals team until defeated.
SOULLESS_MAGE_F_SHORT=Purple Mage
SOULLESS_MAGE_F_DESCRIPTION=Mage creep that specializes in Fantastic ranged attacks.
SOULLESS_MAGE_F_DESCRIPTION_BLUE=Mage creep that specializes in Fantastic ranged attacks. Heals team until defeated.
SOULLESS_SPLASH_N_SHORT=Blue Blob
SOULLESS_SPLASH_N_DESCRIPTION=Blob creep that does Normal splash damage.
SOULLESS_SPLASH_F_SHORT=Purple Blob
SOULLESS_SPLASH_F_DESCRIPTION=Blob creep that does Fantastic splash damage.
SOULLESS_AUTOTURRET_SHORT=Automatic Turret
SOULLESS_AUTOTURRET_DESCRIPTION=Turret creep that comes in groups of three and does Normal damage with ranged attacks.
SOULLESS_AUTOTURRET_DESCRIPTION_GREEN=Turret creep that comes in groups of three and does Normal damage with ranged attacks. Studies the closest enemy.
SOULLESS_TURRET_SHORT=Robot
SOULLESS_TURRET_DESCRIPTION=Robot turret creep that does Normal damage with its laser.
SOULLESS_SKELETON_SHORT=Skeleton
SOULLESS_SKELETON_DESCRIPTION=Bony creep that does Fantastic damage with a sword.
SOULLESS_SKELETON_DESCRIPTION_GREEN=Bony creep that does Fantastic damage with a sword. Immune to Fantastic damage.
SOULLESS_SKELETON_SUMMON_SHORT=Summoned Skeleton
SOULLESS_SKELETON_SUMMON_DESCRIPTION=Bony creep that does Normal damage with a sword.
SOULLESS_GHOUL_F_SHORT=Purple Ghoul
SOULLESS_GHOUL_F_DESCRIPTION=Clawed creep that does Fantastic damage.
SOULLESS_GHOUL_F_DESCRIPTION_BLUE=Clawed creep that does Fantastic damage. Becomes immune to all damage for a period of time.
SOULLESS_GHOUL_N_SHORT=Blue Ghoul
SOULLESS_GHOUL_N_DESCRIPTION=Clawed creep that does Normal damage.
SOULLESS_GHOUL_N_DESCRIPTION_BLUE=Clawed creep that does Normal damage. Becomes immune to all damage for a period of time.
SOULLESS_BUG_N_SHORT=Blue Bug
SOULLESS_BUG_N_DESCRIPTION=Creep bug that does Normal splash damage and ignores Armor.
SOULLESS_BUG_F_SHORT=Purple Bug
SOULLESS_BUG_F_DESCRIPTION=Creep bug that does Fantastic splash damage and ignores Reality.
SOULLESS_GLASS_CANNON_N_SHORT=Blue Hoverbot
SOULLESS_GLASS_CANNON_N_DESCRIPTION=A fragile bot that charges up to deal heavy Normal damage from the back line.
SOULLESS_GLASS_CANNON_F_SHORT=Purple Hoverbot
SOULLESS_GLASS_CANNON_F_DESCRIPTION=A fragile bot that charges up to deal heavy Fantastic damage from the back line.
INVENTOR_SHORT=The Inventor
MAMA_BOT_SHORT=Mama Bot
MAMA_BOT_DESCRIPTION=An enormous Boss creep that spawns other creeps.
SOULLESS_SPIDER_TANK_SHORT=Tank Hunter
SOULLESS_SPIDER_TANK_DESCRIPTION=Creep spider that does Normal damage and traps Tank heroes in a sticky web.
SOULLESS_SPIDER_CONTROL_SHORT=Control Hunter
SOULLESS_SPIDER_CONTROL_DESCRIPTION=Creep spider that does Normal damage and traps Control heroes in a sticky web.
SOULLESS_SPIDER_DPS_SHORT=Damage Hunter
SOULLESS_SPIDER_DPS_DESCRIPTION=Creep spider that does Normal damage and traps Damage heroes in a sticky web.
SOULLESS_SPIDER_SUPPORT_SHORT=Support Hunter
SOULLESS_SPIDER_SUPPORT_DESCRIPTION=Creep spider that does Normal damage and traps Support heroes in a sticky web.
SOULLESS_TREASURE_SHORT=Chomp Chest
SOULLESS_TREASURE_DESCRIPTION=A creep that can withdraw to take reduced damage and deals big Normal damage afterwards.
SOULLESS_DINOSAUR_SHORT=Blue Mecharaptor
SOULLESS_DINOSAUR_DESCRIPTION=Robot dinosaur creep that does Normal damage.
SOULLESS_DINOSAUR_DESCRIPTION_GREEN=Robot dinosaur creep that does Normal damage. Explodes when KO'd, dealing Normal damage in an area.
SOULLESS_DINOSAUR_F_SHORT=Purple Mecharaptor
SOULLESS_DINOSAUR_F_DESCRIPTION=Robot dinosaur creep that does Fantastic damage.
SOULLESS_DINOSAUR_F_DESCRIPTION_GREEN=Robot dinosaur creep that does Fantastic damage. Explodes when KO'd, dealing Fantastic damage in an area.
SHOCK_BOT_SHORT=Lightning R.O.B.
SHOCK_BOT_DESCRIPTION=A Really Overpowered Boss creep that can stun and electrify the battlefield.
SOULLESS_CACTUS_N_SHORT=Blue Purrickly Pear
SOULLESS_CACTUS_N_DESCRIPTION=A spiky creep that does Normal damage to all enemies when hit.
SOULLESS_CACTUS_F_SHORT=Purple Purrickly Pear
SOULLESS_CACTUS_F_DESCRIPTION=A spiky creep that does Fantastic damage to all enemies when hit.
SOULLESS_ONION_SHORT=Rapscallion
SOULLESS_ONION_DESCRIPTION=A stinky creep that blinds and does Fantasic damage over time to enemies when hit.
SOULLESS_FROST_MONSTER_SHORT=Coldsnapper
SOULLESS_FROST_MONSTER_DESCRIPTION=An icy creep that freezes enemies when attacking and when KO'd, dealing Fantastic damage.
SVEN_SHORT=Sven
SVEN_DESCRIPTION=The loyal reindeer companion of Kristoff.
SOULLESS_RED_DOT_SHORT=D.O.T. Goblin
SOULLESS_RED_DOT_DESCRIPTION=This persistent creep does fantastic damage over time to enemy units.
DEAD_MANS_CHEST_SHORT=The Dead Man's Chest
DEAD_MANS_CHEST_DESCRIPTION=While this chest is in a fight, Davy Jones cannot be KO'd.
SOULLESS_MEGA_BRUTE_SHORT=Mega Brute
SOULLESS_MEGA_BRUTE_DESCRIPTION=An empowered Brute creep that does Normal damage and creates shockwaves. Immune to Normal damage.
BEAKER_CLONE_SHORT=Beaker Clone
BEAKER_CLONE_DESCRIPTION=This Beaker copy is the result of an unfortunate mishap with a cloning machine.
SOULLESS_MEGA_MAGE_SHORT=Mega Mage
SOULLESS_MEGA_MAGE_DESCRIPTION=An empowered Mage creep that heals its whole team until defeated.
MEGA_VIRUS_SHORT=Mega Virus
MEGA_VIRUS_DESCRIPTION=This powerful virus is the cause of all the creeps and corruption. It won't stop until the entire game is infected.
CAULDRON_BORN_SHORT=Cauldron Born
CAULDRON_BORN_DESCRIPTION=Skeletal servant of the Horned King, called forth from the bubbling Black Cauldron.
CALHOUN_DESCRIPTION=A natural leader with a haunted past, Sergeant Calhoun takes charge on the battlefield with her massive laser gun.
CALHOUN_QUOTE="This is it, ladies! The kitten whispers and tickle fights end now! "
CHIEF_BOGO_DESCRIPTION=The toughest cape buffalo on the force, Chief Bogo serves and protects his allies with his massive riot shield.
CHIEF_BOGO_QUOTE="Life isn't some cartoon musical where you sing a little song and all your insipid dreams magically come true! So Let... It... Go."
DASH_DESCRIPTION=Dashiell Parr uses his superhuman speed to "dash" in and get in a few well-placed punches before the enemy even realizes he's there.
DASH_QUOTE="We're dead! We're dead! We survived but we're dead!"
ELASTIGIRL_DESCRIPTION=Helen Parr (aka Mrs. Incredible) takes down bad guys with her amazing stretching powers.
ELASTIGIRL_QUOTE="I think you need to be a bit more flexible."
FELIX_DESCRIPTION=This gold hammer wielding good guy uses his amazing Fix-It powers to heal himself and his allies.
FELIX_QUOTE="WHY DO I FIX EVERYTHING I TOUCH?!"
FINNICK_DESCRIPTION=A short fox with an equally short temper, Finnick fox wallops his enemies with his Jumbo Pop and a little help from his beloved van.
FINNICK_QUOTE="Small mammal, big heart, baby."
FROZONE_DESCRIPTION=Lucius Best (aka Frozone) is one cool customer, controlling his enemies with his versatile ice attacks.
FROZONE_QUOTE="We look like bad guys. Incompetent bad guys!"
JACK_JACK_DESCRIPTION=Don't let that cute face fool you. Jack-Jack's powers do some serious damage.
JACK_JACK_QUOTE="Giggle."
JUDY_HOPPS_DESCRIPTION=Brimming with optimism and pure determination, Judy Hopps uses her kickboxing skills to subdue the enemy.
JUDY_HOPPS_QUOTE="Real life is messy. We all have limitations, we all make mistakes, which means - hey, glass half full! - we all have a lot in common."
MR_INCREDIBLE_DESCRIPTION=Bob Parr (aka Mr. Incredible) uses his super strength to fight evil and protect the innocent.
MR_INCREDIBLE_QUOTE="No matter how many times you save the world, it always manages to get back in jeopardy again. Sometimes I just want it to stay saved!"
NICK_WILDE_DESCRIPTION=Nick Wilde uses his street smarts and charm to control and attack enemies.
NICK_WILDE_QUOTE="I know everybody. And I also know that somewhere there's a toy store missing its stuffed animals. So why don't you just get back into your box?"
RALPH_DESCRIPTION=A big-fisted "bad guy" with an even bigger heart, Ralph wreaks havoc on the real baddies.
RALPH_QUOTE="I'm bad, and that's good! I will never be good, and that's not bad! There's no-one I'd rather be...than me."
VANELLOPE_DESCRIPTION=A racer with a wicked sense of humor, Vanellope glitches around her enemies and deals damage with her trusty new soda soaker.
VANELLOPE_QUOTE="Tut, tut. As your merciful princess, I hereby decree that everyone who was ever mean to me shall be... executed."
VIOLET_DESCRIPTION=Violet Parr uses her invisibility and force fields to control enemies on the battlefied.
VIOLET_QUOTE="Normal? What do you know about 'normal'? What does anyone in this family know about 'normal'? We act normal, Mom; I want to be normal!"
YAX_DESCRIPTION=Yax uses his yoga powers to heal and support his allies.
YAX_QUOTE="Yeah, some mammals say the naturalist's life is weird. But you know what I say is weird? Clothes on animals!"
WOODY_DESCRIPTION=Woody is the rootin'est tootin'est cowboy in the City. He wrangles enemies with his lasso and empowers his allies with his leadership abilities.
WOODY_QUOTE="I'd like to join your posse, boys, but first I'm gonna sing a little song."
BUZZ_DESCRIPTION=Buzz Lightyear is a heroic space ranger with real laser action and flying...er, falling with style. He controls enemies on the field with his anti-gravity bubbles.
BUZZ_QUOTE="To infinity, and beyond!"
JESSIE_DESCRIPTION=Jessie the yodeling cowgirl tears up the battlefield and the dance floor with her line dancing moves and Sonic Yodel.
JESSIE_QUOTE="Jessie doesn't give up, Jessie finds a way."
REX_DESCRIPTION=This anxiety ridden T-Rex toy slaps enemies and runs through the battlefield when he gets overwhelmed.
REX_QUOTE="Oh, I'm going for fearsome here, but I just don't feel it! I think I'm just coming off as annoying."
EMPEROR_ZURG_DESCRIPTION=Emperor Zurg blasts enemies with his Ion Blaster and intimidates them with his evil laugh.
EMPEROR_ZURG_QUOTE="So we meet again, Buzz Lightyear, for the last time!"
EVE_DESCRIPTION=This Extraterrestrial Vegetation Evaluator uses her powerful blasters and advanced technology to find and protect life.
EVE_QUOTE="Directive."
SULLEY_DESCRIPTION=James P. Sullivan is the top monster at Monsters, Inc. Boo is a little girl in a monster disguise. Together, they terrify their foes on the battlefield!
SULLEY_QUOTE="Boo?" "Kitty!"
MIKE_DESCRIPTION=Mike Wazowski is a one-eyed monster that uses his comedy skills in battle.
MIKE_QUOTE="What can I say? The camera loves me!"
WALL_E_DESCRIPTION=WALL-E is a robot that loves to collect random objects and throw them at enemies.
WALL_E_QUOTE="WALL-E!"
JACK_SPARROW_DESCRIPTION=Captain Jack Sparrow commands the Black Pearl on the field of battle while dueling enemies with his swashbuckling sabre.
JACK_SPARROW_QUOTE="This is the day you will always remember as the day you almost caught Captain Jack Sparrow."
QUORRA_QUOTE="Flynn is teaching me about the art of the selfless. About removing oneself from the equation."
QUORRA_DESCRIPTION=Quorra dual wields with her identity disc and light sword, and rides through the front lines on her light cycle.
KEVIN_FLYNN_QUOTE="The thing about perfection is that it's unknowable. It's impossible, but it's also right in front of us all the time."
KEVIN_FLYNN_DESCRIPTION=A programming visionary and former CEO, Kevin Flynn supports his allies on the field.
HECTOR_BARBOSSA_QUOTE="I'm disinclined to acquiesce to your request."
HECTOR_BARBOSSA_DESCRIPTION=Captain Barbossa is a legendary pirate who brings his cannon into battle to subdue his enemies.
TIA_DALMA_QUOTE="A touch...of destiny!"
TIA_DALMA_DESCRIPTION=This powerful mystic uses her water affinity to cast storms and bring tidal waves to her enemies.
MAUI_QUOTE="Listen. For a thousand years, I've only been thinking about keepin' this hair silky, getting my hook, and being awesome, again."
MAUI_DESCRIPTION=Maui is a demigod and hero of men (and women) that uses his hook to shapeshift.
MERIDA_QUOTE="There are those who say fate is something beyond our command. That destiny is not our own, but I know better."
MERIDA_DESCRIPTION=Merida is an adventurous princess with unparalleled archery skills.
STITCH_QUOTE="Nobody gets left behind."
STITCH_DESCRIPTION=Experiment 626, also known as Stitch, is an alien being with a vicious bite and powerful plasma guns. He is also pretty cute and fluffy.
MOANA_QUOTE="I am Moana of Motunui. You will board my boat, sail across the sea, and restore the heart of Te Fiti."
MOANA_DESCRIPTION=Moana is the future Chief of Motunui. She uses her connection to the sea to hold her own on the battlefield.
ALADDIN_QUOTE="Trouble? No way. You're only in trouble if you get caught."
ALADDIN_DESCRIPTION=This diamond in the rough uses his street smarts to get one jump ahead of his enemies.
MIGUEL_QUOTE="Sometimes I think I'm cursed 'cause of something that happened before I was even born."
MIGUEL_DESCRIPTION=Miguel is a talented musician that uses his music to support his allies and control his enemies.
GENIE_QUOTE="You have been a fabulous audience! Tell you what, you're the best audience in the whole world. Take care of yourselves! Good night, Alice! Good night, Agrabah! Adios, amigos!"
GENIE_DESCRIPTION=Genie's phenomenal cosmic powers support his allies and control his enemies.
HIRO_QUOTE="We didn't set out to be superheroes. But, sometimes, life doesn't go the way you planned. The good thing is, my brother wanted to help a lot of people. That's what we're gonna do!"
HIRO_DESCRIPTION=A robotics prodigy, Hiro Hamada uses his smarts and gadgets to defeat his enemies.
BAYMAX_QUOTE="Balalalala"
BAYMAX_DESCRIPTION=Built by Hiro's brother Tadashi, Baymax started purely as a healthcare robot. But after a few modifications from Hiro, his rocket punch and combat skills make him a formidable foe.
HADES_QUOTE="The name's Hades, Lord of the Dead. Hi, how ya doin'?"
HADES_DESCRIPTION=Hades, God of the Dead, always felt he got the short end of the Styx compared to his brother, Zeus. He burns enemies with his hot temper.
URSULA_QUOTE="I'm not asking much. Just a token really, a trifle. You'll never even miss it."
URSULA_DESCRIPTION=Only the most desperate merfolk in Atlantica go to Ursula the Sea-Witch for aid. She uses her powerful magic to control enemies on the battlefield.
MALEFICENT_QUOTE="Well... quite a glittering assemblage, King Stefan. Royalty, nobility, the gentry, and... oh, how quaint, even the rabble."
MALEFICENT_DESCRIPTION=An evil fairy with vast power, Maleficent spreads darkness wherever she treads.
SCAR_QUOTE="Life's not fair, is it? You see... I shall never be king. And you... shall never see the light of another day."
SCAR_DESCRIPTION=A machiavellian schemer and deadly predator, Scar uses his prowling skills to take advantage of enemies.
MICKEY_MOUSE_QUOTE="Hot dog!"
MICKEY_MOUSE_DESCRIPTION=Mickey Mouse has been entertaining children of all ages for over 90 years. A master performer, Mickey's a good-hearted, clever pal that'll always save the day!
JACK_SKELLINGTON_QUOTE="Eureka! This year, Christmas will be - OURS!"
JACK_SKELLINGTON_DESCRIPTION=Jack Skellington, the Pumpkin King of Halloween Town, is the unliving embodiment of the chills and thrills of Halloween. He attacks enemies on the field with pumpkins and presents.
ELSA_QUOTE="Watch this!"
ELSA_DESCRIPTION=Queen Elsa of Arendelle was born with the power to create ice and snow.
SHANK_QUOTE="Well, well, well... who are you?"
SHANK_DESCRIPTION=Shank has survived the most intense danger the game Slaughter Race has to offer, and uses her keen driving skills to flatten foes on the battlefield.
SALLY_QUOTE="What's wrong? I thought you liked Frog's Breath!"
SALLY_DESCRIPTION=A diligent apothecary and cautious, caring friend, Sally's ready to lend her friends a hand... sometimes literally.
OLAF_QUOTE="Hi, everyone! I'm Olaf, and I like warm hugs!"
OLAF_DESCRIPTION=Surprisingly supportive despite having no bones, Olaf proves some people are worth melting for... even when they're made out of snow!
DARKWING_DUCK_QUOTE="I am the terror that flaps in the night!"
DARKWING_DUCK_DESCRIPTION=Darkwing Duck, crime fighter extraordinaire, uses his fantastic gadgets to control enemies while subduing them with the art of Quack Fu.
GASTON_QUOTE="How can you read this? There's no pictures!"
GASTON_DESCRIPTION=Gaston confidently stalks the field of battle, subduing enemies with his brawn and ego.
QUEEN_OF_HEARTS_QUOTE="I warn you child... if I lose my temper, you lose your head!"
QUEEN_OF_HEARTS_DESCRIPTION=The Queen of Hearts reigns over her enemies with her army of cards and red hot temper.
MAD_HATTER_QUOTE="We never get compliments, you must have a cup of tea!"
MAD_HATTER_DESCRIPTION=The Mad Hatter causes chaos amongst his enemies, throwing and smashing in a mad dash.
ALICE_QUOTE="Curiouser and curiouser..."
ALICE_DESCRIPTION=Alice grows to enormous size to wreak havoc on the enemy line.
HERCULES_QUOTE="A true hero. Great! Uh, exactly how do you become a true hero?"
HERCULES_DESCRIPTION=A hero whose compassion is equal to his strength, Hercules is a true force to reckon with.
MEGARA_QUOTE="I'm a damsel, I'm in distress, I can handle this. Have a nice day."
MEGARA_DESCRIPTION=Well versed in the art of snark, Megara supports allies on the field with her charm and wit.
ANGER_QUOTE="Congratulations San Francisco! You've ruined pizza!"
ANGER_DESCRIPTION=Anger channels his fiery temper to support allies and damage enemies.
JOY_QUOTE="Think positive!"
JOY_DESCRIPTION=Joy cheers on her team with pep and positivity.
MERLIN_QUOTE="It's up to you how far you go. If you don't try , you'll never know!"
MERLIN_DESCRIPTION=The wise wizard Merlin wields the most powerful tool in his arsenal, brain power, to teach his enemies a lesson they won't forget.
ROBIN_HOOD_QUOTE="Keep your chin up. Someday, there will be happiness again."
ROBIN_HOOD_DESCRIPTION=The gallant Robin Hood uses his impressive archery skills to steal from the rich and give to the poor.
GOOFY_QUOTE="Gawrsh!"
GOOFY_DESCRIPTION=Being accident-prone doesn't keep this fun loving goof from showing his steps while doing damage in his wake.
DUCKY_AND_BUNNY_QUOTE="We weren't made in China yesterday."
DUCKY_AND_BUNNY_DESCRIPTION=Plush buddies Ducky & Bunny bring chaos to the field with their teamwork based attacks.
DUKE_CABOOM_QUOTE="Who's the Canuck with all the luck? Caboom!"
DUKE_CABOOM_DESCRIPTION=Daredevil extraordinaire Duke Caboom uses his motorcycle to zoom through enemies.
BO_PEEP_QUOTE="You're cute when you care."
BO_PEEP_DESCRIPTION=Bo Peep, toy rescuer and shepherd, uses her staff to protect allies.
PETER_PAN_QUOTE="Nobody calls Pan a coward and lives!"
PETER_PAN_DESCRIPTION=This boy who never grew up takes pride in his sword skills. Peter Pan duels his enemies and crows out his victories.
RAFIKI_QUOTE="You're a baboon, and I'm not."
RAFIKI_DESCRIPTION=Rafiki wields his stick to knock sense into enemies and allies alike.
BEAST_QUOTE="So, you've come to stare at the Beast, have you?"
BEAST_DESCRIPTION=The Beast stalks the battlefield, terrifying enemies with his mighty roar.
JAFAR_QUOTE="Desperate times call for desperate measures."
JAFAR_DESCRIPTION=Jafar uses his insidious magical abilities to control enemies.
TIMON_AND_PUMBAA_QUOTE="You got to put your behind in your past."
TIMON_AND_PUMBAA_DESCRIPTION=Timon & Pumbaa disgust and defeat their enemies with their unique culinary choices.
SIMBA_AND_NALA_QUOTE="I laugh in the face of danger."
SIMBA_AND_NALA_DESCRIPTION=Simba & Nala team up against enemies by causing mischief and mayhem.
JASMINE_QUOTE="Unhand him! By order of the princess."
JASMINE_DESCRIPTION=Jasmine fights enemies with her trusty pole and faithful friend Rajah.
TRON_QUOTE="I fight for the Users!"
TRON_DESCRIPTION=Tron is a security program who uses his powers to keep networks free and open for all Users.
HUEY_DEWEY_LOUIE_QUOTE="We're just a normal, boring family!"
HUEY_DEWEY_LOUIE_DESCRIPTION=This feathered trio loves to wreck havock on the battlefield with their skateboard and Junior Woodchuck gear.
MISS_PIGGY_QUOTE="Behind every good woman is a great left hook."
MISS_PIGGY_DESCRIPTION=Miss Piggy puts the enemy in their place with her stunning karate moves.
ANIMAL_QUOTE="ANIMAL! AN! NI! MAL!!!"
ANIMAL_DESCRIPTION=Animal fills the battlefield with upbeats and beatdowns, boosting allies and damaging foes.
MADAM_MIM_QUOTE="Sounds like someone's sick. How lovely. I do hope it's serious. Something dreadful."
MADAM_MIM_DESCRIPTION=Madam Mim uses her amazing powers of transformation to create chaos on the battlefield.
MEGAVOLT_QUOTE="They called me crazy! They called me insane! They called me looney! And, boy, were they right."
MEGAVOLT_DESCRIPTION=Megavolt harnesses the power of electricity to shock his enemies.
YZMA_QUOTE="Our moment of triumph approaches! Ha ha ha ha ha! It's dinner time!"
YZMA_DESCRIPTION=Yzma controls enemies with her push-your-luck potions.
GONZO_QUOTE="If I ruled the world, clothing would be edible!"
GONZO_DESCRIPTION=Gonzo performs acts of daring with his hypnotized chicken brigade to do massive damage on the battlefield.
RANDALL_BOGGS_QUOTE="If I don't see another door in my station in five seconds, I will personally put you through the shredder!"
RANDALL_BOGGS_DESCRIPTION=Randall Boggs uses his invisibility to sneak up and scare enemies.
CAPTAIN_HOOK_QUOTE="Look alive, you swabs! We've got him this time, Mr. Smee."
CAPTAIN_HOOK_DESCRIPTION=Captain Hook slashes his way across the battlefield with his sword and hook.
SCROOGE_MCDUCK_QUOTE="I got where I am today by being smarter than the smarties and tougher than the toughies."
SCROOGE_MCDUCK_DESCRIPTION=Scrooge McDuck turns a profit by throwing and collecting coins on the battlefield.
DONALD_DUCK_QUOTE="What's the big idea?!"
DONALD_DUCK_DESCRIPTION=Donald throws a tantrum by stomping and punching his way across the battlefield.
GIZMODUCK_QUOTE="There's no need to fear. Gizmoduck is here."
GIZMODUCK_DESCRIPTION=Gizmoduck deals out damage with the help of his high-tech suit.
LAUNCHPAD_MCQUACK_QUOTE="If it's got wings, I can crash it!"
LAUNCHPAD_MCQUACK_DESCRIPTION=Launchpad flies into battle, crashing his way through enemy lines.
OOGIE_BOOGIE_QUOTE="One more roll of the dice oughta do it."
OOGIE_BOOGIE_DESCRIPTION=With a roll of his dice, Oogie Boogie takes his chances on the battlefield and scares enemies.
FLYNN_RIDER_QUOTE="You broke my smoulder."
FLYNN_RIDER_DESCRIPTION=Flynn Rider saunters his way onto the battlefield to take down enemies with his sword and smolder.
RAPUNZEL_QUOTE="I have magic hair that glows when I sing."
RAPUNZEL_DESCRIPTION=Armed with her trusty frying pan and magical healing hair, Rapunzel stuns enemies and heals allies on the battlefield.
KIDA_QUOTE="I have some questions for you and you are not leaving this city until they are answered!"
KIDA_DESCRIPTION=Kida keeps enemies at bay with her spear and protects herself with the aid of her magical crystal.
MAGICA_DE_SPELL_QUOTE="Abra-Duckabra!"
MAGICA_DE_SPELL_DESCRIPTION=With her wand at the ready, Magica casts her spells on the battlefield.
COLETTE_QUOTE="I am the toughest cook in this kitchen!"
COLETTE_DESCRIPTION=Chef Colette slices and dices ingredients to stun and damage enemies.
LINGUINI_AND_REMY_QUOTE="Let's do this thing!"
LINGUINI_AND_REMY_DESCRIPTION=Armed with their cart and array of ingredients, Linguini & Remy whip up tasty treats to aid their allies.
HANK_AND_DORY_QUOTE="I'm gonna ask you to do something crazy."
HANK_AND_DORY_DESCRIPTION=Hank & Dory sneak onto the battlefield, where they blind enemies and call in a little help from a whale.
GERALD_MARLIN_NEMO_QUOTE="I know funny. I'm a clownfish!"
GERALD_MARLIN_NEMO_DESCRIPTION=Never straying far from his favorite rock, Gerald barks to buff allies, while Nemo and Marlin splash nearby enemies.
DR_FACILIER_QUOTE="You're in my world now, and I got friends on the other side."
DR_FACILIER_DESCRIPTION=Assisted by his friends from the other side, Dr. Facilier uses his tricks and curses to cause mayhem on the battlefield.
POWERLINE_QUOTE="For the first time ever, we're seeing it eye to eye."
POWERLINE_DESCRIPTION=Powerline puts on a show and damages enemies with his laser light show and smooth moves.
KRISTOFF_AND_SVEN_QUOTE="Ice is my life!"
KRISTOFF_AND_SVEN_DESCRIPTION=Kristoff keeps his best pal, Sven, by his side as he deals some icy damage on the battlefield.
TIGGER_QUOTE="Tiggers don't jump, they bounce!"
TIGGER_DESCRIPTION=With his spring-loaded tail, Tigger bounces all over the battlefield, knocking back and stunning enemies.
WINNIE_THE_POOH_QUOTE="People say nothing is impossible, but I do nothing every day."
WINNIE_THE_POOH_DESCRIPTION=Winnie the Pooh follows his tummy and eats pots of yummy honey, healing himself and causing sticky situations for the enemies.
EEYORE_QUOTE="Thanks for noticin' me."
EEYORE_DESCRIPTION=Eeyore glumly makes his way onto the battlefield, sapping energy and causing mishaps with his replacement tail.
GOLIATH_QUOTE="We can't hide from the world, we must live in it."
GOLIATH_DESCRIPTION=Goliath uses his super strength and mighty wings to battle his enemies and protect his allies.
KIM_POSSIBLE_QUOTE="No big."
KIM_POSSIBLE_DESCRIPTION=Just your basic average girl who saves the world each night before doing her homework. Kim Possible uses her handy gadgets to control enemies. She's just a call or a beep away!
MUSHU_QUOTE="Who am I? I am the guardian of lost souls! I am the powerful, the pleasurable, the indestructible Mushu!"
MUSHU_DESCRIPTION=Did somebody just ask for a miracle? Mushu stomps onto the battlefield with the force of a mighty dragon and uses his fire-breathing skills to take down enemies.
MULAN_QUOTE="Are we in this together, or not?"
MULAN_DESCRIPTION=Fierce, brave, and loyal, Mulan leaps into action using her sword to attack and setting off fireworks to damage enemies.
BELLE_QUOTE="Well, some people use their imaginations."
BELLE_DESCRIPTION=When Belle isn't wielding a mighty stick to strike at enemies, she's got her nose buried in one of her favorite books.
SHAN_YU_QUOTE="Nice work, gentlemen. You found the Hun army."
SHAN_YU_DESCRIPTION=Ominous and ruthless Shan Yu forces his way onto the battlefield, damaging those who oppose him with arrows and his sword.
EVIL_QUEEN_QUOTE="Magic mirror on the wall, who is the fairest one of all?"
EVIL_QUEEN_DESCRIPTION=With a jealous air, The Evil Queen strides onto the battlefield, offering enemies a bite from her poisoned apple and damaging those who challenge her skill and beauty.
SYNDROME_QUOTE="And just when all hope is lost, Syndrome will save the day!\nI'll be a bigger hero than you ever were!"
SYNDROME_DESCRIPTION=Syndrome flies into battle and uses his high-tech inventions to stun and scan enemies.
LI_SHANG_QUOTE="You will assemble swiftly and silently every morning. Anyone who acts otherwise, will answer to me."
LI_SHANG_DESCRIPTION=Li Shang summons all of his different skills and training expertise to help his team on the battlefield and take down any enemies who cross his path.
DAVY_JONES_QUOTE="Life is cruel. Why should the afterlife be any different?"
DAVY_JONES_DESCRIPTION=With a growl, Davy Jones arrives on the battlefield, ready to damage with his mighty claw and call upon the Kraken for a little help.
MINNIE_MOUSE_QUOTE="I am just so lucky that I get to be here with all of you today."
MINNIE_MOUSE_DESCRIPTION=With her signature bow and pal Pluto, Minnie Mouse arrives, ready to spread her sweetness and cheer to all.
KING_LOUIE_QUOTE="Have a banana."
KING_LOUIE_DESCRIPTION=With his loyal Bander-logs swinging in wait, King Louie shakes up the battlefield. If he's not munching on a banana, he'll make sure to toss some at his enemies.
BALOO_QUOTE="You better believe it!"
BALOO_DESCRIPTION=Baloo jives his way onto the battlefield, charming enemies with his groovy moves and helping his allies to cool it and just enjoy the bare necessities.
JUMBA_QUOTE="My experiments are only theoretical and completely within legal boundaries."
JUMBA_DESCRIPTION=With a maniacal laugh, Jumba, aka evil genius, stomps onto the battlefield with his laser blaster and latest scientific experiment.
PLEAKLEY_QUOTE="You're just jealous 'cause I'm pretty!"
PLEAKLEY_DESCRIPTION=Keeping an eye out for enemies, Pleakley struts into battle with a swarm of mosquito friends.
CHESHIRE_CAT_QUOTE="Most everyone's mad here. You may have noticed that I'm not all there myself."
CHESHIRE_CAT_DESCRIPTION=Cheshire Cat appears on the battlefield, almost as gleefully as he disappears again. He enjoys playing head games with enemies, laughing as he stuns them.
BASIL_QUOTE="On the contrary! The game's not over yet!"
BASIL_DESCRIPTION=With his keen deduction skills, Basil expertly scans enemies for weaknesses and dodges those ruffians who seek to harm him.
MAXIMUS_QUOTE="WHINNY!"
MAXIMUS_DESCRIPTION=The fiercest horse to ever serve on the Honor Guard, Maximus is ready to uphold justice on the battlefield with his sword and keen senses.
ANGEL_QUOTE="Boojiboo!"
ANGEL_DESCRIPTION=Experiment 624, better known as Angel, charms and silences enemies with her hauntingly beautiful siren songs.
SLINKY_DOG_QUOTE="I may not be a smart dog, but I know what roadkill is."
SLINKY_DOG_DESCRIPTION=Slinky Dog stretches his way into battle. Beware of his loud bark, spring-loaded force field, and back half. \n\nSlinky Dog copyright Just Play, LLC
CAPTAIN_AMELIA_QUOTE="I'm Captain Amelia. Late of a few run-ins with the Procyon Armada, nasty business, but I won't bore you with my scars"
CAPTAIN_AMELIA_DESCRIPTION=Poised, perspicacious, and pleased to join the battle, Captain Amelia lends her wisdom to helping her allies and dealing damage to those who would dare to attack her.
IAN_LIGHTFOOT_QUOTE="I think with a little bit of magic in your life, you can do anything."
IAN_LIGHTFOOT_DESCRIPTION=Armed with his magical staff, Ian Lightfoot takes down enemies with his armory of spells.
LOCK_SHOCK_BARREL_QUOTE="Trick or treat!"
LOCK_SHOCK_BARREL_DESCRIPTION=Lock, Shock, & Barrel are at your service. Armed with a tub full of weapons, this scheming trio deals all sorts of damage to enemies.
SADNESS_QUOTE="Crying helps me slow down and obsess over the weight of life's problems."
SADNESS_DESCRIPTION=Sadness mopes into battle, spreading sadness to enemies and dousing them with her woeful tears.
BUNSEN_AND_BEAKER_QUOTE="I'm Dr. Bunsen Honeydew, this is Muppet Labs, and I am tickled pink to announce the solution to banana problems."
BUNSEN_AND_BEAKER_DESCRIPTION=Bunsen, with the help of his trusty lab assistant Beaker, is delighted to showcase some of his favorite experiments. He's sure the enemies will get a kick, or explosion, out of them.
DISGUST_QUOTE="Well, I just saved our lives. Yeah, you're welcome."
DISGUST_DESCRIPTION=Disgust struts onto the battlefield, looking for her cool ally friends and avoiding those gross enemies. Ew!
FEAR_QUOTE="Sure, it's the coward's way out. But this coward is gonna survive!"
FEAR_DESCRIPTION=Fear dreads the worst on the battlefield. If his screams don't get to you, then his flailing panic will.
MANTICORE_QUOTE="You have to take risks in life to have an adventure."
MANTICORE_DESCRIPTION=Watch out, The Manticore is here! Corey is ready to unleash her legendary fighting skills on the battlefield.
KRONK_QUOTE="Oh, yeah. I thought we'd start off with soup and a light salad, and then see how we feel after that."
KRONK_DESCRIPTION=Guided by his Shoulder Angel and Shoulder Devil, Kronk either aids his allies or damages his foes. Don't worry, he's got it.
HAMM_QUOTE="Have you heard of Kung Fu? Well, get ready for pork chop!"
HAMM_DESCRIPTION=This piggy is ready to get on the battlefield and knock back those who would dare cross not only him, but the evil Dr. Porkchop.
JIM_HAWKINS_QUOTE="Ah, I've got some plans... to make people see me a little different."
JIM_HAWKINS_DESCRIPTION=Always up for an adventure, Jim Hawkins and his pal Morph join the fray and inspire their allies.
JOHN_SILVER_QUOTE="You're gonna rattle the stars, you are!"
JOHN_SILVER_DESCRIPTION=John Silver happily joins the fray, dealing damage with his cyborg weapons and keeping a close eye on his enemies.
SWEDISH_CHEF_QUOTE="Bork bork bork!"
SWEDISH_CHEF_DESCRIPTION=Make way for flambés! Swedish Chef cooks, bakes, and torches some of his favorite dishes.
HONEY_LEMON_QUOTE="WOO! Now THAT'S a chemical reaction!"
HONEY_LEMON_DESCRIPTION=Armed with her purse of chem balls, Honey Lemon dashes into battle, ready to gloop enemies.
CLAWHAUSER_QUOTE="Are you familiar with Gazelle, greatest singer of our lifetime, angel with horns?"
CLAWHAUSER_DESCRIPTION=Clawhauser brings his favorite food onto the battlefield -- donuts! Watch out as he devours these delicious treats for an instant sugar boost.
KERMIT_QUOTE="Here's some simple advice: always be yourself. Never take yourself too seriously. And beware of advice from experts, pigs, and members of Parliament."
KERMIT_DESCRIPTION=Everyone's favorite frog is here! Kermit charms up the battlefield with his singing and dancing.
DR_DRAKKEN_QUOTE="You think you're all that, but you're not!"
DR_DRAKKEN_DESCRIPTION=Muahaha! The evil Dr. Drakken is ready to thwart his enemies with his slew of diabolical inventions. We'll see who gets the last laugh now.
WASABI_QUOTE="I spilled wasabi on my shirt one time, people. One time!"
WASABI_DESCRIPTION=With calculated and precise attacks, Wasabi battles enemies with his plasma blades.
ROCKETEER_QUOTE="How do I look?"
ROCKETEER_DESCRIPTION=The Rocketeer zooms into battle with his trusty rocket pack, ready to take down enemies.
MR_BIG_AND_KOSLOV_QUOTE="We may be evolved, but deep down we are still animals."
MR_BIG_AND_KOSLOV_DESCRIPTION=Mr. Big & Koslov join the battle, ready to get rid of anyone who doesn't show them some respect.
FOZZIE_QUOTE="Did I tell you the one about the man with the light bulb in his nose? He was lightheaded! Get it? Wocka Wocka Wocka!"
FOZZIE_DESCRIPTION=Fozzie takes to the battlefield and tries to wow enemies with his hilarious jokes and comedic gags.
BARLEY_LIGHTFOOT_QUOTE="On a quest, the clear path is never the right one."
BARLEY_LIGHTFOOT_DESCRIPTION=Barley enthusiastically joins the epic battle, cheering on his allies and scuffling with the woeful enemies.
DEMONA_QUOTE="If you are not my ally, then you are my enemy."
DEMONA_DESCRIPTION=Demona charges into battle, ready to destroy all those who would oppose her.
FAIRY_GODMOTHER_QUOTE="If you'd lost all your faith, I couldn't be here. And here I am."
FAIRY_GODMOTHER_DESCRIPTION=With a wave of her wand, Fairy Godmother appears on the battlefield, ready to help her allies with her magical powers.
POCAHONTAS_QUOTE="Sometimes the right path is not always the easiest."
POCAHONTAS_DESCRIPTION=Pocahontas summons her animal and nature friends to aid her on the battlefield and help their allies.
CARL_QUOTE="Hey. Let's play a game. It's called 'see who could be quiet the longest.'"
CARL_DESCRIPTION=Carl begrudgingly takes to the battlefield, ready to beat back enemies with his cane and yell at those who get in his way.
RUSSELL_AND_KEVIN_QUOTE="A wilderness explorer is a friend to all, be a plant or fish or tiny mole!"
RUSSELL_AND_KEVIN_DESCRIPTION=Russell & Kevin bound into battle, excited to put their wilderness and survival skills to the test.
ESMERALDA_QUOTE="Then it appears we've crowned the wrong fool. The only fool I see is you!"
ESMERALDA_DESCRIPTION=Esmeralda and her trusted goat, Djali, take a stand with their allies on the battlefield, fighting back against their enemies.
SHERIFF_OF_NOTTINGHAM_QUOTE="There's something funny going on around here."
SHERIFF_OF_NOTTINGHAM_DESCRIPTION=Sauntering his way into battle, the Sheriff of Nottingham uses his bow and torch to collect from the poor, aka his enemies.
SHEGO_QUOTE="I am EVIL, have I made myself clear?"
SHEGO_DESCRIPTION=Shego uses her plasma abilities to blast enemies on the battlefield.
RON_STOPPABLE_QUOTE="That would be so cool, if it wasn't going to hurt us."
RON_STOPPABLE_DESCRIPTION=Aided by his pal Rufus, Ron Stoppable takes to the battlefield ready to attack enemies. Watch out for those cheesy nacos!
QUACKERJACK_QUOTE="It's PLAYTIME!"
QUACKERJACK_DESCRIPTION=Armed with his arsenal of exploding toys, Quackerjack is ready to unleash his mad creations on his enemies.
GO_GO_QUOTE="Stop whining. Woman up."
GO_GO_DESCRIPTION=With a need for speed, Go Go wizzes through enemy lines, dealing damage with her mag discs and just a little bit of attitude.
VINNY_SANTORINI_QUOTE="Well, as far as me goes, I just like to blow things up."
VINNY_SANTORINI_DESCRIPTION=Vinny Santorini is ready to blow! With his arsenal of explosives, the enemies won't know what hit them.
GADGET_HACKWRENCH_QUOTE="See, I've got this mind-bashingly high IQ and I get bored easily, so I invent all sorts of things out of spare parts."
GADGET_HACKWRENCH_DESCRIPTION=Need an invention in a jiffy? Gadget is your girl! Tiny, yet mighty, this hero packs a punch! The enemies won't know what hit them.
FRED_FREDERICKSON_QUOTE="The name's Fred. School mascot by day, but by night... I'm also the school mascot."
FRED_FREDERICKSON_DESCRIPTION=Always ready for action, Fred is a force to be reckoned with. Thanks to his fire breath and sign spinning prowess, he is a formidable opponent to any foe!
CHIP_AND_DALE_QUOTE=Chip: "That was a close one. Are you okay Dale?"\nDale: "Yeah. Luckily it landed on my head."
CHIP_AND_DALE_DESCRIPTION=Rescue Rangers, away! Chip and Dale may be small, but these pint-sized heroes are more than the enemy bargained for. Watch out villains! Chip and Dale are on the scene!
LILO_QUOTE="I'm sorry I bit you... and pulled your hair... and punched you in the face..."
LILO_DESCRIPTION=Though small in stature, Lilo makes up for it with her fearless attitude. This little girl has got what it takes!
HELGA_QUOTE="Nothing personal."
HELGA_DESCRIPTION=The only thing sharper than Helga Sinclair's wit, is her ferocity. An absolute force to be reckoned with on the battlefield, Helga will pin down the enemy with her impressive fighting skills.
BOLT_QUOTE="Looks like we're gonna do this the hard way."
BOLT_DESCRIPTION=This pup packs a punch! Superpowered and ready to rumble, Bolt is four-legs of fuzzy fury!
ARIEL_QUOTE="I just don't see how a world that makes such wonderful things could be bad."
ARIEL_DESCRIPTION=Don't underestimate the power of this Little Mermaid. With a song to sing and her fish friend close at hand, Ariel will heal her allies and leave the enemy wondering what hit them.
ZEUS_QUOTE="For a true hero isn't measured by the size of his strength, but by the strength of his heart."
ZEUS_DESCRIPTION=Zeus is a force to be reckoned with! With bolts at the ready, this hero is certain to leave the enemy electrified!
PHIL_QUOTE="What's the matter? You never seen a satyr before?"
PHIL_DESCRIPTION=Who's your biggest fan? Why, it's Phil, trainer extraordinaire! This surly satyr is guaranteed to help your team be the best of the best!
MARY_SANDERSON_QUOTE="I smell children!"
MARY_SANDERSON_DESCRIPTION=Mary Sanderson has a knack for sniffing out trouble. With her trusty vacuum as her steed, this witch is sure to leave the enemy in the dust!
WINIFRED_SANDERSON_QUOTE="Oh, look. Another glorious morning. Makes me sick!"
WINIFRED_SANDERSON_DESCRIPTION=Winifred Sanderson is not to be trifled with. This witchy woman is sure to suck the life right out of the enemy, and have a grand time while doing it!
SARAH_SANDERSON_QUOTE="Hang him on a hook and let me play with him."
SARAH_SANDERSON_DESCRIPTION=Cover your ears! Sarah Sanderson is here to serenade! With Billy as her backup this songstress of sorcery will knock the enemy flat!
RAYA_QUOTE="Note to self: Don't die."
RAYA_DESCRIPTION=Raya is here to save the world...uh, City! Equipped with her trusty sword, and ready to rumble, this girl is going to take down the enemy any way she can!
KING_TRITON_QUOTE="I consider myself a reasonable merman. I set certain rules, and I expect those rules to be obeyed!"
KING_TRITON_DESCRIPTION=Ruler of the water and master of the seas, King Triton can now be part of your team! With his trusty trident, he will vanquish the enemy with deft precision!
ANNA_QUOTE="Excuse me, I climbed the North Mountain, survived a frozen heart, and saved you from my ex-boyfriend. And I did it all without powers."
ANNA_DESCRIPTION=No powers? No problem. Anna has got you covered. Clever, brave, and resourceful, Anna (with some help from the Earth Giants) will have the enemy running for the hills!
SISU_QUOTE="I'm wicked when I hit that liquid! I got water skills that kill! I slaughter when I hit the water! I'm like... really good at swimming... through rhyme."
SISU_DESCRIPTION=Always ready to help a friend in need, Sisu has got your team's back. This dragon is hitting the water hard and the enemies harder!
HOPPER_QUOTE="You piece of dirt! No, I'm wrong. You're lower than dirt. You're an ANT!"
HOPPER_DESCRIPTION=By far the cruelest bug around, Hopper is a threat to his enemies. One thing is for certain, this grasshopper will make a terrifying addition to any team.
FLIK_QUOTE="For the colony, and for oppressed ants everywhere!"
FLIK_DESCRIPTION=Inventive and innovative, Flik is here to help! This industrious ant will do what it takes to get the job done, and secure a win for your team!
PETE_QUOTE="I was born to cheat and lie! I'm a mean, rotten guy!"
PETE_DESCRIPTION=Clear the lanes, Pete is coming through! This classic villain will literally bowl the enemy over!
KAA_QUOTE="You have just sssealed your doom."
KAA_DESCRIPTION=Kaa is coiled and ready for action! This slippery serpent will entrance and trounce the enemy!
BAGHEERA_QUOTE="Will you stop that silly beat business and listen?"
BAGHEERA_DESCRIPTION=This cat may be a bit of a wet blanket, but that doesn't stop him from jumping into danger! With a swipe of his claws and a terrifying roar, Bagheera is a force to be reckoned with!
THE_UNDERMINER_QUOTE="Behold, the Underminer! I'm always beneath you, but nothing is beneath me!"
THE_UNDERMINER_DESCRIPTION=Watch your wallets, because the Underminer is here! Bent on doing more harm than good, this villian will have the enemy face down in the dirt!
THE_HORNED_KING_QUOTE="Now I call on my Army of the Dead: the Cauldron-born! Arise, my messengers of death! Our time has arrived!"
THE_HORNED_KING_DESCRIPTION=The Horned King has wonderfully devious things in store for those who oppose him. With his Black Cauldron and Army of the Dead, he's ready to take down his foes.
NAMAARI_QUOTE="Here I was worried you were going to end up becoming a cat lady. Like me."
NAMAARI_DESCRIPTION=With her arsenal of weapons and trusty Fang cat, Namaari takes to the battlefield to strike down any who get in her path.
DAISY_DUCK_QUOTE="Well, aren't you a lucky duck!"
DAISY_DUCK_DESCRIPTION=This little ducky packs a wallop! Armed with her purse and a hot temper, Daisy Duck will have the enemy running for the hills.
SNOW_WHITE_QUOTE="That was fun!"
SNOW_WHITE_DESCRIPTION=With the creatures of the forest at her beck and call, Snow White will make an excellent addition to any team!
VOYD_QUOTE="Come on, get yourself together, Karen."
VOYD_DESCRIPTION=It's full-tilt portal panic! Voyd is here to interdimensionally dominate and send the enemy packing!
PACHA_QUOTE="I was always taught that there was some good in everyone, but, oh, you proved me wrong."
PACHA_DESCRIPTION=Pacha has a bone to pick with the baddies! Here to help, and maybe throw a punch or two, this peasant is a must-have for your team!
PRINCESS_AURORA_QUOTE="Well, I'm really not supposed to speak to strangers, but we've met before."
PRINCESS_AURORA_DESCRIPTION=Never one to sleep on the job, Princess Aurora will make an excellent addition to any team. Along with her friends, Flora, Fauna, and Merryweather, this princess is a force to be reckoned with!
MILO_THATCH_QUOTE="Alright, Milo, this is it. Any last words? Yeah, I really wish I had a better idea than this."
MILO_THATCH_DESCRIPTION=Don't let this scholar's mild demeanor fool you, Milo Thatch is ready for adventure! Here to help his allies, you'll be rooting for him and your team!
PRINCE_PHILLIP_QUOTE="Now, father, you're living in the past. This is the 14th century!"
PRINCE_PHILLIP_DESCRIPTION=Vigilant and virtuous, Phillip is here to save the day! With his trusty sword and shield he'll give the enemy what for!
AUDREY_RAMIREZ_QUOTE="Ah-ha. Two for flinching."
AUDREY_RAMIREZ_DESCRIPTION=She may be young, but she'll surprise you. Audrey is here to put the "fix" on the enemy! With her hand wrench, she'll beat back the baddies and help win the day.
DUFF_KILLIGAN_QUOTE="So tell me, laddie, have you any previous evil experience?"
DUFF_KILLIGAN_DESCRIPTION=It's a mad golfer's world, we're just living in it. Duff Killigan is here to cause some chaos! Equipped with his exploding golf balls and super grass, this villain will send the enemy into the rough!
MOTHER_GOTHEL_QUOTE="I'm just teasing!"
MOTHER_GOTHEL_DESCRIPTION=Mother knows best. At least that's what Mother Gothel thinks. This villain will bring her personal brand of passive-aggression (or maybe just the aggression) to your team!
AGENT_P_QUOTE=*platypus noises*
AGENT_P_DESCRIPTION=The call to action is never-ending for Agent P. Equipped with his gadgets and wits, this renowned agent is ready to join the fight!
TWENTY_TWO_QUOTE="I'm gonna make you wish you never died."
TWENTY_TWO_DESCRIPTION=The universe's original problem child has arrived! 22 may lack direction, but she's got plenty of passion... for annoying her enemies as much as possible.
MEILIN_LEE_QUOTE="I wear what I want, say what I want, and I will not hesitate to do a spontaneous cartwheel if I feel so moved!"
MEILIN_LEE_DESCRIPTION=Meilin Lee does her own thing and makes her own moves! With her Red Panda powers and unstoppable dance moves, this little scholar is a ride-or-die addition to any team.
THE_MAYOR_QUOTE="I'm only an elected official here. I can't make decisions by myself!"
THE_MAYOR_DESCRIPTION=The polls are in, and so is The Mayor! This elected official aids allies and hinders foes depending on his mood. Whether Happy or Worried, he's here to help!
QUASIMODO_QUOTE="All my life, you have told me that the world is a dark, cruel place. But now I see that the only thing dark and cruel about it is people like you!"
QUASIMODO_DESCRIPTION=Quasimodo swings into action! The reclusive bell-ringer of Notre Dame doesn't like violence, but he'll do what it takes to protect his friends.
MAYOR_BELLWETHER_QUOTE="Underestimated, underappreciated. Aren't you sick of it?"
MAYOR_BELLWETHER_DESCRIPTION=Wake up, sheeple! Mayor Bellwether's term begins now. She keeps her allies healthy and her enemies scrambling with her signature dart gun.
CINDERELLA_QUOTE="I'm just going to have to teach you a lesson!"
CINDERELLA_DESCRIPTION=Have faith in your dreams, because Cinderella's dressed to kill! Switching back and forth between outfits is key for this hero. Sweep up your enemies, and be home by midnight!
LUCA_AND_ALBERTO_QUOTE="We can go anywhere, do anything... we just gotta stick together!"
LUCA_AND_ALBERTO_DESCRIPTION=Luca and Alberto have risen from the sea to ride across the battlefield! Juggle their tag-team attacks to put the enemy in your side-mirror!\n\nVespa is a trademark of Piaggio & C. S.p.A.
PHOEBUS_QUOTE="Candlelight, privacy, music. Can't think of a better place for hand-to-hand combat."
PHOEBUS_DESCRIPTION=Captain Phoebus is an experienced veteran who leads his allies in the fight for what's right, even when it means going against his superiors!
LITTLE_JOHN_QUOTE="Ah, here we go again."
LITTLE_JOHN_DESCRIPTION=Oo-de-lally! Little John is a longtime enemy of injustice. His strength and nimbleness make him hard to hit, and he hits even harder!
STATLER_AND_WALDORF_QUOTE="They aren't half-bad!" "Nope, they're ALL bad!"
STATLER_AND_WALDORF_DESCRIPTION=This gruesome twosome will throw your enemies off their game with their devastating critiques and one-liners. Nobody's safe from the original hecklers!
FLASH_QUOTE="I am... on... break."
FLASH_DESCRIPTION=Slow your roll! Flash will be here any minute to frustrate foes with red-tape and bueracracy. Any minute now... I think I see him coming...
CHEF_SKINNER_QUOTE="I should have you drawn and quartered! I'll do it! I think the law is on my side!"
CHEF_SKINNER_DESCRIPTION=Order up! The tiny terror of Gusteau's is coming in hot! This snide chef berates enemies and keeps the kitchen clean as a whistle!
SWEETUMS_QUOTE="I just gotta catch up with those guys!"
SWEETUMS_DESCRIPTION=Roar your approval for Sweetums! This kind-hearted beast is sweeter than he looks, but twice as strong. Don't get between him and Hollywood!
JAKE_LONG_QUOTE="Dragon up!"
JAKE_LONG_DESCRIPTION=Word up! Jake Long in the house! The American Dragon scorches enemies with fire and distracts them with swagger, ya heard?
ABU_QUOTE=*mischievous and clever monkey noises*
ABU_DESCRIPTION=Watch your wallet, cause Abu is climbing into action! This pint-sized pickpocket steals buffs from enemies to benefit his allies. And who could attack such a charming face?
MONKEY_FIST_QUOTE="Monty Fiske is no more. I am Monkey Fist!"
MONKEY_FIST_DESCRIPTION=The Master of Monkey Martial Arts rises to the challenge! With his Mystical Monkey Power, Monkey Fist is a formidable ally and a deadly foe.
COGSWORTH_AND_LUMIERE_QUOTE="You pompous, paraffin-headed peabrain!"\n"En garde, you you overgrown pocket watch!"
COGSWORTH_AND_LUMIERE_DESCRIPTION=It's time for things to heat up, because Cogsworth and Lumiere are here! These lifelong frenemies make a deadly, damaging duo.
TIANA_QUOTE="I got to make sure all that hard work means something."
TIANA_DESCRIPTION=Can it be true? Tiana is finally here! The Princess from New Orleans is ready to stand strong and support her allies.
NEGADUCK_QUOTE="I am the most fiendish terror that flaps in the darkest night! I am the skunk that pollutes your air! I am... NEGADUCK!"
NEGADUCK_DESCRIPTION=The dark champion of the Negaverse flaps into focus! Negaduck will debuff your foes and hurt them while he's at it. It's all in a day's work for Darkwing Duck's most dangerous enemy!
PEGASUS_QUOTE=*headbutt, snort, headbutt*
PEGASUS_DESCRIPTION=Saddle up to take flight! The heroic flying horse Pegasus swoops in to damage and debuff enemies. Foes will have trouble hitting this agile ally!
BOWLER_HAT_GUY_QUOTE="I plan to destroy your destiny. Easy-peasy, rice and cheesy"
BOWLER_HAT_GUY_DESCRIPTION=Get ready to hold onto a grudge, because Bowler Hat Guy is here! This long-suffering schemer and his homicidal sidekick, Doris, will damage and debuff enemies.
ROSE_QUOTE="We're mortal enemies! Or did you forget?"
ROSE_DESCRIPTION=Rose, sometimes known as Huntsgirl, is ready to put a lifetime of training to work! This deadly damage-dealer targets enemy weaknesses with lethal accuracy. Happy hunting!
DANTE_QUOTE="Bark bark!"
DANTE_DESCRIPTION=Dante is barking into battle! This powerful pup keeps himself going on a steady diet of bones and pilfered treats, and he's ready to escort your enemies to the Land of the Dead!
KUZCO_QUOTE="Well, I was gonna have you imprisoned for life, but I kinda like this better."
KUZCO_DESCRIPTION=The hippest cat in creation is here! Kuzco grooves into battle, ready to dodge attacks and confound your enemies.
EDA_CLAWTHORNE_QUOTE="I'm Eda the Owl Lady, the most powerful witch on the Boiling Isles."
EDA_CLAWTHORNE_DESCRIPTION=Pawns of the Emperor, beware! Eda the Owl Lady flies in, fresh from the Boiling Isles! This powerful witch draws on fantastic magical power to burn your foes to ash!
SHERE_KHAN_QUOTE="Now, I'm going to close my eyes and count to ten. It makes the chase more interesting... for me."
SHERE_KHAN_DESCRIPTION=Shere Khan is an elusive damage Hero who's here to show everyone who the real king of the Jungle is!
LUZ_NOCEDA_QUOTE="This mama is ready for trauma."
LUZ_NOCEDA_DESCRIPTION=This witch-in-training has magical powers that will surprise and destroy enemies who get in her way.
DR_DOOFENSHMIRTZ_QUOTE="My name is Doof, and you'll do what I say... whoop whoop!"
DR_DOOFENSHMIRTZ_DESCRIPTION=This evil scientist hails from the country of Drusselstein, and will wreak evil havoc wherever he goes.
MAX_GOOF_QUOTE="Beat it, doofus!"
MAX_GOOF_DESCRIPTION=With obvious resemblance to his father, Goofy, this teen may seem innocent, but just try to stop him from getting tickets to a Powerline concert. You'll be sorry you did!
MCLEACH_QUOTE="I didn't make it all the way through third grade for nothing."
MCLEACH_DESCRIPTION=A ruthless poacher who won't be stopped by rules, morals, the law, or anything else that gets in his way.
CRUELLA_QUOTE="I'm through with you all. I'll get even. Just you wait. You'll be sorry! "
CRUELLA_DESCRIPTION=Evil, cunning, and ruthless, in her mind, the world exists to give her what she wants.... or else.
MIRABEL_MADRIGAL_QUOTE="Some of us have bigger problems."
MIRABEL_MADRIGAL_DESCRIPTION=Determined to be noticed, Mirabel will stop at nothing to make her mark on the world. Just don't try to tell her what to do.
HEIMLICH_QUOTE="I'm a beautiful butterfly."
HEIMLICH_DESCRIPTION=A plump caterpillar with a big heart and an even bigger appetite.
BRUNO_MADRIGAL_QUOTE="Bruno makes bad things happen."
BRUNO_MADRIGAL_DESCRIPTION=With the ability to see the future, Bruno has magical skills that make him a formidable fighter.
ISABELA_MADRIGAL_QUOTE="So much hides behind my smile."
ISABELA_MADRIGAL_DESCRIPTION=Seemingly perfect but entitled, Isabela is under enough pressure to make just about anyone crack. And when she does... look out!
LADY_AND_TRAMP_QUOTE="There's a great big hunk of world out there, and it's all ours for the taking."
LADY_AND_TRAMP_DESCRIPTION=This pampered cocker spaniel and streetwise mutt may seem like opposites, but opposites attract... and these two are loyal, determined, and ready to do some damage.
FRANNY_ROBINSON_QUOTE="Just a little tip for the future: I am always right. Even when I'm wrong, I'm right."
FRANNY_ROBINSON_DESCRIPTION=This assertive karate practitioner might seem maternal, but her ingenuity and speed make her an intimidating foe.
MAMA_ODIE_QUOTE="Not bad for a 197 year old blind lady!"
MAMA_ODIE_DESCRIPTION=A 197 year old blind voodoo priestess often referred as the Voodoo Queen of the Bayou. She has no shortage of spring in her step and misses nothing with her sight. She emanates great power but does not use it to grant wishes.
CHICKEN_LITTLE_QUOTE="The sky is falling!"
CHICKEN_LITTLE_DESCRIPTION=An impulsive cockerel that, what he lacks in size he more than makes up in sheer willpower. Wait a minute... hasn't there already been an action movie based on his heroics?
RATIGAN_QUOTE="I'm just trying to decide the most appropriate method for your demise."
RATIGAN_DESCRIPTION=This suave, determined crime lord will stop at nothing. But don't call him a rat - he's a mouse, and he won't hesitate to show his savage side when challenged.
JOE_GARDNER_QUOTE="Music is my soul, and I want to share it with everyone!"
JOE_GARDNER_DESCRIPTION=A passionate jazz musician, Joe seeks joy in every note, learning that life is about more than just dreams.
ELIZABETH_SWANN_QUOTE="I've had it with wobbly-legged, rum-soaked pirates!"
ELIZABETH_SWANN_DESCRIPTION=Elizabeth Swann is a fearless and determined young woman who becomes a pirate captain, fighting for justice, freedom, and adventure on the high seas.
MUFASA_QUOTE="Everything you see exists together in a delicate balance."
MUFASA_DESCRIPTION=The wise and benevolent King of the Pride Lands. Known for his deep sense of justice, strength, and compassion, he is a powerful and respected leader who governs with a balance of strength and kindness.
PENNY_PROUD_QUOTE="I'll be nice... until I don't have to be."
PENNY_PROUD_DESCRIPTION=A bold, confident, and clever teenager. Known for her quick wit and strong sense of justice, Penny isn't afraid to stand up for what she believes in or speak her mind.
FERB_QUOTE="Sometimes, the simplest inventions create the greatest adventures."
FERB_DESCRIPTION=A man of few words but boundless imagination, Ferb is an inventive genius and the perfect counterpart to his energetic stepbrother Phineas.
EMBER_LUMEN_QUOTE="Embrace the light while it burns because it won't always last forever."
EMBER_LUMEN_DESCRIPTION=Ember Lumen, with her fiery personality and control over flames, has the spark to ignite change and the strength to blaze through any challenge.
ANNE_BOONCHUY_QUOTE="When you've got your friend by your side, anything is possible."
ANNE_BOONCHUY_DESCRIPTION=Anne's quick thinking and fighting spirit make her a true hero in any world.
LUISA_MADRIGAL_QUOTE="Give it to your sister, it doesn't hurt n' see if she can handle every family burden."
LUISA_MADRIGAL_DESCRIPTION=The middle sister with the gift of super strength, she uses her power to help her family and community. However, beneath her tough exterior, she struggles with the pressure of always being reliable.
CHERNABOG_QUOTE="*evil roar*"
CHERNABOG_DESCRIPTION=A representation of pure evil, powerful, terrifying, a god... really, what's not to fear?
HUNTSMAN_QUOTE="I'm not interested in being a pet."
HUNTSMAN_DESCRIPTION=The Huntsman is a skilled tracker who relies on stealth and instinct in combat, wielding a hunting knife with precision.
WADE_RIPPLE_QUOTE="Why does anyone get to tell you what you can do in your life?"
WADE_RIPPLE_DESCRIPTION=Wade Ripple uses his adaptability and strength to overcome enemies, flowing through challenges with agility and resilience.
SUGA_MAMA_QUOTE="You better check yourself before you wreck yourself, boy!"
SUGA_MAMA_DESCRIPTION=Suga Mama is a tough, street-smart fighter who uses sharp wit and relentless determination to outmatch her opponents.
ANXIETY_QUOTE="I'm not freaking out! I'm just very, very aware of all the things that could possibly go wrong right now!"
ANXIETY_DESCRIPTION=Anxiety is a fast-talking, hyper-alert, and highly energetic emotion who constantly anticipates potential disasters. Always on edge and quick to panic, she embodies worry and caution, often channeling her stress into protective action.
REPTILLUS_MAXIMUS_QUOTE="To the armory!"
REPTILLUS_MAXIMUS_DESCRIPTION=Reptillus Maximus is a fearless warrior who charges into battle with unshakable bravery, using his gladiator skills to dominate his foes.
THOMAS_O_MALLEY_QUOTE="Your eyes are like sapphires sparkling so bright."
THOMAS_O_MALLEY_DESCRIPTION=Thomas O'Malley is a smooth-talking alley cat who uses his street smarts, charm, and nimble moves to outmaneuver enemies and rally his allies.
ISABELLA_SHAPIRO_QUOTE="What'cha doin'?"
ISABELLA_SHAPIRO_DESCRIPTION=A sharp-eyed strategist who notes every enemy's mistake and ensures those who step out of line face the consequences.
LILITH_CLAWTHORNE_QUOTE="Remember, dear sister, you may have been star player, but I was team captain for a reason."
LILITH_CLAWTHORNE_DESCRIPTION=Lilith Clawthorne is a highly skilled witch, specializing in glyph magic and potion-making.
LADY_TREMAINE_QUOTE="Girls, girls! Remember, above all, self-control."
LADY_TREMAINE_DESCRIPTION=With a poised demeanor and a heart full of cruelty, Lady Tremaine displays power through her sheer presence.
EDNA_MODE_QUOTE="No capes!"
EDNA_MODE_DESCRIPTION=Legendary fashion designer for superheroes. Brilliant, bold, and eccentric, Edna crafts high-tech suits with flair and zero capes.
GANTU_QUOTE="Place that idiot scientist under arrest."
GANTU_DESCRIPTION=A former Galactic Federation captain turned bounty hunter. Strong and disciplined but often clumsy, Gantu hunts with brute force, not brains.
CANDACE_FLYNN_QUOTE="I'm calling mom! And I am NOT using the banana this time!"
CANDACE_FLYNN_DESCRIPTION=Candace Flynn is an energetic, determined, and dramatic teenager obsessed with busting her inventive brothers, Phineas and Ferb. Underneath her high-strung exterior, Candace is warm-hearted, deeply caring, and driven by a desire for recognition and validation.
DR_CALICO_QUOTE="Every dog has its day. But this time belongs to Dr. Calico!"
DR_CALICO_DESCRIPTION=A charismatic and merciless evil genius whose goal is to achieve world domination, finding his plans ruined by a... dog?
PHINEAS_QUOTE="We're gonna need a blow torch and some more peanut butter."
PHINEAS_DESCRIPTION=A wacky inventor with a brain for big ideas, Phineas can't be stopped when he sets his mind on something.
CARL_THE_ROBOT_QUOTE="None may enter lest they speak the royal password!"
CARL_THE_ROBOT_DESCRIPTION=Carl is an energetic and quirky robot who works for the Robinson Family, doing tasks around the house. Despite his sometimes chaotic duties, he remains humorous and sympathetic, showing his altruistic side.
YEN_SID_QUOTE="I cannot shake the feeling something terrible is about to transpire."
YEN_SID_DESCRIPTION=A magician who believes firmly in the balance between Light and Dark, Yen Sid won't be easily swayed into any sort of mischief or pranks... or will he?
DUCHESS_QUOTE="Aristocats do not practice biting and clawing."
DUCHESS_DESCRIPTION=Graceful and kind, Duchess is a devoted mother and music lover who always carries herself with elegance. She cares deeply for her kittens and encourages them to grow into proper aristocats.
REUBEN_QUOTE="I could help... but sandwiches come first."
REUBEN_DESCRIPTION=Even though he is lazy and obsessed with sandwiches, Reuben is almost as powerful as Stitch. That is, if he ever decides to get off the couch.
ENVY_QUOTE="Ugh. I wish I was as tall as all of you."
ENVY_DESCRIPTION=Don't let her size fool you: Envy's got a big appetite for everything she doesn't have. Always eyeing the newest and coolest things, she's constantly comparing herself to others and longing for more.
HECTOR_RIVERA_QUOTE="Remember me, though I have to say goodbye."
HECTOR_RIVERA_DESCRIPTION=Once a beloved songwriter and performer, Héctor is now a forgotten spirit from the Land of the Dead.
SIMEA_QUOTE="You said you'd bring me a present."
SIMEA_DESCRIPTION=A fiery three-and-a-half-year-old full of energy, Simea idolizes her big sister and is already dreaming of her own adventures.
GISELLE_QUOTE="I wish you every happiness."
GISELLE_DESCRIPTION=Giselle dreams of finding her own Prince Charming and live happily ever after.
EMBARRASSMENT_QUOTE="And she's got us! Ooh! Yeah! Right?"
EMBARRASSMENT_DESCRIPTION=Extremely shy, easily embarrassed and a blushing machine, Embarrassment never hesitates to hide in his hoodie when things get awkward.
SCAT_CAT_QUOTE="Everybody wants to be a cat."
SCAT_CAT_DESCRIPTION=A cool, smooth-talking and energetic cat with a love for jazz and a talent for the trumpet.
ABBY_MALLARD_QUOTE="Bits of emotion flying everywhere!"
ABBY_MALLARD_DESCRIPTION=Confident, quirky, and never afraid to speak her mind, Abby Mallard is always ready to help her friends.
HEADLESS_HORSEMAN_QUOTE="*scary neigh*"
HEADLESS_HORSEMAN_DESCRIPTION=A terrifying rider mounted on a black horse with a pumpkin for a head instead of his real one. Every Halloween night he appears, seeking what he has lost.
ENNUI_QUOTE="You care too much about things."
ENNUI_DESCRIPTION=A master of boredom, proficient in the art of sighs and of eye rolls, Ennui is always glued to her phone and unimpressed by everything.
AMITY_BLIGHT_QUOTE="As 'Top Student', it is my duty to tell you to keep at it!"
AMITY_BLIGHT_DESCRIPTION=A highly competitive young witch, exceptionally skilled in magic, who gradually reveals her more caring and supportive side.
MARIE_QUOTE="Ladies do not start fights, but they can finish them!"
MARIE_DESCRIPTION=A small white kitten with a big attitude, Marie balances her ladylike charm with a fierce determination. Don't underestimate her: beneath her sweet appearance lies sharp claws!
ERNESTO_DE_LA_CRUZ_QUOTE="You have to do whatever it takes to... seize your moment."
ERNESTO_DE_LA_CRUZ_DESCRIPTION=Ernesto de la Cruz shines with charm and elegance, presenting himself as an adored star. But behind his gallant exterior lies vanity, greed, and a desperate hunger for fame. His relentless ambition drives him to do whatever it takes to stay on top.
GAZELLE_QUOTE="We cannot let fear divide us."
GAZELLE_DESCRIPTION=Gazelle is a kind, optimistic performer and passionate activist. Through music, dance and her words, she inspires others, promotes unity, and encourages everyone to work together and support one another.
PIGLET_QUOTE="The things that make me different are the things that make me, me."
PIGLET_DESCRIPTION=Timid but courageous, Piglet faces challenges with heart and wisdom, proving that even the smallest friends can make the biggest difference.
LIGHTNING_MCQUEEN_QUOTE="Ka-Chow!"
LIGHTNING_MCQUEEN_DESCRIPTION=A fearless racing champion with a need for speed. Lightning McQueen's confidence and quick moves make him unstoppable on any track.
BAMBI_QUOTE="Bird, bird, bird, bird, bird, bir...!"
BAMBI_DESCRIPTION=A gentle young deer learning about life. Curious, playful, and full of innocence, Bambi grows stronger and wiser with every new experience.
DARWIN_QUOTE="I may not be genetically engineered, but I'm no house pet either!"
DARWIN_DESCRIPTION=Clever and inventive, Darwin combines brains, gadgets, and courage to take on any mission. Loyal and caring to his teammates, he's always ready to have their backs.
PINOCCHIO_QUOTE="Oh, oh! Look! My nose! What's happened?"
PINOCCHIO_DESCRIPTION=A wooden boy with a big heart and even bigger dreams, Pinocchio is endlessly curious and always strives to be brave and honest. Though he stumbles often, his determination to become a real boy never wavers.
KING_CANDY_QUOTE="Have some candy!"
KING_CANDY_DESCRIPTION=Sweet on the outside and rotten at the core, King Candy rules with false charm and hidden malice. Beneath his colorful, sugary persona lies a calculating mind obsessed with control, power, and keeping his secrets buried.
PONGO_QUOTE="Hurry, kids. Hurry!"
PONGO_DESCRIPTION=A devoted dalmatian with a clever mind and a fearless heart, Pongo will never stop protecting his family. Loyal, resourceful, and quick to act, he's always ready to leap into danger for those he loves.
HANS_QUOTE="Can I say something crazy? Will you marry me?"
HANS_DESCRIPTION=Charming and ambitious, Hans is a smooth-talking prince with dreams of rising to power. Clever and persuasive, he knows how to make a grand gesture and seize opportunities, but his charm hides a cunning and calculating side that often works to his advantage.
LOTSO_QUOTE="Where's your kid now, Sheriff!"
LOTSO_DESCRIPTION=Lots-o'-Huggin' Bear is a strawberry-scented hugger. Charming on the surface and cunning underneath, those who don't play by his rules... won't play for long!
YOKAI_QUOTE="You're going to watch everything you built disappear, then it's your turn."
YOKAI_DESCRIPTION=A brilliant mind buried beneath grief and rage. Cold, calculating, and relentless, Yokai bends technology to his will, driven by a loss he refuses to let go.
MATER_QUOTE="Yeah, like "Tuh-Mater", but without the "Tuh"!"
MATER_DESCRIPTION=A rusty but lovable tow truck with a heart of gold, Mater is endlessly loyal, optimistic, and always ready for an adventure.
MOLLY_MCGEE_QUOTE="Light is more powerful than darkness."
MOLLY_MCGEE_DESCRIPTION=Cheerful and kind, Molly McGee believes positivity can change the world. With optimism and a big heart, she spreads joy and lifts others up.
CAPTAIN_GRIME_QUOTE="I need warriors who are fierce, cunning, and above all, ruthless!"
CAPTAIN_GRIME_DESCRIPTION=A hardened and imposing warlord, Captain Grime values strength, discipline, and survival above all else. Gruff and intimidating on the outside, he leads with experience and strategy.
DUMBO_QUOTE=*ears flapping*
DUMBO_DESCRIPTION=A tiny elephant with extraordinary ears, Dumbo may be shy and soft-spoken, but his courage shows when it matters most. Guided by love and determination, he learns to believe in himself and rise above his fears.
BENJAMIN_FRANKLIN_GATES_QUOTE="I'm gonna steal the Declaration of Independence."
BENJAMIN_FRANKLIN_GATES_DESCRIPTION=A brilliant historian and relentless treasure hunter, Benjamin Franklin Gates lives for uncovering secrets hidden, chasing clues and diving headfirst into danger if it means protecting history.
SCUTTLE_QUOTE="It's a dinglehopper. Humans use these little babies... to straighten their hair out."
SCUTTLE_DESCRIPTION=An overly confident seagull with a talent for misinformation, Scuttle is enthusiastic, loud, and always eager to help.
MOWGLI_QUOTE="I wanna stay in the jungle!"
MOWGLI_DESCRIPTION=A carefree boy raised by the jungle, where Mowgli feels most at home. Curious, brave, and loyal to his friends, he navigates the wild, embracing the adventure.
