CH_106_LVL_16_TITLE=Trust The System
CH_106_LVL_16_DESC=The heroes are stunned. Every moment, every triumph, every memory could disappear, erased, as if it never happened. Now, they must choose: risk everything to stay, or place their trust in the system to safeguard their worlds.
