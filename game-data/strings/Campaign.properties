CH_107_LVL_19_TITLE=The End
CH_107_LVL_19_DESC=The Platinum energy pulses one final time, a gentle wave that envelopes each hero. Slowly, they feel themselves being carried away, back to their own worlds. In the distance, the Oasis dissolves into light, leaving only distant memories.
