CH_106_LVL_9_DESC=As Negaduck comes closer to the Queen menacingly, Edna's voice crackles over the comms. "Wait, I figured it out! Stopping the corruption abruptly... it's too dangerous! A sudden collapse could destroy the Hub and spread through the portals. It could even erase our true worlds!"
CH_106_LVL_10_TITLE=The Price
CH_106_LVL_10_DESC=As heroes look at each other in awe, Edna adds: "However, if we allow the energies to collide, the system... will be erased. Each hero will be safely returned to their own world, protecting it... but this come with a price."
