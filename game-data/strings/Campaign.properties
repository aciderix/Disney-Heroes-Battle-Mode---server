CH_107_LVL_6_TITLE=Gentle Landing
CH_107_LVL_6_DESC=The chaos fades. The noise disappears. All the heroes from the Hub feel themselves carried, weightless, inside a calm current of Platinum light: no pain, no fear, only quiet.
CH_107_LVL_7_TITLE=World Between Worlds
CH_107_LVL_7_DESC=The light reshapes the space around them. The heroes slowly open their eyes and find themselves somewhere familiar... the Oasis. Not a battlefield. Not a mission. A meeting point to all heroes, a copy of the location, formed by the Platinum's last breath.
CH_107_LVL_8_TITLE=World Between Worlds
CH_107_LVL_8_DESC=The light reshapes the space around them. The heroes slowly open their eyes and find themselves somewhere familiar... the Oasis. This time, not a battlefield. Not a mission. A meeting point to all heroes, a copy of the location, formed by the Platinum's last breath.
CH_107_LVL_9_TITLE=World Between Worlds
CH_107_LVL_9_DESC=The light reshapes the space around them. The heroes slowly open their eyes and find themselves somewhere familiar... the Oasis. Not a battlefield. Not a mission. A meeting point to all heroes, a copy of the location, formed by the Platinum's last breath.
CH_107_LVL_10_TITLE=Truth Spreads
CH_107_LVL_10_DESC=The word begins to spread across the Oasis. One by one, the heroes understand what is happening: not just through words, but through the Platinum itself: the journey is ending. The collision cannot be stopped. Soon, they will all return home... and everything they lived here may fade away.
CH_107_LVL_11_TITLE=Truth Spreads
CH_107_LVL_11_DESC=The word begins to spread across the Oasis. One by one, the heroes understand what is happening: not just through words, but through the Platinum itself: the journey is ending. The collision cannot be stopped. Soon, they will all return home... and everything they lived here may fade away.
CH_107_LVL_12_TITLE=Truth Spreads
CH_107_LVL_12_DESC=The word begins to spread across the Oasis. One by one, the heroes understand what is happening: not just through words, but through the Platinum itself: the journey is ending. The collision cannot be stopped. Soon, they will all return home... and everything they lived here may fade away.
CH_107_LVL_13_TITLE=Lesson Learned
CH_107_LVL_13_DESC=As the realization spreads, Negaduck steps forward, looking at the Queen, with his voice being clearly carried across the Oasis: "I had realized the true power of the Platinum as my greed told me to get more of it... and I knew it would have destroyed everything. I couldn't let that happen. Not here. Not in your worlds."
CH_107_LVL_14_TITLE=Lesson Learned
CH_107_LVL_14_DESC=As the realization spreads, Negaduck steps forward, looking at the Queen, with his voice being clearly carried across the Oasis: "I had realized the true power of the Platinum as I got more of it... and I knew it would have destroyed everything. I couldn't let that happen. Not here. Not in your worlds."
CH_107_LVL_15_TITLE=Lesson Learned
CH_107_LVL_15_DESC=As the realization spreads, Negaduck steps forward, looking at the Queen, with his voice being clearly carried across the Oasis: "I had realized the true power of the Platinum as I got more of it... and I knew it would have destroyed everything. I couldn't let that happen. Not here. Not in your worlds."
CH_107_LVL_16_TITLE=Farewell
CH_107_LVL_16_DESC=The heroes look at each other, a bittersweet mix of relief and sadness in their eyes. They share smiles, small gestures, and words of gratitude, even ones who used to fight. No battle remains, only the acceptance that this adventure is ending, that the bonds they formed were real, even if memory will fade.
CH_107_LVL_17_TITLE=Farewell
CH_107_LVL_17_DESC=The heroes look at each other, a bittersweet mix of relief and sadness in their eyes. They share smiles, small gestures, and words of gratitude, even ones who used to fight. No battle remains, only the acceptance that this adventure is ending, that the bonds they formed were real, even if memory will fade.
