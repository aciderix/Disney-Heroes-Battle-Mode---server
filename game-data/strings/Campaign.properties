CH_106_LVL_19_TITLE=Collision Begins
CH_106_LVL_19_DESC=The heroes finally decide to trust the system: "Even if we forget... even if everything we've done vanishes, this is the right choice. Our worlds matter." And with that, the collision begins.
CH_107_TITLE=Back Home
CH_107_LVL_1_TITLE=After the Collision
CH_107_LVL_1_DESC=The moment the energies collide, the Hub is consumed by a blinding surge of light. Platinum and corruption crash together in a silent, overwhelming explosion that washes across reality itself. It fractures into fragments of fading code, dissolving into pure energy. Yet, instead of destruction... there is calm.
CH_107_LVL_2_TITLE=After the Collision
