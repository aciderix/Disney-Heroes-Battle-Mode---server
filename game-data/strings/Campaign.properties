CH_10_LVL_1_DESC=Vanellope rushes out of the subway to the Park, heading towards the Midway.
CH_10_LVL_2_TITLE=Walnut Hill
CH_10_LVL_2_DESC=Ralph and the others rush to keep up with Vanellope.
CH_10_LVL_3_TITLE=Oak Street
CH_10_LVL_3_DESC=Ralph gets Vanellope to sit still long enough to voice his concerns.
CH_10_LVL_4_TITLE=Elm Avenue
CH_10_LVL_4_DESC=Vanellope reluctantly agrees to stay with the rest of the team.
CH_10_LVL_5_TITLE=Marigold Lane
CH_10_LVL_5_DESC=Bugs start swarming out of the trees, coming straight towards our heroes!
CH_10_LVL_6_TITLE=Birch Street
CH_10_LVL_6_DESC=Calhoun starts shooting Bugs left and right. Ralph tries to help.
CH_10_LVL_7_TITLE=Tulip Lane
CH_10_LVL_7_DESC=Bugs neutralized, the team resumes their journey towards the Midway.
CH_10_LVL_8_TITLE=Sunflower Street
CH_10_LVL_8_DESC=Excited, Vanellope can't keep still. She can see the Midway up ahead!
CH_10_LVL_9_TITLE=Pinball Alley
CH_10_LVL_9_DESC=As our heroes reach the entrance to the Midway, they plan their next move.
CH_10_LVL_10_TITLE=Coaster Street
CH_10_LVL_10_DESC=The team makes their way through the Midway, looking for clues.
CH_10_LVL_11_TITLE=Go-Kart Avenue
CH_10_LVL_11_DESC=Vanellope scours the racetrack for signs of an entryway, but all she finds is scattered kart parts.
CH_10_LVL_12_TITLE=Winner's Way
CH_10_LVL_12_DESC=Ralph spots a bike rack next to Illumination Station. The team rushes to the area.
CH_10_LVL_13_TITLE=Illumination Alley
CH_10_LVL_13_DESC=The game is certainly covered in lights, but there is no secret entrance.
CH_10_LVL_14_TITLE=Kiddie Street
CH_10_LVL_14_DESC=Frozone spots a small bike carousel for children. The team investigates.
CH_10_LVL_15_TITLE=Carousel Way
CH_10_LVL_15_DESC=The team takes a break to ride the carousel before continuing.
CH_10_LVL_16_TITLE=Golfer's Green
CH_10_LVL_16_DESC=Creeps invade the Golf Course. The team takes a break to kick them out.
CH_10_LVL_17_TITLE=Cotton Candy Lane
CH_10_LVL_17_DESC=The creeps chase our heroes off the golf course and into the Midway.
CH_10_LVL_18_TITLE=Prize Alley
CH_10_LVL_18_DESC=The heroes search the Midway game stalls, hoping to find a clue.
CH_10_LVL_19_TITLE=Arcade Avenue
CH_10_LVL_19_DESC=The team has looked everywhere! The only place left to check is the Arcade.
CH_11_TITLE=Power Line
CH_11_LVL_1_TITLE=Utilidor 1
CH_11_LVL_1_DESC=The team is surprised to discover that the secret doorway leads to the underground tunnels below the City.
CH_11_LVL_2_TITLE=Utilidor 4
CH_11_LVL_2_DESC=Vanellope rushes ahead, spotting the same striped pillars that led the team to the underground HackerSpace.
CH_11_LVL_3_TITLE=Utilidor 8
CH_11_LVL_3_DESC=Ralph loses sight of Vanellope as she zooms ahead. Suddenly, they hear her yelling for backup.
CH_11_LVL_4_TITLE=Utilidor 9
CH_11_LVL_4_DESC=Ralph slams the ground with his fists, sending the creeps surrounding his friend sprawling.
CH_11_LVL_5_TITLE=Utilidor 14
CH_11_LVL_5_DESC=The team continues to follow the striped pillars, hoping to find some computers.
CH_11_LVL_6_TITLE=Utilidor 22
CH_11_LVL_6_DESC=The team trades alternate theories about the disappearance of the computers.
CH_11_LVL_7_TITLE=Utilidor 25
CH_11_LVL_7_DESC=Mrs. Incredible thinks the computers could have been taken by a powerful super villain for nefarious reasons.
CH_11_LVL_8_TITLE=Utilidor 27
CH_11_LVL_8_DESC=Officer Hopps wonders if the computers were stolen to be resold on the Black Market.
CH_11_LVL_9_TITLE=Utilidor 28
CH_11_LVL_9_DESC=Jack Sparrow suggests that "computers" must be a collective dream. He's certainly never seen one before.
CH_11_LVL_10_TITLE=Utilidor 30
CH_11_LVL_10_DESC=But no one believes Jack Sparrow's theory. Not even the other pirates.
CH_11_LVL_11_TITLE=Utilidor 32
CH_11_LVL_11_DESC=Vanellope isn't convinced by any of these theories.
CH_11_LVL_12_TITLE=Utilidor 38
CH_11_LVL_12_DESC=The computers weren't just taken. It appears as if they never existed in the first place.
CH_11_LVL_13_TITLE=Utilidor 50
CH_11_LVL_13_DESC=Yax finds a broken monitor. They must be getting close!
CH_11_LVL_14_TITLE=Utilidor 52
CH_11_LVL_14_DESC=The creeps are smashing every computer they can find as if it's their mission.
CH_11_LVL_15_TITLE=Utilidor 57
CH_11_LVL_15_DESC=The team works to stop the creeps from smashing the computers.
CH_11_LVL_16_TITLE=Utilidor 56
CH_11_LVL_16_DESC=The team gets pushed back by creeps trying to attack Yax. They have to defend him.
CH_11_LVL_17_TITLE=Utilidor 58
CH_11_LVL_17_DESC=A Brute leaps at Yax to pull him from the computers. Vanellope sends the Brute back with a splash of soda.
CH_11_LVL_18_TITLE=Utilidor 59
CH_11_LVL_18_DESC=Creeps come pouring in from all sides, trying to stop Yax. He tells the team he's almost finished.
CH_11_LVL_19_TITLE=Utilidor 61
CH_11_LVL_19_DESC=The team kicks the remaining creeps out while Yax finishes up.
CH_12_TITLE=Data Line
CH_12_LVL_1_TITLE=Arcade Station
CH_12_LVL_1_DESC=Yax and the team try to find a quiet place to chat about his latest findings.
CH_12_LVL_2_TITLE=Stack Station
CH_12_LVL_2_DESC=The team follows close behind Yax as he heads straight for a mural of a stack of computers.
CH_12_LVL_3_TITLE=Stack Station (Northbound)
CH_12_LVL_3_DESC=Yax taps the mural twice on one of the painted screens. A strange subway car appears.
CH_12_LVL_4_TITLE=Utilidor 248
CH_12_LVL_4_DESC=Finnick spots a striped pillar up ahead. The team decide the best course of action is to follow the pillars.
CH_12_LVL_5_TITLE=Utilidor 216
CH_12_LVL_5_DESC=Suddenly, thousands of glowing eyes appear in the distance.
CH_12_LVL_6_TITLE=Utilidor 205
CH_12_LVL_6_DESC=A creep army appears! The team tries to fight them off.
CH_12_LVL_7_TITLE=Utilidor 198
CH_12_LVL_7_DESC=The team fights through the creeps. Suddenly, ominous laughter echoes through the corridors...
CH_12_LVL_8_TITLE=Utilidor 196
CH_12_LVL_8_DESC=The shadowy figure disappears as the army of creeps rushes the team.
CH_12_LVL_9_TITLE=Utilidor 175
CH_12_LVL_9_DESC=Ralph smashes a hole in the wall, opening up a side corridor for the team to retreat into.
CH_12_LVL_10_TITLE=Utilidor 168
CH_12_LVL_10_DESC=The creep army rushes by, passing our heroes. That was close!
CH_12_LVL_11_TITLE=Utilidor 165
CH_12_LVL_11_DESC=The team searches for the shadowy figure.
CH_12_LVL_12_TITLE=Utilidor 162
CH_12_LVL_12_DESC=Frozone and Vanellope swap theories about the maniacal bad guy.
CH_12_LVL_13_TITLE=Utilidor 146
CH_12_LVL_13_DESC=Mrs. Incredible hears laughter up ahead. The team fights their way towards the sound.
CH_12_LVL_14_TITLE=Utilidor 141
CH_12_LVL_14_DESC=Ralph spots the shadowy figure in the distance. The team rushes ahead, hoping to catch him.
CH_12_LVL_15_TITLE=Utilidor 122
CH_12_LVL_15_DESC=A group of creeps blocks the way as the team tries to pursue.
CH_12_LVL_16_TITLE=Utilidor 114
CH_12_LVL_16_DESC=The corridors open up to a huge command center. The shadowy figure runs towards the consoles.
CH_12_LVL_17_TITLE=Utilidor 113
CH_12_LVL_17_DESC=The figure summons creeps as if from thin air and starts typing furiously into the consoles.
CH_12_LVL_18_TITLE=Utilidor 112
CH_12_LVL_18_DESC=Before the heroes can stop them, the mysterious figure jumps onto a train and disappears!
CH_12_LVL_19_TITLE=Mysterious Subway
CH_12_LVL_19_DESC=The team jumps onto the next train, hoping that they can catch up.
CH_13_TITLE=Bottom Line
CH_13_LVL_1_TITLE=Hidden Street
CH_13_LVL_1_DESC=The subway pulls up and the heroes hop out, hoping to catch the villain unawares.
CH_13_LVL_2_TITLE=Neon Alley
CH_13_LVL_2_DESC=Unfortunately, the venomous villain they were pursuing is nowhere to be found.
CH_13_LVL_3_TITLE=Automation Lane
CH_13_LVL_3_DESC=Mrs. Incredible looks around, slightly bewildered.
CH_13_LVL_4_TITLE=Application Alley
CH_13_LVL_4_DESC=After some discussion, the heroes realize that none of them have been to this area of the City before.
CH_13_LVL_5_TITLE=Industrious Lane
CH_13_LVL_5_DESC=The team decides to explore the district, hoping to find signs of their quarry.
CH_13_LVL_6_TITLE=Gadget Street
CH_13_LVL_6_DESC=Vanellope and Ralph, excited to explore someplace new, dash down the streets.
CH_13_LVL_7_TITLE=Gizmo Lane
CH_13_LVL_7_DESC=Mrs. Incredible yells after the two, telling them not to get too far ahead.
CH_13_LVL_8_TITLE=Whatsits Way
CH_13_LVL_8_DESC=After exploring on their own, Ralph and Vanellope return, looking frustrated.
CH_13_LVL_9_TITLE=Whosits Lane
CH_13_LVL_9_DESC=Despite Mrs. Incredible's warnings, Vanellope and Ralph go running off again.
CH_13_LVL_10_TITLE=Widget Way
CH_13_LVL_10_DESC=Mr. Incredible tries to find out more about this mysterious location.
CH_13_LVL_11_TITLE=Gear Street
CH_13_LVL_11_DESC=Ralph and Vanellope report on what they've seen. Lots of neon signs and tech-y companies.
CH_13_LVL_12_TITLE=Device Drive
CH_13_LVL_12_DESC=Vanellope hears creepy laughter up ahead and goes running towards it before Mrs. Incredible can stop her.
CH_13_LVL_13_TITLE=Glitch Alley
CH_13_LVL_13_DESC=Before the team can stop him, the Inventor grabs Vanellope!
CH_13_LVL_14_TITLE=Byte Street
CH_13_LVL_14_DESC=The team defends Vanellope against a wave of creeps as the Inventor escapes down an alley.
CH_13_LVL_15_TITLE=Binary Lane
CH_13_LVL_15_DESC=Ralph yells in frustration as the creeps keep coming. The Inventor is getting away!
CH_13_LVL_16_TITLE=Equation Blvd
CH_13_LVL_16_DESC=Mrs. Incredible kicks a creep into Mr. Incredible, who punches it down the block.
CH_13_LVL_17_TITLE=Algorithm Lane
CH_13_LVL_17_DESC=Ralph slams the ground with his fists, opening a rift between the creeps and Vanellope.
CH_13_LVL_18_TITLE=Click Street
CH_13_LVL_18_DESC=Vanellope blasts the creeps with her soda soaker, covering them in sticky sweetness.
CH_13_LVL_19_TITLE=Black Hat Lane
CH_13_LVL_19_DESC=The team clears out the last of the creeps and regroups.
CH_14_TITLE=Top Line
CH_14_LVL_1_TITLE=Hack Station
CH_14_LVL_1_DESC=The team hops a subway train to explore the north side of the District, hoping to find clues.
CH_14_LVL_2_TITLE=Alpha Street
CH_14_LVL_2_DESC=The team emerges from the underground, astonished at what they see.
CH_14_LVL_3_TITLE=Test Lane
CH_14_LVL_3_DESC=Vanellope points out areas that the heroes should avoid as they start to explore.
CH_14_LVL_4_TITLE=QA Street
CH_14_LVL_4_DESC=Ralph and Calhoun try to explain the concept of an "unfinished level" to the others.
CH_14_LVL_5_TITLE=Prototype Alley
CH_14_LVL_5_DESC=Unfortunately, the fact that the level is incomplete doesn't mean it's not filled with creeps.
CH_14_LVL_6_TITLE=Street A1
CH_14_LVL_6_DESC=Mrs. Incredible punches a Ghoul, sending it flying across the street. It hits a building and disappears.
CH_14_LVL_7_TITLE=Street B2
CH_14_LVL_7_DESC=The team continues to search the area for clues.
CH_14_LVL_8_TITLE=Lorem Ipsum Lane
CH_14_LVL_8_DESC=Mrs. Incredible and Finnick try to see if there is any useful graffiti in the area.
CH_14_LVL_9_TITLE=Street C3
CH_14_LVL_9_DESC=Unfortunately, it appears that the Resistance hasn't been to this district either. Their graffiti is nowhere to be found.
CH_14_LVL_10_TITLE=Placeholder Blvd
CH_14_LVL_10_DESC=Buzz and Mr. Incredible try to interrogate some creeps, but all they say is "PURGE THE ERRORS!"
CH_14_LVL_11_TITLE=Street D4
CH_14_LVL_11_DESC=Judy and Frozone analyze the street names, hoping to find some sort of code or cipher.
CH_14_LVL_12_TITLE=Staging Street
CH_14_LVL_12_DESC=Calhoun informs Judy and Frozone that the street signs are nonsense while blasting a Mage out of their path.
CH_14_LVL_13_TITLE=Street E5
CH_14_LVL_13_DESC=Ralph, frustrated by their lack of progress, tries to wreck a building to get to some creeps. His fist just goes right through it.
CH_14_LVL_14_TITLE=Storage Street
CH_14_LVL_14_DESC=Ralph's yelling draws the attention of more creeps.
CH_14_LVL_15_TITLE=Trunk Lane
CH_14_LVL_15_DESC=Yax takes a closer look at some of the unfinished buildings.
CH_14_LVL_16_TITLE=Playtest Alley
CH_14_LVL_16_DESC=After some inspection, Yax calls Calhoun and Vanellope over. He's found something!
CH_14_LVL_17_TITLE=Street F6
CH_14_LVL_17_DESC=Yax leads the team towards the subway to catch a train to the mysterious workshop.
CH_14_LVL_18_TITLE=Wireframe Lane
CH_14_LVL_18_DESC=As they walk, Vanellope and Calhoun debate their theories about the unfinished level.
CH_14_LVL_19_TITLE=Development Station
CH_14_LVL_19_DESC=The team heads down to the subway, hoping to find clues at the Workshop.
CH_15_TITLE=Inquiry Line
CH_15_LVL_1_TITLE=Test Station
CH_15_LVL_1_DESC=When the heroes arrive at the next subway platform, they look for clues, hoping to find the mysterious workshop.
CH_15_LVL_2_TITLE=Code Lab
CH_15_LVL_2_DESC=Yax takes the lead. It isn't long before the heroes find the workshop.
CH_15_LVL_3_TITLE=Design Lab
CH_15_LVL_3_DESC=Before anyone can examine the notebook further, creeps raid the workshop.
CH_15_LVL_4_TITLE=QA Lab
CH_15_LVL_4_DESC=The heroes are forced to retreat. Mrs. Incredible fights off the creeps while everyone else makes a break for it.
CH_15_LVL_5_TITLE=Writing Lab
CH_15_LVL_5_DESC=Thankfully, Ralph is able to stash the notebook in his pocket before the creeps can get their hands on it.
CH_15_LVL_6_TITLE=Environments Lab
CH_15_LVL_6_DESC=Once they're out of harm's way, Ralph and the others study the notebook.
CH_15_LVL_7_TITLE=Enemy Lab
CH_15_LVL_7_DESC=The heroes make a break for it but find themselves surrounded by creeps!
CH_15_LVL_8_TITLE=Balance Lab
CH_15_LVL_8_DESC=Unsure of where to turn, the heroes fight the creeps head on!
CH_15_LVL_9_TITLE=Render Lab
CH_15_LVL_9_DESC=Buzz shoots a Mage in the eyes with his laser. The blinded creep flies into a panic!
CH_15_LVL_10_TITLE=Physics Lab
CH_15_LVL_10_DESC=With the creeps pushed back, the heroes take a break to regroup.
CH_15_LVL_11_TITLE=Level Lab
CH_15_LVL_11_DESC=Ralph finds a wooden structure that looks exactly like the Black Market...weird.
CH_15_LVL_12_TITLE=Sound Lab
CH_15_LVL_12_DESC=Vanellope jumps when she finds herself face to face with a Turret, but it's just a sculpture.
CH_15_LVL_13_TITLE=Interface Lab
CH_15_LVL_13_DESC=The heroes enter another lab, hoping to find an exit. But they only find an army of creeps.
CH_15_LVL_14_TITLE=Building Lab
CH_15_LVL_14_DESC=The creeps lunge for the notebook! The team closes ranks, trying to protect it.
CH_15_LVL_15_TITLE=Animation Lab
CH_15_LVL_15_DESC=In the safety of Violet's forcefield, Ralph takes out the notebook and passes it to Vanellope and Shank.
CH_15_LVL_16_TITLE=Test Lab
CH_15_LVL_16_DESC=Vanellope shouts in surprise, causing Violet to lose her concentration. The force field blinks for a moment, but then recovers.
CH_15_LVL_17_TITLE=Art Lab
CH_15_LVL_17_DESC=Shank and Vanellope try their best to describe hidden levels to the rest of the heroes, but things get lost in translation.
CH_15_LVL_18_TITLE=Server Lab
CH_15_LVL_18_DESC=Finally, the creeps give up trying to break through Violet's force field. The coast is clear, and the heroes decide to move on.
CH_15_LVL_19_TITLE=City Station
CH_15_LVL_19_DESC=The heroes waste no time and head back to the City as fast as they can.
CH_16_TITLE=Unfinished Business
CH_16_LVL_1_TITLE=Incomplete Street
CH_16_LVL_1_DESC=Frustration mounts when the heroes discover that they must travel through the unfinished level again.
CH_16_LVL_2_TITLE=Faulty Road
CH_16_LVL_2_DESC=In an effort to break the tension, Mrs. Incredible tries to learn more about "Hidden Levels".
CH_16_LVL_3_TITLE=Undeveloped Alley
CH_16_LVL_3_DESC=Creeps are waiting the next block over! The waylaid heroes must deal with the villains.
CH_16_LVL_4_TITLE=Immature Way
CH_16_LVL_4_DESC=Judy delivers a flying kick to a creep and sends him flying.
CH_16_LVL_5_TITLE=Shapeless Circle
CH_16_LVL_5_DESC=Yax raises his arms to cheer on Judy and accidently delivers a K.O. with his B.O. The creep never saw it coming.
CH_16_LVL_6_TITLE=Unadorned Alley
CH_16_LVL_6_DESC=Violet and Buzz hold back the rest of the creeps while everyone else makes a break for it.
CH_16_LVL_7_TITLE=Crude Road
CH_16_LVL_7_DESC=As the heroes make their way through the unfinished area, Vanellope spots creeps heading their way!
CH_16_LVL_8_TITLE=Sketchy Street
CH_16_LVL_8_DESC=In the time it took to find the notebook, the creeps must have gotten acclimated to the area.
CH_16_LVL_9_TITLE=Raw Road
CH_16_LVL_9_DESC=The creeps run through the transparent buildings and scale the half visible walls with ease.
CH_16_LVL_10_TITLE=Dabbling Court
CH_16_LVL_10_DESC=Before our heroes know it, the area is swarming with a horde. The air buzzes with electricity.
CH_16_LVL_11_TITLE=Lacking Lane
CH_16_LVL_11_DESC=Mrs. Incredible can tell they're in for a hard fight. She tells Violet to be ready to create a shield.
CH_16_LVL_12_TITLE=Undone Street
CH_16_LVL_12_DESC=Violet stands at the ready, as the rest of the heroes prepare to fight.
CH_16_LVL_13_TITLE=Unpolished Avenue
CH_16_LVL_13_DESC=As the horde closes in around the heroes, everyone readies on the defense.
CH_16_LVL_14_TITLE=Tentative Lane
CH_16_LVL_14_DESC=But, as the horde swells, so do the streets. The buildings bow into the horde, unable to sustain their shape.
CH_16_LVL_15_TITLE=Imperfect Avenue
CH_16_LVL_15_DESC=The area can't sustain so many creeps in one place! The buildings begin to tremble and shake. The heroes make a run for it.
CH_16_LVL_16_TITLE=Half-Baked Lane
CH_16_LVL_16_DESC=As our heroes run through the streets, buildings begin to crumble! The horde scatters as creeps run for safety.
CH_16_LVL_17_TITLE=Rough Road
CH_16_LVL_17_DESC=Putting the swaying buildings out of their minds, the heroes scramble to get to the Subway Station.
CH_16_LVL_18_TITLE=Unassembled Alley
CH_16_LVL_18_DESC=Creeps go flying as buildings and streets explode around them. Ralph is elated that the area is finally getting wrecked.
CH_16_LVL_19_TITLE=Fragmentary Lane
CH_16_LVL_19_DESC=The heroes escape to the safety of the subway just as the entrance collapses under the weight of the destruction.
CH_17_TITLE=Hacker Station
CH_17_LVL_1_TITLE=Utilidor 1
CH_17_LVL_1_DESC=Mrs. Incredible does a head count and finds that, though shaken and tired, everyone is safe and accounted for.
CH_17_LVL_2_TITLE=Utilidor 6
CH_17_LVL_2_DESC=When the heroes arrive at the Hacker Space, Mrs. Incredible asks everyone to suggest some next steps.
CH_17_LVL_3_TITLE=Utilidor 9
CH_17_LVL_3_DESC=The discovery of the deleted computers shocks everyone.
CH_17_LVL_4_TITLE=Utilidor 13
CH_17_LVL_4_DESC=But before anyone can get too disheartened by the situation, Shank suggests they scour the Hacker Space again.
CH_17_LVL_5_TITLE=Utilidor 14B
CH_17_LVL_5_DESC=Each of the heroes heads off on their own to search for clues.
CH_17_LVL_6_TITLE=Utilidor 21C
CH_17_LVL_6_DESC=Vanellope finds a codex with information on the hidden levels. She brings it to Mrs. Incredible.
CH_17_LVL_7_TITLE=Utilidor 23D
CH_17_LVL_7_DESC=Before anyone can lay hands on him, the Inventor runs towards the subway station.
CH_17_LVL_8_TITLE=Utilidor 25
CH_17_LVL_8_DESC=The heroes chase after him, but it's too late. The Inventor boards the subway and vanishes.
CH_17_LVL_9_TITLE=Utilidor 27C
CH_17_LVL_9_DESC=The heroes head back to the Hacker Space and continue searching. Shank and Vanellope pour over the codex.
CH_17_LVL_10_TITLE=Utilidor 31A
CH_17_LVL_10_DESC=Yax finds some spare parts for his device, which could come in handy in the future.
CH_17_LVL_11_TITLE=Utilidor 40
CH_17_LVL_11_DESC=Sergeant Calhoun comes up empty handed. Frustrated, she blasts a nearby pillar to let off some steam.
CH_17_LVL_12_TITLE=Utilidor 42
CH_17_LVL_12_DESC=Mrs. Incredible finds some old resistance graffiti. Though it looks interesting, she doesn't think it will help them.
CH_17_LVL_13_TITLE=Utilidor 43
CH_17_LVL_13_DESC=Ralph starts to impatiently tap his foot. He's told to stop when the Hacker Space starts shaking.
CH_17_LVL_14_TITLE=Utilidor 49
CH_17_LVL_14_DESC=Meanwhile, Vanellope and Shank are still busy making notes and deciphering the codex.
CH_17_LVL_15_TITLE=Utilidor 51
CH_17_LVL_15_DESC=As the heroes begin to run out of places to search, anxiety begins to mount.
CH_17_LVL_16_TITLE=Utilidor 52
CH_17_LVL_16_DESC=Just as the heroes start to give into the idea that they've reached a dead end, Shank makes an announcement.
CH_17_LVL_17_TITLE=Utilidor 53
CH_17_LVL_17_DESC=With renewed energy, everyone begins to brainstorm about where the hidden levels might be located.
CH_17_LVL_18_TITLE=Utilidor 57
CH_17_LVL_18_DESC=The heroes can hear the creeps rioting overhead in the unfinished level. That only motivates them more.
CH_17_LVL_19_TITLE=Utilidor 59
CH_17_LVL_19_DESC=As the heroes try to determine where the hidden levels may be, Mrs. Incredible furrows her brow. She just might have a theory.
CH_18_TITLE=Wet Wired
CH_18_LVL_1_TITLE=Utilidor 60
CH_18_LVL_1_DESC=Working into the night, everyone is bleary-eyed from exhaustion, but their efforts were not in vain.
CH_18_LVL_2_TITLE=Utilidor 61
CH_18_LVL_2_DESC=The walls of the Hacker Space are covered with ideas and theories about where to head next.
CH_18_LVL_3_TITLE=Port 1A
CH_18_LVL_3_DESC=The heroes venture to the Port.
CH_18_LVL_4_TITLE=Port 1B
CH_18_LVL_4_DESC=The Port is a long way from the Hacker Space, so everyone is on high alert for creeps.
CH_18_LVL_5_TITLE=Port 2A
CH_18_LVL_5_DESC=Much to everyone's shock, despite there being some creeps in need of clearing, the long journey is relatively uneventful.
CH_18_LVL_6_TITLE=Port 2B
CH_18_LVL_6_DESC=Finally, the heroes arrive at the Port. They find Jack Sparrow perched on the bow of the Black Pearl.
CH_18_LVL_7_TITLE=Port 3A
CH_18_LVL_7_DESC=Despite being unable to answer Mrs. Incredible's question, Jack Sparrow does offer to take everyone out on the Black Pearl.
CH_18_LVL_8_TITLE=Port 3B
CH_18_LVL_8_DESC=Jack plans to take the ship as far as he can. Then, everyone can dive into the water and search from there.
CH_18_LVL_9_TITLE=Port 4A
CH_18_LVL_9_DESC=The heroes board the ship. Jack offers to give everyone a tour, but as he leads the team below deck, creeps lunge out!
CH_18_LVL_10_TITLE=Port 4B
CH_18_LVL_10_DESC=Creeps swarm over the deck and up the mast. Mages throw spells from the bow of the Black Pearl.
CH_18_LVL_11_TITLE=Port 5A
CH_18_LVL_11_DESC=Jack knocks creeps overboard, fighting his way towards the wheel. If he can get the ship to open water, the creeps will have nowhere to go.
CH_18_LVL_12_TITLE=Port 5B
CH_18_LVL_12_DESC=The team rallies to rid the Pearl of creeps. Ralph grabs the mast and shakes the creeps down. Mrs. Incredible nabs what's left.
CH_18_LVL_13_TITLE=Port 6A
CH_18_LVL_13_DESC=Calhoun and Vanellope fire at the Mages on the bow. Judy Hopps and Mr. Incredible punch the creeps on deck.
CH_18_LVL_14_TITLE=Port 6B
CH_18_LVL_14_DESC=Jack Sparrow yells to the team to hold on. He turns the ship abruptly, causing the creeps to fall and slide off the deck into the water.
CH_18_LVL_15_TITLE=Port 7A
CH_18_LVL_15_DESC=With the deck thoroughly swabbed of creeps, Captain Sparrow doubles the speed of the Black Pearl, heading toward open water.
CH_18_LVL_16_TITLE=Port 7B
CH_18_LVL_16_DESC=It isn't long before they reach the extent of the water. The ocean begins to pixelate in every direction.
CH_18_LVL_17_TITLE=Port 8A
CH_18_LVL_17_DESC=Jack rolls out the plank to use as a diving board. The heroes all look at each other. They've come too far to give up now.
CH_18_LVL_18_TITLE=Port 8B
CH_18_LVL_18_DESC=One by one, everyone takes a deep breath and jumps off the plank. They hit the water with a pixelated splash.
CH_18_LVL_19_TITLE=Port 9
CH_18_LVL_19_DESC=Jack Sparrow looks over the side of the ship, watching as each of his friends slowly fades into the dark water.
CH_19_TITLE=A Pirate's Life For Me
CH_19_LVL_1_TITLE=Port 10
CH_19_LVL_1_DESC=The heroes sink down, down, down. Everything begins to fade into darkness. The pressure becomes almost too much to take.
CH_19_LVL_2_TITLE=Dock 1
CH_19_LVL_2_DESC=Just as all seems lost, the darkness is replaced by blinding light. When the heroes open their eyes, they find themselves on dry land.
CH_19_LVL_3_TITLE=Dock 2
CH_19_LVL_3_DESC=Questions begin to fly: Is this a copy of Tortuga? Are they still underwater? How do they leave?
CH_19_LVL_4_TITLE=Dock 3
CH_19_LVL_4_DESC=Shank and Mrs. Incredible try to calm everyone before panic sets in, but Jack Sparrow has a perfect distraction planned.
CH_19_LVL_5_TITLE=Dock 4
CH_19_LVL_5_DESC=Jack offers everyone a tour of Tortuga. Mrs. Incredible thinks it's a great idea. If anything, they can look for answers along the way.
CH_19_LVL_6_TITLE=Dock 5
CH_19_LVL_6_DESC=Jack takes everyone around town, recounting stories of his youth (which Dash covers his ears for). The tour ends at an inn.
CH_19_LVL_7_TITLE=Dock 6
CH_19_LVL_7_DESC=The heroes sit down at a table in the tavern. Ralph (after breaking the first chair he sits in) opts to stand in the corner.
CH_19_LVL_8_TITLE=Dock 7
CH_19_LVL_8_DESC=The tavern doesn't seem like a safe place and Mrs. Incredible knows it. She begins regretting sitting somewhere without a view of the door.
CH_19_LVL_9_TITLE=Dock 8
CH_19_LVL_9_DESC=Shank and Vanellope keep looking around, as if searching for something.  Shank squints and then elbows Vanellope, pointing to the ceiling.
CH_19_LVL_10_TITLE=Dock 9
CH_19_LVL_10_DESC=With a whisper to Vanellope, Shank stands on the table. She then picks up Vanellope and puts her on her shoulders.
CH_19_LVL_11_TITLE=Dock 10
CH_19_LVL_11_DESC=The rest of the heroes protest, but Mrs. Incredible shushes them. It's obvious that Shank and Vanellope have found something.
CH_19_LVL_12_TITLE=Dock 11
CH_19_LVL_12_DESC=Vanellope stares at the ceiling, reading under her breath. When she finishes, she has Shank put her down.
CH_19_LVL_13_TITLE=Dock 12
CH_19_LVL_13_DESC=Vanellope tells everyone there are dev-notes on the ceiling! And she's found a way out of the hidden level.
CH_19_LVL_14_TITLE=Dock 13
CH_19_LVL_14_DESC=It turns out the Inventor had created Tortuga as a secret trading post with high level guild halls.
CH_19_LVL_15_TITLE=Dock 14
CH_19_LVL_15_DESC=But once it was created, bugs developed in the code almost immediately. He wouldn't be able to fix them alone.
CH_19_LVL_16_TITLE=Dock 15
CH_19_LVL_16_DESC=The Inventor was forced to make an exit after the code went buggy. Luckily, the exit is the back door of the tavern.
CH_19_LVL_17_TITLE=Dock 16
CH_19_LVL_17_DESC=One by one, the heroes make their way to the back of the tavern. A lone exit sign can be seen at the end of the hall.
CH_19_LVL_18_TITLE=Dock 17
CH_19_LVL_18_DESC=Vanellope gestures for everyone to follow her. It's a tight squeeze, but somehow they all manage to fit.
CH_19_LVL_19_TITLE=Dock 18
CH_19_LVL_19_DESC=The back door swings open, once again they find inky blackness. Vanellope pinches her nose and walks into the dark.
CH_20_TITLE=Midway Madness
CH_20_LVL_1_TITLE=Tortuga Station
CH_20_LVL_1_DESC=The team pops out of the exit and finds themselves back at the subway.
CH_20_LVL_2_TITLE=Arcade Station
CH_20_LVL_2_DESC=Buzz leads the way as the group catches a train to the Midway.
CH_20_LVL_3_TITLE=Gardenia Avenue
CH_20_LVL_3_DESC=When the team enters the Park, they discover it's been overrun by creeps.
CH_20_LVL_4_TITLE=Petunia Lane
CH_20_LVL_4_DESC=The team tries to make their way towards the Midway quietly, but Shank trips and falls into Buzz, causing his laser SFX to play loudly.
CH_20_LVL_5_TITLE=Willow Road
CH_20_LVL_5_DESC=The creeps cry out and head toward the heroes. Vanellope checks to make sure her soaker is fully loaded.
CH_20_LVL_6_TITLE=Oak Alley
CH_20_LVL_6_DESC=Vanellope dives behind a nearby tree, laying cover soda blasts as the rest of the team hurries to the Midway.
CH_20_LVL_7_TITLE=Maple Lane
CH_20_LVL_7_DESC=The team arrives at the Goofy Golf entry, taking a break to catch their breath.
CH_20_LVL_8_TITLE=Funtime Road
CH_20_LVL_8_DESC=Buzz looks around. Where has Vanellope gone?
CH_20_LVL_9_TITLE=Coaster Cul-de-sac
CH_20_LVL_9_DESC=Ralph hears Vanellope calling for help. The team rushes towards her voice.
CH_20_LVL_10_TITLE=Pine Road
CH_20_LVL_10_DESC=Vanellope's stuck in a tree! Ralph pulls the trunk from the ground and leans it over gently, allowing Vanellope to hop down.
CH_20_LVL_11_TITLE=Daffodil Lane
CH_20_LVL_11_DESC=Vanellope dusts off her skirt as Shank helps her up. The team heads back to the Midway.
CH_20_LVL_12_TITLE=Golf Avenue
CH_20_LVL_12_DESC=Mrs. Incredible asks Vanellope if she can explain what the Inventor meant when he talked about "buggy code."
CH_20_LVL_13_TITLE=Amusement Lane
CH_20_LVL_13_DESC=Vanellope and Shank explain that sometimes computer code can get messy, or behave in ways that the writer doesn't expect.
CH_20_LVL_14_TITLE=Carnival Road
CH_20_LVL_14_DESC=Bugs can result in dangerous environments like the one the team experienced in the area by the Financial District.
CH_20_LVL_15_TITLE=Celebration Lane
CH_20_LVL_15_DESC=Bugs could also cause the world to degrade and lose progress over time.
CH_20_LVL_16_TITLE=Lucky Lane
CH_20_LVL_16_DESC=Before they know it, the team arrives at the arcade in the Midway.
CH_20_LVL_17_TITLE=Chance Alley
CH_20_LVL_17_DESC=As soon as Vanellope starts to play the game, the creeps come running.
CH_20_LVL_18_TITLE=Joystick Lane
CH_20_LVL_18_DESC=Mrs. Incredible stretches into a shield, blocking all damage from hitting Vanellope.
CH_20_LVL_19_TITLE=Extra Life Lane
CH_20_LVL_19_DESC=Vanellope hits the final battle with Zurg, tongue sticking out in concentration. The others hold their breath in anticipation.
CH_21_TITLE=Bonnie's Room
CH_21_LVL_1_TITLE=A Child's Room
CH_21_LVL_1_DESC=The heroes step into a world only familiar to some of them...Bonnie's room.
CH_21_LVL_2_TITLE=It's Big
CH_21_LVL_2_DESC=The non-toy heroes have a hard time adjusting to their new surroundings.
CH_21_LVL_3_TITLE=Bounce
CH_21_LVL_3_DESC=Vanellope makes a b-line for the gigantic bed and begins bouncing on it like a trampoline.
CH_21_LVL_4_TITLE=Please?
CH_21_LVL_4_DESC=Dash looks at his mom pleadingly. Mrs. Incredible rolls her eyes, but gives him the go ahead.
CH_21_LVL_5_TITLE=Searching
CH_21_LVL_5_DESC=The rest of the heroes begin to comb the room in hopes of finding one of the dev-notes. There's a ton of ground to cover.
CH_21_LVL_6_TITLE=Looking in the Closet
CH_21_LVL_6_DESC=After searching for a while, they come up empty-handed. The last place to look is the closet.
CH_21_LVL_7_TITLE=Search, Part 2
CH_21_LVL_7_DESC=The heroes decide to humor Woody and begin to search the room again. Dash keeps complaining that the search is too slow.
CH_21_LVL_8_TITLE=Keep Looking
CH_21_LVL_8_DESC=The heroes check under the nightstand, behind the headboard, and under the rug.
CH_21_LVL_9_TITLE=Swag
CH_21_LVL_9_DESC=When the heroes reconvene, they share what they've found: a broken headband, a fuzzy lollipop, a plastic key, and a lovely bit of string.
CH_21_LVL_10_TITLE=Looking in the Closet, Part 2
CH_21_LVL_10_DESC=Sadly, no one has located the dev-note. Out of options, the heroes decide the only place left is the closet.
CH_21_LVL_11_TITLE=Working Together
CH_21_LVL_11_DESC=The heroes work together to open the closet door. Jessie lassos the doorknob, and everyone pulls with all their might.
CH_21_LVL_12_TITLE=Toy Scary
CH_21_LVL_12_DESC=The door creaks open ominously. Woody lets out a shiver as he stares into the darkness. Buzz and Jesse look uncomfortable.
CH_21_LVL_13_TITLE=Lost Toys
CH_21_LVL_13_DESC=The heroes all take a deep breath and grasp hands before entering. No one wants to get lost in the darkness.
CH_21_LVL_14_TITLE=It's Glow Time
CH_21_LVL_14_DESC=Thankfully, Buzz's glow-in-the-dark armor illuminates our heroes. In the dim light, Dash spots a glow coming from the back of the closet.
CH_21_LVL_15_TITLE=Cabinets
CH_21_LVL_15_DESC=As they draw closer to the light, they find an arcade cabinet, exactly like the one from Flynn's arcade.
CH_21_LVL_16_TITLE=New Info
CH_21_LVL_16_DESC=Taped to the cabinet is a dev-note. The heroes take it down and pass it to each other, reading the new information.
CH_21_LVL_17_TITLE=Sand Adventures
CH_21_LVL_17_DESC=The dev-note mentions that the Inventor was working on Agrabah next. The heroes need to find Aladdin and the Genie.
CH_21_LVL_18_TITLE=Back Home
CH_21_LVL_18_DESC=As before, Buzz enters the letter t-o-y into the side of the cabinet. The front opens, and the heroes can see the City on the other side.
CH_21_LVL_19_TITLE=A New Search
CH_21_LVL_19_DESC=With dev-note in hand, everyone heads out to try and find Aladdin and the Genie.
CH_22_TITLE=Lamp Work
CH_22_LVL_1_TITLE=Rooftop 1A
CH_22_LVL_1_DESC=Thanks to Shank (who feels that Aladdin is a kindred spirit), the heroes find him and the Genie up on the rooftops.
CH_22_LVL_2_TITLE=Rooftop 2A
CH_22_LVL_2_DESC=Shank, Vanellope, and Ralph fill Aladdin and the Genie in on the hidden levels and then ask if they know of any place like that.
CH_22_LVL_3_TITLE=Rooftop 1B
CH_22_LVL_3_DESC=When the Genie goes to get his lamp, he discovers that it's gone! He thinks it must have been stolen, so they head to the Black Market.
CH_22_LVL_4_TITLE=Rooftop 2B
CH_22_LVL_4_DESC=Mrs. Incredible wonders if they should bring the kids. The Black Market has a...certain reputation after all.
CH_22_LVL_5_TITLE=Rooftop 1C
CH_22_LVL_5_DESC=Mr. Incredible thinks the kids will be all right, but stresses to them to stay close and listen to the adults.
CH_22_LVL_6_TITLE=Rooftop 2C
CH_22_LVL_6_DESC=When they arrive at the Black Market, it's even seedier than everyone remembers. Shank tells the kids not to touch anything.
CH_22_LVL_7_TITLE=Rooftop 1D
CH_22_LVL_7_DESC=They look through stall after stall, searching for anything that resembles a lamp.
CH_22_LVL_8_TITLE=Rooftop 2D
CH_22_LVL_8_DESC=Dash says it would be easier if everyone split up, but walks back his comment when his mom gives him a disapproving look.
CH_22_LVL_9_TITLE=Rooftop 1E
CH_22_LVL_9_DESC=The heroes find skulls, torn books, old paintings, and precious stones.
CH_22_LVL_10_TITLE=Rooftop 2E
CH_22_LVL_10_DESC=One cart has a faint glow coming from it with a sign that says, "Cursed objects: DO NOT MAKE DIRECT EYE CONTACT."
CH_22_LVL_11_TITLE=Rooftop 1F
CH_22_LVL_11_DESC=The heroes realize they're running out of carts to check. The lamp may not even be here.
CH_22_LVL_12_TITLE=Rooftop 2F
CH_22_LVL_12_DESC=Just as they are about to give up, Shank spots it. A battered old lamp is sitting on a pile of moldy books.
CH_22_LVL_13_TITLE=Rooftop 1G
CH_22_LVL_13_DESC=The heroes explain to the vendor that the lamp was stolen and ask for it back.
CH_22_LVL_14_TITLE=Rooftop 2G
CH_22_LVL_14_DESC=The vendor says he'll trade the lamp for Vanellope's soda soaker. Vanellope offers to trade it for a face full of soda.
CH_22_LVL_15_TITLE=Rooftop 1H
CH_22_LVL_15_DESC=The vendor sighs and agrees to give the Genie back his lamp before vowing to never again do business with Duke Weaselton.
CH_22_LVL_16_TITLE=Rooftop 2H
CH_22_LVL_16_DESC=Back on the street, the team passes around the lamp. It doesn't look special, so hopefully it's the right one.
CH_22_LVL_17_TITLE=Rooftop 1I
CH_22_LVL_17_DESC=They head back to Aladdin's place, and Aladdin examines the lamp. Nothing magical happens, so he hands it to Genie.
CH_22_LVL_18_TITLE=Rooftop 2I
CH_22_LVL_18_DESC=Genie shrinks down and goes inside to look for clues.
CH_22_LVL_19_TITLE=Rooftop 1J
CH_22_LVL_19_DESC=The rest of the heroes wait patiently for the Genie to return.
CH_23_TITLE=Lamp Light
CH_23_LVL_1_TITLE=Rooftop 2J
CH_23_LVL_1_DESC=Genie returns from his mission of exploring the inside of the lamp. It's not his lamp, but it does have some strange markings inside it.
CH_23_LVL_2_TITLE=Rooftop 1K
CH_23_LVL_2_DESC=The heroes ask Genie to describe the markings, but he's never seen anything like it. The team asks Tron if he can do a scan.
CH_23_LVL_3_TITLE=Rooftop 2K
CH_23_LVL_3_DESC=Tron finishes his scan and discovers a hidden code inside the lamp.
CH_23_LVL_4_TITLE=Rooftop 1L
CH_23_LVL_4_DESC=Further analysis reveals that the code is instructions. The team must travel to Agrabah.
CH_23_LVL_5_TITLE=Rooftop 2L
CH_23_LVL_5_DESC=The team didn't see an Agrabah arcade cabinet back at Flynn's, so that possibility is out.
CH_23_LVL_6_TITLE=Rooftop 1M
CH_23_LVL_6_DESC=The heroes begin theorizing what they will need to do to get to Agrabah.
CH_23_LVL_7_TITLE=Rooftop 2M
CH_23_LVL_7_DESC=Before the heroes can debate any further, creeps flood onto the Rooftop. Violet looks down the fire escape to an angry swarm climbing up.
CH_23_LVL_8_TITLE=Rooftop 1N
CH_23_LVL_8_DESC=Ralph knocks as many creeps as he can off the roof, but the swarm proves to be too much and overpowers him.
CH_23_LVL_9_TITLE=Rooftop 2N
CH_23_LVL_9_DESC=Seeing Ralph in trouble, Frozone and Felix rush over to aid him. Frozone freezes the creeps, while Felix heals Ralph.
CH_23_LVL_10_TITLE=Rooftop 1O
CH_23_LVL_10_DESC=Judy doles out a roundhouse kick, sending four creeps sailing off the roof. Nick sends his army of lemmings down the side of the building.
CH_23_LVL_11_TITLE=Rooftop 2O
CH_23_LVL_11_DESC=Yax rebuffs the team while knocking out more creeps with his musk. The team cheers as they plug their noses.
CH_23_LVL_12_TITLE=Rooftop 1P
CH_23_LVL_12_DESC=The heroes slowly get the upper hand against their foes. One by one, the remaining creeps derezz.
CH_23_LVL_13_TITLE=Rooftop 2P
CH_23_LVL_13_DESC=Exhausted by the fight, the team is too tired to start theorizing again. Nick suggests taking a break, and everyone groans in agreement.
CH_23_LVL_14_TITLE=Rooftop 1Q
CH_23_LVL_14_DESC=While the team rests, Aladdin and the Genie continue to examine the lamp.
CH_23_LVL_15_TITLE=Rooftop 2Q
CH_23_LVL_15_DESC=Aladdin is still confused. How can this lamp not be Genie's? It looks exactly like it in every way.
CH_23_LVL_16_TITLE=Rooftop 1R
CH_23_LVL_16_DESC=Shank tells Aladdin that the Inventor probably created it. Which is why it's almost, but not quite, the genuine article.
CH_23_LVL_17_TITLE=Rooftop 2R
CH_23_LVL_17_DESC=Aladdin rubs the lamp and it begins to sputter. The team is enveloped in pink glittering smoke.
CH_23_LVL_18_TITLE=Rooftop 1S
CH_23_LVL_18_DESC=Before they know it, the party is sucked into the lamp. With a *pop* the rooftop is deserted, save the lamp.
CH_23_LVL_19_TITLE=Rooftop 2S
CH_23_LVL_19_DESC=The heroes feel as if their bodies are being stretched and bent. Whatever is happening, it's nothing like the arcade cabinet.
CH_24_TITLE=Agrabah Days
CH_24_LVL_1_TITLE=The Market
CH_24_LVL_1_DESC=When the smoke clears, everyone has a crick in their neck. The team looks to see Agrabah's palace, shimmering in the distance.
CH_24_LVL_2_TITLE=Street Rat
CH_24_LVL_2_DESC=The other heroes aren't sure what to make of the market, especially Aladdin. It looks like home, but something about it feels off.
CH_24_LVL_3_TITLE=Too Bright
CH_24_LVL_3_DESC=While the heroes investigate the market, Aladdin looks for inconsistencies compared to the real Agrabah. Maybe he'll find a clue.
CH_24_LVL_4_TITLE=Hidden Danger
CH_24_LVL_4_DESC=Shank is overwhelmed by the sights and smells. The underlying sense of danger makes her feel right at home.
CH_24_LVL_5_TITLE=So Boring
CH_24_LVL_5_DESC=Dash is unhappy to find that the market is pretty boring compared to the City. Violet asks if he could help her, and he gloomily agrees.
CH_24_LVL_6_TITLE=Shocked Locals
CH_24_LVL_6_DESC=Nick and Judy interview people around the market. Sadly, no one has seen anything out of the ordinary.
CH_24_LVL_7_TITLE=Next Area
CH_24_LVL_7_DESC=Out of options at the market, Aladdin suggests they head to the castle.
CH_24_LVL_8_TITLE=Castle Bound
CH_24_LVL_8_DESC=Shank thinks the castle is a great next step. The Inventor wouldn't have included it in his version of Agrabah if it wasn't important.
CH_24_LVL_9_TITLE=Shut
CH_24_LVL_9_DESC=The heroes arrive to find the castle sealed at all entrances. Maybe the Inventor didn't have time to finish the interior.
CH_24_LVL_10_TITLE=Scrap
CH_24_LVL_10_DESC=Ralph bangs on the castle doors, and a scrap of paper slips out from beneath them. Picking it up, he turns to show the other heroes.
CH_24_LVL_11_TITLE=Down Below
CH_24_LVL_11_DESC=Suddenly, the team hears a rumble come from inside the castle. The ground begins to shake as the heroes look towards the castle doors.
CH_24_LVL_12_TITLE=Swarm
CH_24_LVL_12_DESC=A horde of creeps bursts from the castle in a torrent of chaos. They crawl over one another, clawing at the heroes.
CH_24_LVL_13_TITLE=Spread Out
CH_24_LVL_13_DESC=The team spreads out, taking various positions around the courtyard and forcing the creeps to go in all directions.
CH_24_LVL_14_TITLE=Over-wall
CH_24_LVL_14_DESC=Creeps clamber up the courtyard walls, trying to reach the market. Ralph smashes his fists to the ground, knocking the creeps off.
CH_24_LVL_15_TITLE=Last Round
CH_24_LVL_15_DESC=Everyone works together to defeat the torrent of creeps pouring from the castle doors.
CH_24_LVL_16_TITLE=No More
CH_24_LVL_16_DESC=Finally, the castle is cleared. Wherever the creeps came from within the castle, it appears empty.
CH_24_LVL_17_TITLE=Fresh Notes
CH_24_LVL_17_DESC=Vanellope reads off the dev note. Supposedly, the Inventor had created a program to eliminate bugs in the game.
CH_24_LVL_18_TITLE=Perfection
CH_24_LVL_18_DESC=According to the note, the Inventor was very excited to perfect the game and mentioned working on a new project: Arendelle.
CH_24_LVL_19_TITLE=Let's Go
CH_24_LVL_19_DESC=Vanellope folds up the note and puts it in her pocket. The team needs to get back to the City and find Elsa.
CH_25_TITLE=Find Elsa
CH_25_LVL_1_TITLE=Leaving Agrabah
CH_25_LVL_1_DESC=With the dev note in hand, Vanellope rubs the lamp. The team holds their breath as smoke swirls around them once more.
CH_25_LVL_2_TITLE=Rooftop 2S
CH_25_LVL_2_DESC=The team finds themselves back on the roof. Vanellope gathers everyone together to tell them what she found in the dev note.
CH_25_LVL_3_TITLE=Rooftop 1T
CH_25_LVL_3_DESC=The team gets down from the roof and brainstorms where to begin the search for Elsa.
CH_25_LVL_4_TITLE=District A3
CH_25_LVL_4_DESC=Dash wonders if she might be at Flynn's Arcade. If not, they could at least play some video games.
CH_25_LVL_5_TITLE=District A4
CH_25_LVL_5_DESC=Yax wonders if she might be at the Mystic Springs Oasis. She may have decided to start up yoga.
CH_25_LVL_6_TITLE=District A5
CH_25_LVL_6_DESC=Mrs. Incredible thanks everyone for their input, but none of the places they suggested sound like something Elsa might do.
CH_25_LVL_7_TITLE=District A6
CH_25_LVL_7_DESC=The team racks their brains, but now that Ralph suggested the ice cream parlor, no one can think of another alternative.
CH_25_LVL_8_TITLE=District A7
CH_25_LVL_8_DESC=The team decides to venture to Jumbeaux's Cafe. If Elsa isn't there, they can at least rule it out as a possibility.
CH_25_LVL_9_TITLE=District A8
CH_25_LVL_9_DESC=While the team travels to the cafe, Vanellope seems preoccupied. Ralph asks if everything is okay.
CH_25_LVL_10_TITLE=District A9
CH_25_LVL_10_DESC=Vanellope feels like the team is missing something. The Inventor creating the anti-bug program, maybe they should focus on that too.
CH_25_LVL_11_TITLE=District A10
CH_25_LVL_11_DESC=Before Vanellope can share her concerns with the rest of the team, they find their path blocked by creeps!
CH_25_LVL_12_TITLE=District A11
CH_25_LVL_12_DESC=Mages and Bruisers surround the heroes. Before the creeps can attack, Calhoun blows a hole through their blockade.
CH_25_LVL_13_TITLE=District A12
CH_25_LVL_13_DESC=Calhoun yells for everyone to run through the blockade while she covers them. Not needing to be told twice, the heroes make a run for it.
CH_25_LVL_14_TITLE=District A13
CH_25_LVL_14_DESC=The heroes run to Jumbeaux's as Calhoun covers the rear. By the time they reach the cafe, the creeps are long gone.
CH_25_LVL_15_TITLE=District A14
CH_25_LVL_15_DESC=As the team tries to catch their breath, Dash notices that the lights are off in the cafe. Judy tests the front door and finds it locked.
CH_25_LVL_16_TITLE=District A15
CH_25_LVL_16_DESC=Before Judy can search for an alternate entrance, the cafe door opens. Elsa steps out onto the street, asking everyone if they're all right.
CH_25_LVL_17_TITLE=District A16
CH_25_LVL_17_DESC=Vanellope shows Elsa the dev note and tells her all about the keys they've used and places they've visited thus far.
CH_25_LVL_18_TITLE=District A17
CH_25_LVL_18_DESC=When Arendelle is mentioned, Elsa gives a look of concern. What would the Inventor want with the kingdom?
CH_25_LVL_19_TITLE=District A18
CH_25_LVL_19_DESC=The team tells her the only way to find out is by traveling to Arendelle. Elsa tells the heroes to follow her, she has an idea.
CH_26_TITLE=Theater Crowd
CH_26_LVL_1_TITLE=District A18
CH_26_LVL_1_DESC=Elsa bids farewell to Jumbeaux and leads the heroes away from the cafe. She tells everyone she may have a way to get them to Arendelle.
CH_26_LVL_2_TITLE=District A19
CH_26_LVL_2_DESC=While Elsa leads the heroes through the streets and alleyways, Vanellope begins to worry about the Inventor's bug elimination program.
CH_26_LVL_3_TITLE=District A20
CH_26_LVL_3_DESC=As the heroes follow Elsa, the streets are eerily quiet. Calhoun hears footsteps overhead, crossing the rooftops.
CH_26_LVL_4_TITLE=District A21
CH_26_LVL_4_DESC=A Bruiser drops from the roof as the heroes emerge from an alleyway. Out of the shadows, a dozen other creeps join its ranks.
CH_26_LVL_5_TITLE=District A22
CH_26_LVL_5_DESC=As the creeps close in, Judy delivers a roundhouse kick right to the Bruiser's face. The street explodes into all-out chaos!
CH_26_LVL_6_TITLE=District A23
CH_26_LVL_6_DESC=Fists, lasers, and magic fly as the heroes battle against the creeps. When the dust clears, the heroes find themselves alone on the street.
CH_26_LVL_7_TITLE=District A24
CH_26_LVL_7_DESC=The heroes resume their journey towards the Theater District. As they approach the Fashion District, the streets become more populated.
CH_26_LVL_8_TITLE=Zone 7A
CH_26_LVL_8_DESC=The bright, vibrant colors of the Fashion District come into full view. Rich fabrics and exotic feathers fill storefronts.
CH_26_LVL_9_TITLE=Zone 8A
CH_26_LVL_9_DESC=Creeps covered in sequins and glitter burst through a window. Glass flies everywhere and mages begin to hurl spells at the heroes.
CH_26_LVL_10_TITLE=Zone 9A
CH_26_LVL_10_DESC=Everyone scrambles to clear the streets while the creeps attack. Civilians run screaming through the streets in panic.
CH_26_LVL_11_TITLE=Zone 1B
CH_26_LVL_11_DESC=Elsa and Frozone freeze the creeps in their tracks. Though it doesn't hold, it gives the civilians enough time to get out of harm's way.
CH_26_LVL_12_TITLE=Zone 2B
CH_26_LVL_12_DESC=The creeps keep coming, bursting through storefronts and down from rooftops. Elsa and the heroes have a difficult time beating them back.
CH_26_LVL_13_TITLE=Zone 3B
CH_26_LVL_13_DESC=Elsa casts an enormous snow golem, which takes after the creeps. The ground shakes as the golem stomps the creeps out of existence.
CH_26_LVL_14_TITLE=Zone 4B
CH_26_LVL_14_DESC=With the creeps dealt with, Elsa yells to the heroes to follow her to the theater. Everyone chases after her.
CH_26_LVL_15_TITLE=Zone 5B
CH_26_LVL_15_DESC=When they reach the theater, Elsa breaks open the doors and runs inside. Judy cringes; everyone is currently breaking the law.
CH_26_LVL_16_TITLE=Zone 6B
CH_26_LVL_16_DESC=Elsa climbs on stage and prepares to sing. However, something is missing...
CH_26_LVL_17_TITLE=Zone 7B
CH_26_LVL_17_DESC=Elsa begins to sing about helping her fellow heroes with their journey. She sings about wanting to save the City.
CH_26_LVL_18_TITLE=Zone 8B
CH_26_LVL_18_DESC=As she sings, snow begins to fall inside the theater. It starts out light and then begins to whirl into a driving storm.
CH_26_LVL_19_TITLE=Zone 9B
CH_26_LVL_19_DESC=Mrs. Incredible warns everyone to brace. The blizzard blinds the heroes as they are magically transported out of the theater.
CH_27_TITLE=Snow Yourself
CH_27_LVL_1_TITLE=Thunk
CH_27_LVL_1_DESC=With a thunk, the heroes find themselves in a snowbank. As they take in their surroundings, a forest is all that can be seen for miles.
CH_27_LVL_2_TITLE=Nobody Elsa
CH_27_LVL_2_DESC=The heroes search for Elsa, hoping that she might have followed them from the theater, but she's nowhere to be found.
CH_27_LVL_3_TITLE=White Out
CH_27_LVL_3_DESC=With everything covered in snow, the heroes worry about whether or not they'll be able to find whatever the Inventor left behind.
CH_27_LVL_4_TITLE=No Signal
CH_27_LVL_4_DESC=Yax tries to scan for clues on his device, but there isn't any signal in the area.
CH_27_LVL_5_TITLE=Fjord
CH_27_LVL_5_DESC=Judy and Nick finally lead the heroes to the edge of the forest. Through the trees, they can see the city of Arendelle.
CH_27_LVL_6_TITLE=Snow Clue-ing
CH_27_LVL_6_DESC=With Arendelle in the distance, the heroes brainstorm where to look for the next clue.
CH_27_LVL_7_TITLE=Snow Fun
CH_27_LVL_7_DESC=The heroes continue the search. However, it isn't long before they become distracted by the snow.
CH_27_LVL_8_TITLE=Snow Fight
CH_27_LVL_8_DESC=Surprising no one, Vanellope instigates a snowball fight. Judy protests, but gets pelted with snowballs.
CH_27_LVL_9_TITLE=Snow Fall
CH_27_LVL_9_DESC=The rest of the heroes quickly join in on the fun. Ralph lobs snowballs the size of boulders at Felix, who jumps for cover in a snowbank.
CH_27_LVL_10_TITLE=Pop Up
CH_27_LVL_10_DESC=When Felix pops out of the snowbank, he hears a rumble behind him. The handyman turns, only to come face to face with a creep!
CH_27_LVL_11_TITLE=Like Daisies
CH_27_LVL_11_DESC=Felix yells a warning to the heroes as a horde of creeps rises out of the snow.
CH_27_LVL_12_TITLE=Boulder Bash
CH_27_LVL_12_DESC=Ralph winds up and lobs a snowball. The boulder-sized projectile takes out an entire line of creeps.
CH_27_LVL_13_TITLE=Finish 'Em
CH_27_LVL_13_DESC=The other heroes corral what's left of the panicked creeps, fighting them off. It isn't long before the last of the creeps derezz.
CH_27_LVL_14_TITLE=Clean Up
CH_27_LVL_14_DESC=After the battle, the forest is a complete mess. The heroes work to clear broken branches and uprooted trees.
CH_27_LVL_15_TITLE=New Note
CH_27_LVL_15_DESC=Felix begins erasing snowdrifts by "fixing" them with his hammer. As he erases the drift the creeps emerged from, the dev note appears.
CH_27_LVL_16_TITLE=Oh Boy
CH_27_LVL_16_DESC=Felix runs to Shank and Vanellope, handing them the dev note. As they read it over, their expressions become serious.
CH_27_LVL_17_TITLE=Awaiting Signal
CH_27_LVL_17_DESC=Shank gives Yax the code. Hopefully once his device is in range of a signal, the message will reach these other heroes.
CH_27_LVL_18_TITLE=Ice Code
CH_27_LVL_18_DESC=As soon as Yax enters the code into his device, the snow begins to swirl around them once again.
CH_27_LVL_19_TITLE=Snowing Up
CH_27_LVL_19_DESC=As the snow turns from a flurry into a blizzard, the heroes are lifted off the ground and transported out of Arendelle.
CH_28_TITLE=Theatrics
CH_28_LVL_1_TITLE=Row A
CH_28_LVL_1_DESC=In a flurry of snow, the heroes appear back on the theater stage next to Elsa. Suddenly, Yax's device dings, the code has been sent out.
CH_28_LVL_2_TITLE=Row B
CH_28_LVL_2_DESC=Elsa looks surprised to see everyone. Even though the heroes had been in Arendelle for hours, to her it had only been a few minutes.
CH_28_LVL_3_TITLE=Row C
CH_28_LVL_3_DESC=Shank, Vanellope, and the rest of the heroes try their best to tell Elsa about their mission to save the City.
CH_28_LVL_4_TITLE=Row D
CH_28_LVL_4_DESC=Some of the more technical concepts, like the hidden levels, are hard for Elsa to understand, but she seems to get the gist of it.
CH_28_LVL_5_TITLE=Row E
CH_28_LVL_5_DESC=Elsa listens intently as the heroes conclude their story. By the time they are done, her brow is tightly knit in contemplation.
CH_28_LVL_6_TITLE=Row F
CH_28_LVL_6_DESC=Suddenly, there is a banging on the theater doors. Before anyone can answer, creeps burst in.
CH_28_LVL_7_TITLE=Row G
CH_28_LVL_7_DESC=Elsa creates an ice wall to block off the creeps as the other heroes jump to action. Judy scales the ice wall, leading the attack.
CH_28_LVL_8_TITLE=Row H
CH_28_LVL_8_DESC=A monstrous Brute smashes through what is left of the theater doors. With one swing of its fist, the ice wall shatters.
CH_28_LVL_9_TITLE=Row I
CH_28_LVL_9_DESC=Ralph charges, swinging his massive fists. Mr. Incredible flanks him on the right, and the two attack the Brute together.
CH_28_LVL_10_TITLE=Row J
CH_28_LVL_10_DESC=Dash runs circles around the creeps, trapping them in a small vortex. Elsa summons her powers and encases the ensnared creeps in ice.
CH_28_LVL_11_TITLE=Row K
CH_28_LVL_11_DESC=The commotion from the battle shakes the theater up to the rafters. Unbeknownst to the fighters below, a large crack splits the roof.
CH_28_LVL_12_TITLE=Row L
CH_28_LVL_12_DESC=Plaster from the ceiling begins to fall, raining down on the battle below. Within seconds, the theater itself begins to crumble.
CH_28_LVL_13_TITLE=Row M
CH_28_LVL_13_DESC=Judy yells for everyone to run to the exit. The heroes force themselves through the creep horde and out onto the street.
CH_28_LVL_14_TITLE=The Nosebleeds
CH_28_LVL_14_DESC=The heroes make it safely out just in time. The theater collapses on top of the creeps with a terrifying crash.
CH_28_LVL_15_TITLE=Street L7
CH_28_LVL_15_DESC=Yax uses his device to scan for any creeps left in the rubble. Thankfully, nothing comes up.
CH_28_LVL_16_TITLE=Street M7
CH_28_LVL_16_DESC=The heroes regroup and attempt to focus on the new revelation of the City's true nature.
CH_28_LVL_17_TITLE=Street N7
CH_28_LVL_17_DESC=The heroes brainstorm what their next plan of action should be. They decide to continue to look for dev notes for the time being.
CH_28_LVL_18_TITLE=Street O7
CH_28_LVL_18_DESC=However, where the next dev note might be is anyone's guess. As usual, the Inventor gave them little information to go on.
CH_28_LVL_19_TITLE=Street P7
CH_28_LVL_19_DESC=Nick and Judy ask if they can read over the previous dev note, in hopes of finding any clues as to where to search next.
CH_29_TITLE=Comb The City
CH_29_LVL_1_TITLE=Street Q7
CH_29_LVL_1_DESC=As Elsa leads the heroes through the City, Vanellope has the strangest feeling that they're being watched.
CH_29_LVL_2_TITLE=Street R7
CH_29_LVL_2_DESC=Shadows play against the buildings, the streetlights throwing off strange shapes. In a flash, they're surrounded by creeps.
CH_29_LVL_3_TITLE=Street S7
CH_29_LVL_3_DESC=The heroes work together. They have dealt with creeps so many times before that the battle should be over quickly.
CH_29_LVL_4_TITLE=Street T7
CH_29_LVL_4_DESC=When the battle ends, everyone realizes Shank was right, something seemed off about the creeps. They moved differently now.
CH_29_LVL_5_TITLE=Street U7
CH_29_LVL_5_DESC=Despite the change in the creeps, Elsa continues to lead everyone to the Garden. It's important that they focus on one crisis at a time.
CH_29_LVL_6_TITLE=Street V7
CH_29_LVL_6_DESC=The heroes arrive at the Community Garden just in time to find WALL-E pruning some begonias. Elsa waves as the little robot approaches.
CH_29_LVL_7_TITLE=Street W7
CH_29_LVL_7_DESC=WALL-E leads the team out of the Community Garden and down towards the Covered Market.
CH_29_LVL_8_TITLE=Street X7
CH_29_LVL_8_DESC=Elsa and the others keep their eyes open for the tree, but it must be too far off yet. WALL-E trudges through the streets.
CH_29_LVL_9_TITLE=Street Y7
CH_29_LVL_9_DESC=As the team approaches the Market, the smell of cherry blossoms travel through the air. At least now, they know they're on the right track.
CH_29_LVL_10_TITLE=Street Z7
CH_29_LVL_10_DESC=As the team makes their way into the Covered Market, Vanellope, once again, can't shake the feeling they're being watched.
CH_29_LVL_11_TITLE=Street A8
CH_29_LVL_11_DESC=Before she can tell the others, creeps emerge from the stalls. Again, the creeps seem different. They move with more intention than before.
CH_29_LVL_12_TITLE=Street B8
CH_29_LVL_12_DESC=Despite being more focused, the creeps are thankfully still slower than the heroes. Judy tells everyone to attack as fast as they can.
CH_29_LVL_13_TITLE=Street C8
CH_29_LVL_13_DESC=Calhoun fires on the horde as Mrs. Incredible corrals them. Judy delivers a lightning-fast series of kicks, leaving derezzed creeps in her wake.
CH_29_LVL_14_TITLE=Street D8
CH_29_LVL_14_DESC=After the battle, some of the heroes can't shake the ominous feeling that this change in the creeps may not be isolated.
CH_29_LVL_15_TITLE=Street E8
CH_29_LVL_15_DESC=The team finds their way out of the Market, as WALL-E charges ahead. There, at the outskirts of the Market, is the blossom tree.
CH_29_LVL_16_TITLE=Street F8
CH_29_LVL_16_DESC=At the base of the tree is a package. Elsa opens it, finding a jade comb inside.
CH_29_LVL_17_TITLE=Street G8
CH_29_LVL_17_DESC=WALL-E gestures to the team to touch the tree. They look at each other in confusion, but WALL-E is insistent.
CH_29_LVL_18_TITLE=Street H8
CH_29_LVL_18_DESC=The heroes gather around the tree, each holding out their hand. Counting down from three, they place their hands on the trunk.
CH_29_LVL_19_TITLE=Street I8
CH_29_LVL_19_DESC=In a flash of light, the heroes disappear. The blossoms begin to fall from the tree, as WALL-E finds himself alone.
CH_30_TITLE=Reflections
CH_30_LVL_1_TITLE=The Village
CH_30_LVL_1_DESC=The heroes land in a village. Obviously they've found a new hidden level. But which one?
CH_30_LVL_2_TITLE=The Gate
CH_30_LVL_2_DESC=Elsa leads the team to a large gate in the center of the village. The place appears abandoned, and it feels off, somehow.
CH_30_LVL_3_TITLE=Abandoned Homes
CH_30_LVL_3_DESC=Judy spots a young woman searching the abandoned houses. She introduces herself as Mulan, and says she's looking for her lost teapot.
CH_30_LVL_4_TITLE=Feeling Off
CH_30_LVL_4_DESC=Mulan reveals to the team that the village feels...off. Shank tells her about the hidden levels. Mulan handles it surprisingly well.
CH_30_LVL_5_TITLE=Recovery
CH_30_LVL_5_DESC=With Mulan up to speed, the team begins their search for the lost teapot. The only problem is there are a lot of teapots in the village.
CH_30_LVL_6_TITLE=Many Teapots
CH_30_LVL_6_DESC=Whenever one of the heroes finds a teapot, they run it over to Mulan to inspect. But none of them seem to find the right one.
CH_30_LVL_7_TITLE=Found Teapot
CH_30_LVL_7_DESC=Mushu gives the teapot to Mulan. It looks like hers, but feels strange in the same way the rest of the village does.
CH_30_LVL_8_TITLE=Inspection
CH_30_LVL_8_DESC=When Mulan tells the other heroes, Vanellope offers to inspect it. She turns it over in her hands, looking for clues.
CH_30_LVL_9_TITLE=Stick It
CH_30_LVL_9_DESC=Vanellope finally uncovers an answer. On the bottom of the teapot is a sticker that reads "Made in the City." She peels it off.
CH_30_LVL_10_TITLE=Shake It
CH_30_LVL_10_DESC=Suddenly the teapot begins to shake, it shoots out of Vanellope's hands and begins to spin in the air.
CH_30_LVL_11_TITLE=Spin It
CH_30_LVL_11_DESC=The teapot spins faster and faster, then explodes into fireworks. When the smoke clears, a dev note floats to the ground.
CH_30_LVL_12_TITLE=New Note
CH_30_LVL_12_DESC=Shank picks up the dev note and reads it. The Inventor wrote about a new location that had been created.
CH_30_LVL_13_TITLE=Dream Place
CH_30_LVL_13_DESC=They had planned new renovations for one of the hidden levels, to have it transformed into a place of dreams.
CH_30_LVL_14_TITLE=A Haven
CH_30_LVL_14_DESC=The new area was meant to be a haven for players, a place where they would never need to grow up.
CH_30_LVL_15_TITLE=Get Out
CH_30_LVL_15_DESC=Now in possession of the new dev note, the heroes move onto the next matter at hand, how do they leave the hidden level?
CH_30_LVL_16_TITLE=No Exit
CH_30_LVL_16_DESC=A quick search for an exit leaves the heroes empty-handed. They reconvene to discuss options.
CH_30_LVL_17_TITLE=Jade Comb
CH_30_LVL_17_DESC=Mulan takes the comb from Elsa and places it in her hair. The comb begins to glow, emitting a bright light.
CH_30_LVL_18_TITLE=Blinding Light
CH_30_LVL_18_DESC=The light becomes blinding. Unable to see, the heroes call out to one another. In a flash, they're gone and the village is suddenly empty.
CH_30_LVL_19_TITLE=Flash
CH_30_LVL_19_DESC=With another flash, the team finds themselves back in the City at the base of the flowering tree. Now, to find the next hidden level.
CH_31_TITLE=Never, Never
CH_31_LVL_1_TITLE=Rooftop X9
CH_31_LVL_1_DESC=After what happened in Mulan's village, the heroes can't help but feel frustrated. The dev notes have been running them in circles.
CH_31_LVL_2_TITLE=Rooftop X10
CH_31_LVL_2_DESC=Though everyone is severely in need of a break, they must move forward with the next clue.
CH_31_LVL_3_TITLE=Rooftop X11
CH_31_LVL_3_DESC=One thing everyone can agree on though is it has been nice to see other hero's homelands. Even if they aren't actually real.
CH_31_LVL_4_TITLE=Rooftop X12
CH_31_LVL_4_DESC=Shank rereads the latest dev note to the rest of the heroes. The clue about a place where no one needs to grow up is puzzling.
CH_31_LVL_5_TITLE=Rooftop X13
CH_31_LVL_5_DESC=But Mrs. Incredible thinks she might know who the next homeland belongs to. The team follows her to the roof.
CH_31_LVL_6_TITLE=Rooftop X14
CH_31_LVL_6_DESC=On the rooftop, the heroes find a boy playing his pipes. When he spots Mrs. Incredible, he flies over.
CH_31_LVL_7_TITLE=Rooftop X15
CH_31_LVL_7_DESC=How will the heroes get to a place in the stars? And how do they get there without getting separated? The team brainstorms options.
CH_31_LVL_8_TITLE=Rooftop X16
CH_31_LVL_8_DESC=Jack Sparrow suggests the Black Pearl may be up to the task of celestial navigation. In fact, it sounds like exactly what the team needs.
CH_31_LVL_9_TITLE=Rooftop X17
CH_31_LVL_9_DESC=Peter Pan doesn't trust Jack or any pirate for that matter. He refuses to show them the way if Sparrow is Captain.
CH_31_LVL_10_TITLE=Rooftop X18
CH_31_LVL_10_DESC=If Peter can captain the ship, he'll go with them and show them the way to Neverland. Jack despises the idea.
CH_31_LVL_11_TITLE=Rooftop X19
CH_31_LVL_11_DESC=Knowing it's the only way to Neverland, the heroes try their best to convince Jack to hand over his ship.
CH_31_LVL_12_TITLE=Rooftop X20
CH_31_LVL_12_DESC=Jack digs in his heels and continues to refuse. However, when Peter Pan suggests they come to an accord, Jack is all ears.
CH_31_LVL_13_TITLE=Rooftop X1
CH_31_LVL_13_DESC=If Jack lets Peter captain the Black Pearl, then the pirate can take whatever treasure he finds in Neverland.
CH_31_LVL_14_TITLE=Rooftop X22
CH_31_LVL_14_DESC=Peter knows full well that all the treasure in Neverland was stolen by Captain Hook ages ago, but he isn't going to tell Jack that.
CH_31_LVL_15_TITLE=Rooftop X23
CH_31_LVL_15_DESC=Jack agrees, and after a quick handshake to seal the deal, Peter and the rest of the heroes head to the Port.
CH_31_LVL_16_TITLE=Port 7B
CH_31_LVL_16_DESC=The heroes board the Black Pearl. Despite the agreement, Jack is still upset about handing his beloved ship to a child.
CH_31_LVL_17_TITLE=Port 7C
CH_31_LVL_17_DESC=As Mrs. Incredible consults the ship's maps, Jack Sparrow goes off to pout about his new status as a cabin boy.
CH_31_LVL_18_TITLE=Port 7D
CH_31_LVL_18_DESC=Getting behind the wheel, Peter Pan begins to shout orders to the heroes, who are now his acting crew.
CH_31_LVL_19_TITLE=Port 7E
CH_31_LVL_19_DESC=The Black Pearl pulls away from the Port and sets sail toward the horizon.
CH_32_TITLE=Til Morning
CH_32_LVL_1_TITLE=Main Mast
CH_32_LVL_1_DESC=As Peter Pan barks orders to his crew, Jack Sparrow grumbles while swabbing the deck. Cabin boy, indeed.
CH_32_LVL_2_TITLE=Foremast
CH_32_LVL_2_DESC=Standing on the prow of the ship, Pan is every bit his boisterous self. Captain life suits him, and he would be the first to say it.
CH_32_LVL_3_TITLE=Crow's Nest
CH_32_LVL_3_DESC=As the Black Pearl sails farther out into the sea, Mrs. Incredible continues to navigate their course.
CH_32_LVL_4_TITLE=Jibboom
CH_32_LVL_4_DESC=She's trying her best, but "second star to the right and straight on 'til morning" isn't much to go on.
CH_32_LVL_5_TITLE=Prow
CH_32_LVL_5_DESC=Mrs. Incredible ventures up to the prow to speak with Captain Pan. Hopefully, he'll have some insight into the baffling coordinates.
CH_32_LVL_6_TITLE=Bowsprit
CH_32_LVL_6_DESC=When asked about the coordinates, Peter Pan gives a hearty laugh. Mrs. Incredible feels like she may have missed something.
CH_32_LVL_7_TITLE=Figurehead
CH_32_LVL_7_DESC=Peter Pan calls for Tinkerbell. The fairy flies around, spreading pixie dust into every crack and crevice.
CH_32_LVL_8_TITLE=Forepeak
CH_32_LVL_8_DESC=Jack Sparrow looks on in horror as his beloved ship is covered from stem to stern. When will this madness end?
CH_32_LVL_9_TITLE=Keel
CH_32_LVL_9_DESC=Ordering his crew to think happy thoughts, Peter Pan watches from the prow as the ship lifts out of the water.
CH_32_LVL_10_TITLE=Hull
CH_32_LVL_10_DESC=Before the boat can take off, creeps rise from the sea, creating an anchor that moors the ship from leaving.
CH_32_LVL_11_TITLE=Rudder
CH_32_LVL_11_DESC=As creeps pull the ship back down into the water, others board the ship, ready to attack.
CH_32_LVL_12_TITLE=Shrouds
CH_32_LVL_12_DESC=The team assembles, preparing to fight. Peter leads the charge, flying into the fray. The others follow, knocking creeps down as they go.
CH_32_LVL_13_TITLE=Quarterdeck
CH_32_LVL_13_DESC=A Mage motions to the others; two break away from the group and head below deck. Mrs. Incredible yells to Elsa and Frozone to go after them.
CH_32_LVL_14_TITLE=Mizzen
CH_32_LVL_14_DESC=Elsa and Frozone pursue the creeps to the lower deck. They find the creeps punching a hole into the hull! Water floods the ship.
CH_32_LVL_15_TITLE=Fore
CH_32_LVL_15_DESC=The two beat back the creeps and quickly patch the hull with ice. It should hold until they get to wherever they're going.
CH_32_LVL_16_TITLE=Aft
CH_32_LVL_16_DESC=Frozone and Elsa emerge from the lower deck to find the creeps defeated. Pan is back on the prow barking orders to the crew.
CH_32_LVL_17_TITLE=Lower Mast
CH_32_LVL_17_DESC=The ship begins to rise once again. As it does, a golden glow emanates from every surface. Captain Pan gives orders to hoist the mainsail.
CH_32_LVL_18_TITLE=Mainsail
CH_32_LVL_18_DESC=With the mainsail raised, the ship rises rapidly into the sky, chasing the horizon. The heroes begin to whoop and holler.
CH_32_LVL_19_TITLE=Bow
CH_32_LVL_19_DESC=In a flash and a cloud of pixie dust, the ship vanishes. Where the heroes go next, only Peter Pan knows.
CH_33_TITLE=Neverland
CH_33_LVL_1_TITLE=Mermaids
CH_33_LVL_1_DESC=With a flash of pixie dust, the ship appears in a breathtaking lagoon. Mermaids take cover, wary of the ship's sudden appearance.
CH_33_LVL_2_TITLE=Beaches
CH_33_LVL_2_DESC=Peter Pan instructs the crew to dock and disembark the Black Pearl. Once everyone is off, the team reconvenes on the beach.
CH_33_LVL_3_TITLE=The Search
CH_33_LVL_3_DESC=Though Vanellope would rather find some Lost Boys to play with, she and the others begin their search for the dev note.
CH_33_LVL_4_TITLE=Leaderless
CH_33_LVL_4_DESC=The team splits up to look for the dev note. Peter Pan is more than a little disappointed. He had wanted to play follow the leader.
CH_33_LVL_5_TITLE=Lagoon
CH_33_LVL_5_DESC=Judy, Yax, Finnick, and Nick go to the Lagoon to see if they can interview the mermaids about any leads.
CH_33_LVL_6_TITLE=Skull Rock
CH_33_LVL_6_DESC=Vanellope and the Wreck-It-Ralph crew head to Skull Rock. Maybe the pirates already have their hands on the dev note.
CH_33_LVL_7_TITLE=Tree Sweet Tree
CH_33_LVL_7_DESC=The heroes follow Peter Pan all over the island on a wild goose chase. They finally end up at the foot of a dead tree.
CH_33_LVL_8_TITLE=Pan's House
CH_33_LVL_8_DESC=Just as Jack Sparrow is about to suggest they're wasting time, Peter ducks into the tree and beckons the others inside.
CH_33_LVL_9_TITLE=Tink's House
CH_33_LVL_9_DESC=Inside the tree, Peter sets about searching Tinkerbell's house for the dev note.
CH_33_LVL_10_TITLE=Found Note
CH_33_LVL_10_DESC=Sure enough, it's wedged between some spools of thread that Tink was saving. Peter hands the note over to Mrs. Incredible.
CH_33_LVL_11_TITLE=Get Here
CH_33_LVL_11_DESC=With the dev note in hand, Mrs. Incredible contacts the other heroes to meet them at the tree. In no time, everyone else arrives.
CH_33_LVL_12_TITLE=Nonsense
CH_33_LVL_12_DESC=Mrs. Incredible passes around the dev note. Though it has information regarding the virus, most of it is incoherent.
CH_33_LVL_13_TITLE=Akoota Chi Tay
CH_33_LVL_13_DESC=Scribbled all over the notes are unusual words, like Blitznak and Feeboogoo.
CH_33_LVL_14_TITLE=Ukes
CH_33_LVL_14_DESC=As the dev note devolves into nonsensical drawings of palm trees and gibberish, there is one last coherent sentence scribbled in the margins.
CH_33_LVL_15_TITLE=A Message
CH_33_LVL_15_DESC="The heroes will be in the City soon. I sincerely hope that they will save the day."
CH_33_LVL_16_TITLE=Sounds Familiar
CH_33_LVL_16_DESC=It's not much to go on, but when Nick and Judy see the note, a look of recognition passes over their faces.
CH_33_LVL_17_TITLE=Beachy Keen
CH_33_LVL_17_DESC=One thing is for certain. The team needs to leave Neverland. With no other exit in sight, everyone makes their way back to the beach.
CH_33_LVL_18_TITLE=All Aboard
CH_33_LVL_18_DESC=As they board the Black Pearl, Jack Sparrow reclaims his right as Captain. After all, Peter has no idea how to get back to the City.
CH_33_LVL_19_TITLE=Sail Away
CH_33_LVL_19_DESC=Suddenly, Neverland pixelates around the heroes. The moment quickly passes, but someone else is now with them on the Pearl -- the Inventor.
CH_34_TITLE=The Inventor
CH_34_LVL_1_TITLE=Main Mast
CH_34_LVL_1_DESC=At the sight of the Inventor, the Heroes jump to action, ready to fight.
CH_34_LVL_2_TITLE=Foremast
CH_34_LVL_2_DESC=However, before the Heroes can attack, the Inventor puts up a hand to stop them.
CH_34_LVL_3_TITLE=Crow's Nest
CH_34_LVL_3_DESC=As the Inventor stands smugly on the Black Pearl deck, the Heroes know they must choose their next words wisely.
CH_34_LVL_4_TITLE=Jibboom
CH_34_LVL_4_DESC=The Inventor has never been one to relay information if they can help it. But this time, something seems off about them.
CH_34_LVL_5_TITLE=Prow
CH_34_LVL_5_DESC=Surely the Inventor isn't just here to gloat. Mrs. Incredible quietly considers why the Inventor would appear now of all times.
CH_34_LVL_6_TITLE=Bowsprit
CH_34_LVL_6_DESC=The Heroes must be onto something that the Inventor doesn't want them to discover. It's the only logical explanation for their presence.
CH_34_LVL_7_TITLE=Figurehead
CH_34_LVL_7_DESC=The Heroes flank the Inventor from all sides, ready to pounce. But the Inventor has other ideas.
CH_34_LVL_8_TITLE=Forepeak
CH_34_LVL_8_DESC=Creeps appear from nowhere, shielding the Inventor on all sides. Mages fly through the air, lobbing projectiles at the Heroes.
CH_34_LVL_9_TITLE=Keel
CH_34_LVL_9_DESC=Calhoun blasts down a Mage as the other Heroes rush the creeps shielding the Inventor.
CH_34_LVL_10_TITLE=Hull
CH_34_LVL_10_DESC=Mrs. Incredible takes out another Mage, punching it out of the sky. Ralph screams at the pack of creeps surrounding the Inventor.
CH_34_LVL_11_TITLE=Rudder
CH_34_LVL_11_DESC=As more of them are taken out, the creeps tighten their circle around the Inventor. The Heroes double down their attacks.
CH_34_LVL_12_TITLE=Shrouds
CH_34_LVL_12_DESC=Flying overhead, Peter Pan is overwhelmed by Mages. He calls out for help to anyone who can hear.
CH_34_LVL_13_TITLE=Quarterdeck
CH_34_LVL_13_DESC=Jack Sparrow shoots the Mages out of the sky with his pistol. Peter Pan cannot believe he was just saved by a pirate.
CH_34_LVL_14_TITLE=Mizzen
CH_34_LVL_14_DESC=With all of the Mages taken out, Peter and Jack join the other Heroes. The last of the creeps don't stand a chance.
CH_34_LVL_15_TITLE=Fore
CH_34_LVL_15_DESC=With the last of the creeps defeated, the Inventor is at the team's mercy. The Heroes close in, ready to end this once and for all.
CH_34_LVL_16_TITLE=Aft
CH_34_LVL_16_DESC=Before the team can make their move, the Inventor begins to pixelate. A horrible glitching noise escapes the Inventor's throat.
CH_34_LVL_17_TITLE=Lower Mast
CH_34_LVL_17_DESC=The Inventor derezzes before their eyes, leaving the Black Pearl in an uneasy quiet.
CH_34_LVL_18_TITLE=Mainsail
CH_34_LVL_18_DESC=Jack Sparrow takes the wheel and high tails the ship back towards the City.
CH_34_LVL_19_TITLE=Bow
CH_34_LVL_19_DESC=If what the Inventor said is true, they only have so much time to find the last dev note.
CH_35_TITLE=626
CH_35_LVL_1_TITLE=Port A
CH_35_LVL_1_DESC=The team makes it safely back to the Port, but everyone is still shaken from their run-in with the Inventor.
CH_35_LVL_2_TITLE=Port B
CH_35_LVL_2_DESC=One thing is certain; they must find the final dev note before it's too late.
CH_35_LVL_3_TITLE=City Precinct
CH_35_LVL_3_DESC=The Heroes travel to the precinct, all the while hoping that Stitch will be there.
CH_35_LVL_4_TITLE=Jail Cell 7E
CH_35_LVL_4_DESC=Sure enough, Stitch is cuffed in one of the jail cells. He grins from inside the cell.
CH_35_LVL_5_TITLE=Jail Cell 7F
CH_35_LVL_5_DESC=Judy and Nick pass him the dev note through the bars. He muses it over and then gives a definitive nod.
CH_35_LVL_6_TITLE=Jail Cell 7G
CH_35_LVL_6_DESC=The dev note is indeed in tantalog. It says the next dev note is in Hawaii, but Stitch doesn't know how to get there.
CH_35_LVL_7_TITLE=Street A5
CH_35_LVL_7_DESC=The team leaves the precinct more frustrated than when they entered. There has to be an entrance to this hidden level somewhere in the City.
CH_35_LVL_8_TITLE=Street A6
CH_35_LVL_8_DESC=Out of options, the Heroes decide to begin checking places that Stitch frequents around the City.
CH_35_LVL_9_TITLE=Street A7
CH_35_LVL_9_DESC=Their first stop is an ice cream stand that Stitch takes Lilo to when they need a treat to cool off.
CH_35_LVL_10_TITLE=Street A8
CH_35_LVL_10_DESC=Sadly, the ice cream stand doesn't have anything that looks like an entrance, but everyone does take a moment to indulge in some frosty treats.
CH_35_LVL_11_TITLE=Street A9
CH_35_LVL_11_DESC=Hopped up on sugar, the Heroes move onto the next location, a surf shop.
CH_35_LVL_12_TITLE=Street B1
CH_35_LVL_12_DESC=The surf shop is a no-go. However, Yax and Finnick take a moment to enjoy the surfboard designs.
CH_35_LVL_13_TITLE=Street B2
CH_35_LVL_13_DESC=Yax knows of a record store that he and Stitch have gone to before. It's the best option as any to check out leads.
CH_35_LVL_14_TITLE=Street B3
CH_35_LVL_14_DESC=When the Heroes enter the record shop, Yax heads over to the folk section while the others look around.
CH_35_LVL_15_TITLE=Street B4
CH_35_LVL_15_DESC=Finnick flips through the hip-hop records, while Judy checks out the classic rock. There, amidst the vinyl, is a record that literally glitters.
CH_35_LVL_16_TITLE=Street B5
CH_35_LVL_16_DESC=Judy brings the glittering record to the others. On the cover is two simple words: The King.
CH_35_LVL_17_TITLE=Street B6
CH_35_LVL_17_DESC=The clerk puts the record on, and music fills the small space of the record shop. As the turntable spins, the record begins to glow.
CH_35_LVL_18_TITLE=Street B7
CH_35_LVL_18_DESC=In a flash of light and sparkles, the Heroes disappear. Leaving only the sultry sounds of The King behind.
CH_35_LVL_19_TITLE=Aloha
CH_35_LVL_19_DESC=The Heroes reappear on a sandy beach. The smell of the saltwater and a warm breeze filling everyone's senses.
CH_36_TITLE=Just Beachy
CH_36_LVL_1_TITLE=Morcheeba
CH_36_LVL_1_DESC=The team stands on the beach, taking in the sun and saltwater, the waves lapping onto a sandy shore.
CH_36_LVL_2_TITLE=Hassiniyadh
CH_36_LVL_2_DESC=Despite the beautiful sight before them, the team can't shake the accompanying sense of dread.
CH_36_LVL_3_TITLE=Iki Bah Bah
CH_36_LVL_3_DESC=With the Inventor's warning still at the forefront of everyone's mind, the search for the final dev note begins.
CH_36_LVL_4_TITLE=El Kiyotay
CH_36_LVL_4_DESC=The team combs the beach in search of the note. The beach may be massive, but the Heroes remain optimistic.
CH_36_LVL_5_TITLE=Hagata
CH_36_LVL_5_DESC=Ralph finds a metal detector and begins sweeping the beach. It isn't long before the detector goes off.
CH_36_LVL_6_TITLE=Akootah
CH_36_LVL_6_DESC=Using shovels and pails, the team digs in earnest. They find a metal box buried in the sand. Inside is the dev note.
CH_36_LVL_7_TITLE=Bootifa
CH_36_LVL_7_DESC=Yax sets to work entering the code into his device. Sure enough, it's a program. What it does, though, remains to be seen.
CH_36_LVL_8_TITLE=Blitznak
CH_36_LVL_8_DESC=Suddenly, the beach begins the shake. Creeps emerge from the sand, with their eyes set on the Heroes.
CH_36_LVL_9_TITLE=Feeboogoo
CH_36_LVL_9_DESC=The team leaps into action, ready to face off against the ever-growing number of creeps. Their newly formed ranks outnumber the Heroes.
CH_36_LVL_10_TITLE=Gaba
CH_36_LVL_10_DESC=Focused and full of rage, the creeps attack. Just as before, they seem far more vicious than their predecessors.
CH_36_LVL_11_TITLE=Baaheth Jihadi
CH_36_LVL_11_DESC=The creeps flank the team, closing in. Mrs. Incredible throws the first punch, knocking one of the creeps to the ground.
CH_36_LVL_12_TITLE=Crabba Snabba
CH_36_LVL_12_DESC=The creeps swarm on the Heroes, fighting with a furiousness no one has ever seen before. The team is completely outmatched.
CH_36_LVL_13_TITLE=Choota
CH_36_LVL_13_DESC=Chaos ensues as the Heroes panic. Judy attempts a flying kick, only to be caught midair and thrown to the ground.
CH_36_LVL_14_TITLE=Meega-o-Itume
CH_36_LVL_14_DESC=Ralph throws his fists to the ground, trying to throw the creeps off balance, but they ride out the tremors like a wave.
CH_36_LVL_15_TITLE=Naga Bootifa
CH_36_LVL_15_DESC=No matter how they try, the Heroes cannot get the upper hand on the creeps. The swarm is organized and dangerous.
CH_36_LVL_16_TITLE=Farbras
CH_36_LVL_16_DESC=As the creeps close in, they set their eyes on Yax. The swarm rushes the team, knocking them aside as they barrel towards the yak.
CH_36_LVL_17_TITLE=Chabata
CH_36_LVL_17_DESC=A creep grabs Vanellope and throws her into the air. The girl screams as she flies higher and higher.
CH_36_LVL_18_TITLE=Detaka
CH_36_LVL_18_DESC=Thinking quickly, Mrs. Incredible grabs Vanellope and the rest of the team. With Heroes in hand, she runs into the surf.
CH_36_LVL_19_TITLE=Goobaja
CH_36_LVL_19_DESC=The world shimmers around the team as they disappear from the beach, leaving the swarm in their wake.
CH_37_TITLE=New Friends
CH_37_LVL_1_TITLE=Avenue 2
CH_37_LVL_1_DESC=When the team rematerializes, they find themselves in the Theater District. Everyone is shaken from their encounter with the creep horde.
CH_37_LVL_2_TITLE=Avenue 2A
CH_37_LVL_2_DESC=Before the Heroes can rally and plan what comes next, creeps begin pouring in from all sides. The team finds themselves surrounded.
CH_37_LVL_3_TITLE=Avenue 2B
CH_37_LVL_3_DESC=The creeps divide into a flanking position, cutting the Heroes off from one another. Mrs. Incredible is the first to be captured.
CH_37_LVL_4_TITLE=Avenue 2C
CH_37_LVL_4_DESC=The team scrambles to save their unspoken leader but, divided, they're no match for the creeps.
CH_37_LVL_5_TITLE=Avenue 2D
CH_37_LVL_5_DESC=As the Heroes are taken down, one by one, Ralph looks on as Vanellope is carried away by creeps.
CH_37_LVL_6_TITLE=Avenue 2E
CH_37_LVL_6_DESC=Soon, only Ralph, Judy, and Yax remain. As creeps close in, the odds are stacked against them.
CH_37_LVL_7_TITLE=Avenue 2F
CH_37_LVL_7_DESC=Kristoff and Sven get the drop on the creeps. They aren't alone, either. The two are joined by Beaker, Bunsen, Launchpad, Olaf, and Stitch.
CH_37_LVL_8_TITLE=Avenue 2G
CH_37_LVL_8_DESC=Bunsen works quickly to multiply Beaker. Suddenly, the creeps are outnumbered and panicking in the face of an army of Beakers.
CH_37_LVL_9_TITLE=Avenue 2H
CH_37_LVL_9_DESC=As the creeps face off against the numerous Beakers, Kristoff and Sven ride off to round up the captured heroes.
CH_37_LVL_10_TITLE=Avenue 2I
CH_37_LVL_10_DESC=With the backup they so desperately needed, Ralph and the others rally and slowly gain the upper hand.
CH_37_LVL_11_TITLE=Avenue 2J
CH_37_LVL_11_DESC=Kristoff and Sven return to the fight, with the newly freed heroes in close pursuit. Finally, the team has a fighting chance.
CH_37_LVL_12_TITLE=Avenue 2K
CH_37_LVL_12_DESC=Shots fly through the air as Stitch, Vanellope, and Calhoun blast down creeps. Mrs. Incredible leads the charge as the others rush into battle.
CH_37_LVL_13_TITLE=Avenue 2L
CH_37_LVL_13_DESC=Olaf creates a flurry, sending the creeps blindly running into one another. In the chaos, Launchpad and the others begin to pick them off.
CH_37_LVL_14_TITLE=Avenue 2M
CH_37_LVL_14_DESC=One by one, the creeps derezz. The Heroes gain more ground with each punch thrown. What was once an army is now reduced to a chaotic horde.
CH_37_LVL_15_TITLE=Avenue 2N
CH_37_LVL_15_DESC=As the heroes fight for the City and their lives, the horde grows ever smaller. It isn't long before only a handful remains.
CH_37_LVL_16_TITLE=Avenue 2O
CH_37_LVL_16_DESC=With the fight finally over, everyone is exhausted. The team works quickly to assess the damage and heal those that need it.
CH_37_LVL_17_TITLE=Avenue 2P
CH_37_LVL_17_DESC=With everyone healed and rested, the heroes focus on the next task at hand: saving the City.
CH_37_LVL_18_TITLE=Avenue 2Q
CH_37_LVL_18_DESC=Mrs. Incredible tells the others about the code they found at the beach. They listen, enraptured, to the tale of the others; near defeat.
CH_37_LVL_19_TITLE=Avenue 2R
CH_37_LVL_19_DESC=From now on, priority one is saving the City. Using Yax's device and the new program, the team may be able to pull it off.
CH_38_TITLE=Unlikely Allies
CH_38_LVL_1_TITLE=Boulevard A4
CH_38_LVL_1_DESC=When the team arrives at the Hacker Space, the place is eerily quiet. Yax plugs his device into a PC and gets to work.
CH_38_LVL_2_TITLE=Boulevard Z3
CH_38_LVL_2_DESC=As Yax fiddles with the new program, the rest of the team assess their options.
CH_38_LVL_3_TITLE=Boulevard Y3
CH_38_LVL_3_DESC=Before the team can brainstorm ways to get the Inventor's attention, creeps attack the Hacker Space.
CH_38_LVL_4_TITLE=Boulevard X3
CH_38_LVL_4_DESC=This time, the Heroes are ready. Shank and Vanellope guard Yax as the others jump into action.
CH_38_LVL_5_TITLE=Boulevard W3
CH_38_LVL_5_DESC=As the creeps close in, the air begins to crackle with electricity. Suddenly, the Inventor appears with a flash of light.
CH_38_LVL_6_TITLE=Boulevard V3
CH_38_LVL_6_DESC=With a wave of their hand, the Inventor derezzes the creeps in one fell swoop. Leaving the Hacker Space eerily quiet once again.
CH_38_LVL_7_TITLE=Boulevard U3
CH_38_LVL_7_DESC=Holding the virus at bay has taken its toll on the Inventor. It has buried itself deep within them, causing them to unravel.
CH_38_LVL_8_TITLE=Boulevard T3
CH_38_LVL_8_DESC=The Heroes are devastated. The Inventor may be their enemy, but what they're enduring sounds horrific.
CH_38_LVL_9_TITLE=Boulevard S3
CH_38_LVL_9_DESC=In its attempt to escape the Inventor's grasp, the virus has evolved. Now, if it is released, it will rip the City apart.
CH_38_LVL_10_TITLE=Boulevard R3
CH_38_LVL_10_DESC=The virus is now strong enough that the code, originally intended to destroy it, may only weaken it.
CH_38_LVL_11_TITLE=Boulevard Q3
CH_38_LVL_11_DESC=Though the news comes as a blow to the team, they decide to take their chances and use the program to try and destroy the virus.
CH_38_LVL_12_TITLE=Boulevard P3
CH_38_LVL_12_DESC=With the new program loaded, Yax's device doubles as a virus scrubber. Everyone readies themselves to fight.
CH_38_LVL_13_TITLE=Boulevard O3
CH_38_LVL_13_DESC=It's up to Yax to catch the virus once it's released. On Mrs. Incredible's mark, the Inventor unleashes the virus.
CH_38_LVL_14_TITLE=Boulevard N3
CH_38_LVL_14_DESC=Suddenly, the lights in the Hacker Space go out, throwing everyone in darkness. That's when the noise begins.
CH_38_LVL_15_TITLE=Boulevard M3
CH_38_LVL_15_DESC=With a howling scream, the virus rips itself from the Inventor's body. Yax fires up his device, trapping the virus.
CH_38_LVL_16_TITLE=Boulevard L3
CH_38_LVL_16_DESC=The virus is too powerful for the device and breaks free! In the blink of an eye, it tears open a portal and escapes.
CH_38_LVL_17_TITLE=Boulevard K3
CH_38_LVL_17_DESC=The virus may have escaped, but the Heroes aren't deterred. The team chases after the Mega Virus through the portal.
CH_38_LVL_18_TITLE=Boulevard J3
CH_38_LVL_18_DESC=Crossing the threshold of the portal, the Heroes are faced with an eerily familiar sight, the Inventor's Workshop.
CH_38_LVL_19_TITLE=Boulevard I3
CH_38_LVL_19_DESC=Did the portal falter in someway? Or have the Heroes really left the City?
CH_39_TITLE=What's Next
CH_39_LVL_1_TITLE=Art Lab
CH_39_LVL_1_DESC=With the team safely located in what appears to be the Inventor's Workshop, everyone is at an uneasy standstill.
CH_39_LVL_2_TITLE=Server Lab
CH_39_LVL_2_DESC=Now that the Inventor is free of the Mega Virus, can the team really put their faith in them?
CH_39_LVL_3_TITLE=Yellow Lab
CH_39_LVL_3_DESC=The Hub was to be the City's downloadable content. However, before unveiling it, the Inventor would conduct many of his experiments there.
CH_39_LVL_4_TITLE=Animation Lab
CH_39_LVL_4_DESC=One such experiment became self-aware, and, unwilling to be subjected to the Inventor's own gains, it rebelled.
CH_39_LVL_5_TITLE=Building Lab
CH_39_LVL_5_DESC=The experiment mutated into the Mega Virus. But before it could unleash itself onto the City, the Inventor trapped it and merged with it.
CH_39_LVL_6_TITLE=Interface Lab
CH_39_LVL_6_DESC=But now that the Mega Virus is free, it could be wreaking havoc anywhere in the Hub.
CH_39_LVL_7_TITLE=Chocolate Lab
CH_39_LVL_7_DESC=There is still hope for the City. Despite the Mega Virus's escape, the heroes are ready to track the thing down.
CH_39_LVL_8_TITLE=Sound Lab
CH_39_LVL_8_DESC=The team will need more help than ever before. If it hadn't been for Kristoff's rescue, they might not have made it through the last battle.
CH_39_LVL_9_TITLE=Level Lab
CH_39_LVL_9_DESC=Mrs. Incredible recommends a plan of action -- put out a call across the City to every hero who will lend their aid.
CH_39_LVL_10_TITLE=Physics Lab
CH_39_LVL_10_DESC=If the team can amass an army, they may have a fighting chance. But with Yax's device now out of commission, how will they get the word out?
CH_39_LVL_11_TITLE=Render Lab
CH_39_LVL_11_DESC=The Inventor says that they can contact the heroes. Using the equipment in their workshop, Mrs. Incredible could make the call.
CH_39_LVL_12_TITLE=Balance Lab
CH_39_LVL_12_DESC=Though the heroes are reluctant to take the Inventor's help, it seems to be the only option available.
CH_39_LVL_13_TITLE=Enemy Lab
CH_39_LVL_13_DESC=After some consideration, Mrs. Incredible agrees. The Inventor sets up the necessary equipment and puts her through.
CH_39_LVL_14_TITLE=Environments Lab
CH_39_LVL_14_DESC=Mrs. Incredible sends out a plea to every willing hero in the City. Her call to arms is short and concise: The City is in danger. Please help.
CH_39_LVL_15_TITLE=Writing Lab
CH_39_LVL_15_DESC=With the message out, the next move is to track down the Mega Virus. Thankfully, the Inventor may know where it went.
CH_39_LVL_16_TITLE=QA Lab
CH_39_LVL_16_DESC=The Inventor opens a new portal and beckons the Heroes to step through.
CH_39_LVL_17_TITLE=Design Lab
CH_39_LVL_17_DESC=The Heroes agree to go through the portal. However, some are obviously less enthused than others.
CH_39_LVL_18_TITLE=Code Lab
CH_39_LVL_18_DESC=With their faith in the hands of the Inventor, the team enters the portal one by one.
CH_39_LVL_19_TITLE=Black Lab
CH_39_LVL_19_DESC=The Hero's new mission is clear: find and dispose of the Mega Virus, no matter what.
CH_40_TITLE=The Portal Room
CH_40_LVL_1_TITLE=A Strange Site
CH_40_LVL_1_DESC=As the heroes emerge from the portal, they find themselves in a strange room.
CH_40_LVL_2_TITLE=Gone Home
CH_40_LVL_2_DESC=Numerous portals, like the one the Mega Virus escaped through, line the walls. The air thrums with electricity.
CH_40_LVL_3_TITLE=Shut In
CH_40_LVL_3_DESC=With the portals corrupted, the Heroes are trapped. The team mourns the loss of their one chance to return home.
CH_40_LVL_4_TITLE=There's Hope
CH_40_LVL_4_DESC=However, according to the Inventor, all is not lost. If the team can defeat the Mega Virus, the portals can be rebooted.
CH_40_LVL_5_TITLE=Stop It
CH_40_LVL_5_DESC=With this new information, the Heroes find themselves motivated more than ever in their quest to stop the Mega Virus.
CH_40_LVL_6_TITLE=Weapons
CH_40_LVL_6_DESC=First and foremost, the Heroes need the proper tools to give them an advantage in their battle against the Mega Virus.
CH_40_LVL_7_TITLE=In The Wind
CH_40_LVL_7_DESC=With the Mega Virus in the Codebase, it now has the power to be seemingly anywhere.
CH_40_LVL_8_TITLE=It Gets Worse
CH_40_LVL_8_DESC=The team listens with mounting anxiety as the Inventor explains that that isn't the worst of it.
CH_40_LVL_9_TITLE=Access
CH_40_LVL_9_DESC=As part of the Codebase, the Mega Virus also has access to the creeps.
CH_40_LVL_10_TITLE=Better Baddies
CH_40_LVL_10_DESC=The team will have to face an increasingly organized and intelligent enemy.
CH_40_LVL_11_TITLE=Unyielding
CH_40_LVL_11_DESC=The Mega Virus is unrelenting and will stop at nothing to ensure the total destruction of the City and the Hub.
CH_40_LVL_12_TITLE=Outnumbered
CH_40_LVL_12_DESC=The small band of Heroes suddenly feels outmatched when faced with such a daunting adversary.
CH_40_LVL_13_TITLE=Reinforcements
CH_40_LVL_13_DESC=The time to call on the other Heroes is at hand. The team decides to head back to the City and round up the troops.
CH_40_LVL_14_TITLE=Wait
CH_40_LVL_14_DESC=As they prepare to return to the City, they are stopped by the Inventor.
CH_40_LVL_15_TITLE=Keen Gear
CH_40_LVL_15_DESC=The Inventor reaches into a small portal on the wall, pulling out badges unlike any the Heroes have ever seen.
CH_40_LVL_16_TITLE=Badge Brigade
CH_40_LVL_16_DESC=After handing out a badge to each of the Heroes, the Inventor explains their purpose.
CH_40_LVL_17_TITLE=Back Again
CH_40_LVL_17_DESC=Equipped with the new Battle Badges, the Heroes make their way to the City portal.
CH_40_LVL_18_TITLE=Tension Mounts
CH_40_LVL_18_DESC=As the City portal gleams in the room's low light, an uneasy tension passes between the Heroes.
CH_40_LVL_19_TITLE=The City Awaits
CH_40_LVL_19_DESC=With little option left to them, the Heroes step through the portal and back into the City. Are they ready for what lies ahead?
CH_41_TITLE=City Work
CH_41_LVL_1_TITLE=Avenue E3
CH_41_LVL_1_DESC=The heroes arrive back in the City only to find it in chaos. In their absence, the Mega Virus has already run amok.
CH_41_LVL_2_TITLE=Avenue E6
CH_41_LVL_2_DESC=Thankfully, Mrs. Incredible's call was heard across the City. Other heroes are already awaiting them and ready to help.
CH_41_LVL_3_TITLE=Avenue E9
CH_41_LVL_3_DESC=With so many heroes AND villains present, it no longer makes sense to have just one team.
CH_41_LVL_4_TITLE=Avenue E12
CH_41_LVL_4_DESC=Mrs. Incredible has a plan, though. Separate everyone into four teams: two tactical teams, a tech team, and a team to keep peace in the City.
CH_41_LVL_5_TITLE=Avenue E15
CH_41_LVL_5_DESC=The tactical teams will be in charge of pursuing the Mega Virus wherever it hits next.
CH_41_LVL_6_TITLE=Avenue E18
CH_41_LVL_6_DESC=As heroes and villains line up to volunteer for the tactical team, Mrs. Incredible takes Calhoun aside.
CH_41_LVL_7_TITLE=Avenue E21
CH_41_LVL_7_DESC=Calhoun also recruits Kristoff, Sven, Kida, Elsa, Goliath, Jumba, Gaston, and Stitch to the team.
CH_41_LVL_8_TITLE=Avenue E24
CH_41_LVL_8_DESC=Once the first tactical team heads back to the Hub, Judy Hopps is put in charge of the second.
CH_41_LVL_9_TITLE=Avenue E27
CH_41_LVL_9_DESC=She selects Darkwing, Kim Possible, Mulan, Maui, John Silver, Baymax, and Captain Amelia to join her ranks.
CH_41_LVL_10_TITLE=Avenue E30
CH_41_LVL_10_DESC=The tech team will be in charge of repairing the portals and any broken tech that could be used to fight the Mega Virus.
CH_41_LVL_11_TITLE=Avenue E33
CH_41_LVL_11_DESC=Shank is chosen as tech team leader. She recruits Hiro, Yax, Gizmoduck, Quorra, and Tron. The portals will be back and running in no time.
CH_41_LVL_12_TITLE=Avenue E36
CH_41_LVL_12_DESC=To keep order in the City, the last team is led by Chief Bogo and Mrs. Incredible. They select Woody, Joy, Merlin, Yzma, and Pleakley to help.
CH_41_LVL_13_TITLE=Avenue E39
CH_41_LVL_13_DESC=In the blink of an eye, everything has changed. Mrs. Incredible and the others look on in awe at the new army they've assembled.
CH_41_LVL_14_TITLE=Avenue E42
CH_41_LVL_14_DESC=With all the teams selected, the heroes and villains focus on next steps. The City is still unstable. Should they focus their efforts there?
CH_41_LVL_15_TITLE=Avenue E45
CH_41_LVL_15_DESC=It's imperative that the teams get to work, and fulfill their purpose in destroying the Mega Virus.
CH_41_LVL_16_TITLE=Avenue E48
CH_41_LVL_16_DESC=After wishing one another luck and a few tearful goodbyes, all that's left is the last minute review of plans.
CH_41_LVL_17_TITLE=Avenue E51
CH_41_LVL_17_DESC=One by one, each of the assembled teams make their portal jumps. Soon, only the City team remains.
CH_41_LVL_18_TITLE=Avenue E54
CH_41_LVL_18_DESC=With no time to lose, Chief Bogo and Mrs. Incredible hand out orders. Half of the team will go Uptown while the others go Downtown.
CH_41_LVL_19_TITLE=Avenue E57
CH_41_LVL_19_DESC=There's much work to be done. Hopefully, the other teams will find success in their effort to defeat the Mega Virus.
CH_42_TITLE=Servers Up
CH_42_LVL_1_TITLE=Server 116A
CH_42_LVL_1_DESC=The tech team emerges from the portal into the Server Room.
CH_42_LVL_2_TITLE=Server 117B
CH_42_LVL_2_DESC=While Hiro flits around like a kid in a candy store, the others marvel at the space with slack-jawed bewilderment.
CH_42_LVL_3_TITLE=Server 118C
CH_42_LVL_3_DESC=Cracking his neck and stretching his fingers, Hiro prepares for some long-haul hacking.
CH_42_LVL_4_TITLE=Server 119D
CH_42_LVL_4_DESC=While Hiro works, Quorra and Tron attempt to run diagnostics by talking to the servers one-on-one.
CH_42_LVL_5_TITLE=Server 120E
CH_42_LVL_5_DESC=With thousands of databases to sort through, the team is faced with a near-impossible task.
CH_42_LVL_6_TITLE=Server 121F
CH_42_LVL_6_DESC=Suddenly, Hiro slams his laptop shut. Everyone turns to find him pulling at his hair in frustration.
CH_42_LVL_7_TITLE=Server 122G
CH_42_LVL_7_DESC=From what Hiro can tell, the encryption is directly controlled by the Mega Virus.
CH_42_LVL_8_TITLE=Server 123H
CH_42_LVL_8_DESC=As a result, the encryption is continuously changing. It mutates as rapidly as the Mega Virus itself.
CH_42_LVL_9_TITLE=Server 124I
CH_42_LVL_9_DESC=The entire team could work for a hundred hours and still not break it.
CH_42_LVL_10_TITLE=Server 125J
CH_42_LVL_10_DESC=Now faced with a truly impossible task, the tech team begins to despair.
CH_42_LVL_11_TITLE=Server 126K
CH_42_LVL_11_DESC=If they can't get into the databases or communicate with the servers, it will slow down any other teams' progress.
CH_42_LVL_12_TITLE=Server 127L
CH_42_LVL_12_DESC=The tech team begins to brainstorm alternative options. Could the system simply be shut down?
CH_42_LVL_13_TITLE=Server 128M
CH_42_LVL_13_DESC=Hiro believes that it would endanger the Hub and the City if they shut down the server room.
CH_42_LVL_14_TITLE=Server 129N
CH_42_LVL_14_DESC=Since the City and the Hub's damage could be catastrophic, the team will need to come up with a different solution.
CH_42_LVL_15_TITLE=Server 130O
CH_42_LVL_15_DESC=An hour later, the team still hasn't come up with any viable options. Things continue to look grim.
CH_42_LVL_16_TITLE=Server 131P
CH_42_LVL_16_DESC=The only remaining chance the team has is to scrub the virus out manually.
CH_42_LVL_17_TITLE=Server 132Q
CH_42_LVL_17_DESC=With the fate of their mission hanging in the balance, the tech team begins scrubbing out the virus in earnest.
CH_42_LVL_18_TITLE=Server 133R
CH_42_LVL_18_DESC=As the tech team works against the clock, an uneasiness hangs in the air. Will they have enough time to get the deed done?
CH_42_LVL_19_TITLE=Server 134S
CH_42_LVL_19_DESC=Hopefully, the tactical teams will have better luck...wherever they are.
CH_43_TITLE=Sun's Out...
CH_43_LVL_1_TITLE=Danger Ahead?
CH_43_LVL_1_DESC=Tactical Team One steps through the Portal, unaware of what possible danger may lurk on the other side.
CH_43_LVL_2_TITLE=The Sunny Side
CH_43_LVL_2_DESC=The team is astounded to find a picturesque beach awaiting them on the other side.
CH_43_LVL_3_TITLE=Beach Combers
CH_43_LVL_3_DESC=As the team searches the beach, some members become...distracted.
CH_43_LVL_4_TITLE=Sun Buddies
CH_43_LVL_4_DESC=Despite Calhoun's orders, Ducky and Bunny stretch out in the sun, unwilling to move.
CH_43_LVL_5_TITLE=Sandcastles
CH_43_LVL_5_DESC=Stitch decides building a sandcastle is a better use of his time than searching for the Mega Virus.
CH_43_LVL_6_TITLE=Focus, People!
CH_43_LVL_6_DESC=Calhoun tries to get everyone to focus on the mission, but it's like herding cats. Frustrated, she asks Kida for a favor.
CH_43_LVL_7_TITLE=Eye In The Sky
CH_43_LVL_7_DESC=With that, Kida soars her Ketak into the sky. In no time at all, she's nothing but a shadow against the sun.
CH_43_LVL_8_TITLE=What's Wrong?
CH_43_LVL_8_DESC=The team watches from the ground as Kida pilots the Ketak through the air, her flight pattern becoming increasingly erratic.
CH_43_LVL_9_TITLE=Not Great
CH_43_LVL_9_DESC=When Kida returns to the ground, she has a grim expression on her face.
CH_43_LVL_10_TITLE=News
CH_43_LVL_10_DESC=The others gather around to find out what Kida saw. By the looks of it, it's not going to be good.
CH_43_LVL_11_TITLE=Huge
CH_43_LVL_11_DESC=It turns out that the new area is immense! Even from her vantage point in the sky, Kida could hardly see its end.
CH_43_LVL_12_TITLE=Conundrum
CH_43_LVL_12_DESC=The team is completely shocked by the news. How will they be able to find the Mega Virus in this new land?
CH_43_LVL_13_TITLE=Plush Panic
CH_43_LVL_13_DESC=Ducky and Bunny begin to panic, running in circles and screaming nonsense.
CH_43_LVL_14_TITLE=Full Tilt
CH_43_LVL_14_DESC=The others try their best to calm the plush toys, but it's no use. Ducky and Bunny are in full-tilt hysterics.
CH_43_LVL_15_TITLE=Enough
CH_43_LVL_15_DESC=Fed up, Calhoun blasts her cannon skyward. The sound snaps Ducky and Bunny out of their spiral.
CH_43_LVL_16_TITLE=In Focus
CH_43_LVL_16_DESC=Suddenly, all eyes are on Calhoun. A silence falls over the team.
CH_43_LVL_17_TITLE=Good To Go
CH_43_LVL_17_DESC=Thanks to Calhoun, the team is pumped up and ready to roll. Everyone decides the best course of action is to move farther inland.
CH_43_LVL_18_TITLE=Beach Bye
CH_43_LVL_18_DESC=As the team leaves the beach, they take one last look at the picturesque splendor before them. It really would be a nice place to vacation.
CH_43_LVL_19_TITLE=Someday
CH_43_LVL_19_DESC=Maybe, someday, when this is all over, everyone can take a much-needed break.
CH_44_TITLE=Day At The Park
CH_44_LVL_1_TITLE=Team Two
CH_44_LVL_1_DESC=When the second Tactical Team steps through the portal, they find themselves in a Park much like the one in the City.
CH_44_LVL_2_TITLE=Explorers
CH_44_LVL_2_DESC=Ready for any harm that might befall them, the team begins to explore the new area.
CH_44_LVL_3_TITLE=Sticking Around
CH_44_LVL_3_DESC=Everyone agrees that Judy has a point. The team will be stronger if they stick together.
CH_44_LVL_4_TITLE=Time Will Tell
CH_44_LVL_4_DESC=The heroes begin to brainstorm. Whatever their next steps are, one thing is certain: time is of the essence.
CH_44_LVL_5_TITLE=Map It
CH_44_LVL_5_DESC=John Silver suggests they find a map. Perhaps, there will be one at the Park entrance.
CH_44_LVL_6_TITLE=Park It
CH_44_LVL_6_DESC=With a plan in place, the team makes their way toward the Park entrance.
CH_44_LVL_7_TITLE=Surprise!
CH_44_LVL_7_DESC=Mages emerge from the bushes, hurling spells at the heroes. Everyone takes cover as the onslaught begins.
CH_44_LVL_8_TITLE=Oof!
CH_44_LVL_8_DESC=As Brutes flank them, Judy and the others leap into action, but are quickly knocked down.
CH_44_LVL_9_TITLE=Ensnared
CH_44_LVL_9_DESC=With Mages attacking from the air and Brutes on the ground, the heroes are completely surrounded.
CH_44_LVL_10_TITLE=Full Force
CH_44_LVL_10_DESC=Intense and furious, the creeps close in on the heroes. Their movements are organized and filled with malicious intent.
CH_44_LVL_11_TITLE=Suck Gas
CH_44_LVL_11_DESC=Darkwing shoots a gas pellet, enshrouding the team in a thick layer of smoke. If anything, it buys them some time.
CH_44_LVL_12_TITLE=Smoked Out
CH_44_LVL_12_DESC=The team readies their weapons. It will take a miracle to ensure everyone makes it out alive.
CH_44_LVL_13_TITLE=Overhead
CH_44_LVL_13_DESC=When the smoke clears, Mages and Ghouls fly in every direction as the team is rushed by Brutes.
CH_44_LVL_14_TITLE=Shoot!
CH_44_LVL_14_DESC=Captain Amelia and John Silver shoot down the enemies overhead as the others take on the Brutes.
CH_44_LVL_15_TITLE=Sword Worked
CH_44_LVL_15_DESC=Kim Possible gets cornered! Just as a creep is about to throw down a finishing blow, Mulan runs it through with her sword.
CH_44_LVL_16_TITLE=Pin Drop
CH_44_LVL_16_DESC=Creeps begin to derez as the team gets the upper hand. When the battle finally ends, an uneasy quiet descends on the Park.
CH_44_LVL_17_TITLE=Ill At Ease
CH_44_LVL_17_DESC=The knowledge that the Mega Virus may be controlling the enemy in this new land is unsettling, to say the least.
CH_44_LVL_18_TITLE=Outcome Poor
CH_44_LVL_18_DESC=One thing is certain, there will always be more creeps. And with the team barely scraping by with a win, things don't look good.
CH_44_LVL_19_TITLE=Speculation
CH_44_LVL_19_DESC=Putting their fears aside, the team continues their search for the Mega Virus. What happens when they find it is anyone's guess.
CH_45_TITLE=Ominous Days
CH_45_LVL_1_TITLE=14th Blvd
CH_45_LVL_1_DESC=The Order Team finds itself face-to-face with a City that is slowly sinking into chaos.
CH_45_LVL_2_TITLE=77SE Ave
CH_45_LVL_2_DESC=The Theater District has seen better days. Signs and buildings glitch in and out, but most residents seem unphased.
CH_45_LVL_3_TITLE=Alley 21
CH_45_LVL_3_DESC=While Pleakley has his meltdown, the others work hard to keep residents distracted.
CH_45_LVL_4_TITLE=E92 Street
CH_45_LVL_4_DESC=Most City dwellers seem happy and go about their day. Only a few whine that some of the local spots are out of commission.
CH_45_LVL_5_TITLE=59 Ave
CH_45_LVL_5_DESC=Though no one says it, the team knows things are going far too smoothly. It's only a matter of time before the other shoe drops.
CH_45_LVL_6_TITLE=99999 Street
CH_45_LVL_6_DESC=For now, the heroes are doing all they can to keep people satisfied. Hopefully, if anything arises, they'll be prepared.
CH_45_LVL_7_TITLE=127th Blvd
CH_45_LVL_7_DESC=The team decides the best way to keep residents happy is to see that their needs are met.
CH_45_LVL_8_TITLE=S4892 Ave
CH_45_LVL_8_DESC=Joy loves the idea but thinks handing out stickers would cut out the middle man.
CH_45_LVL_9_TITLE=N4232 Street
CH_45_LVL_9_DESC=Mrs. Incredible helps people with directions when all the road signs suddenly vanish.
CH_45_LVL_10_TITLE=9023 Street
CH_45_LVL_10_DESC=Woody uses his pull string to wrangle a lamp post before it falls on some unwitting passersby.
CH_45_LVL_11_TITLE=4th South Ave
CH_45_LVL_11_DESC=Chief Bogo smiles and nods as he listens to a resident complain about the Comedy Club suddenly disappearing.
CH_45_LVL_12_TITLE=Blvd Y29
CH_45_LVL_12_DESC=Merlin conjures fireworks to light the way as the street lamps slowly blink in and out of existence.
CH_45_LVL_13_TITLE=Alley 7758
CH_45_LVL_13_DESC=Pleakley attempts to direct traffic but fails abysmally, resulting in a seven-car pile up.
CH_45_LVL_14_TITLE=411 NW Street
CH_45_LVL_14_DESC=Yzma actively tries not to poison anyone. It ends up being harder than she anticipated.
CH_45_LVL_15_TITLE=Ave 398
CH_45_LVL_15_DESC=As the heroes go about their tasks, something malicious stirs in the dark corners of the Theater District.
CH_45_LVL_16_TITLE=876 E Ct
CH_45_LVL_16_DESC=Unbeknownst to the team, the City's villains are gathering, and a plan is coming together.
CH_45_LVL_17_TITLE=845 Drive
CH_45_LVL_17_DESC=A terrifying bargain is struck. Hades, Oogie Boogie, Maleficent, Ursula, and Scar agree to a truce in the name of taking over the City.
CH_45_LVL_18_TITLE=094 Blvd
CH_45_LVL_18_DESC=The terms are simple, no backstabbing until the heroes are dealt with. After that, it's anyone's game.
CH_45_LVL_19_TITLE=000 Ave
CH_45_LVL_19_DESC=For now, the villains agree to the truce. When the time comes, the heroes will have their work cut out for them.
CH_46_TITLE=Dead Ends
CH_46_LVL_1_TITLE=Portal H23
CH_46_LVL_1_DESC=After hours of manual scrubbing, the Tech Team has had enough.
CH_46_LVL_2_TITLE=Portal I23
CH_46_LVL_2_DESC=Like a Hydra, for every firewall that's torn down, two spring up in its place.
CH_46_LVL_3_TITLE=Portal J23
CH_46_LVL_3_DESC=The Tech Team decides to go back to the Portal Room.
CH_46_LVL_4_TITLE=Portal K23
CH_46_LVL_4_DESC=Maybe they can repair the damage the Mega Virus caused before escaping into the Hub.
CH_46_LVL_5_TITLE=Portal L23
CH_46_LVL_5_DESC=When the Tech Team reaches the Portal Room, it's in even worse disrepair than they remembered.
CH_46_LVL_6_TITLE=Portal M23
CH_46_LVL_6_DESC=Putting their fears aside, the Tech Team sets up shop, ready and willing to do what it takes.
CH_46_LVL_7_TITLE=Portal N23
CH_46_LVL_7_DESC=With tools in hand, the team begins working in earnest.
CH_46_LVL_8_TITLE=Portal O23
CH_46_LVL_8_DESC=Gizmoduck solders pieces back together.
CH_46_LVL_9_TITLE=Portal P23
CH_46_LVL_9_DESC=Quorra takes on the arduous task of untangling chords.
CH_46_LVL_10_TITLE=Portal Q23
CH_46_LVL_10_DESC=Tron picks up trash, which is helpful, if not completely mundane.
CH_46_LVL_11_TITLE=Portal R23
CH_46_LVL_11_DESC=Hiro tries to reconstruct the portal's software.
CH_46_LVL_12_TITLE=Portal S23
CH_46_LVL_12_DESC=Shank searches for any dev notes that may have been left behind.
CH_46_LVL_13_TITLE=Portal T23
CH_46_LVL_13_DESC=When all is said a done, the heroes stand back and appreciate their hard work.
CH_46_LVL_14_TITLE=Portal U23
CH_46_LVL_14_DESC=The moment of truth arrives, everything should be ready to go. Hiro pushes the power button and...
CH_46_LVL_15_TITLE=Portal V23
CH_46_LVL_15_DESC=Nothing happens.
CH_46_LVL_16_TITLE=Portal W23
CH_46_LVL_16_DESC=Hiro pushes the power button again and again, to no effect.
CH_46_LVL_17_TITLE=Portal X23
CH_46_LVL_17_DESC=The Tech Team decides to exorcise their frustrations by working even harder.
CH_46_LVL_18_TITLE=Portal Y23
CH_46_LVL_18_DESC=If they can get the portals up and running, it may be the advantage they need to take down the Mega Virus.
CH_46_LVL_19_TITLE=Portal Z23
CH_46_LVL_19_DESC=If anything else, it could be the saving grace for the Tactical Teams as well.
CH_47_TITLE=Dune And Gloom
CH_47_LVL_1_TITLE=Sand Everywhere
CH_47_LVL_1_DESC=As Tactical Team One ventures farther from the beach, they are met with sand dunes as far as the eye can see.
CH_47_LVL_2_TITLE=Too Hot
CH_47_LVL_2_DESC=The team hikes the endless dunes for hours. Finally, Calhoun calls for a break.
CH_47_LVL_3_TITLE=Sun Spots
CH_47_LVL_3_DESC=While the rest of the team refuses to move, Calhoun becomes increasingly frustrated.
CH_47_LVL_4_TITLE=Quack, Quack
CH_47_LVL_4_DESC=After all, the Mega Virus could be anywhere. The team is sitting ducks in their current location.
CH_47_LVL_5_TITLE=Fly Girl
CH_47_LVL_5_DESC=Calhoun calls for Kida to fly up in her Ketak. Hopefully, there is a sign of civilization in this new land.
CH_47_LVL_6_TITLE=Sign Of Life
CH_47_LVL_6_DESC=Thankfully, Kida returns with good news. It could be that the team's luck is finally turning.
CH_47_LVL_7_TITLE=Hot Stuff
CH_47_LVL_7_DESC=Still exhausted, the team moves out. The promise of the oasis awaiting them on the horizon.
CH_47_LVL_8_TITLE=Bright Lights
CH_47_LVL_8_DESC=The wind begins to blow across the dunes. Calhoun and the others shield their eyes as they trek across the arid landscape.
CH_47_LVL_9_TITLE=Storm Coming
CH_47_LVL_9_DESC=As the team travels closer to the oasis, dark clouds begin to form overhead.
CH_47_LVL_10_TITLE=Storm Here!
CH_47_LVL_10_DESC=Lightning lights up the sky as a sandstorm begins!
CH_47_LVL_11_TITLE=Hold On!
CH_47_LVL_11_DESC=As the sandstorm whips around them, the team clings to one another in a desperate attempt not to be carried away.
CH_47_LVL_12_TITLE=Howling Cry
CH_47_LVL_12_DESC=The wind howls as it knocks against the heroes backs. Its rage an unrelenting torrent.
CH_47_LVL_13_TITLE=Over And Out
CH_47_LVL_13_DESC=Suddenly, the wind dies away, and the clouds part. As quickly as it came, the sandstorm is over.
CH_47_LVL_14_TITLE=Back Up
CH_47_LVL_14_DESC=In an attempt to get their bearings, Calhoun has Kida fly once again. Hopefully, the oasis isn't far.
CH_47_LVL_15_TITLE=Oh No
CH_47_LVL_15_DESC=The oasis has somehow moved! It now lies miles from the team's current location.
CH_47_LVL_16_TITLE=Insight
CH_47_LVL_16_DESC=While the team racks their brains for answers, Ducky and Bunny are uncharacteristically calm.
CH_47_LVL_17_TITLE=Moving Forward
CH_47_LVL_17_DESC=Though Calhoun is still skeptical, the decision is made to continue the journey to the oasis.
CH_47_LVL_18_TITLE=Could Be
CH_47_LVL_18_DESC=Maybe Bunny is right, and the oasis holds the key to the Mega Virus's undoing.
CH_47_LVL_19_TITLE=Reality?
CH_47_LVL_19_DESC=Or maybe, the oasis holds something far more sinister.
CH_48_TITLE=Trackers
CH_48_LVL_1_TITLE=The Facts
CH_48_LVL_1_DESC=With Tactical Team Two barely scraping by with a win in their last creep encounter, it's understandable that everyone is shaken up.
CH_48_LVL_2_TITLE=Questions
CH_48_LVL_2_DESC=Unsure of what lies ahead, the team brainstorms possibilities.
CH_48_LVL_3_TITLE=Obviously
CH_48_LVL_3_DESC=The best way to deal with an enemy is to think like it.
CH_48_LVL_4_TITLE=Next To Nothing
CH_48_LVL_4_DESC=However, with the Inventor off on their own reconnaissance, the team has no one to go to with questions.
CH_48_LVL_5_TITLE=Think Like It
CH_48_LVL_5_DESC=Back at square one, the team racks their brains as to how to get into the Mega Virus's head.
CH_48_LVL_6_TITLE=Clever Girl
CH_48_LVL_6_DESC=Thankfully, Mulan has a plan.
CH_48_LVL_7_TITLE=Stealth
CH_48_LVL_7_DESC=Darkwing volunteers to teach everyone the art of stealth.
CH_48_LVL_8_TITLE=Prattle On
CH_48_LVL_8_DESC=The masked duck gets a little too into his new role and begins monologuing.
CH_48_LVL_9_TITLE=Concentrate
CH_48_LVL_9_DESC=Mulan tells Darkwing to focus. They need to get to the task at hand.
CH_48_LVL_10_TITLE=Well, I Never
CH_48_LVL_10_DESC=After a few moments of blustering (he was caught mid-monologue after all), Darkwing apologizes and gets down to it.
CH_48_LVL_11_TITLE=Sneak This Way
CH_48_LVL_11_DESC=The heroes spend the rest of the day following Darkwing's lead. Sneaking around the city's towering buildings and emerging from the shadows.
CH_48_LVL_12_TITLE=Masters
CH_48_LVL_12_DESC=After hours of practice, the heroes are masters of stealth.
CH_48_LVL_13_TITLE=Essentials
CH_48_LVL_13_DESC=With the team ready, Darkwing decides all that's left is matching costumes and catchphrases.
CH_48_LVL_14_TITLE=Nope
CH_48_LVL_14_DESC=For the sake of time, Judy suggests they save the costumes and catchphrases for another day.
CH_48_LVL_15_TITLE=Fine
CH_48_LVL_15_DESC=Though clearly affronted, Darkwing concedes. If Judy doesn't want to acknowledge the importance of details, then so be it.
CH_48_LVL_16_TITLE=Let's Do This
CH_48_LVL_16_DESC=In the shadow of Desert City's superstructures, the team gathers around to finalize the plan.
CH_48_LVL_17_TITLE=Get It
CH_48_LVL_17_DESC=With the plan in place, the heroes (except for Maui) are confident in their next move.
CH_48_LVL_18_TITLE=Got It
CH_48_LVL_18_DESC=For once, the plan feels like a solid one.
CH_48_LVL_19_TITLE=Good
CH_48_LVL_19_DESC=All that is left now is to find a creep.
CH_49_TITLE=Take Over
CH_49_LVL_1_TITLE=728 Street
CH_49_LVL_1_DESC=Back in the City, the heroes are spread thin.
CH_49_LVL_2_TITLE=L45 Alley
CH_49_LVL_2_DESC=Those that are left are too distracted to notice that something sinister is afoot.
CH_49_LVL_3_TITLE=907 Ave
CH_49_LVL_3_DESC=Not wanting to waste a second more, Hades leads the villains in an attack! Spells, claws, and dice fly at the heroes!
CH_49_LVL_4_TITLE=215 Road
CH_49_LVL_4_DESC=The villains watch with wry amusement as the heroes scramble to get on the offensive.
CH_49_LVL_5_TITLE=85R Drive
CH_49_LVL_5_DESC=Every last one of the heroes seems shaken. No doubt already exhausted by all the good deeds they've been doing.
CH_49_LVL_6_TITLE=654A Way
CH_49_LVL_6_DESC=Woody looks around confusedly, unable to wrap his head around the sudden betrayal.
CH_49_LVL_7_TITLE=A72 Drive
CH_49_LVL_7_DESC=An epic battle for the City begins!
CH_49_LVL_8_TITLE=Y786 Ave
CH_49_LVL_8_DESC=Woody and the others use their best attacks. Thankfully, the heroes and villains are evenly matched.
CH_49_LVL_9_TITLE=952 Street
CH_49_LVL_9_DESC=Though the heroes have the upper hand initially, it's not meant to last.
CH_49_LVL_10_TITLE=97th Lane
CH_49_LVL_10_DESC=Oogie Boogie chucks his dice at Bogo and Mrs. Incredible, knocking the two to the ground.
CH_49_LVL_11_TITLE=900 Way
CH_49_LVL_11_DESC=Yzma cackles cruelly as she tosses potions at Pleakley. He does his best to dodge her advances but quickly gets stunned.
CH_49_LVL_12_TITLE=43rd Ave
CH_49_LVL_12_DESC=Merlin faces off against Maleficent. Though the wizard puts up a good fight, he's no match for the witch's sleeping spell.
CH_49_LVL_13_TITLE=H10 Alley
CH_49_LVL_13_DESC=Scar corners Joy in an alleyway. He disappears, only to reemerge from the shadows, and Joy is quickly struck down.
CH_49_LVL_14_TITLE=9821 Street
CH_49_LVL_14_DESC=Ursula and Hades team up to take on Woody. Ursula pins the toy to the ground as Hades' flames get closer and closer.
CH_49_LVL_15_TITLE=7th Drive
CH_49_LVL_15_DESC=Woody wrenches his way out of Ursula's grasp and makes a break for it! The other heroes follow his lead, making their escape.
CH_49_LVL_16_TITLE=897 Lane
CH_49_LVL_16_DESC=The villains laugh in delight as they watch the heroes flee for their lives. Finally, the City is theirs for the taking.
CH_49_LVL_17_TITLE=8894 Street
CH_49_LVL_17_DESC=One by one, the villains divide up the City. Scar holds court in the Park and Oogie Boogie claims the Midway.
CH_49_LVL_18_TITLE=92nd Ave
CH_49_LVL_18_DESC=As promised, Yzma gets the Fashion District, while Ursula and Maleficent rule over the Black Market.
CH_49_LVL_19_TITLE=6525 Drive
CH_49_LVL_19_DESC=With the heroes in hiding, the fate of the City looks bleak. Only the villains know what comes next.
CH_50_TITLE=Troubled Times
CH_50_LVL_1_TITLE=Portal 2D
CH_50_LVL_1_DESC=The Tech Team is hard at work reprogramming the portals in order to track the Mega Virus.
CH_50_LVL_2_TITLE=Portal 4E
CH_50_LVL_2_DESC=The only problem they face is trying to find where the two Tactical Teams ended up.
CH_50_LVL_3_TITLE=Portal 6F
CH_50_LVL_3_DESC=Despite Shank's optimistic outlook, a dark cloud hangs over the Portal Room.
CH_50_LVL_4_TITLE=Portal 8G
CH_50_LVL_4_DESC=The fact is that any information sent into the portals gets scrambled.
CH_50_LVL_5_TITLE=Portal 10H
CH_50_LVL_5_DESC=Even if they found the teams, there wouldn't be any way to communicate with them.
CH_50_LVL_6_TITLE=Portal 12I
CH_50_LVL_6_DESC=With the tech on the fritz and no possible solution, Hiro becomes increasingly frustrated.
CH_50_LVL_7_TITLE=Portal 14J
CH_50_LVL_7_DESC=As Hiro nurses his injured foot, a humming sound suddenly fills the room.
CH_50_LVL_8_TITLE=Portal 16K
CH_50_LVL_8_DESC=The portals thrum to life! Inexplicably online and functioning, the heroes watch as something emerges from within.
CH_50_LVL_9_TITLE=Portal 18L
CH_50_LVL_9_DESC=Creeps pour through the portals! The enemies tumble over one another, trying to claw their way out.
CH_50_LVL_10_TITLE=Portal 20M
CH_50_LVL_10_DESC=The portals swell under the pressure of the creeps pushing through. The heroes watch in terror as the horde swarms every corner of the room.
CH_50_LVL_11_TITLE=Portal 22N
CH_50_LVL_11_DESC=Shank shouts orders as more creeps pour in. Using every attack in their arsenal, the team battles for their lives.
CH_50_LVL_12_TITLE=Portal 24O
CH_50_LVL_12_DESC=The onslaught of creeps is unending. The enemies zero in on Hiro, backing him into a corner.
CH_50_LVL_13_TITLE=Portal 26P
CH_50_LVL_13_DESC=All at once, the creeps pile on top of Hiro! The boy vanishes under a swarm of bodies.
CH_50_LVL_14_TITLE=Portal 28Q
CH_50_LVL_14_DESC=The rest of the team comes to his aid, pulling the creeps off of Hiro and sending them flying in all directions.
CH_50_LVL_15_TITLE=Portal 30R
CH_50_LVL_15_DESC=Suddenly, the portals go offline once again. With the creeps trapped, the team makes short work of those that are left.
CH_50_LVL_16_TITLE=Portal 32S
CH_50_LVL_16_DESC=As the portals lay dormant and the last creep is felled, an uneasy quiet falls upon the room.
CH_50_LVL_17_TITLE=Portal 34T
CH_50_LVL_17_DESC=Though everyone agrees that Hiro's plan is crazy, he has a point.
CH_50_LVL_18_TITLE=Portal 36U
CH_50_LVL_18_DESC=In order to save the Tactical Teams, the Tech Team will have to put themselves in harm's way once again.
CH_50_LVL_19_TITLE=Portal 38V
CH_50_LVL_19_DESC=The question is, will they be able to survive the next battle?
CH_51_TITLE=About The Oasis
CH_51_LVL_1_TITLE=Press On
CH_51_LVL_1_DESC=In the seemingly endless stretch of desert, Tactical Team One continues their journey to the oasis.
CH_51_LVL_2_TITLE=Guess Work
CH_51_LVL_2_DESC=As the sun beats down upon each of the heroes, they speculate what they might find at the oasis.
CH_51_LVL_3_TITLE=Talk, Talk
CH_51_LVL_3_DESC=Ducky and Bunny talk excitedly about how the Mega Virus would be defeated at the hands of demons for much longer than anyone would like.
CH_51_LVL_4_TITLE=Punch, Punch
CH_51_LVL_4_DESC=When Ducky and Bunny start enacting the battle that would no doubt happen, the two start punching one another...hard.
CH_51_LVL_5_TITLE=Kick, Kick
CH_51_LVL_5_DESC=The punching leads to kicking and name-calling. The team has to pull Ducky and Bunny off of one another before either get seriously hurt.
CH_51_LVL_6_TITLE=To Your Corners
CH_51_LVL_6_DESC=In hopes that it will calm the plush toys, Calhoun calls for a break. The team collapses in the heat, massaging their sore limbs.
CH_51_LVL_7_TITLE=Interruption
CH_51_LVL_7_DESC=Before Ducky can finish, there's a rumble in the distance. The ground begins to shake as creeps rise out of the dunes.
CH_51_LVL_8_TITLE=Oh No
CH_51_LVL_8_DESC=As the team scrambles to their feet, the creeps close in.
CH_51_LVL_9_TITLE=No, No, No
CH_51_LVL_9_DESC=Completely caught off guard, the heroes are at a massive disadvantage.
CH_51_LVL_10_TITLE=Incoming
CH_51_LVL_10_DESC=As if able to sense their disadvantage, the creeps rush the heroes! Unable to find their footing, the heroes brace themselves.
CH_51_LVL_11_TITLE=Direct Hit
CH_51_LVL_11_DESC=Upon impact, the heroes are sent flying! The creeps break off into groups, zeroing in on each of the heroes, ready to pick them off.
CH_51_LVL_12_TITLE=Butter Fingers
CH_51_LVL_12_DESC=Calhoun tries to blast one of the creeps, but her cannon is knocked out of her hands.
CH_51_LVL_13_TITLE=No K.O.
CH_51_LVL_13_DESC=Gaston attempts to punch one of the creeps, but it catches his fist and slams him into the ground.
CH_51_LVL_14_TITLE=Hero Hits
CH_51_LVL_14_DESC=One by one, each member of the team is defeated. As the creeps swarm the dunes, there is only one option left...
CH_51_LVL_15_TITLE=Those Who Fight
CH_51_LVL_15_DESC=Fearing for their lives, the team is forced to flee.
CH_51_LVL_16_TITLE=And Run Away
CH_51_LVL_16_DESC=The team races across the dunes, panting and kicking up sand in their wake.
CH_51_LVL_17_TITLE=Live To Fight
CH_51_LVL_17_DESC=With no plan in sight, the team continues its journey. Things look bleaker and bleaker with each passing step.
CH_51_LVL_18_TITLE=Another Day
CH_51_LVL_18_DESC=Hours later and the team is still on the move. The heroes beg for a break, but Calhoun is unyielding.
CH_51_LVL_19_TITLE=Some Good News
CH_51_LVL_19_DESC=Just as the team gives up hope entirely, the oasis appears on the horizon.
CH_52_TITLE=Wandering
CH_52_LVL_1_TITLE=Once Again
CH_52_LVL_1_DESC=Tactical Team Two's search for a creep continues.
CH_52_LVL_2_TITLE=Spotted
CH_52_LVL_2_DESC=Thankfully, it isn't long before the team spots a lone Mage in the streets and decides to investigate.
CH_52_LVL_3_TITLE=Shadows Know
CH_52_LVL_3_DESC=Under Darkwing's guidance, the team tries their best to "be the shadows."
CH_52_LVL_4_TITLE=Finally!
CH_52_LVL_4_DESC=At first, the heroes are excited to make some headway. It feels like progress is finally being made.
CH_52_LVL_5_TITLE=Slow Down
CH_52_LVL_5_DESC=But as the Mage wanders aimlessly around the desert city, time slows to a crawl.
CH_52_LVL_6_TITLE=Wait A Minute
CH_52_LVL_6_DESC=Dissent begins to form in the ranks. It seems that Mulan's plan isn't what it's cracked up to be.
CH_52_LVL_7_TITLE=Shhh
CH_52_LVL_7_DESC=Judy shushes Baymax, but it's too late. The Mage whirls around and spots the team!
CH_52_LVL_8_TITLE=Sprint
CH_52_LVL_8_DESC=The Mage makes a break for it! The creep races farther into the city, with the team in hot pursuit.
CH_52_LVL_9_TITLE=Run
CH_52_LVL_9_DESC=As the Mage weaves through the streets, the heroes run the risk of losing sight of it. Judy tells Baymax to get a view from the air.
CH_52_LVL_10_TITLE=Jog
CH_52_LVL_10_DESC=Baymax takes off, zooming into the air as the rest of the team valiantly chase after the Mage.
CH_52_LVL_11_TITLE=Gotta Go Fast
CH_52_LVL_11_DESC=Baymax sees the Mage from the air as it zips through the streets, the team closing in behind it.
CH_52_LVL_12_TITLE=Cornered
CH_52_LVL_12_DESC=Meanwhile, on the ground, the Mage suddenly veers right and disappears into an alley.
CH_52_LVL_13_TITLE=Vanished
CH_52_LVL_13_DESC=The team rounds the corner, only to find the alley empty!
CH_52_LVL_14_TITLE=Crash
CH_52_LVL_14_DESC=The team searches the alley, but there's no sign of the Mage. Just as the team is about to throw in the towel, Baymax falls out of the sky.
CH_52_LVL_15_TITLE=Keep Calm
CH_52_LVL_15_DESC=Despite his crash landing, Baymax is fine. The robot calmly informs the team that a creep horde is fast approaching.
CH_52_LVL_16_TITLE=Total Panic
CH_52_LVL_16_DESC=While the sound of marching feet echoes off the walls of the alley, the heroes try their best to think of a plan.
CH_52_LVL_17_TITLE=They're Here
CH_52_LVL_17_DESC=Before anyone can argue, the horde pours into the alley. Creeps crawl over one another as they claw their way toward the heroes.
CH_52_LVL_18_TITLE=Today We Fight
CH_52_LVL_18_DESC=With the horde cutting off their only exit, the team has only one option left.
CH_52_LVL_19_TITLE=Let's Begin
CH_52_LVL_19_DESC=Though outnumbered, the team is far from outmatched. Using their fiercest attacks, the heroes begin the fight for their lives.
CH_53_TITLE=The Theater
CH_53_LVL_1_TITLE=Lobby
CH_53_LVL_1_DESC=With Hades and the other villains currently ruling over the City, the heroes must go into hiding.
CH_53_LVL_2_TITLE=Balcony
CH_53_LVL_2_DESC=Led by Mrs. Incredible and Chief Bogo, the team journeys to the Theater District. Quiet as mice, they file into an abandoned theater.
CH_53_LVL_3_TITLE=Center Stage
CH_53_LVL_3_DESC=With everyone safe and sound, the heroes decide to slow down and assess their situation.
CH_53_LVL_4_TITLE=Stage Left
CH_53_LVL_4_DESC=Between the City repairs and the double-cross by the villains, most of the heroes have been running on sheer adrenaline.
CH_53_LVL_5_TITLE=Stage Right
CH_53_LVL_5_DESC=Safely tucked away within the confines of the theater, the team falls into collapse. Even Chief Bogo seems exhausted.
CH_53_LVL_6_TITLE=Orchestra Pit
CH_53_LVL_6_DESC=Thankfully, this isn't Woody's first rodeo. He does his best to rally the heroes and start brainstorming a plan of attack.
CH_53_LVL_7_TITLE=Fly Rail
CH_53_LVL_7_DESC=With the troops sufficiently rallied, planning begins.
CH_53_LVL_8_TITLE=Hoist
CH_53_LVL_8_DESC=One thing is for certain, everyone is still in shock from Yzma's betrayal.
CH_53_LVL_9_TITLE=Batten
CH_53_LVL_9_DESC=Joy and Pleakley think that Yzma might be planning a triple-cross. The others aren't so sure, but it's too early to make any judgements.
CH_53_LVL_10_TITLE=Proscenium Arch
CH_53_LVL_10_DESC=Trying to focus on the task at hand, the heroes decide the best course of action is to find out where the villains are.
CH_53_LVL_11_TITLE=Apron
CH_53_LVL_11_DESC=In a stroke of genius, Merlin transforms into a bird so that he can search the City undetected.
CH_53_LVL_12_TITLE=House
CH_53_LVL_12_DESC=While Merlin is off on reconnaissance, the rest of the team formulates their next move.
CH_53_LVL_13_TITLE=Legs
CH_53_LVL_13_DESC=Merlin returns with news! It seems the villains have divided the City into sections...
CH_53_LVL_14_TITLE=Wings
CH_53_LVL_14_DESC=Hades has control of City Center.
CH_53_LVL_15_TITLE=Border
CH_53_LVL_15_DESC=Scar is holding court in the Park, while Oogie Boogie runs the Midway.
CH_53_LVL_16_TITLE=Backdrop
CH_53_LVL_16_DESC=And it appears as though Ursula and Maleficent are ruling the Black Market together.
CH_53_LVL_17_TITLE=Mezzanine
CH_53_LVL_17_DESC=Though Mrs. Incredible isn't entirely convinced that Bogo isn't letting his emotions get the better of him, she agrees to the plan.
CH_53_LVL_18_TITLE=Props
CH_53_LVL_18_DESC=After the team defeats Yzma, they'll move on to Scar, Hades, and then Oogie Boogie. The final showdown will be against Ursula and Maleficent.
CH_53_LVL_19_TITLE=Cyclorama
CH_53_LVL_19_DESC=As the heroes head toward the Fashion District, they hold out hope that they'll be strong enough to take back the City.
CH_54_TITLE=Chaos Control
CH_54_LVL_1_TITLE=Portal B54
CH_54_LVL_1_DESC=Back in the Portal Room, the Tech Team is preparing for the fight of their lives.
CH_54_LVL_2_TITLE=Portal A55
CH_54_LVL_2_DESC=Hopefully, the team has enough wherewithal to make their plan a reality. It all comes down to Quorra and Tron.
CH_54_LVL_3_TITLE=Portal Z56
CH_54_LVL_3_DESC=Just as before, Hiro gives a swift kick to one of the portals. As it thrums to life, the team gets into fighting stances.
CH_54_LVL_4_TITLE=Portal Y57
CH_54_LVL_4_DESC=Creeps pour through at an alarming rate! It's almost as if they were lying in wait for the portal to open again.
CH_54_LVL_5_TITLE=Portal X58
CH_54_LVL_5_DESC=As creeps pile in, the team does their best to fight them off. But, despite all their preparation, they still find themselves overwhelmed.
CH_54_LVL_6_TITLE=Portal W59
CH_54_LVL_6_DESC=Quorra and Tron communicate with the portals. Hiro yells from the fray as the two remain focused on their task.
CH_54_LVL_7_TITLE=Portal V60
CH_54_LVL_7_DESC=Hiro has a witty retort, but he doesn't get to say it. Instead, he's rushed by a Brute and knocked to the ground.
CH_54_LVL_8_TITLE=Portal U61
CH_54_LVL_8_DESC=Yax comes in for the save, knocking out the creep with his signature stench.
CH_54_LVL_9_TITLE=Portal T62
CH_54_LVL_9_DESC=Gizmoduck throws every gadget in his arsenal and ends up chasing down a creep with an egg beater.
CH_54_LVL_10_TITLE=Portal S63
CH_54_LVL_10_DESC=Shank kicks and punches her way through a wall of Mages. The creeps hurl spells in her direction, but every attack is dodged.
CH_54_LVL_11_TITLE=Portal R64
CH_54_LVL_11_DESC=Creeps continue to pour through the portal, but the team now has the upper hand.
CH_54_LVL_12_TITLE=Portal Q65
CH_54_LVL_12_DESC=Working together, the team advances against the horde of creeps. If the creeps had a concept of fear, they would surely be feeling it now.
CH_54_LVL_13_TITLE=Portal P66
CH_54_LVL_13_DESC=Suddenly, the portal shuts off, cutting the steady stream of creeps off at the source.
CH_54_LVL_14_TITLE=Portal O67
CH_54_LVL_14_DESC=Though confused, the heroes aren't about to count their blessings. They make short work of the creeps that are left.
CH_54_LVL_15_TITLE=Portal N68
CH_54_LVL_15_DESC=Finally, with the last of the creeps derezzed, the Portal Room is quiet again. Only the hum of electricity remains.
CH_54_LVL_16_TITLE=Portal M69
CH_54_LVL_16_DESC=The question is, what could have shut down the portals? Everyone is still scratching their heads when Quorra and Tron approach.
CH_54_LVL_17_TITLE=Portal L70
CH_54_LVL_17_DESC=With the portals now on their side, the team feels invincible.
CH_54_LVL_18_TITLE=Portal K71
CH_54_LVL_18_DESC=Now, all that stands in their way is to figure out which portals harbor the Tactical Teams.
CH_54_LVL_19_TITLE=Portal J72
CH_54_LVL_19_DESC=The journey is far from over, but today was a definite win for the Tech Team.
CH_55_TITLE=The Oasis
CH_55_LVL_1_TITLE=At Last
CH_55_LVL_1_DESC=After miles of running, the team finally reaches the Oasis.
CH_55_LVL_2_TITLE=What He Said
CH_55_LVL_2_DESC=Taking in their surroundings, the heroes are dumbstruck. Not one of them has ever seen a place so beautiful.
CH_55_LVL_3_TITLE=See Ya
CH_55_LVL_3_DESC=Needing a reprieve from one another, the heroes break off in different directions to explore the new area.
CH_55_LVL_4_TITLE=Under It All
CH_55_LVL_4_DESC=To ensure everyone's safety, Kida and Calhoun sweep the Oasis for enemies.
CH_55_LVL_5_TITLE=Flower Power
CH_55_LVL_5_DESC=Jumba collects samples of the various flora. Hopefully, he can experiment on them in due time.
CH_55_LVL_6_TITLE=Missions
CH_55_LVL_6_DESC=Ducky and Bunny task themselves with a super-ultra-special mission: searching for cursed objects. When they tell Calhoun, she pulls a face.
CH_55_LVL_7_TITLE=Missing
CH_55_LVL_7_DESC=As Ducky and Bunny wander off searching for cursed objects, Calhoun absently wonders how long it will take before they get lost.
CH_55_LVL_8_TITLE=Safe
CH_55_LVL_8_DESC=While the heroes rest and rejuvenate, the quiet air of satisfaction runs through the group. Finally safe, the team can relax.
CH_55_LVL_9_TITLE=Or Is It?
CH_55_LVL_9_DESC=The Oasis, however, seems to have other plans. Rain begins to sprinkle over the area, causing everyone to groan over the inconvenience.
CH_55_LVL_10_TITLE=Showers
CH_55_LVL_10_DESC=Before the team knows it, the light rain turns into an all-out downpour! The heroes shield their heads as the rain beats down upon them.
CH_55_LVL_11_TITLE=Found
CH_55_LVL_11_DESC=Ducky and Bunny come running out of the underbrush, soaked to the stuffing. They tell the others they saw a cave while on their search.
CH_55_LVL_12_TITLE=Run For Cover
CH_55_LVL_12_DESC=A cave is a perfect place to ride out the storm. The team quickly follows Ducky and Bunny.
CH_55_LVL_13_TITLE=Beat Down
CH_55_LVL_13_DESC=The heroes run as the rain beats down more fiercely than ever. Thunder crashes overhead while lightning cracks open the sky.
CH_55_LVL_14_TITLE=The Cave
CH_55_LVL_14_DESC=Finally, the cave is spotted in the distance. The team rushes toward it, but something seems off.
CH_55_LVL_15_TITLE=Falsified
CH_55_LVL_15_DESC=The heroes find the cave is only a painted facade! As the rain pours down, everyone begins to panic.
CH_55_LVL_16_TITLE=What Now?
CH_55_LVL_16_DESC=The confused heroes feverishly look for an entrance, but there isn't one!
CH_55_LVL_17_TITLE=Fight It Out
CH_55_LVL_17_DESC=The heroes begin to squabble over where to go next. Raised voices quickly turn to shouting as infighting breaks out among the team.
CH_55_LVL_18_TITLE=Sounds Like
CH_55_LVL_18_DESC=Above the din of the rain, the heroes suddenly hear a humming sound. Small at first, the noise rapidly grows, drowning out the storm.
CH_55_LVL_19_TITLE=Bright Lights
CH_55_LVL_19_DESC=As the humming crescendos to a cacophonous wall of sound, a blinding flash of light appears!
CH_56_TITLE=It Is Coming
CH_56_LVL_1_TITLE=Battle!
CH_56_LVL_1_DESC=Creeps pour into the alley as Tactical Team Two begins the battle of their lives.
CH_56_LVL_2_TITLE=Level
CH_56_LVL_2_DESC=Fists fly as the heroes go head-to-head with the creep horde. The team may be outnumbered, but they are far from outmatched.
CH_56_LVL_3_TITLE=Down And Out
CH_56_LVL_3_DESC=Kim Possible is struck in the back of the head by a Mage! She crumples to the ground.
CH_56_LVL_4_TITLE=Cut Off
CH_56_LVL_4_DESC=The other heroes try to run to Kim's aid, but it's no use. The creeps quickly swarm around her, forming a barricade.
CH_56_LVL_5_TITLE=One Down
CH_56_LVL_5_DESC=With no way to Kim, the heroes are down a team member and vital asset to the battle.
CH_56_LVL_6_TITLE=Carry On
CH_56_LVL_6_DESC=Despite it all, the team soldiers on, fighting as best they can against the creeps.
CH_56_LVL_7_TITLE=Boom
CH_56_LVL_7_DESC=With the go ahead from Judy, Silver blows a massive hole in the creep barricade.
CH_56_LVL_8_TITLE=Sneak Peak
CH_56_LVL_8_DESC=The heroes see a still unconscious Kim through the hole, but in the blink of an eye, the creeps close ranks, sealing her back in.
CH_56_LVL_9_TITLE=The Cost
CH_56_LVL_9_DESC=The team's minor distraction is enough to give the creeps the upper hand! The horde swells more fiercely than before.
CH_56_LVL_10_TITLE=Quicksilver
CH_56_LVL_10_DESC=Silver blasts the oncoming creeps, but it's no use. The enemy dodges his attacks, and Silver is quickly struck down.
CH_56_LVL_11_TITLE=So Cold
CH_56_LVL_11_DESC=Captain Amelia is cut off at the pass by creeps. The enemy swarms around her, pulling her down before knocking her out cold.
CH_56_LVL_12_TITLE=He Remains
CH_56_LVL_12_DESC=One by one, the heroes are felled. Soon only Baymax remains.
CH_56_LVL_13_TITLE=Revival
CH_56_LVL_13_DESC=Baymax tries his best to revive the team, but with everyone unconscious and the creeps on the attack, things look bleak.
CH_56_LVL_14_TITLE=It Is Here
CH_56_LVL_14_DESC=An inhuman howl cries out in the distance. As if things couldn't get worse, the Mega Virus is coming.
CH_56_LVL_15_TITLE=Skitter Scatter
CH_56_LVL_15_DESC=At the sound, the creeps scatter, leaving the alley empty save for Baymax and the team.
CH_56_LVL_16_TITLE=Still Bad
CH_56_LVL_16_DESC=Baymax works quickly to revive the team. Though no longer unconscious, the heroes are still badly injured.
CH_56_LVL_17_TITLE=Broken Party
CH_56_LVL_17_DESC=Led by Baymax, the heroes hobble their way out of the alley.
CH_56_LVL_18_TITLE=Take Off
CH_56_LVL_18_DESC=Every step results in fresh, shooting pain, but with danger lurking in the distance, the heroes have no other choice but to flee.
CH_56_LVL_19_TITLE=Flight
CH_56_LVL_19_DESC=Hopefully, the team can put enough distance between themselves and the Mega Virus before it's too late.
CH_57_TITLE=In Fashion
CH_57_LVL_1_TITLE=Q Street
CH_57_LVL_1_DESC=With the goal of capturing Yzma, the Order Team heads toward the Fashion District.
CH_57_LVL_2_TITLE=W Lane
CH_57_LVL_2_DESC=When they arrive, they find a calamitous scene awaits them as the Fashion District blinks in and out of existence.
CH_57_LVL_3_TITLE=E Alley
CH_57_LVL_3_DESC=The team fans out in search of Yzma.
CH_57_LVL_4_TITLE=R Court
CH_57_LVL_4_DESC=Joy checks Bibbity-Bobbity Boutique and comes up empty-handed.
CH_57_LVL_5_TITLE=T Street
CH_57_LVL_5_DESC=Pleakley searches Mu-shoes, but Yzma isn't there either.
CH_57_LVL_6_TITLE=Y Loop
CH_57_LVL_6_DESC=Finally, Woody spots her running toward Black Cauldron, White Rabbit.
CH_57_LVL_7_TITLE=A Lane
CH_57_LVL_7_DESC=While Joy has the others momentarily distracted, Yzma makes a break for it.
CH_57_LVL_8_TITLE=S Alley
CH_57_LVL_8_DESC=Gravity suddenly glitches out, and everyone finds themselves suspended in mid-air!
CH_57_LVL_9_TITLE=D Court
CH_57_LVL_9_DESC=In an attempt to get away, Yzma begins to dog paddle through the air.
CH_57_LVL_10_TITLE=F Loop
CH_57_LVL_10_DESC=Members of the team try to grab for her, but the space between rapidly grows.
CH_57_LVL_11_TITLE=G Street
CH_57_LVL_11_DESC=Without warning, gravity returns, and everyone is slammed back to the ground.
CH_57_LVL_12_TITLE=L Alley
CH_57_LVL_12_DESC=Yzma gets up and begins to throw potions at the heroes, but they evade her attacks.
CH_57_LVL_13_TITLE=K Lane
CH_57_LVL_13_DESC=Gravity begins to glitch again, but the team is ready for it this time.
CH_57_LVL_14_TITLE=J Loop
CH_57_LVL_14_DESC=Merlin casts a spell securing the heroes to the ground while Yzma flies through the air once more.
CH_57_LVL_15_TITLE=H Court
CH_57_LVL_15_DESC=Woody lassoes Yzma and pulls her back down with a sickening thud. In one fluid motion, he hogties her hands and feet together.
CH_57_LVL_16_TITLE=P Street
CH_57_LVL_16_DESC=Yzma snorts and snarls, trying to break free, but finally gives in.
CH_57_LVL_17_TITLE=O Alley
CH_57_LVL_17_DESC=Joy is devastated. She was so sure that Yzma was going to double-cross the other villains.
CH_57_LVL_18_TITLE=I Lane
CH_57_LVL_18_DESC=Chief Bogo calls for backup. The CPD is on the scene in minutes and escorts Yzma to jail.
CH_57_LVL_19_TITLE=U Court
CH_57_LVL_19_DESC=With Yzma captured, the team heads to the Park. The showdown with Scar is about to begin.
CH_58_TITLE=Portal Quest
CH_58_LVL_1_TITLE=Server 92
CH_58_LVL_1_DESC=With Quorra and Tron's data in hand, the Tech Team is back in the Server Room.
CH_58_LVL_2_TITLE=Server 93
CH_58_LVL_2_DESC=Now that they know where the portals lead, the team has a fighting chance of making contact with the Tactical Teams.
CH_58_LVL_3_TITLE=Server 94
CH_58_LVL_3_DESC=With no other option on hand, the team sets to work on round two of scrubbing the creeps out of the code.
CH_58_LVL_4_TITLE=Server 95
CH_58_LVL_4_DESC=The heroes are met with the same results as before. The impossible task quickly overwhelms them.
CH_58_LVL_5_TITLE=Server 96
CH_58_LVL_5_DESC=Though frustrated, the team is still energized from their recent win. They continue to work diligently.
CH_58_LVL_6_TITLE=Server 97
CH_58_LVL_6_DESC=As the others work, Hiro is suddenly struck by a stroke of genius.
CH_58_LVL_7_TITLE=Server 98
CH_58_LVL_7_DESC=If Hiro changes the code to make the portals undetectable, creeps won't be able to utilize them.
CH_58_LVL_8_TITLE=Server 99
CH_58_LVL_8_DESC=The Tech Team will be the only ones who know where the portals lead.
CH_58_LVL_9_TITLE=Server 100
CH_58_LVL_9_DESC=It's a strong theory, but Tron points out one very big problem.
CH_58_LVL_10_TITLE=Server 101
CH_58_LVL_10_DESC=If the portals become undetectable, Tactical Teams One and Two won't stand a chance of locating them.
CH_58_LVL_11_TITLE=Server 102
CH_58_LVL_11_DESC=Doubt in Hiro's plan begins to creep in, and before anyone knows it, a sullen fog hangs over the team.
CH_58_LVL_12_TITLE=Server 103
CH_58_LVL_12_DESC=But Hiro refuses to give up. If a member from the Tech Team can find one of the Tactical Teams, then they might have a chance.
CH_58_LVL_13_TITLE=Server 104
CH_58_LVL_13_DESC=With the possibility of finding the other teams in mind, the heroes get to work making Hiro's plan a reality.
CH_58_LVL_14_TITLE=Server 105
CH_58_LVL_14_DESC=Tron and Quorra recode the portals with surprising ease. They find Tactical Team One and lock onto their location.
CH_58_LVL_15_TITLE=Server 106
CH_58_LVL_15_DESC=In no time at all, the team is ready to execute Hiro's plan.
CH_58_LVL_16_TITLE=Server 107
CH_58_LVL_16_DESC=Now, all that is left is to figure out which team member will take the great leap through the portal.
CH_58_LVL_17_TITLE=Server 108
CH_58_LVL_17_DESC=Before anyone can cast their vote, Hiro sprints out of the Server Room! The others chase him as he makes his way back to the Portal Room.
CH_58_LVL_18_TITLE=Server 109
CH_58_LVL_18_DESC=The team yells at him to stop, but he ignores their pleas. With a swift kick, Hiro starts one of the portals.
CH_58_LVL_19_TITLE=Server 110
CH_58_LVL_19_DESC=Giving a salute to the other heroes, Hiro enters the portal and, in a bright flash of light...is gone.
CH_59_TITLE=Oh My Oasis
CH_59_LVL_1_TITLE=Flash
CH_59_LVL_1_DESC=In a blinding flash of light, Hiro emerges from the portal to find Tactical Team Two.
CH_59_LVL_2_TITLE=Actual
CH_59_LVL_2_DESC=The team looks on in slack-jawed amazement as the light dims around Hiro. It's such an odd sight. The others aren't even sure he's real.
CH_59_LVL_3_TITLE=Threat
CH_59_LVL_3_DESC=Ducky and Bunny try to rush Hiro, but Gaston catches them by the tails and drags them back.
CH_59_LVL_4_TITLE=Group Hug
CH_59_LVL_4_DESC=The team members gather around Hiro and hug the boy. Everyone chatters wildly about their adventure thus far.
CH_59_LVL_5_TITLE=Query
CH_59_LVL_5_DESC=The chatter quickly gives way to questions: What happened to Team Two? Is the City safe? Have they heard from the Order Team?
CH_59_LVL_6_TITLE=Out Of Time
CH_59_LVL_6_DESC=As much as Hiro would like to answer everyone's questions, they don't have time.
CH_59_LVL_7_TITLE=Hunt
CH_59_LVL_7_DESC=As Ducky and Bunny bound off in search of their bounty, the others work to get all the supplies in order.
CH_59_LVL_8_TITLE=It's Fine
CH_59_LVL_8_DESC=The ground begins to shake, then suddenly stops. Everyone exchanges looks. It must have been a fluke.
CH_59_LVL_9_TITLE=Fallen
CH_59_LVL_9_DESC=The ground shakes again, this time more violently. Jumba topples over with a loud "Oof!"
CH_59_LVL_10_TITLE=We're Fine
CH_59_LVL_10_DESC=As the ground begins to quake, the team members start stuffing gear into bags with heightened urgency.
CH_59_LVL_11_TITLE=Not Fine!
CH_59_LVL_11_DESC=A vortex suddenly opens and begins sucking everything in!
CH_59_LVL_12_TITLE=Woosh
CH_59_LVL_12_DESC=As rocks and trees get sucked into the vortex, Hiro ushers the other team members through the portal.
CH_59_LVL_13_TITLE=Head Count
CH_59_LVL_13_DESC=Hiro counts the team members off as they race through the portal to safety.
CH_59_LVL_14_TITLE=Plushie Peril
CH_59_LVL_14_DESC=He counts everyone...except Ducky and Bunny.
CH_59_LVL_15_TITLE=Oh No
CH_59_LVL_15_DESC=Hiro's mind begins to race! Did they get sucked into the vortex already?
CH_59_LVL_16_TITLE=Coming Through
CH_59_LVL_16_DESC=Just as Hiro begins to panic, Ducky and Bunny burst out of the underbrush! The two are laden down with various junk.
CH_59_LVL_17_TITLE=Follow Up
CH_59_LVL_17_DESC=With Ducky and Bunny safely through the portal, Hiro follows behind.
CH_59_LVL_18_TITLE=Gone For Good?
CH_59_LVL_18_DESC=Hiro looks back only to see the last of the Oasis swallowed into the vortex.
CH_59_LVL_19_TITLE=New Plan
CH_59_LVL_19_DESC=With the Oasis gone, the only option is to regroup and figure out the next move.
CH_60_TITLE=Rough Recovery
CH_60_LVL_1_TITLE=Shifting Sands
CH_60_LVL_1_DESC=Having fled Desert City and the Megavirus, a demoralized Tactical Team Two attempts to regroup and recover in the sand dunes.
CH_60_LVL_2_TITLE=Damage Dune
CH_60_LVL_2_DESC=Baymax tends to everyone's injuries, but he can't do much to heal their pride.
CH_60_LVL_3_TITLE=Busted Beak
CH_60_LVL_3_DESC=Baymax begins to tend to everyone's injuries. First up, applying medical adhesive to Darkwing Duck's cracked beak.
CH_60_LVL_4_TITLE=Healing Hair
CH_60_LVL_4_DESC=Maui nearly dislocated his shoulder swinging his hook through ten Creeps at once. Baymax fashions a sling from Maui's hair.
CH_60_LVL_5_TITLE=Cold Comfort
CH_60_LVL_5_DESC=Baymax treats Judy Hopps and John Silver, who both took a freeze blast head-on. Quick treatment prevents any permanent damage.
CH_60_LVL_6_TITLE=Kim Struggles
CH_60_LVL_6_DESC=Kim Possible slips in and out of consciousness. As Baymax attempts to stabilize her, the mood among the heroes turns grim.
CH_60_LVL_7_TITLE=Tension Mounts
CH_60_LVL_7_DESC=Captain Amelia attempts to rally the team to her cause, but most of them don't even make eye contact. John Silver scoffs and walks off.
CH_60_LVL_8_TITLE=Wide Open
CH_60_LVL_8_DESC=Amelia and Mulan discuss strategies for fortifying their position. But with nothing but sand in every direction, defense seems impossible.
CH_60_LVL_9_TITLE=Shadowless
CH_60_LVL_9_DESC="No darkness, no shadow, not even shade," laments Darkwing Duck. "If they catch up to us, we're wide open." Amelia ignores him.
CH_60_LVL_10_TITLE=Indefensible
CH_60_LVL_10_DESC=Amelia asks Judy Hopps to set up patrols to prevent ambush. "What's the point?" asks Silver. "The Megavirus doesn't have to sneak."
CH_60_LVL_11_TITLE=Just Deserts
CH_60_LVL_11_DESC="I was trapped on a desert island once," recalls Maui. "It was a lot like this. More ocean, less desert. But the same principle, really."
CH_60_LVL_12_TITLE=Tarnished Silver
CH_60_LVL_12_DESC=John Silver questions what the team can hope to accomplish. Best case scenario, they're up against an unbeatable enemy that never finds them.
CH_60_LVL_13_TITLE=Kim Stirs
CH_60_LVL_13_DESC=Suddenly, Kim Possible's eyes flutter open.
CH_60_LVL_14_TITLE=Breathing Room
CH_60_LVL_14_DESC=Everyone crowds around as Kim wakes up. Baymax gently pushes the other heroes away in order to give her space.
CH_60_LVL_15_TITLE=Desert Hope
CH_60_LVL_15_DESC=Leaning on Captain Amelia for support, Kim slowly rises to her feet. The team stands in a semi-circle around her, waiting for her to speak.
CH_60_LVL_16_TITLE=Message Clear
CH_60_LVL_16_DESC="So, we got our butts kicked," Kim acknowledges. "Probably not the first time for any of us. So what's different about today?"
CH_60_LVL_17_TITLE=She Is Here
CH_60_LVL_17_DESC=Encouraged by Kim Possible's speech, Tactical Team Two gives a loud cheer. Whatever comes next, they'll face it with their friends.
CH_60_LVL_18_TITLE=Kim Reassures
CH_60_LVL_18_DESC=Healed in body and spirit, the heroes of Tactical Team Two rally together. Creeps beware! The Megavirus better watch out, too.
CH_60_LVL_19_TITLE=Wanna Reach You
CH_60_LVL_19_DESC=The heroes are fired up and ready to fight, but the question remains: how to get back in communication with Hiro and the other teams?
CH_61_TITLE=Park Dot Exe
CH_61_LVL_1_TITLE=Woods 9
CH_61_LVL_1_DESC=With Yzma locked up at CPD and the Fashion District liberated, the Order Team makes their way to Scar's current hunting grounds: the Park.
CH_61_LVL_2_TITLE=Roots 10
CH_61_LVL_2_DESC=As the heroes make their way through the Park, they encounter eerie glitches that make them doubt their very senses. This won't be easy.
CH_61_LVL_3_TITLE=Branch 11
CH_61_LVL_3_DESC=Leafless branches grow from midair and sway in an absent breeze. Merlin reaches for one, but the branch bends sharply away with a creak.
CH_61_LVL_4_TITLE=Pond A
CH_61_LVL_4_DESC=Patches of bone-white grass sprout briefly in the Pleakley's footprints before wilting with a shriek. He climbs onto Chief Bogo's back.
CH_61_LVL_5_TITLE=Fountain C
CH_61_LVL_5_DESC=The heroes attempt to form a circle, back to back, but the twisting landscape of the Park confuses them, and they're quickly separated.
CH_61_LVL_6_TITLE=Ash Tree 7
CH_61_LVL_6_DESC=Suddenly, a voice from the shadows.. Or... voices? Scar's contemptuous laughter seems to echo from every corner of the glitch-twisted Park.
CH_61_LVL_7_TITLE=Leaf 12
CH_61_LVL_7_DESC=From the shadows, Scar lunges toward Chief Bogo, sinking his claws into the officer's shoulder! The chief falls onto his side, pinned.
CH_61_LVL_8_TITLE=Roots 6
CH_61_LVL_8_DESC="I haven't had cape buffalo in ages," Scar purrs, fangs bared for a deadly bite. Chief Bogo struggles, but Scar just sinks his claws deeper.
CH_61_LVL_9_TITLE=Stream 22
CH_61_LVL_9_DESC="Maybe start with something smaller as an appetizer!' Pleakley shouts from behind Chief Bogo, sending mosquitoes swarming into Scar's mouth!
CH_61_LVL_10_TITLE=Grass 2
CH_61_LVL_10_DESC=Choking and spitting on mosquitoes, Scar retracts his claws from Chief Bogo and lunges at Pleakley. Pleakley flees, Scar right behind him!
CH_61_LVL_11_TITLE=Grass 3
CH_61_LVL_11_DESC=As Scar pounces at Pleakley, rubber-gloved fingers grip his mane and yank him backwards, slamming the big cat into the grass.
CH_61_LVL_12_TITLE=Grass -833
CH_61_LVL_12_DESC=Scar bites at Mrs. Incredible's retracting hands, but misses. He stalks toward her, but her punches keep him at a distance. He turns and flees!
CH_61_LVL_13_TITLE=River Z
CH_61_LVL_13_DESC="This madness lacks method," mutters Merlin, twirling his fingers. The branches weave together into walls blocking Scar's escape.
CH_61_LVL_14_TITLE=River Y
CH_61_LVL_14_DESC="That's the trouble with always following your instincts," a deep voice rumbles from behind Scar. "It makes you predictable."
CH_61_LVL_15_TITLE=River X
CH_61_LVL_15_DESC=Chief Bogo's bulk collides into Scar. The force of the cape buffalo's charge lifits the lion up off the grass to slam against the branches.
CH_61_LVL_16_TITLE=River W
CH_61_LVL_16_DESC=Scar falls to the ground, unconscious. Woody rushes forward to bind the would-be king's paws with his pull-string.
CH_61_LVL_17_TITLE=Rock Sum Error
CH_61_LVL_17_DESC=Chief Bogo calls in backup to cart Scar off to the CPD. It was a victory, but an exhausting one. Nothing about this has been easy.
CH_61_LVL_18_TITLE=Meadow 11
CH_61_LVL_18_DESC=Joy steps up, smiling like a sunrise. "Come on, everyone! City Center needs us!" The heroes head off to City Center... and Hades.
CH_61_LVL_19_TITLE=Meadow 92
CH_61_LVL_19_DESC=With Scar defeated and the Park somewhat safer, the Order Team sets their sights on City Center... and Hades.
CH_62_TITLE=Portal Panic
CH_62_LVL_1_TITLE=Server 111
CH_62_LVL_1_DESC=With Tactical Team One safely rescued via a newly-cooperative Portal, Hiro focuses on how to save the wayward Tactical Team Two.
CH_62_LVL_2_TITLE=Server 112
CH_62_LVL_2_DESC=While scanning Tactical Team One, Hiro discovers several temporal-spatial anomalies emanating from... Ducky and Bunny?
CH_62_LVL_3_TITLE=Server 113
CH_62_LVL_3_DESC=Using location data from the "cursed objects," Hiro locks onto Tactical Team Two's location in the Sand Dunes. A portal begins to form.
CH_62_LVL_4_TITLE=Server 114
CH_62_LVL_4_DESC=In the distant Sand Dunes, the weary Tactical Team Two is shocked when a Portal opens suddenly before them. Kim Possible leaps to her feet.
CH_62_LVL_5_TITLE=Server 115
CH_62_LVL_5_DESC=Judy Hopps holds up a closed fist, preparing Tactical Team Two to attack! But when the portal finishes forming, Kim recognizes someone.
CH_62_LVL_6_TITLE=Server 116
CH_62_LVL_6_DESC=It's Hiro! The entire team relaxes, then questions whether what they're seeing is real or another Creep trick!
CH_62_LVL_7_TITLE=Server 117
CH_62_LVL_7_DESC=Captain Amelia lowers the sword she'd drawn when the portal began to form. "Shall we?" she asks the team. Nods all around from the Team.
CH_62_LVL_8_TITLE=Server 118
CH_62_LVL_8_DESC="Come on, hurry!" Hiro shouts, hand outstretched. "It won't stay open forever!" Tactical Team Two rushes through the portal.
CH_62_LVL_9_TITLE=Server 119
CH_62_LVL_9_DESC=Sand and tears of relief spill onto the floor as the Tech Team, Tactical Team One, and Tactical Team Two are reunited in the Portal Room.
CH_62_LVL_10_TITLE=Server 120
CH_62_LVL_10_DESC=Shank sees grim looks on the faces of Calhoun and Judy Hopps. "You two look like you've been racing unpaved source code," Shank sympathizes.
CH_62_LVL_11_TITLE=Server 121
CH_62_LVL_11_DESC=We tracked a creep, but got ambushed, says Kim. "I got overwhelmed and..." Elsa lays a hand on her shoulder. "So not the drama," Kim sniffs.
CH_62_LVL_12_TITLE=Server 122
CH_62_LVL_12_DESC=Mulan picks up the story: "We escaped into the Desert. We might have given into despair if not for Kim's bravery." Calhoun nods approvingly.
CH_62_LVL_13_TITLE=Server 123
CH_62_LVL_13_DESC=Gizmoduck rolls up. "We were worried about you! Once coms went dark, we feared the worst! Wait a minute, that gives me an idea!"
CH_62_LVL_14_TITLE=Server 124
CH_62_LVL_14_DESC=Ducky takes the walkie-talkie from Gizmoduck, quickly dropping it to the floor, where it shatters into a hundred pieces. "Oops," says Ducky.
CH_62_LVL_15_TITLE=Server 125
CH_62_LVL_15_DESC="Oh, come on!" shouts Hiro. Ducky and Bunny both look down, ashamed. "We're sorry. Our hands don't always listen"
CH_62_LVL_16_TITLE=Server 126
CH_62_LVL_16_DESC=As Ducky and Bunny apologize to a frustrated Hiro, Shank, quietly observing until now, suddenly speaks up.
CH_62_LVL_17_TITLE=Server 127
CH_62_LVL_17_DESC=With Shanks and Kim's help, Hiro modifies the Kimmunicator, enabling it to reach the lab, even on the other side of a closed portal.
CH_62_LVL_18_TITLE=Server 128
CH_62_LVL_18_DESC=With communications resolved, Tactical Teams One and Two decide to combine forces and charge through the portal.
CH_62_LVL_19_TITLE=Server 129
CH_62_LVL_19_DESC=The combined Tactical Team heads off through the portal to Desert City... time to take the fight to the Creeps together!
CH_63_TITLE=The Sunless Sea
CH_63_LVL_1_TITLE=Wrong Turn?
CH_63_LVL_1_DESC=Emerging from the Portal, a united Tactical Team finds not the sandy vistas of Desert City, but rather the curious sight of a giant bedroom.
CH_63_LVL_2_TITLE=Something Familiar
CH_63_LVL_2_DESC=The co-leaders spring into action: Calhoun takes Goliath, Gaston and Maui to form a defensive guard while Judy Hopps opens an investigation.
CH_63_LVL_3_TITLE=Scent's Memory
CH_63_LVL_3_DESC=A sudden flash of silver-white erupts from atop the giant bed in the room's center. "I smell treasure," breathes John Silver.
CH_63_LVL_4_TITLE=Can't Resist the Call
CH_63_LVL_4_DESC=John's words are met with nods. Something rare and powerful is there, and every hero feels its pull. "Careful!" urges Hiro, but few hear it.
CH_63_LVL_5_TITLE=Destination: Treasure
CH_63_LVL_5_DESC=Calhoun leads the heroes on a wild charge across a brightly-colored carpet as big as a ballroom, every eye fixed on the silver-white flash.
CH_63_LVL_6_TITLE=Rising Tension
CH_63_LVL_6_DESC=As they reach the base of the giant bed, the heroes draw grappling hooks, unfurl wings, and extend claws to begin a reckless, frantic climb.
CH_63_LVL_7_TITLE=The Love of Treasure
CH_63_LVL_7_DESC=The banter dies as they reach the apex. They all simply stare in silence, eyes fixed on a small platinum circle floating in midair.
CH_63_LVL_8_TITLE=Understatement
CH_63_LVL_8_DESC="It is a Badge," Baymax offers, but it's unlike any badge they've seen, radiating brilliant waves of platinum light. "It is power," Jumba replies.
CH_63_LVL_9_TITLE=Circling a Circle
CH_63_LVL_9_DESC=The heroes stand in a circle around the object, transfixed, unmoving. Nothing seems to exist beyond the blinding light of the Platinum Badge.
CH_63_LVL_10_TITLE=Reach Me
CH_63_LVL_10_DESC=A thousand miles away, Kim can hear Hiro screaming her name. Silly Hiro, she thinks. What else could matter but this silver brilliance?
CH_63_LVL_11_TITLE=Marked Urgent
CH_63_LVL_11_DESC=Annoyed, Kim glances at her Kimmunicator, intending to mute Hiro. His terrified face shocks her back to reality as a shadow falls over the screen.
CH_63_LVL_12_TITLE=The Tide Rises
CH_63_LVL_12_DESC="Kim! Run! Run NOW!" Hiro cries. "Think we'll have to swim," Kim whispers. A dark ocean has swelled up around them, covering the entire room.
CH_63_LVL_13_TITLE=Sea of Despair
CH_63_LVL_13_DESC=Kim has made a career of the impossible. But the mass of creeps surrounding the heroes is worse than impossible. It is, quite simply, unfair.
CH_63_LVL_14_TITLE=Frozen Fractals
CH_63_LVL_14_DESC=With a gesture, Elsa encircles the Heroes in a defensive wall of ice. Cracks form immediately as thousands of Creeps attack simultaneously.
CH_63_LVL_15_TITLE=Darkwing, Darkwing
CH_63_LVL_15_DESC="Live by the shadow, die by the shadow," whispers Darkwing Duck, as a Brute's enormous fist shatters their icy defenses.
CH_63_LVL_16_TITLE=In Danger or Trouble
CH_63_LVL_16_DESC=Kim Possible is lifted up off her feet and hurled backwards by the force of the blow. With all eyes on her, she collides with the Platinum Badge.
CH_63_LVL_17_TITLE=A Chastened Retreat
CH_63_LVL_17_DESC=Without any particular reason to stay, the Heroes make their way back to the Portal. The journey back is cautious and eerily quiet.
CH_63_LVL_18_TITLE=Beep beep Be-beep
CH_63_LVL_18_DESC=The Kimmunicator beeps. It's Hiro! "You should all get back here in a hurry. We need to figure out what just happened." The Heroes agree.
CH_63_LVL_19_TITLE=Re-Porting for Duty
CH_63_LVL_19_DESC=In possession of a strange and terrifying new power, the combined Tactical Team returns to the Portal Room to discuss their next steps.
CH_64_TITLE=City Cinder
CH_64_LVL_1_TITLE=Branch Street
CH_64_LVL_1_DESC=With Scar defeated, the Order Team makes its way from the Park towards City Center. Everyone's on their guard for more glitchy weirdness.
CH_64_LVL_2_TITLE=Walking Drive
CH_64_LVL_2_DESC=It's hard to prepare for the impossible, however. The fear that the glitches will be worse downtown is at the front of everyone's mind.
CH_64_LVL_3_TITLE=Broadway Alley
CH_64_LVL_3_DESC=They pass a side-street covered in chaotic crosswalks. Some have bars several feet wide, another, a gradient of thousands, each pixel-thin.
CH_64_LVL_4_TITLE=Exchange Street
CH_64_LVL_4_DESC="Keep moving," says Mrs. Incredible, but it's not easy. The ordered grid of streets has turned to a tangled mess, twisting in every direction.
CH_64_LVL_5_TITLE=Roundabout Square
CH_64_LVL_5_DESC=After wandering for what feels like hours, the Order Team finally reaches City Center... only to find it wreathed in impassable green flames.
CH_64_LVL_6_TITLE=Lost Lane
CH_64_LVL_6_DESC="Eyes up," barks Chief Bogo. "Wrong way," quips a slimy voice from their feet. All leap backwards as the pavement opens into a smug sneer.
CH_64_LVL_7_TITLE=Overpass Tunnel
CH_64_LVL_7_DESC=The rough mouth of the street shifts, sprouting dagger-like fangs. As the heroes crowd the sidewalk, a sewer-pipe tongue darts out at Joy!
CH_64_LVL_8_TITLE=Toll Freeway
CH_64_LVL_8_DESC=Before the pipe-tongue hits Joy, she's yanked backwards into Mrs. Incredible's arms. "Be somewhere else, remember?" Mrs. Incredible asks. "Yes, ma'am!"
CH_64_LVL_9_TITLE=Hilltop Hollow
CH_64_LVL_9_DESC=The heroes retreat from the sewer-tongue, gnashing teeth, and crushing pavement that used to be a city street, but find the way blocked.
CH_64_LVL_10_TITLE=Distant Center
CH_64_LVL_10_DESC="This is the way we came, isn't it? Where's the way back? Where's ANY way out?" babbles Pleakley. All exits from City Center Square are gone.
CH_64_LVL_11_TITLE=Dead End Circle
CH_64_LVL_11_DESC=Where streets lead away from the Square moments prior, the Heroes see only more buildings, forming a coliseum of glass and steel around them.
CH_64_LVL_12_TITLE=Fail Pass
CH_64_LVL_12_DESC=Two smaller holes open on the other side of the street-mouth, close to the burning City Center. "Oh, good," says Woody. "I was getting bored."
CH_64_LVL_13_TITLE=Broken Union
CH_64_LVL_13_DESC=The new holes in the sidewalk erupt in circles of fire above the street-mouth, completing a familiar face. It's unmistakably Hades.
CH_64_LVL_14_TITLE=United Divide
CH_64_LVL_14_DESC=Merlin raises his hands, a conductor before the orchestra, then slams them to his knees. Suddenly, every fire hydrant in the square explodes!
CH_64_LVL_15_TITLE=Upward Falls
CH_64_LVL_15_DESC=With no exit, the water has nowhere to go but down. Thousands of gallons flood into Hades' horrible street-mouth, which sputters and coughs.
CH_64_LVL_16_TITLE=Executor Estate
CH_64_LVL_16_DESC=The mouth chokes, before suddenly spitting up a thoroughly-soaked and unconscious Hades! Mrs. Incredible and Woody quickly restrain him.
CH_64_LVL_17_TITLE=Mesa Flats
CH_64_LVL_17_DESC=With Hades defeated, the flames on City Center go out, and the exits reappear. "So taking out the villains stabilizes the code?" muses Woody.
CH_64_LVL_18_TITLE=Lone Forks
CH_64_LVL_18_DESC="This world was not made for evil to rule," Merlin explains. "The code itself rejects them. We must hurry. Our very reality is at stake."
CH_64_LVL_19_TITLE=Takeoff Landing
CH_64_LVL_19_DESC=Merlin's words strengthen everyone's resolve. The Order Team makes for the Midway, and the dark games of Oogie-Boogie.
CH_65_TITLE=Tech Team Time
CH_65_LVL_1_TITLE=Server 130
CH_65_LVL_1_DESC=Rewinding, we return to the Portal Room, where Hiro has just seen the combined Tactical Teams off to Desert City... so why aren't they there?
CH_65_LVL_2_TITLE=Server 131
CH_65_LVL_2_DESC=Hiro learns the Tactical Team ended up in Bonnie's Room. He advises caution, but the distracted team pays him little mind.
CH_65_LVL_3_TITLE=Server 132
CH_65_LVL_3_DESC=Time crawls on the Portal Room side as the Tech Team is forced to watch the dazed Tactical Team almost get wiped out by Creeps.
CH_65_LVL_4_TITLE=Server 133
CH_65_LVL_4_DESC=After a shining display of newfound power from Kim, Hiro urges the Tactical Teams to return. The Tech Team lets out a collective sigh.
CH_65_LVL_5_TITLE=Server 134
CH_65_LVL_5_DESC=The Tech Team putters around, not making eye contact, waiting for the Tactical Team to return. After a few minutes, Shank suddenly stands.
CH_65_LVL_6_TITLE=Server 135
CH_65_LVL_6_DESC="Enough Tech Team Pity Party," spits Shank. "Our friends are risking their lives, and I want to hear how each of you are gonna help."
CH_65_LVL_7_TITLE=Server 136
CH_65_LVL_7_DESC=Quorra quickly initializes dozens of parallel simulations (overclocked, of course) to determine how a Portal's destination could be shifted.
CH_65_LVL_8_TITLE=Server 137
CH_65_LVL_8_DESC=Tron studies petabytes of data on mass spontaneous Creep gatherings, desperately seeking some similarity to the events of Bonnie's Room.
CH_65_LVL_9_TITLE=Server 138
CH_65_LVL_9_DESC=Yax turns the full force of his undivided attention to analyzing the mysteries of the Platinum Badge.
CH_65_LVL_10_TITLE=Server 139
CH_65_LVL_10_DESC=Quorra's simulations all reach at the same answer: the recent upgrades to the Portals should have kept the Mega Virus from controlling them.
CH_65_LVL_11_TITLE=Server 140
CH_65_LVL_11_DESC=Tron's studies of past mass Creep swarms show that the ocean of them in Bonnie's Room must have been gathering for days, if not weeks.
CH_65_LVL_12_TITLE=Server 141
CH_65_LVL_12_DESC=Yax's Platinum Badge analysis reveals that its power is even more irresistible than it seems. Like gravity, it draws everything toward it.
CH_65_LVL_13_TITLE=Server 142
CH_65_LVL_13_DESC=Quorra, Tron, and Yax present their findings to Shank. She thinks for a moment, then throws her head back and laughs.
CH_65_LVL_14_TITLE=Server 143
CH_65_LVL_14_DESC="The next Platinum Badge?" asks Gizmoduck. "That's right," Shank replies. "Somehow I doubt we stumbled across the only one in existence."
CH_65_LVL_15_TITLE=Server 144
CH_65_LVL_15_DESC=Yax nods. "The Platinum Badge we found was a result of circumstances in the code that haven't changed. Therefore, we can expect more."
CH_65_LVL_16_TITLE=Server 145
CH_65_LVL_16_DESC=Shank smiles broadly. "We've gathered data, analyzed it for patterns, and drew conclusions. All we need now is plan of action."
CH_65_LVL_17_TITLE=Server 146
CH_65_LVL_17_DESC=Hiro suddenly looks up from the corner, where he's been absorbed with the Kimmunicator. "Sorry, I missed all that. What's up?"
CH_65_LVL_18_TITLE=Sever 147
CH_65_LVL_18_DESC="The Tactical Team just entered the return portal," Hiro continues. "They should be back here any second." Shank just stares.
CH_65_LVL_19_TITLE=Server 148
CH_65_LVL_19_DESC="I don't know where the Tactical Team is going," Shank says slowly, "but I think it's safe to say they won't be back here for a while."
CH_66_TITLE=Never, Again?
CH_66_LVL_1_TITLE=Marooned
CH_66_LVL_1_DESC=Tactical Team emerges from a Portal onto a moonlit stretch of beach that is NOT the Portal Room. "Why am I not surprised?" mutters Kristoff.
CH_66_LVL_2_TITLE=Been Here
CH_66_LVL_2_DESC="Alright, first thing's first," announces Calhoun. "Where are we?" The other Heroes gather close in the dim light, offering suggestions.
CH_66_LVL_3_TITLE=Hiro Huddle
CH_66_LVL_3_DESC=A quick Kimmunicator conversation with Hiro confirms Tactical Team's is in Neverland, and they've been pulled here by another Platinum Badge.
CH_66_LVL_4_TITLE=Sly Silver
CH_66_LVL_4_DESC="Another badge..." whispers John Silver. Gaston looks up from admiring his biceps. "The hunt is on, then!" he smirks.
CH_66_LVL_5_TITLE=Second Verse
CH_66_LVL_5_DESC=Before anyone can stop them, John Silver and Gaston streak off into the darkness. Maui follows, shouting "It's MINE! Demigod's privilege!"
CH_66_LVL_6_TITLE=After Them
CH_66_LVL_6_DESC=Kim Possible takes a step after them, then stops. She closes her eyes for a moment. "They're heading straight for the badge. I can feel it."
CH_66_LVL_7_TITLE=Rabbiting
CH_66_LVL_7_DESC=Tactical Team pursues John Silver, Gaston and Maui, with Judy Hopps using her previous experience in Neverland to narrow their lead.
CH_66_LVL_8_TITLE=Exit Strategy
CH_66_LVL_8_DESC=But as they leave the Portal behind, Creeps suddenly shimmer in from nowhere. "We can't let them cut off our exit!" shouts Mulan.
CH_66_LVL_9_TITLE=First Split
CH_66_LVL_9_DESC=Calhoun stays behind with Jumba and Stitch, counting on their island experience. By the same logic, she sends Captain Amelia along with Judy.
CH_66_LVL_10_TITLE=Sandy Sneaks
CH_66_LVL_10_DESC=As Judy leads the team down the beach, following the footprints of John Silver, Maui, and Gaston, Creeps erupt from the sand all around them!
CH_66_LVL_11_TITLE=Power Trio
CH_66_LVL_11_DESC="I'll hold the beachhead! Pursue our wayward allies!" cries Kida, swinging her spear in a wide arc. Ignoring this, Ducky and Bunny join her.
CH_66_LVL_12_TITLE=Into Neverland
CH_66_LVL_12_DESC=Down the beach, the footprints lead sharply away from the water, towards a jungle at the edge of the sand. "Straight to the Badge," says Kim.
CH_66_LVL_13_TITLE=Jungle Jitters
CH_66_LVL_13_DESC=The team pursues their wayward allies through the dark jungle. "Scans detect multiple entities in every direction," Baymax announces.
CH_66_LVL_14_TITLE=In the Clearing
CH_66_LVL_14_DESC=Trusting their allies, Judy's team runs until they reach a clearing with a large dead tree in the center. "Tinkerbell's house," says Judy.
CH_66_LVL_15_TITLE=Not So Clear
CH_66_LVL_15_DESC=At Kim's nod, the heroes quickly begin climbing the tree. They're less than halfway up when the clearing rapidly begins filling with Creeps!
CH_66_LVL_16_TITLE=Fa Falls
CH_66_LVL_16_DESC=Without a second's hesitation, Mulan releases her grip on the ladder, drawing her sword in midair as she drops lightly to the ground.
CH_66_LVL_17_TITLE=Nobody Home
CH_66_LVL_17_DESC=Kim, Baymax and Captain Amelia enter Tinkerbell's house, where they find Gaston, John Silver and Maui staring vacantly at the Platinum Badge.
CH_66_LVL_18_TITLE=The Impossible
CH_66_LVL_18_DESC="Boys," mutters Kim, as she strides up and snatches the badge from mid-air. A silver shockwave erupts outward, wiping out the Creeps below.
CH_66_LVL_19_TITLE=Collectibles
CH_66_LVL_19_DESC="Onto the next one," says Kim. As the allies they left behind begin to join them in the clearing, Judy gathers everyone for the trek back.
CH_67_TITLE=Roll Playing
CH_67_LVL_1_TITLE=ERROR CODE 01
CH_67_LVL_1_DESC=With Hades defeated and City Center secured, the Order Team heads back towards the Midway, where Oogie-Boogie reigns.
CH_67_LVL_2_TITLE=ERROR CODE 02
CH_67_LVL_2_DESC=As they near the Midway, strange neon signs flicker in and out of existence. Every one advertises Oogie Boogie's Midway of Misery.
CH_67_LVL_3_TITLE=ERROR CODE 03
CH_67_LVL_3_DESC=Suddenly, a giant neon die appears, rolling towards the team! Everyone dodges in different directions, but something's up with it.
CH_67_LVL_4_TITLE=ERROR CODE 04
CH_67_LVL_4_DESC=Each side of the die has a different face on it! Merlin, Mrs. Incredible, Joy, Woody, Pleakley, and Chief Bogo. The die stops, showing Bogo.
CH_67_LVL_5_TITLE=ERROR CODE 05
CH_67_LVL_5_DESC="Bad Luck, Chief Bogo!" says a deep, sleazy voice from everywhere at once, and suddenly, Chief Bogo explodes into hundreds of glowing dice!
CH_67_LVL_6_TITLE=ERROR CODE 06
CH_67_LVL_6_DESC=The dice scatter everywhere. Merlin quickly casts a spell to try to reverse the change, but it's no good! Chief Bogo is gone!
CH_67_LVL_7_TITLE=ERROR CODE 07
CH_67_LVL_7_DESC=Woody hurls his lasso around the rolling die, but it yanks him off his feet! "Cheating means SNAKE EYES, lawman!" laughs Oogie Boogie.
CH_67_LVL_8_TITLE=ERROR CODE 08
CH_67_LVL_8_DESC=As the heroes watch in horror, all the faces on the die turn to Woody. Suddenly, his lasso turns into an angry, hissing snake!
CH_67_LVL_9_TITLE=ERROR CODE 09
CH_67_LVL_9_DESC="Easy there, easy," says Woody, but before anyone can react, the snake unhinges its jaw and lunges forward, gobbling Woody whole!
CH_67_LVL_10_TITLE=ERROR CODE 10
CH_67_LVL_10_DESC=Since Woody was still holding the snake's tail, it begins consuming itself as well. As the team looks on in horror, the snake disappears!
CH_67_LVL_11_TITLE=ERROR CODE 11
CH_67_LVL_11_DESC="Enough is enough, team. Find Oogie Boogie!" says Mrs. Incredible. "Oh, I'm not hiding," says the burlap boogeyman, emerging from the shadows.
CH_67_LVL_12_TITLE=ERROR CODE 12
CH_67_LVL_12_DESC=Oogie Boogie strolls forward, taking a bite out of a cotton candy covered in cockroaches. The Order Team squares up, ready to fight!
CH_67_LVL_13_TITLE=ERROR CODE 13
CH_67_LVL_13_DESC=As Mrs. Incredible swings a punch towards oogie boogie, he suddenly glitches out of existence, reappearing just out of harm's way.
CH_67_LVL_14_TITLE=ERROR CODE 14
CH_67_LVL_14_DESC=Mrs. Incredible aims another jab at Oogie Boogie. He dodges, and taps her extended arm. It glitches, then snaps back and begins wrapping her up!
CH_67_LVL_15_TITLE=ERROR CODE 15
CH_67_LVL_15_DESC=With Mrs. Incredible bound up like a christmas present, only a terrified Pleakley and Joy are left to oppose Oogie Boogie's complete victory.
CH_67_LVL_16_TITLE=ERROR CODE 16
CH_67_LVL_16_DESC=As Pleakley descends into gibbering terror, Joy slowly steps forward towards the buggy baddie, a serene smile on her face.
CH_67_LVL_17_TITLE=ERROR CODE 17
CH_67_LVL_17_DESC=Looks like the bug man's making himself at home.
CH_67_LVL_18_TITLE=ERROR CODE 18
CH_67_LVL_18_DESC=One by one, Order Team snaps back into existence, unharmed. Chief Bogo shoves the empty burlap sack that is Oogie Boogie into an evidence bag.
CH_67_LVL_19_TITLE=ERROR CODE 19
CH_67_LVL_19_DESC=Order Team heads towards the Black Market, where Ursula and Maleficent hold a wicked court. Leading the charge is Joy, the hero of the day!
CH_68_TITLE=Cooking Servers
CH_68_LVL_1_TITLE=Server 148
CH_68_LVL_1_DESC=Previously, the Tech Team realized that Platinum Badges will keep pulling the Tactical Team to different worlds when they appear.
CH_68_LVL_2_TITLE=Server 149
CH_68_LVL_2_DESC=Now, the Tech Team searches for a way to apply their new understanding of the Platinum badges to give the Tactical Team an edge.
CH_68_LVL_3_TITLE=Server 150
CH_68_LVL_3_DESC=Tron studies the data on mass Creep encounters. The Tactical Team is always getting ambushed! If only they could improve their monitoring...
CH_68_LVL_4_TITLE=Server 151
CH_68_LVL_4_DESC=Quorra wrestles with how to ensure the heroes get to the Platinum badges first when they appear. At present, they're at a disadvantage...
CH_68_LVL_5_TITLE=Server 152
CH_68_LVL_5_DESC=Now that they have data on a second Platinum badge, Yax wonders if it might be possible to create one artificially...
CH_68_LVL_6_TITLE=Server 153
CH_68_LVL_6_DESC=Tron, Quorra and Yax prepare to present their research proposals to Shank. They're all a little nervous, since Shank is pretty intense!
CH_68_LVL_7_TITLE=Server 154
CH_68_LVL_7_DESC=Tron struggles to develop a widespread early-warning system for Creeps. "What warning signs should I even be looking for?" he ponders.
CH_68_LVL_8_TITLE=Server 155
CH_68_LVL_8_DESC=Quorra begins her research by opening two Portals at once, and is shocked to discover that each is only half the size of normal!
CH_68_LVL_9_TITLE=Server 156
CH_68_LVL_9_DESC=Yax attempts to create an artificial Platinum badge. But as powerful as they are, it takes even more power to make one. A lot more.
CH_68_LVL_10_TITLE=Server 157
CH_68_LVL_10_DESC=By tapping into the network, Tron discovers he can determine if there's presently any Creeps near a Portal's exit. But what about the future?
CH_68_LVL_11_TITLE=Server 158
CH_68_LVL_11_DESC=Quorra has hit a wall. Each additional open Portal halves the size of each Portal's opening, quickly rendering them too small to enter.
CH_68_LVL_12_TITLE=Server 159
CH_68_LVL_12_DESC=Yax has also hit a wall. The energy required to create a Platinum badge is somehow more than the output of the entire City.
CH_68_LVL_13_TITLE=Server 160
CH_68_LVL_13_DESC=Shank calls the team together to hear the results of their efforts. It doesn't seem like they've had much success... or have they?
CH_68_LVL_14_TITLE=Server 161
CH_68_LVL_14_DESC=Shank explains that by combining the results of their research, they can lead the Creeps on a wild goose chase.
CH_68_LVL_15_TITLE=Server 162
CH_68_LVL_15_DESC="Quorra, as soon as Tactical Team is through the next Portal, you open tiny Portals to everywhere," Shanks instructs.
CH_68_LVL_16_TITLE=Server 163
CH_68_LVL_16_DESC=Shank turns to Yax. "Then you send bogus Platinum energy through all of them. With any luck, the Creeps will chase their tails."
CH_68_LVL_17_TITLE=Server 164
CH_68_LVL_17_DESC=Shank orders the Tech Team to prepare to execute their diversion as soon as the Tactical team goes through another Portal.
CH_68_LVL_18_TITLE=Server 165
CH_68_LVL_18_DESC=Hiro looks up from the Kimmunicator and gives a thumbs-up. "They're wrapping things up in Neverland, so we better hustle." Shank nods.
CH_68_LVL_19_TITLE=Server 166
CH_68_LVL_19_DESC=Tech Team hurries to ready their plan, preparing to activate as soon as the Tactical Team enters the portal in Neverland.
CH_69_TITLE=Picking Teams
CH_69_LVL_1_TITLE=Oasis Again
CH_69_LVL_1_DESC=Emerging from the Neverland Portal, the Combined Tactical Team is surprised to find themselves back at... the Oasis?
CH_69_LVL_2_TITLE=Huddle Up
CH_69_LVL_2_DESC=As Calhoun forms a perimeter with Gaston and Kristoff to prevent sudden ambush by Creeps, the group discusses their next move.
CH_69_LVL_3_TITLE=Beep My Hiro
CH_69_LVL_3_DESC=Kim decides to reach out to Hiro on the Kimmunicator, hoping for clarity on the absent Platinum Badge. "Hiro, what's going on? I'm not feeling anything."
CH_69_LVL_4_TITLE=Zero Battery
CH_69_LVL_4_DESC=We didn't see any Platinum Badges for a long time, and now we've seen two one after another. Maybe it needs to recharge? Hiro theorizes.
CH_69_LVL_5_TITLE=Let's Recharge
CH_69_LVL_5_DESC=Kim relays Hiro's theory that the Platinum Badge energy needs to recharge to the rest of the team. "In the meantime, I guess we wait here."
CH_69_LVL_6_TITLE=Picking Sides
CH_69_LVL_6_DESC=Calhoun and Judy Hopps decide to split the recently-joined Tactical Team into two units: the Oasis Defense Team and the Platinum Search Team!
CH_69_LVL_7_TITLE=Co-Captains
CH_69_LVL_7_DESC=The Oasis Defense team will be led by Judy Hopps and Agent Calhoun.
CH_69_LVL_8_TITLE=Boys, Scouting
CH_69_LVL_8_DESC=Kristoff, Sven, and Gaston will lead excursions into the desert to scout for Creeps and any resources that can be put to use at the Oasis.
CH_69_LVL_9_TITLE=Old Pro
CH_69_LVL_9_DESC=No one has more experience defending a base than Goliath, who will be in charge of preparing counter-siege tactics.
CH_69_LVL_10_TITLE=Science It!
CH_69_LVL_10_DESC=Jumba will be focused on continuing research on Platinum energy, coordinating with Hiro back in the Portal Room and Baymax in the field.
CH_69_LVL_11_TITLE=Fancy Flights
CH_69_LVL_11_DESC=Maui's ability to turn into a bird makes him crucial for long-range scouting of any Creep incursions that slip past Kristoff.
CH_69_LVL_12_TITLE=Re-Cursed
CH_69_LVL_12_DESC=Ducky and Bunny will be looking for cursed things, and trying not to break important, non-cursed things.
CH_69_LVL_13_TITLE=What About Us?
CH_69_LVL_13_DESC=The newly-formed Oasis Defense Team gathers together around Judy Hopps and Agent Calhoun. As for the Platinum Search Team...
CH_69_LVL_14_TITLE=Stand Ready
CH_69_LVL_14_DESC=To shorten their response time, everyone on the Platinum Search Team is assigned a dedicated task suited to their expertise.
CH_69_LVL_15_TITLE=Captain and Kim
CH_69_LVL_15_DESC=Captain Amelia will make the leadership decisions for the Platinum Badge Retrieval Team, while Kim Possible focuses on finding the badge.
CH_69_LVL_16_TITLE=Silver Lining
CH_69_LVL_16_DESC=Kida's flying Ketak gives the team eyes in the skies and the ability to traverse any terrestrial obstacles, making her an ideal scout.
CH_69_LVL_17_TITLE=Discipline
CH_69_LVL_17_DESC=When she's not keeping a wary eye on John Silver, Mulan will serve as auxiliary commander and Creep Combat specialist.
CH_69_LVL_18_TITLE=Shadow's Ally
CH_69_LVL_18_DESC=Darkwing Duck leads stealth incursions, while Stitch's resilience makes him perfect for exploring a wide variety of hostile environments.
CH_69_LVL_19_TITLE=Cold Comfort
CH_69_LVL_19_DESC=With Elsa's versatile ice powers and Baymax's scanners and medical support, the Platinum Badge Team is a force to be reckoned with!
CH_70_TITLE=Dark Dealing
CH_70_LVL_1_TITLE=ERROR CODE 20
CH_70_LVL_1_DESC=Having defeated Oogie Boogie, the Order Team makes for the Black Market, where it's rumored Ursula and Maleficent have taken over.
CH_70_LVL_2_TITLE=ERROR CODE 21
CH_70_LVL_2_DESC=As they move off the main streets and towards the nest of back alleys that make up the Black Market, the Heroes share their concerns.
CH_70_LVL_3_TITLE=ERROR CODE 22
CH_70_LVL_3_DESC=Moving down one back alley, then another, Merlin notes that the glitching seems much less severe here than it did in the other areas.
CH_70_LVL_4_TITLE=ERROR CODE 23
CH_70_LVL_4_DESC=As the Order Team enters the Black Market, they are suddenly swarmed by strange robed figures, offering terrifying deals!
CH_70_LVL_5_TITLE=ERROR CODE 24
CH_70_LVL_5_DESC="Sell me your string, cowboy!" cries out one hooded figure. "How much to buy your eye?" one whispers at a shuddering Pleakley.
CH_70_LVL_6_TITLE=ERROR CODE 25
CH_70_LVL_6_DESC=Suddenly, all the hooded remove their hoods, revealing...tentacles? Emerging from the center is a crowned figure... the Sea Witch, Ursula!
CH_70_LVL_7_TITLE=ERROR CODE 26
CH_70_LVL_7_DESC=Several of Ursula's tentacles grab Pleakley and carry him off! Before anyone can react, a few more carry Woody off in the other direction!
CH_70_LVL_8_TITLE=ERROR CODE 27
CH_70_LVL_8_DESC="Mrs. Incredible, take Merlin and save Pleakley," Chief Bogo shouts, charging off after Woody. "Joy and I are on Woody rescue."
CH_70_LVL_9_TITLE=ERROR CODE 28
CH_70_LVL_9_DESC=Mrs. Incredible and Merlin run towards the detached tentacles carrying Pleakley, whose shouted protests echo down the darkened alleyways.
CH_70_LVL_10_TITLE=ERROR CODE 29
CH_70_LVL_10_DESC="Merlin, cut them off!" shouts Mrs. Incredible. Merlin stretches out his hands in either direction, then brings them crashing together!
CH_70_LVL_11_TITLE=ERROR CODE 30
CH_70_LVL_11_DESC=Obeying Merlin, the alleyways ahead close themselves, blocking the tentacles' exit. Mrs. Incredible grabs Pleakley and yanks him back!
CH_70_LVL_12_TITLE=ERROR CODE 31
CH_70_LVL_12_DESC=Merlin, Mrs. Incredible and the liberated Pleakley charge towards Ursula's other tentacles, joining Chief Bogo and Joy to pull Woody free!
CH_70_LVL_13_TITLE=ERROR CODE 32
CH_70_LVL_13_DESC=Now free from her disembodied tentacles, the Order team converges on Ursula. She laughs, and separates into a mass of tentacles!
CH_70_LVL_14_TITLE=ERROR CODE 33
CH_70_LVL_14_DESC=Chief Bogo charges through the swarm of tentacles, Joy riding on his shoulders and cheering optimistic encouragement!
CH_70_LVL_15_TITLE=ERROR CODE 34
CH_70_LVL_15_DESC=Woody and Mrs. Incredible stand back-to-back, swinging lasso and stretchy-arms respectively, until the tentacles begin to recede.
CH_70_LVL_16_TITLE=ERROR CODE 35
CH_70_LVL_16_DESC=The mass of glitchy tentacles parts, fading away to nothing, revealing... Ursula, looking exhausted but grimly determined.
CH_70_LVL_17_TITLE=ERROR CODE 36
CH_70_LVL_17_DESC=The Order Team looks up to see Maleficent, in the form of a great black dragon, take flight and sail over their heads!
CH_70_LVL_18_TITLE=ERROR CODE 37
CH_70_LVL_18_DESC="Too late, Heroes! Far too late!" the wicked Maleficent cackles, the wind pressure of her wingbeats knocking the heroes to the ground.
CH_70_LVL_19_TITLE=ERROR CODE 38
CH_70_LVL_19_DESC=Pausing only to secure the defeated Ursula, the Order Team pursues Maleficent as she flies off toward City Center!
CH_71_TITLE=Look Homeward
CH_71_LVL_1_TITLE=All is Quiet
CH_71_LVL_1_DESC=The Heroes at the Oasis are doing well. The Oasis Defense Team keeps an eye out for Creeps before they can threaten the base.
CH_71_LVL_2_TITLE=Heroes On-Call
CH_71_LVL_2_DESC=Meanwhile, the Platinum Search Team waits on standby, ready to enter a new Portal when it appears... any minute now...
CH_71_LVL_3_TITLE=Portal Pop-In
CH_71_LVL_3_DESC=Suddenly, a Portal appears! "Platinum Search Team! Form ranks and prepare to advance!" bellows Captain Amelia. At her command, they gather.
CH_71_LVL_4_TITLE=Back To Before
CH_71_LVL_4_DESC=The Platinum Search Team surges through the Portal, arriving in an odd village. "Mulan, isn't this where you joined us?" asks Elsa.
CH_71_LVL_5_TITLE=Mulan's Malaise
CH_71_LVL_5_DESC=Yes. We're back in my village, answers Mulan. "But it's... it's not right. Everyone is gone, as before, but something feels even stranger."
CH_71_LVL_6_TITLE=Call to Action
CH_71_LVL_6_DESC=Captain Amelia quickly orders the Platinum Search Team into action.
CH_71_LVL_7_TITLE=Village Roads
CH_71_LVL_7_DESC=That's my family's shrine, Mulan informs the team. "I'll lead the way, but I worry what we may find at the end of this road."
CH_71_LVL_8_TITLE=Take Me Home
CH_71_LVL_8_DESC=Kim and Mulan lead the way to Mulan's family shrine. Darkwing lurks in the shadows, while John Silver and Baymax scan for Platinum energy.
CH_71_LVL_9_TITLE=Sky-eye and Ice
CH_71_LVL_9_DESC=Creeps are popping up nearby, but I don't see any swarms, reports Kida. Elsa quickly builds ice fortifications to defend the home Portal.
CH_71_LVL_10_TITLE=Not At Home?
CH_71_LVL_10_DESC=Kim pauses, waiting for Mulan, who keeps getting distracted: "Everything seems off, but... I don't remember how it SHOULD be."
CH_71_LVL_11_TITLE=Warmed Shoulder
CH_71_LVL_11_DESC=Mulan, my friend. Are you alright? asks Elsa, placing a hand on Mulan's shoulder. "I know how it feels to return home and find it changed."
CH_71_LVL_12_TITLE=Boiling Over
CH_71_LVL_12_DESC=But IS this my home? asks Mulan. "What was I doing here? I was looking for a teapot... but where is my father? My mother? The villagers?"
CH_71_LVL_13_TITLE=Creep Clarity
CH_71_LVL_13_DESC=Mulan's questions unnerve the team as they pass through the empty village. Suddenly, a swarm of Creeps erupts out of the snow all around them!
CH_71_LVL_14_TITLE=Battle Better
CH_71_LVL_14_DESC=The Creeps drive all questions from Mulan's mind. As she plunges her father's sword into the face of a Creep, she suddenly feels all better.
CH_71_LVL_15_TITLE=Clear Eyes
CH_71_LVL_15_DESC=Mulan carves a path through the Creeps, leading the rest of the Team towards the shrine of the Fa family. Kim is relieved, but curious, to see Mulan looking less troubled.
CH_71_LVL_16_TITLE=Platinum Shrine
CH_71_LVL_16_DESC=The team arrives at Mulan's family shrine, where the Platinum Badge floats in mid air. Kim Possible strides forward and grabs it.
CH_71_LVL_17_TITLE=Can't Go Back
CH_71_LVL_17_DESC=As the team enters the portal leading back to the Oasis, Mulan passes a final lingering gaze over her village.
CH_71_LVL_18_TITLE=Science Huddle
CH_71_LVL_18_DESC=Before portaling home, Baymax informs Jumba and Hiro of the plan's success. Both are concerned when Baymax mentions Mulan's brief crisis.
CH_71_LVL_19_TITLE=Foreshadowing
CH_71_LVL_19_DESC=It's probably nothing to worry about, says Hiro. "And even if it is, we are having enough to worry about already," chuckles Jumba.
CH_72_TITLE=Draconic Feint
CH_72_LVL_1_TITLE=ERROR CODE 39
CH_72_LVL_1_DESC=The Order Team managed to defeat Ursula in the Black Market, but the sea witch's defeat gave Maleficent the time she needed to escape!
CH_72_LVL_2_TITLE=ERROR CODE 40
CH_72_LVL_2_DESC=Recovering from the shock of a draconic Maleficent taking to the skies, the Order Team springs into action and engages pursuit!
CH_72_LVL_3_TITLE=ERROR CODE 41
CH_72_LVL_3_DESC=Putting Merlin's ominous memory of the future (or is it a prediction of the past?) aside, the Heroes chase Maleficent as she soars overhead!
CH_72_LVL_4_TITLE=ERROR CODE 42
CH_72_LVL_4_DESC=Suddenly, Maleficent unleashes a gout of scorching green flame-breath in the Fashion District! But there's something strange about the fire...
CH_72_LVL_5_TITLE=ERROR CODE 43
CH_72_LVL_5_DESC="More of that confounded bug stuff!" shouts Woody. Sure enough, as the flames touch clothes, they become outdated and tacky!
CH_72_LVL_6_TITLE=ERROR CODE 44
CH_72_LVL_6_DESC="She's just trying to distract us!" yells Mrs. Incredible, stretching a hand out across the flames. Before it snaps back, she gathers the others close.
CH_72_LVL_7_TITLE=ERROR CODE 45
CH_72_LVL_7_DESC=Mrs. Incredible pulls herself, along with the rest of the Order Team, high over the strange bug-flames spreading across the Fashion District.
CH_72_LVL_8_TITLE=ERROR CODE 46
CH_72_LVL_8_DESC=Landing safely, the Order Team runs after Maleficent. "You should have burned, Heroes! It would have been kinder than what awaits you!"
CH_72_LVL_9_TITLE=ERROR CODE 47
CH_72_LVL_9_DESC="Don't listen to her," says Joy. "I think it's good that we didn't get burned up!" Pleakley nods, not trusting himself to speak without throwing up.
CH_72_LVL_10_TITLE=ERROR CODE 48
CH_72_LVL_10_DESC=The tunnel to City Hall looms ahead, and to the Heroes' surprise, Maleficent dives and charges through it rather than soaring overhead.
CH_72_LVL_11_TITLE=ERROR CODE 49
CH_72_LVL_11_DESC="We've got her now," says Chief Bogo, leading the others after Maleficent into the tunnel. "Her wings won't do much good here."
CH_72_LVL_12_TITLE=ERROR CODE 50
CH_72_LVL_12_DESC="Think again, pathetic agents of so-called justice!" bellows Maleficent, slamming into the tunnel walls as she flies, cracking them!
CH_72_LVL_13_TITLE=ERROR CODE 51
CH_72_LVL_13_DESC=Maleficent's rampage is damaging the structural integrity of the tunnel! The Heroes pursue, with the tunnel collapsing just behind them!
CH_72_LVL_14_TITLE=ERROR CODE 52
CH_72_LVL_14_DESC=Chief Bogo picks up Pleakley and Joy for the final push through the collapsing tunnel, with Mrs. Incredible snagging just before he's crushed!
CH_72_LVL_15_TITLE=ERROR CODE 53
CH_72_LVL_15_DESC="Proud... of yourself... Heroes?" murmurs a weak voice. The Heroes turn to find a battered Maleficent, returned to her non-dragon form.
CH_72_LVL_16_TITLE=ERROR CODE 54
CH_72_LVL_16_DESC="On your guard, everyone. It's probably another trick!" orders Mrs. Incredible. "Ahaha... learning, are we?" spits Maleficent, her code flickering.
CH_72_LVL_17_TITLE=ERROR CODE 55
CH_72_LVL_17_DESC="Woody, Mrs. Incredible, secure her!" barks Chief Bogo. "Hiro! Hiro! We've got intel on a possible attack on the Portal Room! Do you copy?"
CH_72_LVL_18_TITLE=ERROR CODE 56
CH_72_LVL_18_DESC=No response. With no other options, the exhausted Order Team leaves the incapacitated Maleficent for CPD and takes off for the Portal Room.
CH_72_LVL_19_TITLE=TERMINAL ERROR
CH_72_LVL_19_DESC=Outside the Portal Room, a new dark alliance prepares to strike. Who is Maleficent's Toxic Squad? And what do they want with the Portals?
CH_73_TITLE=Oasis Assault
CH_73_LVL_1_TITLE=Base Building
CH_73_LVL_1_DESC=Back at Base, the Oasis Defense team goes about the business of preparing for any and all potential Creep attacks. Vigilance takes effort!
CH_73_LVL_2_TITLE=Morning Report
CH_73_LVL_2_DESC=Judy Hopps, co-leader of the Oasis Defense Team, kicks off the morning by radioing the Defense Team Scouts for an update.
CH_73_LVL_3_TITLE=Weak Won't Work
CH_73_LVL_3_DESC=While Judy checks in with the scouts, co-leader Agent Calhoun discusses setting up new defenses in the base's weak spots.
CH_73_LVL_4_TITLE=To the Lab
CH_73_LVL_4_DESC=Judy heads over to the makeshift lab near the Portal. She notices Ducky and Bunny interrogating a "cursed" flower and just keeps walking by.
CH_73_LVL_5_TITLE=Mumbo Jumba
CH_73_LVL_5_DESC=Jumba informs Judy that ambient nearby Platinum energy is down to zero. "At present, Kim Possible is only source of energy," he explains.
CH_73_LVL_6_TITLE=Call to Action
CH_73_LVL_6_DESC=As Judy Hopps jogs back to the forward defenses, she suddenly receives a call on her radio that makes her break into a run!
CH_73_LVL_7_TITLE=Back to Base!
CH_73_LVL_7_DESC=On Calhoun's orders, Kristoff, Sven and Gaston charge across the Desert and make it back to the Oasis just as the swarm crests the horizon.
CH_73_LVL_8_TITLE=Error in Judgement
CH_73_LVL_8_DESC=Creeps swarm endlessly over the sand, a terrible, glitchy battle cry rising as a single scream from a thousand mouths: PURGE THE ERRORS!!!
CH_73_LVL_9_TITLE=Testing Time
CH_73_LVL_9_DESC=We had been hoping to field-test the defensive upgrades, says a rumbling baritone voice from behind Calhoun. She smiles. Goliath is right.
CH_73_LVL_10_TITLE=Ring Rope
CH_73_LVL_10_DESC=At Calhoun's signal, Kristoff and Gaston pull a huge metal ring attached to a long rope buried just under the sand. But why? Stay tuned!
CH_73_LVL_11_TITLE=Sand Swallower
CH_73_LVL_11_DESC=On cue, Creeps are swallowed up by sand by the dozen! The pullstring-activated hidden sandpit traps work great, but the Creeps keep coming!
CH_73_LVL_12_TITLE=Make It Count
CH_73_LVL_12_DESC=With the Creep swarm scattered, Calhoun begins taking shots at Creep leadership, while Judy Hopps targets the healers with her strong kicks!
CH_73_LVL_13_TITLE=Feinting Foes
CH_73_LVL_13_DESC=Though there are still lots of Creeps, they begin to appear like less of a swarm and more of a swamp. Glitching data spills on the sand.
CH_73_LVL_14_TITLE=It Can't Be
CH_73_LVL_14_DESC=A deafening, discordant howl arises from the north, shaking every tree in the Oasis. Calhoun drops her radio, startled. It can't be...
CH_73_LVL_15_TITLE=It Is.
CH_73_LVL_15_DESC=Judy Hopps scrambles up to a lookout post at the north end of the Oasis. She peers out over the horizon, hoping desperately not to see...
CH_73_LVL_16_TITLE=Too Late To Run
CH_73_LVL_16_DESC=But it would seem hope holds no power over what's charging towards the Oasis from the north. Judy grabs her radio and shouts a warning.
CH_73_LVL_17_TITLE=Sandpede
CH_73_LVL_17_DESC=The Mega Virus charges across the sand like a hurricane on legs. Is there any hope of victory? Or even survival?
CH_73_LVL_18_TITLE=Darkest Hour
CH_73_LVL_18_DESC=Calhoun races towards the south, shouting desperate orders into her walkie-talkie. But what can be done?
CH_73_LVL_19_TITLE=Desperate Hope
CH_73_LVL_19_DESC=Time seems to freeze. The southern defensive structures are scattered. The Mega Virus has almost reached the Oasis. Can anything be done?
CH_74_TITLE=Cold Servers
CH_74_LVL_1_TITLE=Server 167
CH_74_LVL_1_DESC=In the Server Room, Tech Team leader Shank studies her tactical info-streams. Looks like the Order Team brought down Maleficent, but...
CH_74_LVL_2_TITLE=Server 168
CH_74_LVL_2_DESC=ENTRY OPEN flashes on every screen in the Server Room! But before anyone can react, the door is blown open by green plasma!
CH_74_LVL_3_TITLE=Server 169
CH_74_LVL_3_DESC=Shank quickly tries to muster the defenses, but the Tech Team is caught totally off guard by the Toxic Team's well-organized assault.
CH_74_LVL_4_TITLE=Server 170
CH_74_LVL_4_DESC=The Evil Queen asks her Magic Mirror who the biggest threat on the Tech Team is. To the surprise of everyone, it names Hiro!
CH_74_LVL_5_TITLE=Server 171
CH_74_LVL_5_DESC=Begrudgingly following the Evil Queen's command, the Horned King sends several Cauldron Born after Hiro, interrupting his countermeasures!
CH_74_LVL_6_TITLE=Server 172
CH_74_LVL_6_DESC=The Cauldron Born swarm towards Hiro, who ducks into the server stacks, hoping to either summon his bots or call Kim. No luck!
CH_74_LVL_7_TITLE=Server 173
CH_74_LVL_7_DESC=Gizmoduck rushes forward, blocking the advance of his familiar foe, Negaduck. Evenly matched, they clash in a cloud of bills and feathers!
CH_74_LVL_8_TITLE=Server 174
CH_74_LVL_8_DESC=Yax's protective shield of good vibes is shattered by the force of Mayor Bellwether's smiling passive-aggression! Yax withers like a leaf!
CH_74_LVL_9_TITLE=Server 175
CH_74_LVL_9_DESC="Good effort, but let's see some hustle!" smirks Bellwether, as she fires a dart into Negaduck. With new strength, he charges through Gizmoduck.
CH_74_LVL_10_TITLE=Server 176
CH_74_LVL_10_DESC=The Evil Queen leads the Toxic Team past the defeated Yax and Gizmoduck, as The Horned King's Cauldron Born keep Shanks and Hiro pinned.
CH_74_LVL_11_TITLE=Server 177
CH_74_LVL_11_DESC=Quorra and Tron move to block the Toxic Team's path! Can the digital defenders protect the precious Portal? It's honestly not looking great.
CH_74_LVL_12_TITLE=Server 178
CH_74_LVL_12_DESC=Quorra leaps for the Evil Queen, but is blown back by an energy-blast cheapshot."So brave! You remind me of someone I can't stand," smirks Shego.
CH_74_LVL_13_TITLE=Server 179
CH_74_LVL_13_DESC=As Shego and Quorra trade skillful strikes, Tron stands sentinel by the Portal, staring down the Evil Queen. "No farther, malware," he spits.
CH_74_LVL_14_TITLE=Server 180
CH_74_LVL_14_DESC=Tron's programming prevents him from doing anything to stop the Toxic Team, due to the Evil Queen having ill-gotten Admin Access.
CH_74_LVL_15_TITLE=Server 181
CH_74_LVL_15_DESC=Shank and Hiro swarmed by Cauldron Born, Yax dazed, Gizmoduck clobbered, Tron unable to act, and Quorra fighting Shego... Toxic Team wins?
CH_74_LVL_16_TITLE=Server 182
CH_74_LVL_16_DESC=With the entire Tech Team defeated, neutralized, or distracted, the Toxic Team passes through the undefended Portal, one by one.
CH_74_LVL_17_TITLE=Server 183
CH_74_LVL_17_DESC=And with that, the Toxic Team vanishes through the Portal. Quorra, hot on the heels of the escaping Shego, stops just short of following.
CH_74_LVL_18_TITLE=Server 184
CH_74_LVL_18_DESC=Working together, the Tech Team makes quick work of the remaining Cauldron Born, but mopping up distractions is a hollow victory.
CH_74_LVL_19_TITLE=Server 185
CH_74_LVL_19_DESC=Shanks scowls. The Toxic Team knew just where to hit everyone where they were weakest. But to what purpose? Where did that Portal lead?
CH_75_TITLE=The Anti-Virus
CH_75_LVL_1_TITLE=Virus Violence
CH_75_LVL_1_DESC=The Heroes of the Oasis Defense Team have just resisted a swarm of Creeps, only to be ambushed from the other direction by the Mega Virus!
CH_75_LVL_2_TITLE=Virus Violence
CH_75_LVL_2_DESC=The Heroes of the Oasis Defense Team have just resisted a swarm of Creeps, only to be ambushed from the other direction by the Mega Virus!
CH_75_LVL_3_TITLE=Virus Violence
CH_75_LVL_3_DESC=The Heroes of the Oasis Defense Team have just resisted a swarm of Creeps, only to be ambushed from the other direction by the Mega Virus!
CH_75_LVL_4_TITLE=Standing Tall
CH_75_LVL_4_DESC=As Judy Hopps looks into the embodied malevolence that is the Mega Virus, she hears a flap of heavy wings behind her.
CH_75_LVL_5_TITLE=Standing Tall
CH_75_LVL_5_DESC=As Judy Hopps looks into the embodied malevolence that is the Mega Virus, she hears a flap of heavy wings behind her.
CH_75_LVL_6_TITLE=Standing Tall
CH_75_LVL_6_DESC=As Judy Hopps looks into the embodied malevolence that is the Mega Virus, she hears a flap of heavy wings behind her.
CH_75_LVL_7_TITLE=Face the Truth
CH_75_LVL_7_DESC=Despite Judy and Goliath's brave words, the Mega Virus races towards them like an avalanche on legs. Can any defense be possible?
CH_75_LVL_8_TITLE=Face the Truth
CH_75_LVL_8_DESC=Despite Judy and Goliath's brave words, the Mega Virus races towards them like an avalanche on legs. Can any defense be possible?
CH_75_LVL_9_TITLE=Face the Truth
CH_75_LVL_9_DESC=Despite Judy and Goliath's brave words, the Mega Virus races towards them like an avalanche on legs. Can any defense be possible?
CH_75_LVL_10_TITLE=Showing Up
CH_75_LVL_10_DESC=Sven trots up, Kristoff on his back. Gaston follows close behind, silently eating eggs. Maui swoops down, reverting to human as he lands.
CH_75_LVL_11_TITLE=Showing Up
CH_75_LVL_11_DESC=Sven trots up, Kristoff on his back. Gaston follows close behind, silently eating eggs. Maui swoops down, reverting to human as he lands.
CH_75_LVL_12_TITLE=Showing Up
CH_75_LVL_12_DESC=Sven trots up, Kristoff on his back. Gaston follows close behind, silently eating eggs. Maui swoops down, reverting to human as he lands.
CH_75_LVL_13_TITLE=Quiet Dignity
CH_75_LVL_13_DESC=Calhoun reaches the defenders. No one tries to speak over the calamitous noise. All simply turn, square their shoulders, and prepare to fight.
CH_75_LVL_14_TITLE=Quiet Dignity
CH_75_LVL_14_DESC=Calhoun reaches the defenders. No one tries to speak over the calamitous noise. All simply turn, square their shoulders, and prepare to fight.
CH_75_LVL_15_TITLE=Quiet Dignity
CH_75_LVL_15_DESC=Calhoun reaches the defenders. No one tries to speak over the calamitous noise. All simply turn, square their shoulders, and prepare to fight.
CH_75_LVL_16_TITLE=Many Last Words
CH_75_LVL_16_DESC=As the terrifying Mega Virus bears down on them, the Oasis Defense Team stands to face it without a trace of doubt on their determined faces.
CH_75_LVL_17_TITLE=Many Last Words
CH_75_LVL_17_DESC=As the terrifying Mega Virus bears down on them, the Oasis Defense Team stands to face it without a trace of doubt on their determined faces.
CH_75_LVL_18_TITLE=Many Last Words
CH_75_LVL_18_DESC=As the terrifying Mega Virus bears down on them, the Oasis Defense Team stands to face it without a trace of doubt on their determined faces.
CH_75_LVL_19_TITLE=News You Can Use
CH_75_LVL_19_DESC=Over the walkie, Jumba relays the news that may turn the tide: "It is Platinum Retrieval Team! They have returned!" But will it do any good?
CH_76_TITLE=Distract and Attack
CH_76_LVL_1_TITLE=Cold Reception
CH_76_LVL_1_DESC=Suddenly, a wave of cold blasts outward from the Oasis, turning the surrounding sands to ice! The Mega Virus' legs begin slipping and sliding!
CH_76_LVL_2_TITLE=Cold Reception
CH_76_LVL_2_DESC=Suddenly, a wave of cold blasts outward from the Oasis, turning the surrounding sands to ice! The Mega Virus' legs begin slipping and sliding!
CH_76_LVL_3_TITLE=Cold Reception
CH_76_LVL_3_DESC=Suddenly, a wave of cold blasts outward from the Oasis, turning the surrounding sands to ice! The Mega Virus' legs begin slipping and sliding!
CH_76_LVL_4_TITLE=Buzzing Birds
CH_76_LVL_4_DESC=Kida soars overhead on her Ketak, drawing the Mega Virus's attention away from the Oasis! Maui takes off in bird form to assist her.
CH_76_LVL_5_TITLE=Buzzing Birds
CH_76_LVL_5_DESC=Kida soars overhead on her Ketak, drawing the Mega Virus's attention away from the Oasis! Maui takes off in bird form to assist her.
CH_76_LVL_6_TITLE=Buzzing Birds
CH_76_LVL_6_DESC=Kida soars overhead on her Ketak, drawing the Mega Virus's attention away from the Oasis! Maui takes off in bird form to assist her.
CH_76_LVL_7_TITLE=Stitch and Climb
CH_76_LVL_7_DESC=Sven charges forward, Kristoff on his back, and Stitch on Kristoff's back! As they near the Mega Virus, Stitch leaps off and begins climbing it!
CH_76_LVL_8_TITLE=Stitch and Climb
CH_76_LVL_8_DESC=Sven charges forward, Kristoff on his back, and Stitch on Kristoff's back! As they near the Mega Virus, Stitch leaps off and begins climbing it!
CH_76_LVL_9_TITLE=Stitch and Climb
CH_76_LVL_9_DESC=Sven charges forward, Kristoff on his back, and Stitch on Kristoff's back! As they near the Mega Virus, Stitch leaps off and begins climbing it!
CH_76_LVL_10_TITLE=Running Red
CH_76_LVL_10_DESC=Suddenly, a flash of red hair as Kim Possible charges directly at the Mega Virus, platinum energy streaking behind her like the tail of a comet!
CH_76_LVL_11_TITLE=Running Red
CH_76_LVL_11_DESC=Suddenly, a flash of red hair as Kim Possible charges directly at the Mega Virus, platinum energy streaking behind her like the tail of a comet!
CH_76_LVL_12_TITLE=Running Red
CH_76_LVL_12_DESC=Suddenly, a flash of red hair as Kim Possible charges directly at the Mega Virus, platinum energy streaking behind her like the tail of a comet!
CH_76_LVL_13_TITLE=Brought to Heel
CH_76_LVL_13_DESC=As Kim nears it, the Mega Virus slows... and then, the impossible happens. It stops, less than a hundred feet from the Base!
CH_76_LVL_14_TITLE=Brought to Heel
CH_76_LVL_14_DESC=As Kim nears it, the Mega Virus slows... and then, the impossible happens. It stops, less than a hundred feet from the Base!
CH_76_LVL_15_TITLE=Brought to Heel
CH_76_LVL_15_DESC=As Kim nears it, the Mega Virus slows... and then, the impossible happens. It stops, less than a hundred feet from the Base!
CH_76_LVL_16_TITLE=Call Me, Beat You
CH_76_LVL_16_DESC=Kim Possible races towards the Mega Virus, leaping up to deliver a flying kick! Of course, nothing happens... wait, what? She knocked it down?
CH_76_LVL_17_TITLE=Call Me, Beat You
CH_76_LVL_17_DESC=Kim Possible races towards the Mega Virus, leaping up to deliver a flying kick! Of course, nothing happens... wait, what? She knocked it down?
CH_76_LVL_18_TITLE=Call Me, Beat You
CH_76_LVL_18_DESC=Kim Possible races towards the Mega Virus, leaping up to deliver a flying kick! Of course, nothing happens... wait, what? She knocked it down?
CH_76_LVL_19_TITLE=Pressing Their Lead
CH_76_LVL_19_DESC=With the Mega Virus knocked down, the Oasis Defense Team and Platinum Retrieval Team rush forward to make the most of the upper hand!
CH_77_TITLE=Energy Spike
CH_77_LVL_1_TITLE=Cold Steel
CH_77_LVL_1_DESC=Elsa uses ice to slow the toppled Mega Virus's recovery. Stitch claws at its face as Mulan, Maui and Goliath attack with sword, hook, and claw!
CH_77_LVL_2_TITLE=Cold Steel
CH_77_LVL_2_DESC=Elsa uses ice to slow the toppled Mega Virus's recovery. Stitch claws at its face as Mulan, Maui and Goliath attack with sword, hook, and claw!
CH_77_LVL_3_TITLE=Cold Steel
CH_77_LVL_3_DESC=Elsa uses ice to slow the toppled Mega Virus's recovery. Stitch claws at its face as Mulan, Maui and Goliath attack with sword, hook, and claw!
CH_77_LVL_4_TITLE=Ready, Aim, Fire!
CH_77_LVL_4_DESC=John Silver, Gaston, Darkwing and Calhoun let fly with a variety of ranged attacks, pouring more hurt onto the incapacitated Mega Virus!
CH_77_LVL_5_TITLE=Ready, Aim, Fire!
CH_77_LVL_5_DESC=John Silver, Gaston, Darkwing and Calhoun let fly with a variety of ranged attacks, pouring more hurt onto the incapacitated Mega Virus!
CH_77_LVL_6_TITLE=Ready, Aim, Fire!
CH_77_LVL_6_DESC=John Silver, Gaston, Darkwing and Calhoun let fly with a variety of ranged attacks, pouring more hurt onto the incapacitated Mega Virus!
CH_77_LVL_7_TITLE=Scream Scrambled
CH_77_LVL_7_DESC=Suddenly, the Mega Virus lets out a terrifying scream, the force of which sends both teams flying backwards into the sand!
CH_77_LVL_8_TITLE=Scream Scrambled
CH_77_LVL_8_DESC=Suddenly, the Mega Virus lets out a terrifying scream, the force of which sends both teams flying backwards into the sand!
CH_77_LVL_9_TITLE=Scream Scrambled
CH_77_LVL_9_DESC=Suddenly, the Mega Virus lets out a terrifying scream, the force of which sends both teams flying backwards into the sand!
CH_77_LVL_10_TITLE=Vanished Virus
CH_77_LVL_10_DESC=Before the heroes can pull themselves back together, the Mega Virus charges away as suddenly as it appeared!
CH_77_LVL_11_TITLE=Vanished Virus
CH_77_LVL_11_DESC=Before the heroes can pull themselves back together, the Mega Virus charges away as suddenly as it appeared!
CH_77_LVL_12_TITLE=Vanished Virus
CH_77_LVL_12_DESC=Before the heroes can pull themselves back together, the Mega Virus charges away as suddenly as it appeared!
CH_77_LVL_13_TITLE=Now What?
CH_77_LVL_13_DESC=Jumba emerges from the Oasis, stroking his chin. "It would seem Platinum Energy is having utility we were not aware of," he says.
CH_77_LVL_14_TITLE=Now What?
CH_77_LVL_14_DESC=Jumba emerges from the Oasis, stroking his chin. "It would seem Platinum Energy is having utility we were not aware of," he says.
CH_77_LVL_15_TITLE=Now What?
CH_77_LVL_15_DESC=Jumba emerges from the Oasis, stroking his chin. "It would seem Platinum Energy is having utility we were not aware of," he says.
CH_77_LVL_16_TITLE=The Chase Is On
CH_77_LVL_16_DESC=With the virus on the move, the heroes now must hunt it down, before it wreaks havoc somewhere else!
CH_77_LVL_17_TITLE=The Chase Is On
CH_77_LVL_17_DESC=With the virus on the move, the heroes now must hunt it down, before it wreaks havoc somewhere else!
