CH_107_LVL_4_TITLE=Gentle Landing
CH_107_LVL_4_DESC=The chaos fades. The noise disappears. All the heroes feel themselves carried, weightless, inside a calm current of Platinum light: no pain, no fear, only quiet.
CH_107_LVL_5_TITLE=Gentle Landing
