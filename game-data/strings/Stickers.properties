SOCIAL_BUTTERFLY_TITLE=Social Butterfly
SOCIAL_BUTTERFLY_DESC=Receive a private chat message from 5 different friends in a day.
SOCIAL_BUTTERFLY_TOOLTIP=Private chat messages only. Must be 5 different friends.
TO_CATCH_A_STAR_TITLE=Catch a Star
TO_CATCH_A_STAR_DESC=3-Star every major stage in Chapter 4 of the Normal Campaign.
