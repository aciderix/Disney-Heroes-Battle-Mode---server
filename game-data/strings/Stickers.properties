CELEBRITY_OF_THE_WEEK_TITLE=Celebrity of the Week
CELEBRITY_OF_THE_WEEK_DESC=Collect at least 25 Hero Chips for the same hero from the Elite Campaign in one week.
THE_POWER_OF_FRIENDSHIP_TITLE=The Power of Friendship
THE_POWER_OF_FRIENDSHIP_DESC=Win any 50 friend campaign fights in a week.
GUILD_MAGNET_TITLE=Guild Magnet
GUILD_MAGNET_DESC=Contribute 20,000 influence to a single Guild this week.
