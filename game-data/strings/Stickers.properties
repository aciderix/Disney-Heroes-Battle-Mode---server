YOURE_NUMBER_ONE_TITLE=You're Number One!
YOURE_NUMBER_ONE_DESC=Win 5 fights in the Arena in a single day.
THE_NAMES_NICK_TITLE=The Name's Wilde
THE_NAMES_NICK_DESC=Collect 20 Nick Hero Chips from the Elite Campaign.
ON_THE_CASE_TITLE=On the Case
